<svg viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,'Segoe UI',Roboto,system-ui,sans-serif">
  <defs>
    <style>
      .title{font-size:22px;font-weight:700;fill:#0f172a;}
      .sub{font-size:13px;fill:#64748b;}
      .head{font-size:16px;font-weight:700;}
      .mono{font-size:12.5px;font-family:ui-monospace,'SF Mono',Menlo,monospace;}
      .lbl{font-size:12px;fill:#475569;}
      .tag{font-size:11px;font-weight:700;fill:#fff;}
    </style>
  </defs>
  <rect width="1000" height="560" fill="#fbfbf8"/>
  <text x="40" y="46" class="title">Due politiche di default a confronto (ACL inbound)</text>
  <text x="40" y="68" class="sub">L'ordine è top-down, primo match vince. Cambia solo l'ULTIMA riga: è lei a definire la politica di default.</text>

  <!-- LEFT: LAN default allow -->
  <rect x="40" y="100" width="440" height="420" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <rect x="40" y="100" width="440" height="46" rx="14" fill="#2563eb"/>
  <text x="60" y="130" class="head" fill="#fff">Interfacce LAN — DEFAULT ALLOW</text>
  <text x="60" y="172" class="lbl" font-weight="700" fill="#1d4ed8">«tutto permesso se non esplicitamente negato»</text>

  <!-- rules left -->
  <g>
    <rect x="60" y="190" width="400" height="42" rx="8" fill="#dcfce7"/>
    <rect x="60" y="190" width="56" height="42" rx="8" fill="#16a34a"/><text x="70" y="216" class="tag">PERMIT</text>
    <text x="128" y="216" class="mono" fill="#166534">eccezioni puntuali (es. reply server)</text>

    <rect x="60" y="242" width="400" height="42" rx="8" fill="#fee2e2"/>
    <rect x="60" y="242" width="56" height="42" rx="8" fill="#dc2626"/><text x="76" y="268" class="tag">DENY</text>
    <text x="128" y="268" class="mono" fill="#991b1b">deny ip &lt;subnet&gt; 10.0.0.0 0.0.255.255</text>

    <rect x="60" y="294" width="400" height="42" rx="8" fill="#fee2e2"/>
    <rect x="60" y="294" width="56" height="42" rx="8" fill="#dc2626"/><text x="76" y="320" class="tag">DENY</text>
    <text x="128" y="320" class="mono" fill="#991b1b">…altri blocchi specifici…</text>

    <rect x="60" y="346" width="400" height="50" rx="8" fill="#bbf7d0" stroke="#16a34a" stroke-width="2.5"/>
    <rect x="60" y="346" width="56" height="50" rx="8" fill="#15803d"/><text x="70" y="375" class="tag">PERMIT</text>
    <text x="128" y="370" class="mono" font-weight="700" fill="#14532d">permit ip any any</text>
    <text x="128" y="388" class="lbl" fill="#15803d">← riga di DEFAULT (tutto il resto passa)</text>
  </g>
  <text x="60" y="430" class="lbl">Adatto a: Subnet A, C, D, DMZ, Server Farm</text>
  <text x="60" y="452" class="lbl">Vantaggio: poche eccezioni, rete interna fluida.</text>
  <text x="60" y="474" class="lbl">Rischio: una porta nuova è aperta di default →</text>
  <text x="60" y="494" class="lbl">richiede disciplina nel manutenere i deny.</text>

  <!-- RIGHT: WAN/tunnel default deny -->
  <rect x="520" y="100" width="440" height="420" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <rect x="520" y="100" width="440" height="46" rx="14" fill="#dc2626"/>
  <text x="540" y="130" class="head" fill="#fff">WAN &amp; Tunnel — DEFAULT DENY</text>
  <text x="540" y="172" class="lbl" font-weight="700" fill="#b91c1c">«tutto negato se non esplicitamente permesso»</text>

  <g>
    <rect x="540" y="190" width="400" height="42" rx="8" fill="#fee2e2"/>
    <rect x="540" y="190" width="56" height="42" rx="8" fill="#dc2626"/><text x="556" y="216" class="tag">DENY</text>
    <text x="608" y="216" class="mono" fill="#991b1b">anti-spoofing (RFC1918, bogon) log</text>

    <rect x="540" y="242" width="400" height="42" rx="8" fill="#dcfce7"/>
    <rect x="540" y="242" width="56" height="42" rx="8" fill="#16a34a"/><text x="550" y="268" class="tag">PERMIT</text>
    <text x="608" y="268" class="mono" fill="#166534">permit tcp any host 10.0.5.50 eq 443</text>

    <rect x="540" y="294" width="400" height="42" rx="8" fill="#dcfce7"/>
    <rect x="540" y="294" width="56" height="42" rx="8" fill="#16a34a"/><text x="550" y="320" class="tag">PERMIT</text>
    <text x="608" y="320" class="mono" fill="#166534">…altri servizi esposti / tunnel…</text>

    <rect x="540" y="346" width="400" height="50" rx="8" fill="#fecaca" stroke="#dc2626" stroke-width="2.5"/>
    <rect x="540" y="346" width="56" height="50" rx="8" fill="#991b1b"/><text x="556" y="375" class="tag">DENY</text>
    <text x="608" y="370" class="mono" font-weight="700" fill="#7f1d1d">deny ip any any</text>
    <text x="608" y="388" class="lbl" fill="#b91c1c">← riga di DEFAULT (tutto il resto cade)</text>
  </g>
  <text x="540" y="430" class="lbl">Adatto a: interfaccia WAN (Gi0/4) e tunnel</text>
  <text x="540" y="452" class="lbl">VPN site-to-site (Tunnel0) sopra la WAN.</text>
  <text x="540" y="474" class="lbl">Vantaggio: superficie d'attacco minima — ciò</text>
  <text x="540" y="494" class="lbl">che non è previsto è già bloccato (fail-safe).</text>
</svg>
