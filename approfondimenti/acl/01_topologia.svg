<svg viewBox="0 0 1000 680" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, 'Segoe UI', Roboto, system-ui, sans-serif">
  <defs>
    <style>
      .title { font-size: 22px; font-weight: 700; fill: #0f172a; }
      .sub   { font-size: 13px; fill: #64748b; }
      .zname { font-size: 14.5px; font-weight: 700; }
      .net   { font-size: 12px; font-family: ui-monospace,'SF Mono',Menlo,monospace; fill:#334155; }
      .prof  { font-size: 11px; fill:#475569; }
      .iflbl { font-size: 11.5px; font-weight:700; font-family: ui-monospace,'SF Mono',Menlo,monospace; }
      .rt    { font-size: 15px; font-weight:700; fill:#f8fafc; }
      .rtsub { font-size: 11px; fill:#cbd5e1; }
    </style>
    <marker id="dot" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5"><circle cx="3.5" cy="3.5" r="3" fill="#475569"/></marker>
  </defs>

  <rect width="1000" height="680" fill="#fbfbf8"/>
  <text x="40" y="46" class="title">Topologia &amp; piano interfacce</text>
  <text x="40" y="68" class="sub">Router con interfacce fisiche dedicate · ACL applicate inbound (in) su ogni interfaccia · zone colorate per livello di fiducia</text>

  <!-- links (drawn first, behind boxes) -->
  <g stroke="#94a3b8" stroke-width="2.5" fill="none">
    <line x1="500" y1="150" x2="500" y2="300"/>            <!-- WAN -->
    <line x1="250" y1="250" x2="430" y2="320"/>            <!-- A -->
    <line x1="250" y1="345" x2="430" y2="345"/>            <!-- B -->
    <line x1="250" y1="440" x2="430" y2="370"/>            <!-- C -->
    <line x1="250" y1="535" x2="430" y2="395"/>            <!-- D -->
    <line x1="570" y1="345" x2="760" y2="280"/>            <!-- DMZ -->
    <line x1="570" y1="375" x2="760" y2="470"/>            <!-- Farm -->
  </g>

  <!-- interface labels on links -->
  <g class="iflbl" fill="#1e293b">
    <rect x="455" y="218" width="58" height="20" rx="5" fill="#fee2e2"/><text x="461" y="232" fill="#b91c1c">Gi0/4</text>
    <rect x="318" y="270" width="58" height="20" rx="5" fill="#e0e7ff"/><text x="324" y="284" fill="#3730a3">Gi0/0</text>
    <rect x="318" y="335" width="58" height="20" rx="5" fill="#e0e7ff"/><text x="324" y="349" fill="#3730a3">Gi0/1</text>
    <rect x="318" y="400" width="58" height="20" rx="5" fill="#ede9fe"/><text x="324" y="414" fill="#6d28d9">Gi0/2</text>
    <rect x="318" y="462" width="58" height="20" rx="5" fill="#e0e7ff"/><text x="324" y="476" fill="#3730a3">Gi0/3</text>
    <rect x="625" y="298" width="58" height="20" rx="5" fill="#ffedd5"/><text x="631" y="312" fill="#c2410c">Gi0/5</text>
    <rect x="625" y="408" width="58" height="20" rx="5" fill="#ccfbf1"/><text x="631" y="422" fill="#0f766e">Gi0/6</text>
  </g>

  <!-- Router -->
  <rect x="430" y="300" width="140" height="90" rx="12" fill="#1e293b"/>
  <text x="500" y="335" text-anchor="middle" class="rt">ROUTER</text>
  <text x="500" y="356" text-anchor="middle" class="rtsub">filtraggio ACL inbound</text>
  <text x="500" y="372" text-anchor="middle" class="rtsub">+ NAT</text>

  <!-- Internet / WAN -->
  <g>
    <ellipse cx="500" cy="120" rx="92" ry="46" fill="#fef2f2" stroke="#dc2626" stroke-width="2.5"/>
    <text x="500" y="112" text-anchor="middle" class="zname" fill="#b91c1c">Internet / WAN</text>
    <text x="500" y="132" text-anchor="middle" class="prof" fill="#dc2626">untrusted · anti-spoofing</text>
    <text x="500" y="149" text-anchor="middle" class="net">IP pubblico</text>
  </g>

  <!-- LAN A -->
  <g>
    <rect x="40" y="210" width="210" height="80" rx="10" fill="#eff4ff" stroke="#2563eb" stroke-width="2"/>
    <text x="56" y="234" class="zname" fill="#1d4ed8">Subnet A · Utenti</text>
    <text x="56" y="254" class="net">10.0.1.0/24 · GW .1</text>
    <text x="56" y="273" class="prof">Internet only — isolamento laterale · file server .100</text>
  </g>
  <!-- LAN B -->
  <g>
    <rect x="40" y="305" width="210" height="80" rx="10" fill="#eff4ff" stroke="#2563eb" stroke-width="2"/>
    <text x="56" y="329" class="zname" fill="#1d4ed8">Subnet B · Risorse</text>
    <text x="56" y="349" class="net">10.0.2.0/24 · GW .1</text>
    <text x="56" y="368" class="prof">Solo file server Subnet A — no Internet</text>
  </g>
  <!-- LAN C -->
  <g>
    <rect x="40" y="400" width="210" height="80" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="56" y="424" class="zname" fill="#6d28d9">Subnet C · Privilegiato</text>
    <text x="56" y="444" class="net">10.0.3.0/24 · GW .1</text>
    <text x="56" y="463" class="prof">Accesso illimitato</text>
  </g>
  <!-- LAN D -->
  <g>
    <rect x="40" y="495" width="210" height="80" rx="10" fill="#eff4ff" stroke="#2563eb" stroke-width="2"/>
    <text x="56" y="519" class="zname" fill="#1d4ed8">Subnet D · Solo esterno</text>
    <text x="56" y="539" class="net">10.0.4.0/24 · GW .1</text>
    <text x="56" y="558" class="prof">Internet — nessuna visibilità intranet</text>
  </g>

  <!-- DMZ -->
  <g>
    <rect x="760" y="240" width="210" height="80" rx="10" fill="#fff7ed" stroke="#d97706" stroke-width="2"/>
    <text x="776" y="264" class="zname" fill="#c2410c">DMZ · semi-trusted</text>
    <text x="776" y="284" class="net">10.0.5.0/24 · GW .1</text>
    <text x="776" y="303" class="prof">Server pubblici (web .50) · no intranet</text>
  </g>
  <!-- Server Farm -->
  <g>
    <rect x="760" y="430" width="210" height="80" rx="10" fill="#f0fdfa" stroke="#0f766e" stroke-width="2"/>
    <text x="776" y="454" class="zname" fill="#0f766e">Server Farm (Tier 3)</text>
    <text x="776" y="474" class="net">10.0.6.0/24 · GW .1</text>
    <text x="776" y="493" class="prof">DB .100 · solo reply verso DMZ</text>
  </g>

  <!-- legend -->
  <g font-size="12px">
    <text x="40" y="630" font-weight="700" fill="#0f172a">Livelli di fiducia:</text>
    <rect x="155" y="620" width="14" height="14" rx="3" fill="#eff4ff" stroke="#2563eb"/><text x="174" y="631" fill="#334155">LAN trusted</text>
    <rect x="262" y="620" width="14" height="14" rx="3" fill="#f5f3ff" stroke="#7c3aed"/><text x="281" y="631" fill="#334155">privilegiata</text>
    <rect x="368" y="620" width="14" height="14" rx="3" fill="#fff7ed" stroke="#d97706"/><text x="387" y="631" fill="#334155">DMZ semi-trusted</text>
    <rect x="520" y="620" width="14" height="14" rx="3" fill="#f0fdfa" stroke="#0f766e"/><text x="539" y="631" fill="#334155">server farm</text>
    <rect x="630" y="620" width="14" height="14" rx="3" fill="#fef2f2" stroke="#dc2626"/><text x="649" y="631" fill="#334155">WAN untrusted</text>
  </g>
</svg>
