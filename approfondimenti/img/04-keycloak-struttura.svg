<svg viewBox="0 0 720 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="sh4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <text x="360" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#1E293B">Struttura logica di Keycloak</text>

  <!-- Server -->
  <rect x="20" y="50" width="680" height="372" rx="14" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.5"/>
  <rect x="34" y="62" width="22" height="22" rx="4" fill="#64748B"/>
  <rect x="38" y="67" width="14" height="3" rx="1.5" fill="#F8FAFC"/>
  <rect x="38" y="73" width="14" height="3" rx="1.5" fill="#F8FAFC"/>
  <text x="66" y="79" font-size="13.5" font-weight="700" fill="#334155">Keycloak Server</text>

  <!-- Realm -->
  <rect x="44" y="98" width="632" height="306" rx="12" fill="#FFFFFF" stroke="#4338CA" stroke-width="1.6"/>
  <text x="62" y="124" font-size="13.5" font-weight="700" fill="#3730A3">Realm: «scuola»</text>
  <text x="208" y="124" font-size="11" font-style="italic" fill="#6366F1">— dominio isolato di utenti, ruoli e applicazioni</text>

  <!-- Clients -->
  <g filter="url(#sh4)"><rect x="64" y="146" width="140" height="232" rx="10" fill="#FFFFFF" stroke="#0D9488" stroke-width="1.4"/></g>
  <rect x="64" y="146" width="140" height="30" rx="10" fill="#0D9488"/>
  <rect x="64" y="166" width="140" height="10" fill="#0D9488"/>
  <text x="134" y="166" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFFFFF">Clients</text>
  <text x="134" y="196" text-anchor="middle" font-size="10" fill="#0D9488">le applicazioni registrate</text>
  <rect x="74" y="208" width="120" height="26" rx="6" fill="#CCFBF1"/>
  <text x="134" y="225" text-anchor="middle" font-size="11" fill="#115E59">registro-app</text>
  <rect x="74" y="240" width="120" height="26" rx="6" fill="#CCFBF1"/>
  <text x="134" y="257" text-anchor="middle" font-size="11" fill="#115E59">elearning-app</text>

  <!-- Users -->
  <g filter="url(#sh4)"><rect x="213" y="146" width="140" height="232" rx="10" fill="#FFFFFF" stroke="#B45309" stroke-width="1.4"/></g>
  <rect x="213" y="146" width="140" height="30" rx="10" fill="#B45309"/>
  <rect x="213" y="166" width="140" height="10" fill="#B45309"/>
  <text x="283" y="166" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFFFFF">Users</text>
  <text x="283" y="196" text-anchor="middle" font-size="10" fill="#B45309">gli account utente</text>
  <rect x="223" y="208" width="120" height="26" rx="6" fill="#FEF3C7"/>
  <text x="283" y="225" text-anchor="middle" font-size="10.5" fill="#92400E">mario.rossi</text>
  <rect x="223" y="240" width="120" height="26" rx="6" fill="#FEF3C7"/>
  <text x="283" y="257" text-anchor="middle" font-size="10.5" fill="#92400E">prof.bianchi</text>

  <!-- Roles -->
  <g filter="url(#sh4)"><rect x="362" y="146" width="140" height="232" rx="10" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.4"/></g>
  <rect x="362" y="146" width="140" height="30" rx="10" fill="#7C3AED"/>
  <rect x="362" y="166" width="140" height="10" fill="#7C3AED"/>
  <text x="432" y="166" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFFFFF">Roles</text>
  <text x="432" y="196" text-anchor="middle" font-size="10" fill="#7C3AED">ruoli e permessi</text>
  <rect x="372" y="208" width="120" height="24" rx="6" fill="#EDE9FE"/>
  <text x="432" y="224" text-anchor="middle" font-size="10.5" fill="#5B21B6">studente</text>
  <rect x="372" y="238" width="120" height="24" rx="6" fill="#EDE9FE"/>
  <text x="432" y="254" text-anchor="middle" font-size="10.5" fill="#5B21B6">docente</text>
  <rect x="372" y="268" width="120" height="24" rx="6" fill="#EDE9FE"/>
  <text x="432" y="284" text-anchor="middle" font-size="10.5" fill="#5B21B6">admin</text>

  <!-- Identity providers -->
  <g filter="url(#sh4)"><rect x="511" y="146" width="140" height="232" rx="10" fill="#FFFFFF" stroke="#64748B" stroke-width="1.4"/></g>
  <rect x="511" y="146" width="140" height="30" rx="10" fill="#64748B"/>
  <rect x="511" y="166" width="140" height="10" fill="#64748B"/>
  <text x="581" y="166" text-anchor="middle" font-size="11.5" font-weight="700" fill="#FFFFFF">Identity Providers</text>
  <text x="581" y="196" text-anchor="middle" font-size="10" fill="#64748B">login esterni (opzionale)</text>
  <rect x="521" y="208" width="120" height="26" rx="6" fill="#F1F5F9"/>
  <text x="581" y="225" text-anchor="middle" font-size="11" fill="#334155">Google</text>
  <rect x="521" y="240" width="120" height="26" rx="6" fill="#F1F5F9"/>
  <text x="581" y="257" text-anchor="middle" font-size="11" fill="#334155">SPID</text>
</svg>
