<svg viewBox="0 0 860 470" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f0f4ff"/><stop offset="100%" stop-color="#e8f0fe"/></linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#dc2626"/><stop offset="35%" stop-color="#f59e0b"/><stop offset="70%" stop-color="#16a34a"/><stop offset="100%" stop-color="#0891b2"/></linearGradient>
    <filter id="sh6"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000018"/></filter>
  </defs>

  <rect width="860" height="470" fill="url(#bg6)" rx="16"/>
  <text x="430" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">La Scala della Disponibilità</text>
  <text x="430" y="56" text-anchor="middle" font-size="12.5" fill="#475569">Quanti "9" di uptime — e cosa serve per raggiungerli</text>

  <!-- gradient bar -->
  <rect x="50" y="70" width="760" height="16" rx="8" fill="url(#bar)" filter="url(#sh6)"/>
  <g font-size="9.5" fill="#475569" text-anchor="middle">
    <text x="50" y="102">90%</text><text x="202" y="102">99%</text><text x="354" y="102">99.9%</text>
    <text x="506" y="102">99.99%</text><text x="658" y="102">99.999%</text><text x="810" y="102">99.9999%</text>
  </g>
  <g stroke="#64748b" stroke-width="1">
    <line x1="50" y1="86" x2="50" y2="92"/><line x1="202" y1="86" x2="202" y2="92"/><line x1="354" y1="86" x2="354" y2="92"/>
    <line x1="506" y1="86" x2="506" y2="92"/><line x1="658" y1="86" x2="658" y2="92"/><line x1="810" y1="86" x2="810" y2="92"/>
  </g>

  <!-- rows: column layout - left badge, mid text, right tag -->
  <!-- ROW 90% -->
  <rect x="40" y="116" width="780" height="58" rx="10" fill="white" stroke="#fecaca" stroke-width="1.5" filter="url(#sh6)"/>
  <rect x="40" y="116" width="6" height="58" rx="3" fill="#dc2626"/>
  <text x="64" y="139" font-size="14" font-weight="700" fill="#0f172a">90%</text>
  <text x="64" y="157" font-size="10.5" fill="#64748b">1 nove</text>
  <text x="150" y="139" font-size="11.5" font-weight="600" fill="#dc2626">Downtime annuo ≈ 36,5 giorni</text>
  <text x="150" y="158" font-size="11" fill="#475569">Server singolo senza ridondanza né backup automatico — solo ambienti di test.</text>
  <rect x="688" y="134" width="120" height="24" rx="12" fill="#fee2e2"/>
  <text x="748" y="150" text-anchor="middle" font-size="10.5" font-weight="600" fill="#dc2626">Nessuna HA</text>

  <!-- ROW 99% -->
  <rect x="40" y="180" width="780" height="58" rx="10" fill="white" stroke="#fde68a" stroke-width="1.5" filter="url(#sh6)"/>
  <rect x="40" y="180" width="6" height="58" rx="3" fill="#f59e0b"/>
  <text x="64" y="203" font-size="14" font-weight="700" fill="#0f172a">99%</text>
  <text x="64" y="221" font-size="10.5" fill="#64748b">2 nove</text>
  <text x="150" y="203" font-size="11.5" font-weight="600" fill="#b45309">Downtime annuo ≈ 3,65 giorni</text>
  <text x="150" y="222" font-size="11" fill="#475569">Un server Proxmox, backup notturno su NAS, UPS, snapshot. RTO ~4 ore.</text>
  <rect x="676" y="198" width="132" height="24" rx="12" fill="#fef3c7"/>
  <text x="742" y="214" text-anchor="middle" font-size="10.5" font-weight="600" fill="#92400e">Backup + UPS</text>

  <!-- ROW 99.9% -->
  <rect x="40" y="244" width="780" height="58" rx="10" fill="white" stroke="#86efac" stroke-width="1.5" filter="url(#sh6)"/>
  <rect x="40" y="244" width="6" height="58" rx="3" fill="#16a34a"/>
  <text x="64" y="267" font-size="14" font-weight="700" fill="#0f172a">99.9%</text>
  <text x="64" y="285" font-size="10.5" fill="#64748b">3 nove</text>
  <text x="150" y="267" font-size="11.5" font-weight="600" fill="#15803d">Downtime annuo ≈ 8,76 ore</text>
  <text x="150" y="286" font-size="11" fill="#475569">Virtualizzazione + storage condiviso (SAN/NAS) + HA cluster. MTTR &lt; 10 min.</text>
  <rect x="652" y="262" width="156" height="24" rx="12" fill="#dcfce7"/>
  <text x="730" y="278" text-anchor="middle" font-size="10.5" font-weight="600" fill="#14532d">Virtualizzazione + HA</text>

  <!-- ROW 99.99% -->
  <rect x="40" y="308" width="780" height="58" rx="10" fill="white" stroke="#67e8f9" stroke-width="1.5" filter="url(#sh6)"/>
  <rect x="40" y="308" width="6" height="58" rx="3" fill="#0891b2"/>
  <text x="64" y="331" font-size="14" font-weight="700" fill="#0f172a">99.99%</text>
  <text x="64" y="349" font-size="10.5" fill="#64748b">4 nove</text>
  <text x="150" y="331" font-size="11.5" font-weight="600" fill="#0e7490">Downtime annuo ≈ 52,6 minuti</text>
  <text x="150" y="350" font-size="11" fill="#475569">Stack combinato VRRP + HCI (Ceph/vSAN) + DNAT, replica sincrona. MTTR in secondi.</text>
  <rect x="640" y="326" width="168" height="24" rx="12" fill="#cffafe"/>
  <text x="724" y="342" text-anchor="middle" font-size="10.5" font-weight="600" fill="#155e75">VRRP + HCI + DNAT</text>

  <!-- ROW 99.999% -->
  <rect x="40" y="372" width="780" height="58" rx="10" fill="white" stroke="#a5b4fc" stroke-width="1.5" filter="url(#sh6)"/>
  <rect x="40" y="372" width="6" height="58" rx="3" fill="#4f46e5"/>
  <text x="64" y="395" font-size="14" font-weight="700" fill="#0f172a">99.999%</text>
  <text x="64" y="413" font-size="10.5" fill="#64748b">5 nove</text>
  <text x="170" y="395" font-size="11.5" font-weight="600" fill="#4338ca">Downtime annuo ≈ 5,26 minuti</text>
  <text x="170" y="414" font-size="11" fill="#475569">VMware Fault Tolerance / DRBD + HCI + datacenter Tier IV. Costo molto elevato.</text>
  <rect x="652" y="390" width="156" height="24" rx="12" fill="#e0e7ff"/>
  <text x="730" y="406" text-anchor="middle" font-size="10.5" font-weight="600" fill="#3730a3">VMware FT · Tier IV</text>

  <text x="430" y="452" text-anchor="middle" font-size="10.5" font-style="italic" fill="#64748b">Ogni nove in più riduce il downtime di un fattore 10 — e fa salire ripidamente costo e complessità.</text>
</svg>
