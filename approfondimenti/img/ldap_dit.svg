<svg viewBox="0 0 880 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="softl" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1a2233" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="880" height="520" fill="#ffffff"/>
  <text x="32" y="40" font-size="22" font-weight="700" fill="#1a2233">La directory come albero: il Distinguished Name</text>
  <text x="32" y="64" font-size="14" fill="#5b6677">Ogni oggetto ha una posizione gerarchica precisa. Il DN si legge dal basso verso l'alto.</text>

  <!-- tree edges -->
  <g stroke="#a9b4c2" stroke-width="2" fill="none">
    <path d="M170 130 L170 188"/>
    <path d="M170 218 L170 256 L280 256"/>
    <path d="M170 256 L170 340 L280 340"/>
    <path d="M280 290 L340 290"/>
    <path d="M280 380 L340 380"/>
    <path d="M280 430 L340 430"/>
  </g>

  <!-- root domain -->
  <g filter="url(#softl)"><rect x="80" y="100" width="180" height="60" rx="10" fill="#f3eefb" stroke="#6a3da8" stroke-width="1.6"/></g>
  <text x="170" y="125" font-size="13.5" font-weight="700" fill="#6a3da8" text-anchor="middle">DC=scuola, DC=local</text>
  <text x="170" y="145" font-size="11" fill="#5a3590" text-anchor="middle">il dominio (radice)</text>

  <!-- OU level -->
  <g filter="url(#softl)"><rect x="80" y="188" width="180" height="34" rx="9" fill="#eef4fb" stroke="#1d4e8f" stroke-width="1.4"/></g>
  <text x="170" y="210" font-size="13" font-weight="700" fill="#1d4e8f" text-anchor="middle">OU=Contabilita</text>

  <!-- leaf objects -->
  <g filter="url(#softl)"><rect x="280" y="239" width="200" height="34" rx="9" fill="#e9f4ee" stroke="#2f7d52" stroke-width="1.3"/></g>
  <text x="380" y="261" font-size="12.5" font-weight="600" fill="#234a37" text-anchor="middle">CN=Alice Rossi (utente)</text>

  <g filter="url(#softl)"><rect x="280" y="323" width="200" height="34" rx="9" fill="#eef2f6" stroke="#5b6677" stroke-width="1.3"/></g>
  <text x="380" y="345" font-size="12.5" font-weight="600" fill="#3a4757" text-anchor="middle">OU=Gruppi</text>

  <!-- groups -->
  <g filter="url(#softl)"><rect x="340" y="364" width="200" height="32" rx="8" fill="#fdf3df" stroke="#b8791a" stroke-width="1.2"/></g>
  <text x="440" y="385" font-size="12" font-weight="600" fill="#9a6512" text-anchor="middle">CN=GRP_Docenti</text>
  <g filter="url(#softl)"><rect x="340" y="414" width="200" height="32" rx="8" fill="#fdf3df" stroke="#b8791a" stroke-width="1.2"/></g>
  <text x="440" y="435" font-size="12" font-weight="600" fill="#9a6512" text-anchor="middle">CN=GRP_Studenti</text>

  <!-- DN read -->
  <rect x="540" y="100" width="312" height="120" rx="12" fill="#f7f9fc" stroke="#c9d2dd" stroke-width="1.3"/>
  <text x="556" y="124" font-size="12.5" font-weight="700" fill="#1a2233">Il DN di Alice si legge dal basso:</text>
  <text x="556" y="150" font-size="12.5" fill="#27384e" font-family="monospace">CN=Alice Rossi,</text>
  <text x="556" y="170" font-size="12.5" fill="#27384e" font-family="monospace">OU=Contabilita,</text>
  <text x="556" y="190" font-size="12.5" fill="#27384e" font-family="monospace">DC=scuola, DC=local</text>
  <text x="556" y="210" font-size="10.5" fill="#5b6677">CN = nome · OU = unità · DC = dominio</text>

  <!-- member / memberOf -->
  <rect x="540" y="240" width="312" height="206" rx="12" fill="#fff" stroke="#1d4e8f" stroke-width="1.4"/>
  <text x="556" y="266" font-size="13.5" font-weight="700" fill="#1d4e8f">Due modi di vedere l'appartenenza</text>

  <rect x="556" y="282" width="280" height="68" rx="9" fill="#eef4fb"/>
  <text x="570" y="304" font-size="12.5" font-weight="700" fill="#1d4e8f">member (sul GRUPPO)</text>
  <text x="570" y="324" font-size="11.5" fill="#27384e">«Dammi tutti gli utenti dei Docenti»</text>
  <text x="570" y="341" font-size="11" fill="#5b6677">lista di DN dentro il gruppo</text>

  <rect x="556" y="360" width="280" height="68" rx="9" fill="#e9f4ee"/>
  <text x="570" y="382" font-size="12.5" font-weight="700" fill="#2f7d52">memberOf (sull'UTENTE)</text>
  <text x="570" y="402" font-size="11.5" fill="#234a37">«Alice è nel gruppo Docenti?»</text>
  <text x="570" y="419" font-size="11" fill="#3d6b51">back-link calcolato da AD</text>

  <!-- note bottom -->
  <rect x="80" y="466" width="772" height="40" rx="9" fill="#fdf3df" stroke="#b8791a" stroke-width="1.1"/>
  <text x="100" y="491" font-size="12" fill="#7d5a23">AD tiene <tspan font-weight="700">member</tspan> e <tspan font-weight="700">memberOf</tspan> sempre coerenti: aggiungi Alice ai Docenti e si aggiornano entrambi automaticamente.</text>
</svg>
