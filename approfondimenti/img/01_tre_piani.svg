<svg viewBox="0 0 860 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f4ff"/><stop offset="100%" stop-color="#e8f0fe"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1d4ed8"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#0891b2"/><stop offset="100%" stop-color="#0e7490"/></linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ea580c"/><stop offset="100%" stop-color="#c2410c"/></linearGradient>
    <filter id="sh" x="-5%" y="-5%" width="110%" height="130%"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#00000022"/></filter>
  </defs>

  <rect width="860" height="460" fill="url(#bg)" rx="16"/>
  <text x="430" y="40" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">I Tre Piani della Continuità di Servizio</text>
  <text x="430" y="61" text-anchor="middle" font-size="13" fill="#64748b">Tre domande distinte — tre famiglie di tecnologie complementari</text>

  <!-- connectors -->
  <line x1="430" y1="158" x2="430" y2="176" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="430,180 425,170 435,170" fill="#94a3b8"/>
  <line x1="430" y1="268" x2="430" y2="286" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="430,290 425,280 435,280" fill="#94a3b8"/>

  <!-- PIANO 1 -->
  <rect x="40" y="84" width="780" height="76" rx="12" fill="url(#g1)" filter="url(#sh)"/>
  <circle cx="92" cy="122" r="24" fill="rgba(255,255,255,0.18)"/>
  <circle cx="92" cy="122" r="15" fill="none" stroke="white" stroke-width="2"/>
  <line x1="92" y1="107" x2="92" y2="137" stroke="white" stroke-width="1.5"/>
  <line x1="77" y1="122" x2="107" y2="122" stroke="white" stroke-width="1.5"/>
  <path d="M80,112 Q92,108 104,112" fill="none" stroke="white" stroke-width="1.5"/>
  <path d="M80,132 Q92,136 104,132" fill="none" stroke="white" stroke-width="1.5"/>
  <text x="135" y="116" font-size="17" font-weight="700" fill="white">Piano del Servizio</text>
  <text x="135" y="136" font-size="13" fill="rgba(255,255,255,0.88)">Come rendo il servizio sempre raggiungibile?</text>
  <text x="135" y="152" font-size="11" fill="rgba(255,255,255,0.7)">Failover proxy in 2–3 s · health check continui · VIP condiviso</text>
  <!-- tech column, fixed right zone -->
  <g font-size="11.5" font-weight="600" fill="white" text-anchor="middle">
    <rect x="500" y="98" width="150" height="24" rx="12" fill="rgba(255,255,255,0.22)"/><text x="575" y="114">VRRP / keepalived</text>
    <rect x="660" y="98" width="150" height="24" rx="12" fill="rgba(255,255,255,0.22)"/><text x="735" y="114">HAProxy / Nginx</text>
    <rect x="500" y="128" width="150" height="24" rx="12" fill="rgba(255,255,255,0.22)"/><text x="575" y="144">DNAT / ALG</text>
    <rect x="660" y="128" width="150" height="24" rx="12" fill="rgba(255,255,255,0.22)"/><text x="735" y="144">Load Balancer</text>
  </g>

  <!-- PIANO 2 -->
  <rect x="40" y="184" width="780" height="76" rx="12" fill="url(#g2)" filter="url(#sh)"/>
  <ellipse cx="92" cy="206" rx="17" ry="6" fill="none" stroke="white" stroke-width="2"/>
  <rect x="75" y="206" width="34" height="28" fill="none" stroke="white" stroke-width="2"/>
  <ellipse cx="92" cy="234" rx="17" ry="6" fill="none" stroke="white" stroke-width="2"/>
  <line x1="75" y1="218" x2="75" y2="234" stroke="white" stroke-width="1"/>
  <line x1="109" y1="218" x2="109" y2="234" stroke="white" stroke-width="1"/>
  <text x="135" y="216" font-size="17" font-weight="700" fill="white">Piano dei Dati</text>
  <text x="135" y="236" font-size="13" fill="rgba(255,255,255,0.88)">Come rendo i dati sempre integri e disponibili?</text>
  <text x="135" y="252" font-size="11" fill="rgba(255,255,255,0.7)">Replica sincrona · RPO &lt; 1 s · nessun dato perso al failover</text>
  <g font-size="11.5" font-weight="600" fill="white" text-anchor="middle">
    <rect x="500" y="198" width="150" height="24" rx="12" fill="rgba(255,255,255,0.22)"/><text x="575" y="214">DRBD (RAID-1 rete)</text>
    <rect x="660" y="198" width="150" height="24" rx="12" fill="rgba(255,255,255,0.22)"/><text x="735" y="214">HCI / Ceph / vSAN</text>
    <rect x="500" y="228" width="150" height="24" rx="12" fill="rgba(255,255,255,0.22)"/><text x="575" y="244">VMware FT</text>
    <rect x="660" y="228" width="150" height="24" rx="12" fill="rgba(255,255,255,0.22)"/><text x="735" y="244">RAID / ZFS</text>
  </g>

  <!-- PIANO 3 -->
  <rect x="40" y="294" width="780" height="76" rx="12" fill="url(#g3)" filter="url(#sh)"/>
  <circle cx="92" cy="332" r="20" fill="none" stroke="white" stroke-width="2"/>
  <path d="M78,322 Q82,312 94,312 Q106,312 110,324" fill="none" stroke="white" stroke-width="2"/>
  <polygon points="78,322 71,318 82,314" fill="white"/>
  <line x1="92" y1="322" x2="92" y2="333" stroke="white" stroke-width="2"/>
  <line x1="92" y1="333" x2="100" y2="338" stroke="white" stroke-width="2"/>
  <text x="135" y="326" font-size="17" font-weight="700" fill="white">Piano del Ripristino</text>
  <text x="135" y="346" font-size="13" fill="rgba(255,255,255,0.88)">Come torno a uno stato precedente sano?</text>
  <text x="135" y="362" font-size="11" fill="rgba(255,255,255,0.7)">Rollback istantaneo · difesa ransomware · regola 3-2-1</text>
  <g font-size="11.5" font-weight="600" fill="white" text-anchor="middle">
    <rect x="500" y="308" width="150" height="24" rx="12" fill="rgba(255,255,255,0.22)"/><text x="575" y="324">Snapshot a caldo</text>
    <rect x="660" y="308" width="150" height="24" rx="12" fill="rgba(255,255,255,0.22)"/><text x="735" y="324">Backup su NAS</text>
    <rect x="500" y="338" width="150" height="24" rx="12" fill="rgba(255,255,255,0.22)"/><text x="575" y="354">Offsite / WORM</text>
    <rect x="660" y="338" width="150" height="24" rx="12" fill="rgba(255,255,255,0.22)"/><text x="735" y="354">Conservazione norma</text>
  </g>

  <!-- warning -->
  <rect x="40" y="386" width="780" height="60" rx="10" fill="#fef9c3" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="62" y="406" font-size="13.5" font-weight="700" fill="#92400e">⚠  I tre piani sono complementari, non alternativi</text>
  <text x="62" y="425" font-size="12" fill="#78350f">La replica (Piano 2) propaga fedelmente anche uno stato corrotto: il backup (Piano 3) è l'unica difesa contro</text>
  <text x="62" y="440" font-size="12" fill="#78350f">ransomware ed errori umani, e resta necessario anche con la migliore architettura HCI.</text>
</svg>
