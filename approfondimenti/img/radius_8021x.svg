<svg viewBox="0 0 920 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="softr" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1a2233" flood-opacity="0.16"/>
    </filter>
    <marker id="aR" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1d4e8f"/></marker>
    <marker id="aRb" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#b8791a"/></marker>
  </defs>
  <rect width="920" height="500" fill="#ffffff"/>
  <text x="32" y="40" font-size="22" font-weight="700" fill="#1a2233">Wi-Fi aziendale: 802.1X, RADIUS e Active Directory</text>
  <text x="32" y="64" font-size="14" fill="#5b6677">L'access point non conosce le password: fa solo da tramite. La verità è in AD.</text>

  <!-- four actors -->
  <g filter="url(#softr)">
    <rect x="40" y="110" width="170" height="78" rx="12" fill="#e8f0fa" stroke="#1d4e8f" stroke-width="1.5"/>
    <rect x="270" y="110" width="170" height="78" rx="12" fill="#eef2f6" stroke="#5b6677" stroke-width="1.5"/>
    <rect x="500" y="110" width="170" height="78" rx="12" fill="#fdf3df" stroke="#b8791a" stroke-width="1.5"/>
    <rect x="730" y="110" width="150" height="78" rx="12" fill="#f3eefb" stroke="#6a3da8" stroke-width="1.5"/>
  </g>
  <text x="125" y="138" font-size="14" font-weight="700" fill="#1d4e8f" text-anchor="middle">Supplicant</text>
  <text x="125" y="158" font-size="11.5" fill="#46586e" text-anchor="middle">laptop / smartphone</text>
  <text x="125" y="176" font-size="11" fill="#46586e" text-anchor="middle">parla EAP</text>

  <text x="355" y="138" font-size="14" font-weight="700" fill="#3a4757" text-anchor="middle">Authenticator</text>
  <text x="355" y="158" font-size="11.5" fill="#5b6677" text-anchor="middle">Access Point (NAS)</text>
  <text x="355" y="176" font-size="11" fill="#5b6677" text-anchor="middle">solo un relay</text>

  <text x="585" y="138" font-size="14" font-weight="700" fill="#9a6512" text-anchor="middle">RADIUS</text>
  <text x="585" y="158" font-size="11.5" fill="#7d5a23" text-anchor="middle">NPS / FreeRADIUS</text>
  <text x="585" y="176" font-size="11" fill="#7d5a23" text-anchor="middle">Auth Server</text>

  <text x="805" y="138" font-size="14" font-weight="700" fill="#6a3da8" text-anchor="middle">Active</text>
  <text x="805" y="156" font-size="14" font-weight="700" fill="#6a3da8" text-anchor="middle">Directory</text>
  <text x="805" y="176" font-size="11" fill="#5a3590" text-anchor="middle">LDAP / Kerberos</text>

  <!-- request arrows -->
  <line x1="210" y1="226" x2="262" y2="226" stroke="#1d4e8f" stroke-width="2.2" marker-end="url(#aR)"/>
  <line x1="440" y1="226" x2="492" y2="226" stroke="#1d4e8f" stroke-width="2.2" marker-end="url(#aR)"/>
  <line x1="670" y1="226" x2="722" y2="226" stroke="#1d4e8f" stroke-width="2.2" marker-end="url(#aR)"/>
  <text x="236" y="218" font-size="11" fill="#1d4e8f" text-anchor="middle">EAP</text>
  <text x="466" y="218" font-size="11" fill="#1d4e8f" text-anchor="middle">RADIUS</text>
  <text x="696" y="218" font-size="11" fill="#1d4e8f" text-anchor="middle">query</text>
  <text x="460" y="248" font-size="12.5" font-weight="600" fill="#1d4e8f" text-anchor="middle">→ «Queste credenziali sono valide?»</text>

  <!-- response arrows -->
  <line x1="722" y1="288" x2="670" y2="288" stroke="#b8791a" stroke-width="2.2" marker-end="url(#aRb)"/>
  <line x1="492" y1="288" x2="440" y2="288" stroke="#b8791a" stroke-width="2.2" marker-end="url(#aRb)"/>
  <line x1="262" y1="288" x2="210" y2="288" stroke="#b8791a" stroke-width="2.2" marker-end="url(#aRb)"/>
  <text x="696" y="280" font-size="11" fill="#9a6512" text-anchor="middle">sì + gruppo</text>
  <text x="466" y="280" font-size="11" fill="#9a6512" text-anchor="middle">Access-Accept</text>
  <text x="236" y="280" font-size="11" fill="#9a6512" text-anchor="middle">connesso</text>
  <text x="460" y="310" font-size="12.5" font-weight="600" fill="#9a6512" text-anchor="middle">← «Sì: è nel gruppo studenti → VLAN 130»</text>

  <!-- VLAN box -->
  <rect x="40" y="346" width="840" height="126" rx="14" fill="#f7f9fc" stroke="#c9d2dd" stroke-width="1.3"/>
  <text x="60" y="372" font-size="14" font-weight="700" fill="#1a2233">VLAN dinamica: stessa rete Wi-Fi, mondi separati</text>

  <g font-family="'Segoe UI', Arial, sans-serif">
    <rect x="60" y="388" width="250" height="68" rx="10" fill="#e9f4ee" stroke="#2f7d52" stroke-width="1.3"/>
    <text x="78" y="412" font-size="12.5" font-weight="700" fill="#2f7d52">lehrer-sc1 → VLAN 120</text>
    <text x="78" y="434" font-size="11.5" fill="#3d6b51">rete docenti</text>

    <rect x="335" y="388" width="250" height="68" rx="10" fill="#eef4fb" stroke="#1d4e8f" stroke-width="1.3"/>
    <text x="353" y="412" font-size="12.5" font-weight="700" fill="#1d4e8f">schueler-sc1 → VLAN 130</text>
    <text x="353" y="434" font-size="11.5" fill="#46586e">rete studenti</text>

    <rect x="610" y="388" width="250" height="68" rx="10" fill="#fbeaea" stroke="#b23b3b" stroke-width="1.3"/>
    <text x="628" y="412" font-size="12.5" font-weight="700" fill="#b23b3b">nessun gruppo → Reject</text>
    <text x="628" y="434" font-size="11.5" fill="#8a3232">accesso negato</text>
  </g>
</svg>
