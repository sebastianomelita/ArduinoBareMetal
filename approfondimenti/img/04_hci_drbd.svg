<svg viewBox="0 0 860 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f0fdfa"/><stop offset="100%" stop-color="#ccfbf1"/></linearGradient>
    <filter id="sh4"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0891b222"/></filter>
    <filter id="sh4b"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000015"/></filter>
    <marker id="a4" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L0,8 L8,4 z" fill="#0891b2"/></marker>
    <marker id="a4r" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L0,8 L8,4 z" fill="#dc2626"/></marker>
    <marker id="a4g" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L0,8 L8,4 z" fill="#16a34a"/></marker>
  </defs>

  <rect width="860" height="520" fill="url(#bg4)" rx="16"/>
  <text x="430" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Piano dei Dati: HCI con Replica Distribuita</text>
  <text x="430" y="56" text-anchor="middle" font-size="12.5" fill="#475569">Ogni scrittura confermata su più nodi — RPO &lt; 1 s anche al guasto hardware</text>

  <!-- ORCHESTRATOR bar at top, fully visible -->
  <rect x="40" y="72" width="600" height="34" rx="10" fill="#0e7490" filter="url(#sh4b)"/>
  <text x="340" y="94" text-anchor="middle" font-size="12.5" font-weight="700" fill="white">ORCHESTRATORE  ·  Proxmox HA / VMware vCenter  —  rileva i nodi down e riavvia le VM</text>

  <!-- cluster boundary -->
  <rect x="40" y="116" width="600" height="278" rx="14" fill="none" stroke="#0891b2" stroke-width="2" stroke-dasharray="8,5"/>
  <text x="340" y="136" text-anchor="middle" font-size="12" font-weight="700" fill="#0e7490">CLUSTER HCI — Proxmox + Ceph  (oppure VMware vSAN)</text>

  <!-- orchestrator control arrows to nodes -->
  <line x1="130" y1="106" x2="130" y2="146" stroke="#0e7490" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#a4)"/>
  <line x1="320" y1="106" x2="320" y2="146" stroke="#0e7490" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#a4)"/>
  <line x1="510" y1="106" x2="510" y2="146" stroke="#0e7490" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- NODE 1 -->
  <g>
    <rect x="58" y="148" width="150" height="232" rx="12" fill="white" stroke="#0891b2" stroke-width="2" filter="url(#sh4)"/>
    <rect x="58" y="148" width="150" height="28" rx="12" fill="#0891b2"/>
    <rect x="58" y="164" width="150" height="12" fill="#0891b2"/>
    <text x="133" y="167" text-anchor="middle" font-size="12" font-weight="700" fill="white">Nodo 1</text>
    <rect x="72" y="186" width="122" height="34" rx="6" fill="#e0f2fe" stroke="#0891b2" stroke-width="1"/>
    <text x="133" y="200" text-anchor="middle" font-size="10" font-weight="600" fill="#0c4a6e">CPU + RAM</text>
    <text x="133" y="214" text-anchor="middle" font-size="9" fill="#0369a1">Hypervisor KVM</text>
    <rect x="72" y="226" width="58" height="28" rx="5" fill="#f0f9ff" stroke="#7dd3fc" stroke-width="1"/>
    <text x="101" y="244" text-anchor="middle" font-size="10" font-weight="600" fill="#075985">VM-A</text>
    <rect x="136" y="226" width="58" height="28" rx="5" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
    <text x="165" y="241" text-anchor="middle" font-size="8.5" font-weight="700" fill="#14532d">Ceph</text>
    <text x="165" y="251" text-anchor="middle" font-size="8" fill="#166534">OSD</text>
    <rect x="72" y="260" width="122" height="18" rx="5" fill="#cffafe" stroke="#22d3ee" stroke-width="1"/>
    <text x="133" y="273" text-anchor="middle" font-size="9" font-weight="600" fill="#155e75">NVMe ① ② ③</text>
    <rect x="72" y="284" width="122" height="20" rx="6" fill="#dcfce7"/>
    <text x="133" y="298" text-anchor="middle" font-size="9.5" font-weight="700" fill="#14532d">● ATTIVO</text>
    <text x="133" y="324" text-anchor="middle" font-size="9" fill="#64748b">contribuisce i suoi</text>
    <text x="133" y="337" text-anchor="middle" font-size="9" fill="#64748b">dischi al pool comune</text>
  </g>

  <!-- NODE 2 -->
  <g>
    <rect x="248" y="148" width="150" height="232" rx="12" fill="white" stroke="#0891b2" stroke-width="2" filter="url(#sh4)"/>
    <rect x="248" y="148" width="150" height="28" rx="12" fill="#0891b2"/>
    <rect x="248" y="164" width="150" height="12" fill="#0891b2"/>
    <text x="323" y="167" text-anchor="middle" font-size="12" font-weight="700" fill="white">Nodo 2</text>
    <rect x="262" y="186" width="122" height="34" rx="6" fill="#e0f2fe" stroke="#0891b2" stroke-width="1"/>
    <text x="323" y="200" text-anchor="middle" font-size="10" font-weight="600" fill="#0c4a6e">CPU + RAM</text>
    <text x="323" y="214" text-anchor="middle" font-size="9" fill="#0369a1">Hypervisor KVM</text>
    <rect x="262" y="226" width="58" height="28" rx="5" fill="#f0f9ff" stroke="#7dd3fc" stroke-width="1"/>
    <text x="291" y="244" text-anchor="middle" font-size="10" font-weight="600" fill="#075985">VM-B</text>
    <rect x="326" y="226" width="58" height="28" rx="5" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
    <text x="355" y="241" text-anchor="middle" font-size="8.5" font-weight="700" fill="#14532d">Ceph</text>
    <text x="355" y="251" text-anchor="middle" font-size="8" fill="#166534">OSD</text>
    <rect x="262" y="260" width="122" height="18" rx="5" fill="#cffafe" stroke="#22d3ee" stroke-width="1"/>
    <text x="323" y="273" text-anchor="middle" font-size="9" font-weight="600" fill="#155e75">NVMe ① ② ③</text>
    <rect x="262" y="284" width="122" height="20" rx="6" fill="#dcfce7"/>
    <text x="323" y="298" text-anchor="middle" font-size="9.5" font-weight="700" fill="#14532d">● ATTIVO</text>
    <text x="323" y="324" text-anchor="middle" font-size="9" fill="#64748b">conserva una replica</text>
    <text x="323" y="337" text-anchor="middle" font-size="9" fill="#64748b">dei dati del Nodo 3</text>
  </g>

  <!-- NODE 3 FAILED -->
  <g>
    <rect x="438" y="148" width="150" height="232" rx="12" fill="#fff5f5" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4" filter="url(#sh4b)"/>
    <rect x="438" y="148" width="150" height="28" rx="12" fill="#dc2626"/>
    <rect x="438" y="164" width="150" height="12" fill="#dc2626"/>
    <text x="513" y="167" text-anchor="middle" font-size="12" font-weight="700" fill="white">Nodo 3 — GUASTO</text>
    <rect x="452" y="186" width="122" height="34" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
    <text x="513" y="200" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">CPU + RAM</text>
    <text x="513" y="214" text-anchor="middle" font-size="9" fill="#b91c1c">OFFLINE</text>
    <rect x="452" y="226" width="122" height="28" rx="5" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
    <text x="513" y="244" text-anchor="middle" font-size="9.5" fill="#b91c1c">VM-C irraggiungibile</text>
    <line x1="438" y1="148" x2="588" y2="380" stroke="#dc262630" stroke-width="3"/>
    <line x1="588" y1="148" x2="438" y2="380" stroke="#dc262630" stroke-width="3"/>
    <rect x="452" y="290" width="122" height="20" rx="6" fill="#fee2e2"/>
    <text x="513" y="304" text-anchor="middle" font-size="9.5" font-weight="700" fill="#991b1b">✕ DOWN</text>
  </g>

  <!-- sync arrows between nodes (placed in gaps between cards, y away from text) -->
  <line x1="210" y1="200" x2="246" y2="200" stroke="#0891b2" stroke-width="1.5" marker-end="url(#a4)"/>
  <line x1="246" y1="210" x2="210" y2="210" stroke="#0891b2" stroke-width="1.5" marker-end="url(#a4)"/>
  <text x="228" y="194" text-anchor="middle" font-size="8" fill="#0891b2">replica sync</text>

  <line x1="400" y1="200" x2="436" y2="200" stroke="#0891b2" stroke-width="1.5" marker-end="url(#a4)"/>
  <line x1="436" y1="210" x2="400" y2="210" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#a4r)"/>
  <text x="418" y="194" text-anchor="middle" font-size="8" fill="#0891b2">sync</text>
  <text x="418" y="224" text-anchor="middle" font-size="7.5" fill="#dc2626">interrotta</text>

  <!-- RIGHT PANEL: DRBD + ZFS -->
  <rect x="656" y="72" width="180" height="200" rx="12" fill="white" stroke="#7c3aed" stroke-width="2" filter="url(#sh4b)"/>
  <rect x="656" y="72" width="180" height="28" rx="12" fill="#7c3aed"/>
  <rect x="656" y="86" width="180" height="14" fill="#7c3aed"/>
  <text x="746" y="91" text-anchor="middle" font-size="12" font-weight="700" fill="white">DRBD — alternativa</text>
  <text x="746" y="116" text-anchor="middle" font-size="10.5" font-weight="600" fill="#4c1d95">RAID-1 di rete · solo 2 nodi</text>
  <rect x="670" y="126" width="74" height="50" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="707" y="146" text-anchor="middle" font-size="9.5" font-weight="700" fill="#4c1d95">Primario</text>
  <text x="707" y="160" text-anchor="middle" font-size="8.5" fill="#6d28d9">VM attiva</text>
  <text x="707" y="171" text-anchor="middle" font-size="8" fill="#7c3aed">disco locale</text>
  <line x1="744" y1="146" x2="756" y2="146" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#a4)"/>
  <line x1="756" y1="156" x2="744" y2="156" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#a4)"/>
  <rect x="758" y="126" width="64" height="50" rx="8" fill="#faf5ff" stroke="#a78bfa" stroke-width="1"/>
  <text x="790" y="146" text-anchor="middle" font-size="9" font-weight="700" fill="#6d28d9">Secondario</text>
  <text x="790" y="160" text-anchor="middle" font-size="8" fill="#7c3aed">standby</text>
  <text x="790" y="171" text-anchor="middle" font-size="8" fill="#7c3aed">replica</text>
  <text x="746" y="196" text-anchor="middle" font-size="9.5" fill="#15803d" font-weight="600">+  RPO &lt; 1 s su disco · economico</text>
  <text x="746" y="214" text-anchor="middle" font-size="9.5" fill="#b91c1c" font-weight="600">−  1 sola scrittura attiva</text>
  <text x="746" y="230" text-anchor="middle" font-size="9.5" fill="#b91c1c" font-weight="600">−  RAM/CPU non replicati</text>
  <text x="746" y="246" text-anchor="middle" font-size="9" fill="#374151">breve riavvio VM al failover</text>
  <text x="746" y="263" text-anchor="middle" font-size="9" fill="#0891b2" font-style="italic">ideale con VRRP, a basso costo</text>

  <rect x="656" y="282" width="180" height="112" rx="12" fill="#fef9c3" stroke="#d97706" stroke-width="1.5"/>
  <text x="746" y="303" text-anchor="middle" font-size="11.5" font-weight="700" fill="#78350f">ZFS (nodo singolo)</text>
  <text x="746" y="324" text-anchor="middle" font-size="10" fill="#92400e">RAIDZ2: protegge dalla perdita</text>
  <text x="746" y="338" text-anchor="middle" font-size="10" fill="#92400e">di 2 dischi sullo stesso server.</text>
  <text x="746" y="356" text-anchor="middle" font-size="10" fill="#92400e">Alta efficienza spazio (≈75%),</text>
  <text x="746" y="370" text-anchor="middle" font-size="10" fill="#92400e">snapshot e compressione LZ4.</text>
  <text x="746" y="386" text-anchor="middle" font-size="9.5" fill="#9a3412" font-style="italic">non copre il guasto del server</text>

  <!-- FAILOVER note: full-width clean band at bottom, NOTHING above it -->
  <rect x="40" y="406" width="796" height="48" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.5"/>
  <text x="60" y="427" font-size="12.5" font-weight="700" fill="#14532d">⚡ Failover automatico quando il Nodo 3 cade</text>
  <text x="60" y="446" font-size="11.5" fill="#166534">L'orchestratore riavvia VM-C sui Nodi 1 o 2 (che hanno già la replica Ceph) in pochi secondi, senza trasferire dati dalla rete.</text>

  <rect x="40" y="462" width="796" height="44" rx="10" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
  <text x="60" y="483" font-size="11.5" fill="#7c2d12"><tspan font-weight="700">Scaling lineare:</tspan> aggiungere un nodo porta simultaneamente più compute (CPU+RAM), più storage e più banda — una sola operazione</text>
  <text x="60" y="499" font-size="11.5" fill="#7c2d12">invece di tre separate come nell'infrastruttura tradizionale con SAN dedicata.</text>
</svg>
