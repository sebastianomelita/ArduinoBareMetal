<svg xmlns="http://www.w3.org/2000/svg" width="680" height="676" viewBox="0 0 680 676" role="img" aria-labelledby="t5 d5">
<title id="t5">Diagramma di collaborazione UML con i livelli OSI dei messaggi</title>
<desc id="d5">Quattro nodi collegati da tre link: veicolo e colonnina via ISO 15118 sul cavo, colonnina e backend via OCPP, backend e aggregatore via mercato. Tredici messaggi numerati con il rispettivo livello OSI, e la soglia oltre la quale il cavo diventa una rete IP.</desc>
<style>
text{font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",sans-serif}
.ts{font-size:12px;fill:#73726c}
.f-coral{fill:#FAECE7;stroke:#993C1D;stroke-width:.5}
.f-purple{fill:#EEEDFE;stroke:#534AB7;stroke-width:.5}
.f-teal{fill:#E1F5EE;stroke:#0F6E56;stroke-width:.5}
.tt-coral{font-size:14px;font-weight:500;fill:#712B13}
.st-coral{font-size:12px;fill:#993C1D}
.tt-purple{font-size:14px;font-weight:500;fill:#3C3489}
.st-purple{font-size:12px;fill:#534AB7}
.tt-teal{font-size:14px;font-weight:500;fill:#085041}
.st-teal{font-size:12px;fill:#0F6E56}
.k-iso{stroke:#D85A30;fill:none}
.k-ocpp{stroke:#7F77DD;fill:none;stroke-dasharray:6 4}
.k-mkt{stroke:#1D9E75;fill:none;stroke-dasharray:2 3}
.soglia{stroke:#b4b2a9;stroke-width:.5;stroke-dasharray:3 3}
.sog-t{font-size:12px;font-weight:500;fill:#993C1D}
@media (prefers-color-scheme:dark){
.ts{fill:#9c9a92}
.f-coral{fill:#712B13;stroke:#F0997B}
.f-purple{fill:#3C3489;stroke:#AFA9EC}
.f-teal{fill:#085041;stroke:#5DCAA5}
.tt-coral{fill:#F5C4B3}.st-coral{fill:#F0997B}
.tt-purple{fill:#CECBF6}.st-purple{fill:#AFA9EC}
.tt-teal{fill:#9FE1CB}.st-teal{fill:#5DCAA5}
.k-iso{stroke:#F0997B}.k-ocpp{stroke:#AFA9EC}.k-mkt{stroke:#5DCAA5}
.soglia{stroke:#5f5e5a}
.sog-t{fill:#F0997B}
}
</style>

<rect class="f-coral" x="40" y="30" width="190" height="56" rx="8"/>
<text class="tt-coral" x="135" y="55" text-anchor="middle">Veicolo</text>
<text class="st-coral" x="135" y="73" text-anchor="middle">EVCC</text>

<line class="k-iso" x1="135" y1="86" x2="135" y2="285" stroke-width="1.5"/>
<line class="k-iso" x1="265" y1="94" x2="265" y2="262" stroke-width="2"/>
<text class="ts" x="285" y="104">1 ↓ SLAC, matching PLC · L2 (HomePlug GP)</text>
<text class="sog-t" x="285" y="124">soglia IP: da qui il cavo è una rete</text>
<line class="soglia" x1="265" y1="132" x2="620" y2="132"/>
<text class="ts" x="285" y="152">2 ↕ SLAAC + SDP · L3, L4 (IPv6, UDP)</text>
<text class="ts" x="285" y="172">3 ↕ handshake TLS · L5, L6</text>
<text class="ts" x="285" y="192">4 ↓ AuthorizationReq · L7 (EXI)</text>
<text class="ts" x="285" y="212">5 ↓ ScheduleExchangeReq · L7</text>
<text class="ts" x="285" y="232">6 ↑ ScheduleExchangeRes · L7</text>
<text class="ts" x="285" y="252">7 ↓ PowerDeliveryReq · L7</text>

<rect class="f-coral" x="40" y="285" width="190" height="56" rx="8"/>
<text class="tt-coral" x="135" y="310" text-anchor="middle">Colonnina</text>
<text class="st-coral" x="135" y="328" text-anchor="middle">SECC su Linux</text>

<line class="k-ocpp" x1="135" y1="341" x2="135" y2="465" stroke-width="1.5"/>
<line class="k-ocpp" x1="265" y1="350" x2="265" y2="446" stroke-width="2"/>
<text class="ts" x="285" y="360">8 ↓ Authorize · L7 (JSON su WebSocket)</text>
<text class="ts" x="285" y="380">9 ↑ AuthorizeResponse · L7</text>
<text class="ts" x="285" y="400">10 ↓ NotifyEVChargingNeeds · L7</text>
<text class="ts" x="285" y="420">11 ↑ SetChargingProfile · L7</text>
<text class="ts" x="285" y="440">12 ↓ TransactionEvent · L7</text>

<rect class="f-purple" x="40" y="465" width="190" height="56" rx="8"/>
<text class="tt-purple" x="135" y="490" text-anchor="middle">Backend CPO</text>
<text class="st-purple" x="135" y="508" text-anchor="middle">CSMS</text>

<line class="k-mkt" x1="135" y1="521" x2="135" y2="600" stroke-width="1.5"/>
<line class="k-mkt" x1="265" y1="540" x2="265" y2="558" stroke-width="2"/>
<text class="ts" x="285" y="550">13 ↕ offerta e ordine di dispacciamento · L7</text>

<rect class="f-teal" x="40" y="600" width="190" height="56" rx="8"/>
<text class="tt-teal" x="135" y="625" text-anchor="middle">Aggregatore</text>
<text class="st-teal" x="135" y="643" text-anchor="middle">e mercato</text>
</svg>
