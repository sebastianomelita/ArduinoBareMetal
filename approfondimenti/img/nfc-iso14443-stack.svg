<svg viewBox="0 0 760 700" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="seGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E8962F"/>
      <stop offset="1" stop-color="#D07C1C"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#11212B" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- panel -->
  <rect x="12" y="12" width="736" height="676" rx="22" fill="#F4F7FA" stroke="#D8E0E8" stroke-width="1.5"/>

  <!-- signature: RF concentric waves, top-right -->
  <g stroke="#2F6FB0" fill="none" opacity="0.12">
    <circle cx="690" cy="58" r="16"/>
    <circle cx="690" cy="58" r="30"/>
    <circle cx="690" cy="58" r="44"/>
    <circle cx="690" cy="58" r="58"/>
  </g>

  <!-- header -->
  <text x="44" y="50" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#2F6FB0">ISO/IEC 14443 &#183; NFC CARD EMULATION</text>
  <text x="44" y="84" font-size="28" font-weight="700" fill="#11212B">Una pila comune, tre contenitori</text>
  <text x="44" y="109" font-size="13.5" fill="#5A6B76">Carta, HCE e Secure Element parlano lo stesso protocollo verso il lettore. Cambia solo &#171;dove vive la credenziale&#187;.</text>

  <!-- ===== TOP: three credential containers ===== -->
  <!-- box 1: physical card -->
  <rect x="50" y="130" width="210" height="80" rx="12" fill="#FFFFFF" stroke="#CDD8E1" stroke-width="1.5" filter="url(#soft)"/>
  <rect x="50" y="130" width="6" height="80" rx="3" fill="#1E8AA8"/>
  <rect x="70" y="150" width="30" height="20" rx="3" fill="#1E8AA8"/>
  <rect x="70" y="156" width="30" height="4.5" fill="#0E5C68"/>
  <text x="112" y="166" font-size="14" font-weight="700" fill="#0E5C68">CARTA FISICA</text>
  <text x="70" y="190" font-size="11.5" fill="#5A6B76">credenziale nel chip</text>
  <text x="70" y="205" font-size="11.5" fill="#5A6B76">della carta stessa</text>

  <!-- box 2: HCE -->
  <rect x="275" y="130" width="210" height="80" rx="12" fill="#FFFFFF" stroke="#CDD8E1" stroke-width="1.5" filter="url(#soft)"/>
  <rect x="275" y="130" width="6" height="80" rx="3" fill="#2F6FB0"/>
  <rect x="295" y="148" width="18" height="26" rx="3" fill="#2F6FB0"/>
  <rect x="297.5" y="151.5" width="13" height="17" rx="1.5" fill="#FFFFFF"/>
  <text x="325" y="160" font-size="13.5" font-weight="700" fill="#25527F">SMARTPHONE &#183; HCE</text>
  <text x="295" y="184" font-size="11.5" fill="#5A6B76">app sul processore (host)</text>
  <text x="295" y="200" font-size="11.5" fill="#5A6B76">chiavi: tokenizzazione + cloud</text>

  <!-- box 3: Secure Element -->
  <rect x="500" y="130" width="210" height="80" rx="12" fill="#FFFFFF" stroke="#CDD8E1" stroke-width="1.5" filter="url(#soft)"/>
  <rect x="500" y="130" width="6" height="80" rx="3" fill="#D07C1C"/>
  <!-- lock glyph -->
  <rect x="520" y="153" width="20" height="16" rx="2.5" fill="#D07C1C"/>
  <path d="M523.5 153 v-4 a6.5 6.5 0 0 1 13 0 v4" fill="none" stroke="#D07C1C" stroke-width="2.5"/>
  <circle cx="530" cy="160" r="2.4" fill="#FFFFFF"/>
  <text x="552" y="160" font-size="13.5" font-weight="700" fill="#A85E12">SMARTPHONE &#183; SE</text>
  <text x="520" y="184" font-size="11.5" fill="#5A6B76">Secure Element (eSE / SIM)</text>
  <text x="520" y="200" font-size="11.5" fill="#5A6B76">chiavi isolate in hardware</text>

  <!-- converging connectors to the common stack -->
  <g stroke="#8A99A4" stroke-width="2" fill="none">
    <path d="M155 210 C 155 244, 360 246, 380 258"/>
    <path d="M380 210 L 380 258"/>
    <path d="M605 210 C 605 244, 400 246, 380 258"/>
  </g>
  <path d="M380 272 l-7 -12 l14 0 z" fill="#8A99A4"/>
  <text x="600" y="258" font-size="10.5" font-style="italic" fill="#7A8893" text-anchor="end">il controller NFC instrada all&#8217;uno o all&#8217;altro</text>

  <!-- ===== COMMON STACK ===== -->
  <!-- 7816-4 -->
  <rect x="160" y="276" width="440" height="56" rx="11" fill="#4B4E9E" filter="url(#soft)"/>
  <text x="184" y="301" font-size="15" font-weight="700" fill="#FFFFFF">ISO/IEC 7816-4</text>
  <text x="184" y="319" font-size="11.5" fill="#DCDCF2">APDU &#8212; comandi smart card</text>
  <text x="576" y="310" font-size="10.5" font-weight="700" letter-spacing="1" fill="#DCDCF2" text-anchor="end">COMANDI</text>

  <!-- 14443-4 -->
  <rect x="160" y="342" width="440" height="56" rx="11" fill="#2F6FB0" filter="url(#soft)"/>
  <text x="184" y="367" font-size="15" font-weight="700" fill="#FFFFFF">ISO/IEC 14443-4 &#183; ISO-DEP (T=CL)</text>
  <text x="184" y="385" font-size="11.5" fill="#D6E6F4">protocollo di trasporto</text>
  <text x="576" y="376" font-size="10.5" font-weight="700" letter-spacing="1" fill="#D6E6F4" text-anchor="end">TRASPORTO</text>

  <!-- 14443-3 -->
  <rect x="160" y="408" width="440" height="56" rx="11" fill="#1E8AA8" filter="url(#soft)"/>
  <text x="184" y="433" font-size="15" font-weight="700" fill="#FFFFFF">ISO/IEC 14443-3</text>
  <text x="184" y="451" font-size="11.5" fill="#D4EEF4">anticollisione &#183; selezione &#183; Type A / B</text>
  <text x="576" y="442" font-size="10.5" font-weight="700" letter-spacing="1" fill="#D4EEF4" text-anchor="end">SELEZIONE</text>

  <!-- 14443-2 -->
  <rect x="160" y="474" width="440" height="56" rx="11" fill="#0E5C68" filter="url(#soft)"/>
  <text x="184" y="499" font-size="15" font-weight="700" fill="#FFFFFF">ISO/IEC 14443-2</text>
  <text x="184" y="517" font-size="11.5" fill="#CDE7EA">radio 13,56 MHz &#183; modulazione / codifica</text>
  <text x="576" y="508" font-size="10.5" font-weight="700" letter-spacing="1" fill="#CDE7EA" text-anchor="end">RADIO</text>

  <!-- RF coupling waves -->
  <g stroke="#1E8AA8" stroke-width="2" fill="none" opacity="0.8">
    <path d="M348 544 q32 14 64 0"/>
    <path d="M338 551 q42 20 84 0"/>
  </g>

  <!-- reader -->
  <rect x="160" y="564" width="440" height="46" rx="11" fill="#11212B"/>
  <circle cx="186" cy="587" r="9" fill="none" stroke="#1E8AA8" stroke-width="2.5"/>
  <circle cx="186" cy="587" r="3" fill="#E8962F"/>
  <text x="208" y="585" font-size="14" font-weight="700" fill="#FFFFFF">LETTORE ISO 14443</text>
  <text x="208" y="601" font-size="11" fill="#9DB0BC">riceve un segnale identico da carta e telefono</text>

  <!-- footnote -->
  <text x="44" y="640" font-size="11" fill="#7A8893">SE = sicurezza in hardware, gestione rigida (es. Apple Pay). HCE = flessibilit&#224; software via app, sicurezza demandata a tokenizzazione/cloud (Android 4.4+).</text>
  <text x="44" y="657" font-size="11" fill="#7A8893">L&#8217;emulazione opera da 14443-4 in su (APDU): i protocolli proprietari sotto il trasporto (MIFARE Classic, Ultralight) non sono emulabili in HCE generico.</text>
</svg>
