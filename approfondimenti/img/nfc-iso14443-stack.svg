<svg viewBox="0 0 760 720" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="appGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E8962F"/>
      <stop offset="1" stop-color="#D07C1C"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#11212B" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#E8962F" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- panel -->
  <rect x="12" y="12" width="736" height="696" rx="22" fill="#F4F7FA" stroke="#D8E0E8" stroke-width="1.5"/>

  <!-- signature: RF concentric waves, top-right -->
  <g stroke="#2F6FB0" fill="none" opacity="0.14">
    <circle cx="678" cy="66" r="18"/>
    <circle cx="678" cy="66" r="34"/>
    <circle cx="678" cy="66" r="50"/>
    <circle cx="678" cy="66" r="66"/>
  </g>

  <!-- header -->
  <text x="48" y="56" font-size="12.5" letter-spacing="2.5" font-weight="700" fill="#2F6FB0">ISO/IEC 14443 · NFC CARD EMULATION</text>
  <text x="48" y="90" font-size="29" font-weight="700" fill="#11212B">Una sola pila, due sorgenti</text>
  <text x="48" y="116" font-size="14" fill="#5A6B76">Carta fisica e smartphone parlano lo stesso protocollo &#8212; il lettore non li distingue.</text>

  <!-- source chips -->
  <g filter="url(#soft)">
    <rect x="96" y="146" width="228" height="56" rx="12" fill="#FFFFFF" stroke="#CDD8E1" stroke-width="1.5"/>
    <rect x="412" y="146" width="252" height="56" rx="12" fill="#FFFFFF" stroke="#CDD8E1" stroke-width="1.5"/>
  </g>
  <!-- card glyph -->
  <rect x="118" y="164" width="34" height="22" rx="4" fill="#1E8AA8"/>
  <rect x="118" y="170" width="34" height="5" fill="#0E5C68"/>
  <text x="166" y="172" font-size="14.5" font-weight="700" fill="#11212B">CARTA FISICA</text>
  <text x="166" y="190" font-size="11.5" fill="#5A6B76">tessera contactless</text>
  <!-- phone glyph -->
  <rect x="434" y="160" width="22" height="34" rx="4" fill="#4B4E9E"/>
  <rect x="437" y="164" width="16" height="22" rx="1.5" fill="#FFFFFF"/>
  <text x="470" y="172" font-size="14.5" font-weight="700" fill="#11212B">SMARTPHONE</text>
  <text x="470" y="190" font-size="11.5" fill="#5A6B76">HCE / Secure Element</text>

  <!-- converging arrows to stack top -->
  <g stroke="#8A99A4" stroke-width="2" fill="none">
    <path d="M210 202 C 210 226, 374 224, 380 240"/>
    <path d="M538 202 C 538 226, 386 224, 380 240"/>
  </g>
  <path d="M380 248 l-6 -10 l12 0 z" fill="#8A99A4"/>

  <!-- ===== STACK ===== -->
  <!-- band: App / Secure Element (accent, top) -->
  <g filter="url(#glow)">
    <rect x="160" y="252" width="440" height="58" rx="11" fill="url(#appGrad)"/>
  </g>
  <text x="184" y="278" font-size="15.5" font-weight="700" fill="#FFFFFF">App / Secure Element</text>
  <text x="184" y="297" font-size="12" fill="#FFF1DD">la &#171;credenziale&#187; &#8212; applet EMV, profilo MIFARE2GO, badge accessi</text>
  <text x="576" y="287" font-size="11" font-weight="700" letter-spacing="1" fill="#FFF1DD" text-anchor="end">COSA</text>

  <!-- band: ISO 7816-4 -->
  <rect x="160" y="320" width="440" height="58" rx="11" fill="#4B4E9E" filter="url(#soft)"/>
  <text x="184" y="346" font-size="15.5" font-weight="700" fill="#FFFFFF">ISO/IEC 7816-4</text>
  <text x="184" y="365" font-size="12" fill="#DCDCF2">APDU &#8212; comandi smart card</text>
  <text x="576" y="355" font-size="11" font-weight="700" letter-spacing="1" fill="#DCDCF2" text-anchor="end">COMANDI</text>

  <!-- band: ISO 14443-4 -->
  <rect x="160" y="388" width="440" height="58" rx="11" fill="#2F6FB0" filter="url(#soft)"/>
  <text x="184" y="414" font-size="15.5" font-weight="700" fill="#FFFFFF">ISO/IEC 14443-4 &#183; ISO-DEP (T=CL)</text>
  <text x="184" y="433" font-size="12" fill="#D6E6F4">protocollo di trasporto</text>
  <text x="576" y="423" font-size="11" font-weight="700" letter-spacing="1" fill="#D6E6F4" text-anchor="end">TRASPORTO</text>

  <!-- band: ISO 14443-3 -->
  <rect x="160" y="456" width="440" height="58" rx="11" fill="#1E8AA8" filter="url(#soft)"/>
  <text x="184" y="482" font-size="15.5" font-weight="700" fill="#FFFFFF">ISO/IEC 14443-3</text>
  <text x="184" y="501" font-size="12" fill="#D4EEF4">anticollisione &#183; selezione &#183; Type A / B</text>
  <text x="576" y="491" font-size="11" font-weight="700" letter-spacing="1" fill="#D4EEF4" text-anchor="end">SELEZIONE</text>

  <!-- band: ISO 14443-2 (radio, bottom) -->
  <rect x="160" y="524" width="440" height="58" rx="11" fill="#0E5C68" filter="url(#soft)"/>
  <text x="184" y="550" font-size="15.5" font-weight="700" fill="#FFFFFF">ISO/IEC 14443-2</text>
  <text x="184" y="569" font-size="12" fill="#CDE7EA">radio 13,56 MHz &#183; modulazione / codifica</text>
  <text x="576" y="559" font-size="11" font-weight="700" letter-spacing="1" fill="#CDE7EA" text-anchor="end">RADIO</text>

  <!-- RF coupling waves between radio layer and reader -->
  <g stroke="#1E8AA8" stroke-width="2" fill="none" opacity="0.8">
    <path d="M348 596 q32 14 64 0"/>
    <path d="M338 603 q42 20 84 0"/>
  </g>

  <!-- reader -->
  <rect x="160" y="616" width="440" height="48" rx="11" fill="#11212B"/>
  <circle cx="186" cy="640" r="9" fill="none" stroke="#1E8AA8" stroke-width="2.5"/>
  <circle cx="186" cy="640" r="3" fill="#E8962F"/>
  <text x="208" y="638" font-size="14.5" font-weight="700" fill="#FFFFFF">LETTORE ISO 14443</text>
  <text x="208" y="654" font-size="11.5" fill="#9DB0BC">riceve un segnale identico da carta e telefono</text>

  <!-- footnote -->
  <text x="48" y="690" font-size="11.5" fill="#7A8893">L&#8217;emulazione opera da 14443-4 in su (APDU). I protocolli proprietari sotto il trasporto &#8212; MIFARE Classic, Ultralight &#8212; non sono emulabili in HCE generico.</text>
</svg>
