<svg viewBox="0 0 820 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="sh2">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000018"/>
    </filter>
  </defs>
  
  <rect width="820" height="500" fill="url(#bg2)" rx="16"/>
  <text x="410" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Guasti per Probabilità di Occorrenza</text>
  <text x="410" y="56" text-anchor="middle" font-size="12" fill="#64748b">Dal più frequente (in basso) al più raro (in alto) — con le tecnologie che li coprono</text>

  <!-- Frequency label on left -->
  <text x="22" y="410" font-size="11" fill="#94a3b8" text-anchor="middle" transform="rotate(-90,22,300)">← più frequente</text>
  <line x1="35" y1="80" x2="35" y2="465" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- Arrow up = rarer -->
  <polygon points="35,78 31,88 39,88" fill="#94a3b8"/>

  <!-- Level 1 - Most frequent: Crash processo/servizio -->
  <rect x="50" y="428" width="560" height="38" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#sh2)"/>
  <rect x="50" y="428" width="10" height="38" rx="4" fill="#16a34a"/>
  <text x="76" y="443" font-size="12" font-weight="700" fill="#14532d">Crash di un processo / servizio</text>
  <text x="76" y="458" font-size="10.5" fill="#166534">Molto comune — anche quotidiano</text>
  <text x="628" y="445" font-size="10.5" fill="#14532d">⟶ Restart automatico VM · Health check HAProxy</text>
  <text x="628" y="459" font-size="10.5" fill="#14532d">    Watchdog · systemd</text>

  <!-- Level 2 - Frequent: Guasto disco singolo -->
  <rect x="50" y="378" width="510" height="38" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1.5" filter="url(#sh2)"/>
  <rect x="50" y="378" width="10" height="38" rx="4" fill="#059669"/>
  <text x="76" y="393" font-size="12" font-weight="700" fill="#064e3b">Guasto disco singolo</text>
  <text x="76" y="408" font-size="10.5" fill="#065f46">Frequente — ogni pochi mesi per disco</text>
  <text x="578" y="395" font-size="10.5" fill="#064e3b">⟶ RAID-1 / RAIDZ2 / ZFS</text>
  <text x="578" y="409" font-size="10.5" fill="#064e3b">    Nessuna interruzione del servizio</text>

  <!-- Level 3: Guasto server backend -->
  <rect x="50" y="328" width="460" height="38" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5" filter="url(#sh2)"/>
  <rect x="50" y="328" width="10" height="38" rx="4" fill="#ca8a04"/>
  <text x="76" y="343" font-size="12" font-weight="700" fill="#713f12">Guasto server backend (tier 2)</text>
  <text x="76" y="358" font-size="10.5" fill="#854d0e">Periodico — qualche volta l'anno</text>
  <text x="528" y="345" font-size="10.5" fill="#713f12">⟶ DNAT Clustering + health check</text>
  <text x="528" y="359" font-size="10.5" fill="#713f12">    Redirect automatico in &lt; 5 s</text>

  <!-- Level 4: Guasto proxy/router -->
  <rect x="50" y="278" width="410" height="38" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" filter="url(#sh2)"/>
  <rect x="50" y="278" width="10" height="38" rx="4" fill="#d97706"/>
  <text x="76" y="293" font-size="12" font-weight="700" fill="#78350f">Guasto proxy / load balancer</text>
  <text x="76" y="308" font-size="10.5" fill="#92400e">Raro — singolo punto di guasto critico</text>
  <text x="478" y="295" font-size="10.5" fill="#78350f">⟶ VRRP / keepalived</text>
  <text x="478" y="309" font-size="10.5" fill="#78350f">    VIP trasferito in 2–3 s</text>

  <!-- Level 5: Guasto nodo hypervisor -->
  <rect x="50" y="228" width="360" height="38" rx="8" fill="#fed7aa" stroke="#ea580c" stroke-width="1.5" filter="url(#sh2)"/>
  <rect x="50" y="228" width="10" height="38" rx="4" fill="#ea580c"/>
  <text x="76" y="243" font-size="12" font-weight="700" fill="#7c2d12">Guasto nodo hypervisor (server fisico)</text>
  <text x="76" y="258" font-size="10.5" fill="#9a3412">Raro — ma impatta tutte le VM sul nodo</text>
  <text x="428" y="245" font-size="10.5" fill="#7c2d12">⟶ HCI (Ceph/vSAN) · HA cluster</text>
  <text x="428" y="259" font-size="10.5" fill="#7c2d12">    VM riavviate in secondi sui nodi superstiti</text>

  <!-- Level 6: Corruzione logica / ransomware -->
  <rect x="50" y="178" width="310" height="38" rx="8" fill="#fecdd3" stroke="#e11d48" stroke-width="1.5" filter="url(#sh2)"/>
  <rect x="50" y="178" width="10" height="38" rx="4" fill="#e11d48"/>
  <text x="76" y="193" font-size="12" font-weight="700" fill="#881337">Corruzione logica / ransomware</text>
  <text x="76" y="208" font-size="10.5" fill="#9f1239">Raro ma devastante — la replica non aiuta</text>
  <text x="378" y="195" font-size="10.5" fill="#881337">⟶ Backup WORM / offsite</text>
  <text x="378" y="209" font-size="10.5" fill="#881337">    Unica difesa efficace</text>

  <!-- Level 7: Guasto rack / sala server -->
  <rect x="50" y="128" width="260" height="38" rx="8" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh2)"/>
  <rect x="50" y="128" width="10" height="38" rx="4" fill="#7c3aed"/>
  <text x="76" y="143" font-size="12" font-weight="700" fill="#3b0764">Guasto rack / alimentazione sala server</text>
  <text x="76" y="158" font-size="10.5" fill="#4c1d95">Molto raro — dipende da UPS e impianti</text>
  <text x="328" y="145" font-size="10.5" fill="#3b0764">⟶ UPS ridondati · Generatori</text>
  <text x="328" y="159" font-size="10.5" fill="#3b0764">    TIA-942 Tier III/IV</text>

  <!-- Level 8: Disastro datacenter -->
  <rect x="50" y="78" width="210" height="38" rx="8" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5" filter="url(#sh2)"/>
  <rect x="50" y="78" width="10" height="38" rx="4" fill="#4f46e5"/>
  <text x="76" y="93" font-size="12" font-weight="700" fill="#1e1b4b">Disastro datacenter (incendio, alluvione)</text>
  <text x="76" y="108" font-size="10.5" fill="#312e81">Rarissimo — ma perdita totale</text>
  <text x="278" y="95" font-size="10.5" fill="#1e1b4b">⟶ Backup offsite fisico</text>
  <text x="278" y="109" font-size="10.5" fill="#1e1b4b">    DR site geograficamente separato</text>

  <!-- Legend bar at right -->
  <rect x="742" y="78" width="18" height="390" rx="9" fill="url(#lgnd)"/>
  <defs>
    <linearGradient id="lgnd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <text x="760" y="86" font-size="10" fill="#64748b" text-anchor="middle">raro</text>
  <text x="760" y="470" font-size="10" fill="#64748b" text-anchor="middle">comune</text>
</svg>
