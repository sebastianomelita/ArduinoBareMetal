<svg viewBox="0 0 860 540" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#f1f5f9"/></linearGradient>
    <filter id="sh2"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000015"/></filter>
  </defs>

  <rect width="860" height="540" fill="url(#bg2)" rx="16"/>
  <text x="430" y="38" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">Guasti per Probabilità di Occorrenza</text>
  <text x="430" y="59" text-anchor="middle" font-size="13" fill="#64748b">Dal più frequente (in alto) al più raro (in basso) — con le tecnologie che li coprono</text>

  <!-- column headers -->
  <text x="48" y="84" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="0.5">TIPO DI GUASTO</text>
  <text x="500" y="84" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="0.5">FREQUENZA</text>
  <text x="640" y="84" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="0.5">TECNOLOGIA DI PROTEZIONE</text>
  <line x1="48" y1="92" x2="812" y2="92" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Row template: y starts 102, each row h=52, gap 4 => step 56 -->
  <!-- ROW 1 -->
  <g>
    <rect x="48" y="102" width="764" height="52" rx="9" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" filter="url(#sh2)"/>
    <rect x="48" y="102" width="6" height="52" rx="3" fill="#16a34a"/>
    <text x="70" y="125" font-size="13" font-weight="700" fill="#14532d">Crash di un processo / servizio</text>
    <text x="70" y="143" font-size="11" fill="#166534">interno alla VM: kernel panic, servizio bloccato</text>
    <!-- freq meter -->
    <rect x="500" y="120" width="110" height="9" rx="4.5" fill="#bbf7d0"/>
    <rect x="500" y="120" width="106" height="9" rx="4.5" fill="#16a34a"/>
    <text x="500" y="143" font-size="10" fill="#166534">molto comune</text>
    <!-- tech -->
    <text x="640" y="125" font-size="11.5" font-weight="600" fill="#14532d">Health check + restart VM</text>
    <text x="640" y="143" font-size="10.5" fill="#166534">ripristino in secondi</text>
  </g>

  <!-- ROW 2 -->
  <g>
    <rect x="48" y="158" width="764" height="52" rx="9" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1.5" filter="url(#sh2)"/>
    <rect x="48" y="158" width="6" height="52" rx="3" fill="#059669"/>
    <text x="70" y="181" font-size="13" font-weight="700" fill="#064e3b">Guasto di un disco singolo</text>
    <text x="70" y="199" font-size="11" fill="#065f46">usura fisica nel ciclo di vita dello storage</text>
    <rect x="500" y="176" width="110" height="9" rx="4.5" fill="#a7f3d0"/>
    <rect x="500" y="176" width="92" height="9" rx="4.5" fill="#059669"/>
    <text x="500" y="199" font-size="10" fill="#065f46">frequente</text>
    <text x="640" y="181" font-size="11.5" font-weight="600" fill="#064e3b">RAID-1 / RAIDZ2 / ZFS</text>
    <text x="640" y="199" font-size="10.5" fill="#065f46">assorbito senza interruzione del servizio</text>
  </g>

  <!-- ROW 3 -->
  <g>
    <rect x="48" y="214" width="764" height="52" rx="9" fill="#fef9c3" stroke="#fde047" stroke-width="1.5" filter="url(#sh2)"/>
    <rect x="48" y="214" width="6" height="52" rx="3" fill="#ca8a04"/>
    <text x="70" y="237" font-size="13" font-weight="700" fill="#713f12">Guasto server backend (tier 2)</text>
    <text x="70" y="255" font-size="11" fill="#854d0e">un nodo applicativo del pool diventa irraggiungibile</text>
    <rect x="500" y="232" width="110" height="9" rx="4.5" fill="#fef08a"/>
    <rect x="500" y="232" width="68" height="9" rx="4.5" fill="#ca8a04"/>
    <text x="500" y="255" font-size="10" fill="#854d0e">periodico</text>
    <text x="640" y="237" font-size="11.5" font-weight="600" fill="#713f12">DNAT Clustering + health check</text>
    <text x="640" y="255" font-size="10.5" fill="#854d0e">redirect automatico in &lt; 5 s</text>
  </g>

  <!-- ROW 4 -->
  <g>
    <rect x="48" y="270" width="764" height="52" rx="9" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5" filter="url(#sh2)"/>
    <rect x="48" y="270" width="6" height="52" rx="3" fill="#d97706"/>
    <text x="70" y="293" font-size="13" font-weight="700" fill="#78350f">Guasto proxy / load balancer</text>
    <text x="70" y="311" font-size="11" fill="#92400e">singolo punto di transito: bloccherebbe tutto il traffico</text>
    <rect x="500" y="288" width="110" height="9" rx="4.5" fill="#fde68a"/>
    <rect x="500" y="288" width="52" height="9" rx="4.5" fill="#d97706"/>
    <text x="500" y="311" font-size="10" fill="#92400e">raro</text>
    <text x="640" y="293" font-size="11.5" font-weight="600" fill="#78350f">VRRP / keepalived</text>
    <text x="640" y="311" font-size="10.5" fill="#92400e">VIP trasferito allo slave in 2–3 s</text>
  </g>

  <!-- ROW 5 -->
  <g>
    <rect x="48" y="326" width="764" height="52" rx="9" fill="#fed7aa" stroke="#fb923c" stroke-width="1.5" filter="url(#sh2)"/>
    <rect x="48" y="326" width="6" height="52" rx="3" fill="#ea580c"/>
    <text x="70" y="349" font-size="13" font-weight="700" fill="#7c2d12">Guasto nodo hypervisor (server fisico)</text>
    <text x="70" y="367" font-size="11" fill="#9a3412">tutte le VM su quel nodo offline contemporaneamente</text>
    <rect x="500" y="344" width="110" height="9" rx="4.5" fill="#fdba74"/>
    <rect x="500" y="344" width="46" height="9" rx="4.5" fill="#ea580c"/>
    <text x="500" y="367" font-size="10" fill="#9a3412">raro</text>
    <text x="640" y="349" font-size="11.5" font-weight="600" fill="#7c2d12">HCI (Ceph / vSAN) · DRBD</text>
    <text x="640" y="367" font-size="10.5" fill="#9a3412">VM riavviate sui superstiti in secondi</text>
  </g>

  <!-- ROW 6 -->
  <g>
    <rect x="48" y="382" width="764" height="52" rx="9" fill="#fecdd3" stroke="#fb7185" stroke-width="1.5" filter="url(#sh2)"/>
    <rect x="48" y="382" width="6" height="52" rx="3" fill="#e11d48"/>
    <text x="70" y="405" font-size="13" font-weight="700" fill="#881337">Corruzione logica / ransomware / errore umano</text>
    <text x="70" y="423" font-size="11" fill="#9f1239">la replica propaga lo stato corrotto: non aiuta</text>
    <rect x="500" y="400" width="110" height="9" rx="4.5" fill="#fda4af"/>
    <rect x="500" y="400" width="34" height="9" rx="4.5" fill="#e11d48"/>
    <text x="500" y="423" font-size="10" fill="#9f1239">raro · devastante</text>
    <text x="640" y="405" font-size="11.5" font-weight="600" fill="#881337">Backup WORM / offsite</text>
    <text x="640" y="423" font-size="10.5" fill="#9f1239">unica difesa efficace</text>
  </g>

  <!-- ROW 7 -->
  <g>
    <rect x="48" y="438" width="764" height="52" rx="9" fill="#f3e8ff" stroke="#c084fc" stroke-width="1.5" filter="url(#sh2)"/>
    <rect x="48" y="438" width="6" height="52" rx="3" fill="#7c3aed"/>
    <text x="70" y="461" font-size="13" font-weight="700" fill="#3b0764">Guasto alimentazione / rack / sala server</text>
    <text x="70" y="479" font-size="11" fill="#4c1d95">black-out, surriscaldamento, guasto impianto</text>
    <rect x="500" y="456" width="110" height="9" rx="4.5" fill="#e9d5ff"/>
    <rect x="500" y="456" width="22" height="9" rx="4.5" fill="#7c3aed"/>
    <text x="500" y="479" font-size="10" fill="#4c1d95">molto raro</text>
    <text x="640" y="461" font-size="11.5" font-weight="600" fill="#3b0764">UPS ridondati · generatori</text>
    <text x="640" y="479" font-size="10.5" fill="#4c1d95">TIA-942 Tier III / IV</text>
  </g>

  <!-- ROW 8 -->
  <g>
    <rect x="48" y="494" width="764" height="40" rx="9" fill="#e0e7ff" stroke="#818cf8" stroke-width="1.5" filter="url(#sh2)"/>
    <rect x="48" y="494" width="6" height="40" rx="3" fill="#4f46e5"/>
    <text x="70" y="513" font-size="13" font-weight="700" fill="#1e1b4b">Disastro datacenter (incendio, alluvione)</text>
    <text x="70" y="528" font-size="10.5" fill="#312e81">perdita fisica totale del sito</text>
    <rect x="500" y="508" width="110" height="9" rx="4.5" fill="#c7d2fe"/>
    <rect x="500" y="508" width="14" height="9" rx="4.5" fill="#4f46e5"/>
    <text x="500" y="528" font-size="10" fill="#312e81">rarissimo</text>
    <text x="640" y="513" font-size="11.5" font-weight="600" fill="#1e1b4b">Backup offsite · DR site</text>
    <text x="640" y="528" font-size="10.5" fill="#312e81">copia geograficamente distante</text>
  </g>
</svg>
