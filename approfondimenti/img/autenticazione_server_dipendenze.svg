<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Flusso orizzontale a cinque passi. Il passo 3 valida il certificato utente. In basso due frecce mostrano i dati che alimentano la verifica della firma: la chiave pubblica estratta dal certificato validato e la sfida firmata ricevuta nella risposta.</desc>
