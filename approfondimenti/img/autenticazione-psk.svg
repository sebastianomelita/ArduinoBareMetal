<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 600" role="img" font-family="'Segoe UI', system-ui, -apple-system, Roboto, sans-serif">
  <title>Autenticazione con chiave pre-condivisa per dispositivi IoT: PSK condivisa vs chiave per-dispositivo</title>
  <desc>A ogni livello di rete esiste una variante basata su segreto simmetrico condiviso, installato in anticipo sui due estremi. Sul livello di accesso i nodi IoT si dividono in due modelli: PSK condivisa uguale per tutti, oppure chiave unica per dispositivo derivata da un Join Server (LoRaWAN OTAA).</desc>
  <style>
    .ttl  { font-size: 19px; font-weight: 700; fill:#18212B; }
    .sub  { font-size: 13px; fill:#586673; }
    .lane-l{ font-size: 12.5px; font-weight:800; letter-spacing:.04em; }
    .lane-t{ font-size: 14px; font-weight:700; fill:#18212B; }
    .lane-d{ font-size: 12.5px; fill:#586673; }
    .subh { font-size: 12.5px; font-weight:700; fill:#18212B; }
    .node { font-size: 13.5px; font-weight:700; fill:#18212B; }
    .node-s{ font-size:11px; fill:#586673; }
    .anno { font-size: 11.5px; font-style:italic; fill:#586673; }
    .cap  { font-size: 13px; fill:#18212B; }
    .badge{ font-size:10px; font-weight:800; fill:#fff; }
    .badge-s{ font-size:9px; fill:#fff; }
    .ap   { font-size:11.5px; font-weight:700; fill:#18212B; }
  </style>
  <rect x="0" y="0" width="880" height="600" fill="#FFFFFF"/>
  <text x="32" y="34" class="ttl">Autenticazione con chiave pre-condivisa (PSK) &#8212; risorse limitate</text>
  <text x="32" y="54" class="sub">Stesso principio a ogni livello: un segreto simmetrico installato sui due estremi. Niente CA n&#233; crittografia asimmetrica.</text>

  <!-- Endpoint sinistro -->
  <rect x="32" y="92" width="120" height="400" rx="12" fill="#18212B"/>
  <text x="92" y="241" text-anchor="middle" class="node" fill="#fff">Dispositivo</text>
  <text x="92" y="259" text-anchor="middle" class="node" fill="#fff">vincolato</text>
  <text x="92" y="281" text-anchor="middle" class="node-s" fill="#B8C2CC">Sensore &#183; AP</text>
  <text x="92" y="296" text-anchor="middle" class="node-s" fill="#B8C2CC">nodo IoT</text>
  <rect x="62" y="313" width="60" height="44" rx="6" fill="#B0531F"/>
  <text x="92" y="333" text-anchor="middle" class="badge">PSK</text>
  <text x="92" y="348" text-anchor="middle" class="badge-s">chiave simm.</text>
  <text x="92" y="379" text-anchor="middle" class="node-s" fill="#B8C2CC">CPU/RAM ridotte</text>

  <!-- Endpoint destro -->
  <rect x="728" y="92" width="120" height="400" rx="12" fill="#18212B"/>
  <text x="788" y="237" text-anchor="middle" class="node" fill="#fff">Gateway /</text>
  <text x="788" y="255" text-anchor="middle" class="node" fill="#fff">Concentratore</text>
  <text x="788" y="277" text-anchor="middle" class="node-s" fill="#B8C2CC">Access Point</text>
  <text x="788" y="293" text-anchor="middle" class="node-s" fill="#B8C2CC">Broker / Server</text>
  <rect x="758" y="313" width="60" height="44" rx="6" fill="#B0531F"/>
  <text x="788" y="333" text-anchor="middle" class="badge">PSK</text>
  <text x="788" y="348" text-anchor="middle" class="badge-s">copia identica</text>
  <text x="788" y="379" text-anchor="middle" class="node-s" fill="#B8C2CC">stessa chiave</text>

  <line x1="152" y1="292" x2="168" y2="292" stroke="#18212B" stroke-width="2"/>
  <line x1="712" y1="292" x2="728" y2="292" stroke="#18212B" stroke-width="2"/>

  <path d="M 680 123 L 680 410" fill="none" stroke="#B0531F" stroke-width="1.6" stroke-dasharray="4 4"/>

  <!-- ===== L7 ===== -->
  <rect x="168" y="92" width="544" height="80" rx="10" fill="#F1F4F6" stroke="#1E6E66" stroke-width="2"/>
  <rect x="168" y="92" width="46" height="80" rx="10" fill="#1E6E66"/>
  <rect x="200" y="92" width="14" height="80" fill="#1E6E66"/>
  <text x="191" y="136" text-anchor="middle" class="lane-l" fill="#fff" transform="rotate(-90 191 132)">L7</text>
  <text x="228" y="118" class="lane-t">MQTT &#183; CoAP &#8212; segreto applicativo (HMAC)</text>
  <text x="228" y="138" class="lane-d">Messaggi autenticati con un segreto condiviso, senza certificati.</text>
  <text x="228" y="158" class="anno">anche Kerberos si fonda su chiavi simmetriche condivise con il KDC</text>
  <rect x="660" y="106" width="40" height="34" rx="5" fill="#B0531F"/>
  <text x="680" y="127" text-anchor="middle" class="badge">PSK</text>

  <!-- ===== L4/5 ===== -->
  <rect x="168" y="184" width="544" height="78" rx="10" fill="#F1F4F6" stroke="#2C5C8F" stroke-width="2"/>
  <rect x="168" y="184" width="46" height="78" rx="10" fill="#2C5C8F"/>
  <rect x="200" y="184" width="14" height="78" fill="#2C5C8F"/>
  <text x="191" y="227" text-anchor="middle" class="lane-l" fill="#fff" transform="rotate(-90 191 223)">L4/5</text>
  <text x="228" y="212" class="lane-t">(D)TLS-PSK &#8212; sessione cifrata senza certificati</text>
  <text x="228" y="232" class="lane-d">Chiave condivisa al posto del certificato &#8212; diffuso nell'IoT.</text>
  <rect x="660" y="200" width="40" height="34" rx="5" fill="#B0531F"/>
  <text x="680" y="221" text-anchor="middle" class="badge">PSK</text>

  <!-- ===== L3 ===== -->
  <rect x="168" y="274" width="544" height="66" rx="10" fill="#F1F4F6" stroke="#6A7E92" stroke-width="2"/>
  <rect x="168" y="274" width="46" height="66" rx="10" fill="#6A7E92"/>
  <rect x="200" y="274" width="14" height="66" fill="#6A7E92"/>
  <text x="191" y="311" text-anchor="middle" class="lane-l" fill="#fff" transform="rotate(-90 191 307)">L3</text>
  <text x="228" y="300" class="lane-t">IPsec / IKE con PSK &#8212; tunnel VPN</text>
  <text x="228" y="320" class="lane-d">Tunnel fra siti autenticato con chiave condivisa, non con certificati.</text>
  <rect x="660" y="289" width="40" height="34" rx="5" fill="#B0531F"/>
  <text x="680" y="310" text-anchor="middle" class="badge">PSK</text>

  <!-- ===== L2 (due gruppi IoT) ===== -->
  <rect x="168" y="352" width="544" height="140" rx="10" fill="#F1F4F6" stroke="#586673" stroke-width="2"/>
  <rect x="168" y="352" width="46" height="140" rx="10" fill="#586673"/>
  <rect x="200" y="352" width="14" height="140" fill="#586673"/>
  <text x="191" y="426" text-anchor="middle" class="lane-l" fill="#fff" transform="rotate(-90 191 422)">L2</text>
  <text x="228" y="371" class="lane-t">Accesso ai nodi IoT &#8212; due modi di gestire la chiave</text>

  <!-- Gruppo A: PSK condivisa -->
  <text x="228" y="391" class="subh"><tspan fill="#B0531F" font-weight="800">A</tspan> &#183; PSK condivisa &#8212; uguale per tutti</text>
  <rect x="236" y="398" width="26" height="22" rx="5" fill="#18212B"/><circle cx="249" cy="409" r="3.2" fill="#B0531F"/>
  <rect x="268" y="398" width="26" height="22" rx="5" fill="#18212B"/><circle cx="281" cy="409" r="3.2" fill="#B0531F"/>
  <rect x="300" y="398" width="26" height="22" rx="5" fill="#18212B"/><circle cx="313" cy="409" r="3.2" fill="#B0531F"/>
  <line x1="330" y1="409" x2="384" y2="409" stroke="#586673" stroke-width="1.2" stroke-dasharray="3 3"/>
  <rect x="390" y="397" width="44" height="24" rx="6" fill="#F1F4F6" stroke="#586673" stroke-width="1.5"/>
  <text x="412" y="413" text-anchor="middle" class="ap">AP</text>
  <text x="446" y="413" class="anno">una passphrase per tutti</text>

  <!-- Gruppo B: chiave per-dispositivo -->
  <text x="228" y="444" class="subh"><tspan fill="#2C5C8F" font-weight="800">B</tspan> &#183; Chiave per-dispositivo &#8212; diversa per ciascuno</text>
  <rect x="236" y="451" width="26" height="22" rx="5" fill="#18212B"/><circle cx="249" cy="462" r="3.2" fill="#1E6E66"/>
  <rect x="268" y="451" width="26" height="22" rx="5" fill="#18212B"/><circle cx="281" cy="462" r="3.2" fill="#2C5C8F"/>
  <rect x="300" y="451" width="26" height="22" rx="5" fill="#18212B"/><circle cx="313" cy="462" r="3.2" fill="#6A4C93"/>
  <line x1="330" y1="462" x2="384" y2="462" stroke="#586673" stroke-width="1.2" stroke-dasharray="3 3"/>
  <rect x="390" y="450" width="92" height="24" rx="6" fill="#F1F4F6" stroke="#2C5C8F" stroke-width="1.5"/>
  <text x="436" y="466" text-anchor="middle" class="ap">Join Server</text>
  <text x="494" y="466" class="anno">una chiave per nodo</text>
  <circle cx="664" cy="462" r="3.2" fill="#1E6E66"/>
  <circle cx="676" cy="462" r="3.2" fill="#2C5C8F"/>
  <circle cx="688" cy="462" r="3.2" fill="#6A4C93"/>

  <rect x="660" y="397" width="40" height="26" rx="5" fill="#B0531F"/>
  <text x="680" y="414" text-anchor="middle" class="badge">PSK</text>

  <!-- caption -->
  <rect x="32" y="506" width="816" height="86" rx="10" fill="#FBF3EE" stroke="#B0531F" stroke-width="1.4"/>
  <text x="50" y="532" class="cap"><tspan font-weight="800" fill="#B0531F">Punto chiave.</tspan> Un solo segreto simmetrico, installato in anticipo sui due estremi: niente CA n&#233; chiavi asimmetriche.</text>
  <text x="50" y="552" class="cap">Solo crittografia simmetrica &#8594; pochi cicli di CPU: ideale per sensori, AP e nodi IoT a basse risorse.</text>
  <text x="50" y="572" class="anno">PSK condivisa (A): segreto uguale per tutti, se trapela cadono tutti. Chiave per-dispositivo (B): ognuno la sua, con revoca singola.</text>
  <text x="50" y="586" class="anno">Nota: la via B (Join Server LoRaWAN OTAA) usa chiavi simmetriche uniche per nodo, non &#232; PKI; la PKI vera (certificati X.509) &#232; la figura a fianco.</text>
</svg>
