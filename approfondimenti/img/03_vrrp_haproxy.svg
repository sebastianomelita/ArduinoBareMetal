<svg viewBox="0 0 860 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#eff6ff"/><stop offset="100%" stop-color="#dbeafe"/></linearGradient>
    <filter id="sh3"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#2563eb22"/></filter>
    <filter id="sh3b"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000015"/></filter>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L0,7 L9,3.5 z" fill="#2563eb"/></marker>
    <marker id="arrG" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L0,7 L9,3.5 z" fill="#16a34a"/></marker>
    <marker id="arrR" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L0,7 L9,3.5 z" fill="#dc2626"/></marker>
  </defs>

  <rect width="860" height="480" fill="url(#bg3)" rx="16"/>
  <text x="430" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Piano del Servizio: VRRP + HAProxy + DNAT</text>
  <text x="430" y="56" text-anchor="middle" font-size="12.5" fill="#475569">Come il servizio rimane raggiungibile anche durante un guasto</text>

  <!-- CLIENT -->
  <rect x="28" y="190" width="86" height="62" rx="10" fill="#1e293b" filter="url(#sh3b)"/>
  <text x="71" y="214" text-anchor="middle" font-size="11" font-weight="700" fill="white">CLIENT</text>
  <rect x="52" y="219" width="38" height="24" rx="3" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="71" y1="243" x2="71" y2="247" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="64" y1="247" x2="78" y2="247" stroke="#94a3b8" stroke-width="1.5"/>

  <line x1="116" y1="221" x2="156" y2="221" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="136" y="214" text-anchor="middle" font-size="10" fill="#2563eb">HTTPS</text>

  <!-- VIP -->
  <ellipse cx="206" cy="221" rx="42" ry="26" fill="#2563eb" filter="url(#sh3)"/>
  <text x="206" y="216" text-anchor="middle" font-size="11" font-weight="700" fill="white">VIP</text>
  <text x="206" y="231" text-anchor="middle" font-size="9.5" fill="#bfdbfe">10.0.0.1</text>
  <rect x="158" y="256" width="96" height="22" rx="11" fill="#1d4ed8"/>
  <text x="206" y="271" text-anchor="middle" font-size="10" font-weight="700" fill="white">VRRP keepalived</text>

  <!-- VIP to master (active) -->
  <line x1="248" y1="206" x2="316" y2="172" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrG)"/>
  <!-- VIP to slave (standby dashed) -->
  <line x1="248" y1="238" x2="316" y2="300" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- PROXY MASTER -->
  <rect x="320" y="118" width="170" height="96" rx="12" fill="white" stroke="#16a34a" stroke-width="2.5" filter="url(#sh3)"/>
  <rect x="320" y="118" width="170" height="26" rx="12" fill="#16a34a"/>
  <rect x="320" y="132" width="170" height="12" fill="#16a34a"/>
  <text x="405" y="135" text-anchor="middle" font-size="12" font-weight="700" fill="white">PROXY MASTER</text>
  <text x="405" y="158" text-anchor="middle" font-size="11" fill="#166534">HAProxy / Nginx</text>
  <text x="405" y="174" text-anchor="middle" font-size="10" fill="#374151">health check ogni 500 ms · ALG · SSL term.</text>
  <rect x="338" y="184" width="134" height="20" rx="10" fill="#dcfce7"/>
  <text x="405" y="198" text-anchor="middle" font-size="10" font-weight="700" fill="#14532d">● ATTIVO — detiene il VIP</text>

  <!-- heartbeat -->
  <line x1="405" y1="216" x2="405" y2="256" stroke="#f59e0b" stroke-width="2" stroke-dasharray="3,3"/>
  <rect x="416" y="227" width="62" height="18" rx="9" fill="#fef3c7"/>
  <text x="447" y="240" text-anchor="middle" font-size="9.5" fill="#92400e">heartbeat</text>

  <!-- PROXY SLAVE -->
  <rect x="320" y="258" width="170" height="86" rx="12" fill="white" stroke="#94a3b8" stroke-width="1.5" filter="url(#sh3b)"/>
  <rect x="320" y="258" width="170" height="26" rx="12" fill="#94a3b8"/>
  <rect x="320" y="272" width="170" height="12" fill="#94a3b8"/>
  <text x="405" y="275" text-anchor="middle" font-size="12" font-weight="700" fill="white">PROXY SLAVE</text>
  <text x="405" y="298" text-anchor="middle" font-size="11" fill="#374151">HAProxy / Nginx</text>
  <text x="405" y="314" text-anchor="middle" font-size="10" fill="#374151">in ascolto dell'heartbeat</text>
  <rect x="338" y="322" width="134" height="18" rx="9" fill="#f1f5f9"/>
  <text x="405" y="335" text-anchor="middle" font-size="9.5" font-weight="700" fill="#64748b">◌ STANDBY — pronto al takeover</text>

  <!-- master to backend -->
  <line x1="492" y1="166" x2="566" y2="166" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrG)"/>
  <text x="529" y="159" text-anchor="middle" font-size="9.5" fill="#15803d">DNAT / load balance</text>

  <!-- BACKEND POOL -->
  <rect x="568" y="92" width="266" height="252" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2" filter="url(#sh3b)"/>
  <text x="701" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">BACKEND POOL</text>
  <text x="701" y="132" text-anchor="middle" font-size="10.5" fill="#64748b">server web / applicativi</text>

  <rect x="588" y="146" width="110" height="56" rx="9" fill="white" stroke="#16a34a" stroke-width="1.5"/>
  <text x="643" y="168" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Server 1</text>
  <rect x="596" y="176" width="94" height="20" rx="6" fill="#dcfce7"/>
  <text x="643" y="190" text-anchor="middle" font-size="9.5" fill="#14532d">● UP · risponde</text>

  <rect x="588" y="212" width="110" height="56" rx="9" fill="white" stroke="#16a34a" stroke-width="1.5"/>
  <text x="643" y="234" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Server 2</text>
  <rect x="596" y="242" width="94" height="20" rx="6" fill="#dcfce7"/>
  <text x="643" y="256" text-anchor="middle" font-size="9.5" fill="#14532d">● UP · risponde</text>

  <rect x="710" y="178" width="110" height="56" rx="9" fill="white" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="765" y="200" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">Server 3</text>
  <rect x="718" y="208" width="94" height="20" rx="6" fill="#fee2e2"/>
  <text x="765" y="222" text-anchor="middle" font-size="9.5" fill="#991b1b">✕ DOWN · escluso</text>
  <line x1="710" y1="178" x2="820" y2="234" stroke="#dc262633" stroke-width="2"/>
  <line x1="820" y1="178" x2="710" y2="234" stroke="#dc262633" stroke-width="2"/>

  <!-- health checks -->
  <line x1="566" y1="174" x2="586" y2="174" stroke="#16a34a" stroke-width="1.2" stroke-dasharray="2,2" marker-end="url(#arrG)"/>
  <line x1="566" y1="240" x2="586" y2="240" stroke="#16a34a" stroke-width="1.2" stroke-dasharray="2,2" marker-end="url(#arrG)"/>
  <line x1="566" y1="206" x2="708" y2="206" stroke="#dc2626" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#arrR)"/>

  <!-- FAILOVER note: full-width clean band, separate from diagram -->
  <rect x="28" y="356" width="806" height="40" rx="10" fill="#fef9c3" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="48" y="381" font-size="12" fill="#78350f"><tspan font-weight="700">⚡ Failover:</tspan> se il master cade, lo slave acquisisce il VIP in 2–3 s, trasparente ai client (l'IP non cambia).</text>

  <!-- description -->
  <rect x="28" y="404" width="806" height="62" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="48" y="424" font-size="12.5" font-weight="700" fill="#0f172a">Come funziona</text>
  <text x="48" y="442" font-size="11.5" fill="#374151">1. I client raggiungono sempre il VIP, indirizzo virtuale condiviso tra proxy master e slave tramite VRRP/keepalived.</text>
  <text x="48" y="459" font-size="11.5" fill="#374151">2. Il master distribuisce via DNAT ai backend sani; gli health check (500 ms) escludono i server caduti.</text>
</svg>
