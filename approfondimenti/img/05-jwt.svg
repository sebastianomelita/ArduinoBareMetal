<svg viewBox="0 0 760 380" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="sh5" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <text x="380" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#1E293B">Anatomia dell'ID Token (JWT)</text>
  <text x="380" y="50" text-anchor="middle" font-size="12" fill="#64748B">tre parti codificate in Base64URL, separate da un punto</text>

  <!-- token codificato -->
  <text x="380" y="92" text-anchor="middle" font-family="'Consolas','SF Mono',monospace" font-size="13" font-weight="600">
    <tspan fill="#BE123C">eyJhbGciOiJSUzI1NiJ9</tspan><tspan fill="#94A3B8">.</tspan><tspan fill="#4338CA">eyJzdWIiOiIyNDgyODkiLCJ1c2VyIn0</tspan><tspan fill="#94A3B8">.</tspan><tspan fill="#0D9488">SflKxwRJSMeKKF2QT4</tspan>
  </text>

  <!-- Header -->
  <g filter="url(#sh5)"><rect x="45" y="118" width="210" height="200" rx="10" fill="#FFFFFF" stroke="#BE123C" stroke-width="1.5"/></g>
  <rect x="45" y="118" width="210" height="30" rx="10" fill="#BE123C"/>
  <rect x="45" y="138" width="210" height="10" fill="#BE123C"/>
  <text x="150" y="138" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFFFFF">HEADER</text>
  <text x="62" y="178" font-family="'Consolas','SF Mono',monospace" font-size="11.5" fill="#334155">{</text>
  <text x="74" y="198" font-family="'Consolas','SF Mono',monospace" font-size="11.5" fill="#334155">"alg": "RS256",</text>
  <text x="74" y="218" font-family="'Consolas','SF Mono',monospace" font-size="11.5" fill="#334155">"typ": "JWT",</text>
  <text x="74" y="238" font-family="'Consolas','SF Mono',monospace" font-size="11.5" fill="#334155">"kid": "abc123"</text>
  <text x="62" y="258" font-family="'Consolas','SF Mono',monospace" font-size="11.5" fill="#334155">}</text>
  <text x="150" y="298" text-anchor="middle" font-size="10.5" font-style="italic" fill="#BE123C">algoritmo di firma</text>

  <!-- Payload -->
  <g filter="url(#sh5)"><rect x="275" y="118" width="210" height="200" rx="10" fill="#FFFFFF" stroke="#4338CA" stroke-width="1.5"/></g>
  <rect x="275" y="118" width="210" height="30" rx="10" fill="#4338CA"/>
  <rect x="275" y="138" width="210" height="10" fill="#4338CA"/>
  <text x="380" y="138" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFFFFF">PAYLOAD</text>
  <text x="292" y="170" font-family="'Consolas','SF Mono',monospace" font-size="11" fill="#334155">"iss": "…/scuola",</text>
  <text x="292" y="188" font-family="'Consolas','SF Mono',monospace" font-size="11" fill="#334155">"sub": "248289",</text>
  <text x="292" y="206" font-family="'Consolas','SF Mono',monospace" font-size="11" fill="#334155">"aud": "registro-app",</text>
  <text x="292" y="224" font-family="'Consolas','SF Mono',monospace" font-size="11" fill="#334155">"exp": 1718900000,</text>
  <text x="292" y="242" font-family="'Consolas','SF Mono',monospace" font-size="11" fill="#334155">"name": "Mario Rossi",</text>
  <text x="292" y="260" font-family="'Consolas','SF Mono',monospace" font-size="11" fill="#334155">"email": "m.rossi@…"</text>
  <text x="380" y="298" text-anchor="middle" font-size="10.5" font-style="italic" fill="#4338CA">i dati (claim) sull'utente</text>

  <!-- Signature -->
  <g filter="url(#sh5)"><rect x="505" y="118" width="210" height="200" rx="10" fill="#FFFFFF" stroke="#0D9488" stroke-width="1.5"/></g>
  <rect x="505" y="118" width="210" height="30" rx="10" fill="#0D9488"/>
  <rect x="505" y="138" width="210" height="10" fill="#0D9488"/>
  <text x="610" y="138" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFFFFF">SIGNATURE</text>
  <g transform="translate(610,188)" fill="none" stroke="#0D9488" stroke-width="2">
    <rect x="-18" y="-6" width="36" height="28" rx="4"/>
    <path d="M-10,-6 v-8 a10,10 0 0 1 20,0 v8"/>
  </g>
  <text x="610" y="246" text-anchor="middle" font-size="10.5" fill="#115E59">Firmata dal Provider con</text>
  <text x="610" y="262" text-anchor="middle" font-size="10.5" fill="#115E59">la chiave privata; verificata</text>
  <text x="610" y="278" text-anchor="middle" font-size="10.5" fill="#115E59">con la chiave pubblica (JWKS)</text>
  <text x="610" y="300" text-anchor="middle" font-size="10.5" font-style="italic" fill="#0D9488">garantisce l'integrità</text>

  <!-- nota -->
  <rect x="45" y="334" width="670" height="34" rx="9" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="380" y="356" text-anchor="middle" font-size="12" fill="#334155">L'ID Token è un JWT <tspan font-weight="700" fill="#0D9488">firmato</tspan>: una prova verificabile dell'identità dell'utente, non modificabile senza invalidare la firma.</text>
</svg>
