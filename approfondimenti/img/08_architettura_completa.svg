<svg viewBox="0 0 820 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f4ff"/>
      <stop offset="100%" stop-color="#e8eaf6"/>
    </linearGradient>
    <filter id="sh8">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#00000020"/>
    </filter>
    <filter id="sh8b">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000012"/>
    </filter>
    <marker id="a8" markerWidth="8" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L8,3.5 z" fill="#475569"/>
    </marker>
    <marker id="a8g" markerWidth="8" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L8,3.5 z" fill="#16a34a"/>
    </marker>
    <marker id="a8b" markerWidth="8" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L8,3.5 z" fill="#2563eb"/>
    </marker>
    <marker id="a8o" markerWidth="8" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L8,3.5 z" fill="#ea580c"/>
    </marker>
  </defs>

  <rect width="820" height="500" fill="url(#bg8)" rx="16"/>
  <text x="410" y="30" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">Architettura Completa: i Tre Livelli in Produzione</text>
  <text x="410" y="48" text-anchor="middle" font-size="11.5" fill="#475569">Come si sovrappongono: piano del servizio · piano dei dati · piano del ripristino</text>

  <!-- CLIENT at left -->
  <rect x="18" y="192" width="70" height="68" rx="10" fill="#1e293b" filter="url(#sh8b)"/>
  <text x="53" y="220" text-anchor="middle" font-size="10" font-weight="700" fill="white">CLIENT</text>
  <rect x="30" y="225" width="46" height="28" rx="4" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="53" y1="253" x2="53" y2="258" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="45" y1="258" x2="61" y2="258" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Arrow client → L1 -->
  <line x1="90" y1="226" x2="126" y2="226" stroke="#475569" stroke-width="2" marker-end="url(#a8)"/>
  <text x="108" y="220" text-anchor="middle" font-size="8.5" fill="#64748b">HTTPS</text>

  <!-- ======== LIVELLO 1: PIANO DEL SERVIZIO ======== -->
  <rect x="128" y="66" width="218" height="340" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#sh8)"/>
  <rect x="128" y="66" width="218" height="32" rx="14" fill="#2563eb"/>
  <rect x="128" y="84" width="218" height="14" fill="#2563eb"/>
  <text x="237" y="86" text-anchor="middle" font-size="12" font-weight="700" fill="white">L1 — Piano del Servizio</text>

  <!-- VIP -->
  <ellipse cx="237" cy="130" rx="38" ry="22" fill="#1d4ed8" filter="url(#sh8b)"/>
  <text x="237" y="126" text-anchor="middle" font-size="10" font-weight="700" fill="white">Virtual IP</text>
  <text x="237" y="140" text-anchor="middle" font-size="9" fill="#bfdbfe">VIP condiviso</text>
  
  <!-- VRRP label -->
  <rect x="170" y="156" width="134" height="18" rx="9" fill="#1e40af"/>
  <text x="237" y="168" text-anchor="middle" font-size="9.5" font-weight="600" fill="white">VRRP / keepalived</text>
  
  <!-- Proxy master -->
  <rect x="140" y="182" width="94" height="56" rx="10" fill="white" stroke="#16a34a" stroke-width="2" filter="url(#sh8b)"/>
  <rect x="140" y="182" width="94" height="22" rx="10" fill="#16a34a"/>
  <rect x="140" y="192" width="94" height="12" fill="#16a34a"/>
  <text x="187" y="195" text-anchor="middle" font-size="9.5" font-weight="700" fill="white">Proxy MASTER</text>
  <text x="187" y="210" text-anchor="middle" font-size="9" fill="#374151">HAProxy/Nginx</text>
  <text x="187" y="222" text-anchor="middle" font-size="8.5" fill="#374151">● ATTIVO</text>
  <rect x="140" y="230" width="94" height="8" fill="none"/>

  <!-- Proxy slave -->
  <rect x="242" y="182" width="92" height="56" rx="10" fill="white" stroke="#94a3b8" stroke-width="1.5" filter="url(#sh8b)"/>
  <rect x="242" y="182" width="92" height="22" rx="10" fill="#94a3b8"/>
  <rect x="242" y="192" width="92" height="12" fill="#94a3b8"/>
  <text x="288" y="195" text-anchor="middle" font-size="9.5" font-weight="700" fill="white">Proxy SLAVE</text>
  <text x="288" y="210" text-anchor="middle" font-size="9" fill="#374151">HAProxy/Nginx</text>
  <text x="288" y="222" text-anchor="middle" font-size="8.5" fill="#374151">◌ STANDBY</text>

  <!-- Heartbeat -->
  <line x1="236" y1="212" x2="242" y2="212" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="2,2"/>

  <!-- DNAT / ALG label -->
  <rect x="152" y="248" width="174" height="30" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="239" y="262" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1d4ed8">DNAT · ALG · SSL Termination</text>
  <text x="239" y="274" text-anchor="middle" font-size="8.5" fill="#374151">health check ogni 500 ms</text>

  <!-- L1 bottom label -->
  <text x="237" y="308" text-anchor="middle" font-size="9" fill="#1e40af" font-weight="600">Guasto coperto:</text>
  <text x="237" y="322" text-anchor="middle" font-size="9" fill="#374151">crash proxy → failover in 2–3 s</text>
  <text x="237" y="336" text-anchor="middle" font-size="9" fill="#374151">crash backend → redirect in &lt;5 s</text>
  <text x="237" y="350" text-anchor="middle" font-size="9" fill="#374151">saturazione → load balance</text>
  <text x="237" y="364" text-anchor="middle" font-size="9" fill="#374151">MTTR piano servizio: secondi</text>

  <!-- Arrow L1 → L2 -->
  <line x1="348" y1="226" x2="382" y2="226" stroke="#16a34a" stroke-width="2.5" marker-end="url(#a8g)"/>
  <text x="365" y="218" text-anchor="middle" font-size="8.5" fill="#16a34a">routing</text>

  <!-- ======== LIVELLO 2: PIANO DEI DATI ======== -->
  <rect x="384" y="66" width="220" height="340" rx="14" fill="#ccfbf1" stroke="#0891b2" stroke-width="2" filter="url(#sh8)"/>
  <rect x="384" y="66" width="220" height="32" rx="14" fill="#0891b2"/>
  <rect x="384" y="84" width="220" height="14" fill="#0891b2"/>
  <text x="494" y="86" text-anchor="middle" font-size="12" font-weight="700" fill="white">L2 — Piano dei Dati</text>

  <!-- HCI Cluster label -->
  <text x="494" y="118" text-anchor="middle" font-size="11" font-weight="700" fill="#0e7490">HCI Cluster</text>

  <!-- Node 1 -->
  <rect x="396" y="126" width="92" height="110" rx="10" fill="white" stroke="#0891b2" stroke-width="1.5" filter="url(#sh8b)"/>
  <rect x="396" y="126" width="92" height="22" rx="10" fill="#0891b2"/>
  <rect x="396" y="136" width="92" height="12" fill="#0891b2"/>
  <text x="442" y="140" text-anchor="middle" font-size="9.5" font-weight="700" fill="white">Nodo 1</text>
  <text x="442" y="160" text-anchor="middle" font-size="8.5" fill="#374151">VM-A  VM-B</text>
  <rect x="404" y="166" width="76" height="16" rx="5" fill="#cffafe"/>
  <text x="442" y="177" text-anchor="middle" font-size="8" fill="#155e75">Ceph OSD</text>
  <rect x="404" y="186" width="76" height="16" rx="5" fill="#cffafe"/>
  <text x="442" y="197" text-anchor="middle" font-size="8" fill="#155e75">NVMe 1 2 3</text>
  <rect x="404" y="206" width="76" height="18" rx="5" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="442" y="218" text-anchor="middle" font-size="8" fill="#14532d">● ATTIVO</text>

  <!-- Sync arrows between nodes -->
  <path d="M490,182 Q494,182 498,182" stroke="#0891b2" stroke-width="1.5" fill="none" marker-end="url(#a8b)"/>
  <text x="494" y="178" text-anchor="middle" font-size="8" fill="#0891b2">sync</text>
  <path d="M498,190 Q494,190 490,190" stroke="#0891b2" stroke-width="1.5" fill="none" marker-end="url(#a8b)"/>

  <!-- Node 2 -->
  <rect x="500" y="126" width="92" height="110" rx="10" fill="white" stroke="#0891b2" stroke-width="1.5" filter="url(#sh8b)"/>
  <rect x="500" y="126" width="92" height="22" rx="10" fill="#0891b2"/>
  <rect x="500" y="136" width="92" height="12" fill="#0891b2"/>
  <text x="546" y="140" text-anchor="middle" font-size="9.5" font-weight="700" fill="white">Nodo 2</text>
  <text x="546" y="160" text-anchor="middle" font-size="8.5" fill="#374151">VM-C  VM-D</text>
  <rect x="508" y="166" width="76" height="16" rx="5" fill="#cffafe"/>
  <text x="546" y="177" text-anchor="middle" font-size="8" fill="#155e75">Ceph OSD</text>
  <rect x="508" y="186" width="76" height="16" rx="5" fill="#cffafe"/>
  <text x="546" y="197" text-anchor="middle" font-size="8" fill="#155e75">NVMe 1 2 3</text>
  <rect x="508" y="206" width="76" height="18" rx="5" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="546" y="218" text-anchor="middle" font-size="8" fill="#14532d">● ATTIVO</text>

  <!-- Distributed pool -->
  <rect x="396" y="248" width="196" height="30" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.5"/>
  <text x="494" y="262" text-anchor="middle" font-size="9.5" font-weight="700" fill="#14532d">Pool storage distribuito</text>
  <text x="494" y="273" text-anchor="middle" font-size="8.5" fill="#374151">replica factor=2 · RPO &lt; 1 s</text>

  <!-- L2 bottom label -->
  <text x="494" y="308" text-anchor="middle" font-size="9" fill="#0e7490" font-weight="600">Guasto coperto:</text>
  <text x="494" y="322" text-anchor="middle" font-size="9" fill="#374151">guasto nodo → VM riavviate</text>
  <text x="494" y="336" text-anchor="middle" font-size="9" fill="#374151">guasto disco → replica sana</text>
  <text x="494" y="350" text-anchor="middle" font-size="9" fill="#374151">scaling → aggiunta nodi</text>
  <text x="494" y="364" text-anchor="middle" font-size="9" fill="#374151">MTTR piano dati: secondi</text>

  <!-- Arrow L2 → L3 -->
  <line x1="606" y1="226" x2="640" y2="226" stroke="#ea580c" stroke-width="2.5" marker-end="url(#a8o)"/>
  <text x="623" y="218" text-anchor="middle" font-size="8.5" fill="#ea580c">backup</text>

  <!-- ======== LIVELLO 3: PIANO DEL RIPRISTINO ======== -->
  <rect x="642" y="66" width="164" height="340" rx="14" fill="#ffedd5" stroke="#ea580c" stroke-width="2" filter="url(#sh8)"/>
  <rect x="642" y="66" width="164" height="32" rx="14" fill="#ea580c"/>
  <rect x="642" y="84" width="164" height="14" fill="#ea580c"/>
  <text x="724" y="86" text-anchor="middle" font-size="12" font-weight="700" fill="white">L3 — Ripristino</text>

  <!-- NAS -->
  <rect x="660" y="112" width="128" height="68" rx="10" fill="white" stroke="#ea580c" stroke-width="1.5" filter="url(#sh8b)"/>
  <rect x="660" y="112" width="128" height="20" rx="10" fill="#ea580c" opacity="0.8"/>
  <rect x="660" y="122" width="128" height="10" fill="#ea580c" opacity="0.8"/>
  <text x="724" y="124" text-anchor="middle" font-size="9.5" font-weight="700" fill="white">NAS Locale</text>
  <text x="724" y="142" text-anchor="middle" font-size="9" fill="#374151">Snapshot orari/notturni</text>
  <text x="724" y="155" text-anchor="middle" font-size="9" fill="#374151">30 giorni di storia</text>
  <rect x="668" y="163" width="112" height="14" rx="7" fill="#ffedd5"/>
  <text x="724" y="173" text-anchor="middle" font-size="8" fill="#9a3412">RPO = intervallo snapshot</text>

  <!-- Arrow down to cloud -->
  <line x1="724" y1="182" x2="724" y2="198" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a8o)"/>
  <text x="744" y="193" font-size="8.5" fill="#ea580c">notte</text>

  <!-- Cloud / S3 -->
  <rect x="660" y="200" width="128" height="68" rx="10" fill="white" stroke="#7c2d12" stroke-width="2" filter="url(#sh8b)"/>
  <rect x="660" y="200" width="128" height="20" rx="10" fill="#7c2d12"/>
  <rect x="660" y="210" width="128" height="10" fill="#7c2d12"/>
  <text x="724" y="213" text-anchor="middle" font-size="9.5" font-weight="700" fill="white">Cloud WORM</text>
  <text x="724" y="231" text-anchor="middle" font-size="9" fill="#374151">S3 / B2 / MinIO</text>
  <text x="724" y="244" text-anchor="middle" font-size="9" fill="#374151">Object Lock immutabile</text>
  <rect x="668" y="250" width="112" height="15" rx="7" fill="#fee2e2"/>
  <text x="724" y="261" text-anchor="middle" font-size="8" font-weight="600" fill="#7c2d12">⟶ antiransomware</text>

  <!-- L3 bottom label -->
  <text x="724" y="302" text-anchor="middle" font-size="9" fill="#9a3412" font-weight="600">Guasto coperto:</text>
  <text x="724" y="316" text-anchor="middle" font-size="8.5" fill="#374151">corruzione logica</text>
  <text x="724" y="330" text-anchor="middle" font-size="8.5" fill="#374151">ransomware</text>
  <text x="724" y="344" text-anchor="middle" font-size="8.5" fill="#374151">errore umano</text>
  <text x="724" y="358" text-anchor="middle" font-size="8.5" fill="#374151">incendio / furto</text>
  <text x="724" y="374" text-anchor="middle" font-size="8.5" fill="#374151">RPO = intervallo backup</text>

  <!-- Bottom summary bar -->
  <rect x="18" y="420" width="790" height="66" rx="12" fill="#1e293b" filter="url(#sh8)"/>
  <text x="413" y="440" text-anchor="middle" font-size="11" font-weight="700" fill="white">Come si leggono i livelli in produzione</text>
  <text x="50" y="457" font-size="10" fill="#94a3b8">L1</text>
  <text x="68" y="457" font-size="10" fill="#e2e8f0">I client arrivano sempre al VIP. Il proxy attivo distribuisce le richieste ai backend sani. Se il proxy crasha, VRRP dà il VIP allo slave in 2–3 s.</text>
  <text x="50" y="472" font-size="10" fill="#94a3b8">L2</text>
  <text x="68" y="472" font-size="10" fill="#e2e8f0">Ogni dato scritto va su ≥2 nodi prima della conferma. Se un nodo cade, le sue VM ripartono automaticamente sugli altri nodi in secondi.</text>
  <text x="50" y="487" font-size="10" fill="#94a3b8">L3</text>
  <text x="68" y="487" font-size="10" fill="#e2e8f0">Il backup notturno su storage immutabile è l'unica difesa se ransomware o errore umano corrompono i dati: la replica non aiuta in questo scenario.</text>
</svg>
