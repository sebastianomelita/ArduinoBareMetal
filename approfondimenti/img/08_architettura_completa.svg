<svg viewBox="0 0 860 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f0f4ff"/><stop offset="100%" stop-color="#e8eaf6"/></linearGradient>
    <filter id="sh8"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#00000020"/></filter>
    <filter id="sh8b"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000012"/></filter>
    <marker id="m8" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L0,8 L8,4 z" fill="#475569"/></marker>
    <marker id="m8g" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L0,8 L8,4 z" fill="#16a34a"/></marker>
    <marker id="m8o" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L0,8 L8,4 z" fill="#ea580c"/></marker>
    <marker id="m8b" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L0,8 L8,4 z" fill="#0891b2"/></marker>
