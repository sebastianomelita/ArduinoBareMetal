  <rect width="860" height="520" fill="url(#bg8)" rx="16"/>
  <text x="430" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Architettura Completa: i Tre Livelli in Produzione</text>
  <text x="430" y="51" text-anchor="middle" font-size="12.5" fill="#475569">Come si sovrappongono: piano del servizio · piano dei dati · piano del ripristino</text>

  <!-- CLIENT -->
  <rect x="18" y="210" width="68" height="64" rx="10" fill="#1e293b" filter="url(#sh8b)"/>
  <text x="52" y="236" text-anchor="middle" font-size="10" font-weight="700" fill="white">CLIENT</text>
  <rect x="30" y="241" width="44" height="26" rx="4" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="52" y1="267" x2="52" y2="271" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="44" y1="271" x2="60" y2="271" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="88" y1="242" x2="126" y2="242" stroke="#475569" stroke-width="2" marker-end="url(#m8)"/>
  <text x="107" y="235" text-anchor="middle" font-size="8.5" fill="#64748b">HTTPS</text>

  <!-- L1 -->
  <rect x="128" y="66" width="218" height="358" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#sh8)"/>
  <rect x="128" y="66" width="218" height="30" rx="14" fill="#2563eb"/>
  <rect x="128" y="82" width="218" height="14" fill="#2563eb"/>
  <text x="237" y="86" text-anchor="middle" font-size="12.5" font-weight="700" fill="white">L1 — Piano del Servizio</text>

  <ellipse cx="237" cy="128" rx="40" ry="22" fill="#1d4ed8" filter="url(#sh8b)"/>
  <text x="237" y="124" text-anchor="middle" font-size="10" font-weight="700" fill="white">Virtual IP</text>
  <text x="237" y="138" text-anchor="middle" font-size="8.5" fill="#bfdbfe">condiviso</text>
  <rect x="170" y="156" width="134" height="18" rx="9" fill="#1e40af"/>
  <text x="237" y="169" text-anchor="middle" font-size="9.5" font-weight="600" fill="white">VRRP / keepalived</text>

  <rect x="140" y="182" width="94" height="58" rx="10" fill="white" stroke="#16a34a" stroke-width="2" filter="url(#sh8b)"/>
  <rect x="140" y="182" width="94" height="20" rx="10" fill="#16a34a"/>
  <rect x="140" y="192" width="94" height="10" fill="#16a34a"/>
  <text x="187" y="196" text-anchor="middle" font-size="9" font-weight="700" fill="white">Proxy MASTER</text>
  <text x="187" y="216" text-anchor="middle" font-size="8.5" fill="#374151">HAProxy/Nginx</text>
  <text x="187" y="231" text-anchor="middle" font-size="8.5" font-weight="700" fill="#15803d">● ATTIVO</text>
  <rect x="242" y="182" width="92" height="58" rx="10" fill="white" stroke="#94a3b8" stroke-width="1.5" filter="url(#sh8b)"/>
  <rect x="242" y="182" width="92" height="20" rx="10" fill="#94a3b8"/>
  <rect x="242" y="192" width="92" height="10" fill="#94a3b8"/>
  <text x="288" y="196" text-anchor="middle" font-size="9" font-weight="700" fill="white">Proxy SLAVE</text>
  <text x="288" y="216" text-anchor="middle" font-size="8.5" fill="#374151">HAProxy/Nginx</text>
  <text x="288" y="231" text-anchor="middle" font-size="8.5" font-weight="700" fill="#64748b">◌ STANDBY</text>
  <line x1="236" y1="211" x2="242" y2="211" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="2,2"/>

  <rect x="148" y="250" width="178" height="28" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="237" y="263" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1d4ed8">DNAT · ALG · SSL Termination</text>
  <text x="237" y="274" text-anchor="middle" font-size="8.5" fill="#374151">health check ogni 500 ms</text>

  <text x="237" y="302" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1e40af">Guasti coperti</text>
  <text x="237" y="320" text-anchor="middle" font-size="9" fill="#374151">crash proxy → failover 2–3 s</text>
  <text x="237" y="336" text-anchor="middle" font-size="9" fill="#374151">crash backend → redirect &lt;5 s</text>
  <text x="237" y="352" text-anchor="middle" font-size="9" fill="#374151">saturazione → load balance</text>
  <rect x="160" y="364" width="154" height="22" rx="11" fill="#dbeafe"/>
  <text x="237" y="379" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1e40af">MTTR servizio: secondi</text>

  <!-- arrow L1->L2 -->
  <line x1="348" y1="242" x2="386" y2="242" stroke="#16a34a" stroke-width="2.5" marker-end="url(#m8g)"/>
  <text x="367" y="234" text-anchor="middle" font-size="8.5" fill="#16a34a">routing</text>

  <!-- L2 -->
  <rect x="388" y="66" width="232" height="358" rx="14" fill="#ccfbf1" stroke="#0891b2" stroke-width="2" filter="url(#sh8)"/>
  <rect x="388" y="66" width="232" height="30" rx="14" fill="#0891b2"/>
  <rect x="388" y="82" width="232" height="14" fill="#0891b2"/>
  <text x="504" y="86" text-anchor="middle" font-size="12.5" font-weight="700" fill="white">L2 — Piano dei Dati</text>
  <text x="504" y="116" text-anchor="middle" font-size="11" font-weight="700" fill="#0e7490">HCI Cluster</text>

  <rect x="402" y="126" width="98" height="116" rx="10" fill="white" stroke="#0891b2" stroke-width="1.5" filter="url(#sh8b)"/>
  <rect x="402" y="126" width="98" height="20" rx="10" fill="#0891b2"/>
  <rect x="402" y="136" width="98" height="10" fill="#0891b2"/>
  <text x="451" y="140" text-anchor="middle" font-size="9" font-weight="700" fill="white">Nodo 1</text>
  <text x="451" y="160" text-anchor="middle" font-size="8.5" fill="#374151">VM-A · VM-B</text>
  <rect x="410" y="166" width="82" height="16" rx="5" fill="#cffafe"/><text x="451" y="178" text-anchor="middle" font-size="8" fill="#155e75">Ceph OSD</text>
  <rect x="410" y="186" width="82" height="16" rx="5" fill="#cffafe"/><text x="451" y="198" text-anchor="middle" font-size="8" fill="#155e75">NVMe ① ② ③</text>
  <rect x="410" y="206" width="82" height="18" rx="5" fill="#dcfce7"/><text x="451" y="219" text-anchor="middle" font-size="8" font-weight="700" fill="#14532d">● ATTIVO</text>

  <rect x="508" y="126" width="98" height="116" rx="10" fill="white" stroke="#0891b2" stroke-width="1.5" filter="url(#sh8b)"/>
  <rect x="508" y="126" width="98" height="20" rx="10" fill="#0891b2"/>
  <rect x="508" y="136" width="98" height="10" fill="#0891b2"/>
  <text x="557" y="140" text-anchor="middle" font-size="9" font-weight="700" fill="white">Nodo 2</text>
  <text x="557" y="160" text-anchor="middle" font-size="8.5" fill="#374151">VM-C · VM-D</text>
  <rect x="516" y="166" width="82" height="16" rx="5" fill="#cffafe"/><text x="557" y="178" text-anchor="middle" font-size="8" fill="#155e75">Ceph OSD</text>
  <rect x="516" y="186" width="82" height="16" rx="5" fill="#cffafe"/><text x="557" y="198" text-anchor="middle" font-size="8" fill="#155e75">NVMe ① ② ③</text>
  <rect x="516" y="206" width="82" height="18" rx="5" fill="#dcfce7"/><text x="557" y="219" text-anchor="middle" font-size="8" font-weight="700" fill="#14532d">● ATTIVO</text>

  <!-- sync between nodes, in the gap -->
  <line x1="500" y1="180" x2="507" y2="180" stroke="#0891b2" stroke-width="1.5" marker-end="url(#m8b)"/>
  <line x1="507" y1="190" x2="500" y2="190" stroke="#0891b2" stroke-width="1.5" marker-end="url(#m8b)"/>

  <rect x="402" y="250" width="204" height="28" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.5"/>
  <text x="504" y="263" text-anchor="middle" font-size="9.5" font-weight="700" fill="#14532d">Pool storage distribuito</text>
  <text x="504" y="274" text-anchor="middle" font-size="8.5" fill="#374151">replica factor 2 · RPO &lt; 1 s</text>

  <text x="504" y="302" text-anchor="middle" font-size="9.5" font-weight="700" fill="#0e7490">Guasti coperti</text>
  <text x="504" y="320" text-anchor="middle" font-size="9" fill="#374151">guasto nodo → VM riavviate</text>
  <text x="504" y="336" text-anchor="middle" font-size="9" fill="#374151">guasto disco → replica sana</text>
  <text x="504" y="352" text-anchor="middle" font-size="9" fill="#374151">scaling → aggiunta nodi</text>
  <rect x="424" y="364" width="160" height="22" rx="11" fill="#cffafe"/>
  <text x="504" y="379" text-anchor="middle" font-size="9.5" font-weight="700" fill="#0e7490">MTTR dati: secondi</text>

  <!-- arrow L2->L3 -->
  <line x1="622" y1="242" x2="660" y2="242" stroke="#ea580c" stroke-width="2.5" marker-end="url(#m8o)"/>
  <text x="641" y="234" text-anchor="middle" font-size="8.5" fill="#ea580c">backup</text>

  <!-- L3 -->
  <rect x="662" y="66" width="180" height="358" rx="14" fill="#ffedd5" stroke="#ea580c" stroke-width="2" filter="url(#sh8)"/>
  <rect x="662" y="66" width="180" height="30" rx="14" fill="#ea580c"/>
  <rect x="662" y="82" width="180" height="14" fill="#ea580c"/>
  <text x="752" y="86" text-anchor="middle" font-size="12.5" font-weight="700" fill="white">L3 — Ripristino</text>

  <rect x="680" y="116" width="144" height="64" rx="10" fill="white" stroke="#ea580c" stroke-width="1.5" filter="url(#sh8b)"/>
  <rect x="680" y="116" width="144" height="20" rx="10" fill="#ea580c" opacity="0.85"/>
  <rect x="680" y="126" width="144" height="10" fill="#ea580c" opacity="0.85"/>
  <text x="752" y="130" text-anchor="middle" font-size="9.5" font-weight="700" fill="white">NAS Locale</text>
  <text x="752" y="150" text-anchor="middle" font-size="9" fill="#374151">snapshot orari/notturni</text>
  <text x="752" y="164" text-anchor="middle" font-size="9" fill="#374151">30 giorni di storia</text>
  <rect x="688" y="167" width="128" height="9" rx="4" fill="#fff7ed"/>

  <line x1="752" y1="182" x2="752" y2="196" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#m8o)"/>
  <text x="772" y="192" font-size="8" fill="#ea580c">notte</text>

  <rect x="680" y="200" width="144" height="68" rx="10" fill="white" stroke="#7c2d12" stroke-width="2" filter="url(#sh8b)"/>
  <rect x="680" y="200" width="144" height="20" rx="10" fill="#7c2d12"/>
  <rect x="680" y="210" width="144" height="10" fill="#7c2d12"/>
  <text x="752" y="214" text-anchor="middle" font-size="9.5" font-weight="700" fill="white">Cloud WORM</text>
  <text x="752" y="234" text-anchor="middle" font-size="9" fill="#374151">S3 / B2 / MinIO</text>
  <text x="752" y="248" text-anchor="middle" font-size="9" fill="#374151">Object Lock immutabile</text>
  <rect x="688" y="252" width="128" height="12" rx="6" fill="#fee2e2"/>
  <text x="752" y="262" text-anchor="middle" font-size="8" font-weight="700" fill="#7c2d12">⟶ antiransomware</text>

  <text x="752" y="296" text-anchor="middle" font-size="9.5" font-weight="700" fill="#9a3412">Guasti coperti</text>
  <text x="752" y="314" text-anchor="middle" font-size="8.5" fill="#374151">corruzione logica · ransomware</text>
  <text x="752" y="330" text-anchor="middle" font-size="8.5" fill="#374151">errore umano</text>
  <text x="752" y="346" text-anchor="middle" font-size="8.5" fill="#374151">incendio / furto</text>
  <rect x="676" y="358" width="152" height="22" rx="11" fill="#fed7aa"/>
  <text x="752" y="373" text-anchor="middle" font-size="9" font-weight="700" fill="#9a3412">RPO = intervallo backup</text>

  <!-- bottom summary -->
  <rect x="18" y="438" width="824" height="68" rx="12" fill="#1e293b" filter="url(#sh8)"/>
  <text x="430" y="458" text-anchor="middle" font-size="11" font-weight="700" fill="white">Come si leggono i livelli in produzione</text>
  <text x="42" y="475" font-size="9.5" font-weight="700" fill="#60a5fa">L1</text>
  <text x="62" y="475" font-size="9.5" fill="#e2e8f0">I client arrivano sempre al VIP. Il proxy attivo distribuisce ai backend sani. Se crasha, VRRP dà il VIP allo slave in 2–3 s.</text>
  <text x="42" y="490" font-size="9.5" font-weight="700" fill="#22d3ee">L2</text>
  <text x="62" y="490" font-size="9.5" fill="#e2e8f0">Ogni scrittura va su ≥2 nodi prima della conferma. Se un nodo cade, le sue VM ripartono automaticamente sugli altri in secondi.</text>
  <text x="42" y="505" font-size="9.5" font-weight="700" fill="#fb923c">L3</text>
  <text x="62" y="505" font-size="9.5" fill="#e2e8f0">Il backup su storage immutabile è l'unica difesa se ransomware o errore umano corrompono i dati: la replica li propagherebbe.</text>
</svg>
