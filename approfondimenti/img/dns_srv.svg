<svg viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="softd" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1a2233" flood-opacity="0.16"/>
    </filter>
    <marker id="aD" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1d4e8f"/></marker>
    <marker id="aDg" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2f7d52"/></marker>
  </defs>
  <rect width="880" height="480" fill="#ffffff"/>
  <text x="32" y="40" font-size="22" font-weight="700" fill="#1a2233">DNS: come il client trova il Domain Controller</text>
  <text x="32" y="64" font-size="14" fill="#5b6677">Prima di poter fare login, il PC chiede al DNS dove sta il KDC. Senza SRV, niente Kerberos.</text>

  <!-- client -->
  <g filter="url(#softd)"><rect x="40" y="150" width="160" height="80" rx="12" fill="#e8f0fa" stroke="#1d4e8f" stroke-width="1.5"/></g>
  <text x="120" y="184" font-size="14" font-weight="700" fill="#1d4e8f" text-anchor="middle">PC di dominio</text>
  <text x="120" y="205" font-size="11.5" fill="#46586e" text-anchor="middle">si accende, vuole il login</text>

  <!-- DNS -->
  <g filter="url(#softd)"><rect x="360" y="150" width="160" height="80" rx="12" fill="#fdf3df" stroke="#b8791a" stroke-width="1.5"/></g>
  <text x="440" y="184" font-size="14" font-weight="700" fill="#9a6512" text-anchor="middle">Server DNS</text>
  <text x="440" y="205" font-size="11.5" fill="#7d5a23" text-anchor="middle">(di solito sul DC stesso)</text>

  <!-- DC -->
  <g filter="url(#softd)"><rect x="680" y="150" width="160" height="80" rx="12" fill="#e9f4ee" stroke="#2f7d52" stroke-width="1.5"/></g>
  <text x="760" y="184" font-size="14" font-weight="700" fill="#2f7d52" text-anchor="middle">Domain Controller</text>
  <text x="760" y="205" font-size="11.5" fill="#3d6b51" text-anchor="middle">KDC · LDAP · GC</text>

  <!-- query -->
  <line x1="200" y1="172" x2="352" y2="172" stroke="#1d4e8f" stroke-width="2.2" marker-end="url(#aD)"/>
  <text x="276" y="164" font-size="11.5" font-weight="600" fill="#1d4e8f" text-anchor="middle">«Dov'è il KDC?»</text>
  <!-- answer -->
  <line x1="352" y1="208" x2="200" y2="208" stroke="#b8791a" stroke-width="2.2" marker-end="url(#aDg)" stroke-dasharray="0"/>
  <text x="276" y="226" font-size="11.5" font-weight="600" fill="#9a6512" text-anchor="middle">record SRV → dc01:88</text>
  <!-- connect to DC -->
  <line x1="520" y1="190" x2="672" y2="190" stroke="#2f7d52" stroke-width="2.2" marker-end="url(#aDg)"/>
  <text x="596" y="182" font-size="11.5" font-weight="600" fill="#2f7d52" text-anchor="middle">login Kerberos →</text>

  <!-- SRV records table -->
  <rect x="40" y="262" width="800" height="190" rx="14" fill="#f7f9fc" stroke="#c9d2dd" stroke-width="1.3"/>
  <text x="60" y="288" font-size="14" font-weight="700" fill="#1a2233">I record SRV pubblicati da Active Directory</text>

  <g font-family="monospace" font-size="12">
    <rect x="60" y="300" width="370" height="34" rx="7" fill="#eef4fb"/>
    <text x="74" y="322" fill="#1d4e8f" font-weight="700">_kerberos._tcp</text>
    <text x="240" y="322" fill="#27384e" font-family="'Segoe UI',Arial">→ il KDC (porta 88)</text>

    <rect x="450" y="300" width="370" height="34" rx="7" fill="#f3eefb"/>
    <text x="464" y="322" fill="#6a3da8" font-weight="700">_ldap._tcp</text>
    <text x="630" y="322" fill="#27384e" font-family="'Segoe UI',Arial">→ la directory (389)</text>

    <rect x="60" y="342" width="370" height="34" rx="7" fill="#fdf3df"/>
    <text x="74" y="364" fill="#9a6512" font-weight="700">_kpasswd._tcp</text>
    <text x="240" y="364" fill="#27384e" font-family="'Segoe UI',Arial">→ cambio password (464)</text>

    <rect x="450" y="342" width="370" height="34" rx="7" fill="#e9f4ee"/>
    <text x="464" y="364" fill="#2f7d52" font-weight="700">_gc._tcp</text>
    <text x="630" y="364" fill="#27384e" font-family="'Segoe UI',Arial">→ Global Catalog (3268)</text>

    <rect x="60" y="384" width="760" height="34" rx="7" fill="#eef2f6"/>
    <text x="74" y="406" fill="#3a4757" font-weight="700">_ldap._tcp.&lt;sito&gt;._sites</text>
    <text x="320" y="406" fill="#27384e" font-family="'Segoe UI',Arial">→ il DC del sito più vicino (multi-sede)</text>
  </g>
  <text x="60" y="440" font-size="11.5" fill="#b23b3b">⚠ DNS rotto = login lento o fallito, GPO non applicate, Kerberos che ripiega su NTLM.</text>
</svg>
