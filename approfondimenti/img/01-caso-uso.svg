<svg viewBox="0 0 720 430" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ar1" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
    <filter id="sh1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- titolo -->
  <text x="360" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#1E293B">Single Sign-On (SSO) a scuola</text>
  <text x="360" y="50" text-anchor="middle" font-size="12.5" fill="#64748B">Un'unica autenticazione → accesso a più applicazioni</text>

  <!-- Studente -->
  <g transform="translate(95,215)">
    <circle cx="0" cy="-2" r="15" fill="#FEF3C7" stroke="#B45309" stroke-width="1.6"/>
    <path d="M-20,42 a20,24 0 0 1 40,0 Z" fill="#FEF3C7" stroke="#B45309" stroke-width="1.6"/>
    <text x="0" y="68" text-anchor="middle" font-size="13" font-weight="600" fill="#92400E">Studente</text>
  </g>

  <!-- freccia studente -> IdP -->
  <line x1="140" y1="210" x2="252" y2="210" stroke="#475569" stroke-width="1.6" marker-end="url(#ar1)"/>
  <text x="196" y="200" text-anchor="middle" font-size="11.5" font-weight="600" fill="#334155">① login unico</text>

  <!-- OpenID Provider -->
  <g filter="url(#sh1)">
    <rect x="256" y="158" width="180" height="108" rx="12" fill="#E0E7FF" stroke="#4338CA" stroke-width="1.6"/>
  </g>
  <!-- glifo chiave -->
  <g transform="translate(286,188)" stroke="#4338CA" stroke-width="1.8" fill="none">
    <circle cx="0" cy="0" r="7"/>
    <line x1="6" y1="6" x2="20" y2="20"/>
    <line x1="14" y1="14" x2="18" y2="10"/>
    <line x1="20" y1="20" x2="24" y2="16"/>
  </g>
  <text x="358" y="195" text-anchor="middle" font-size="14.5" font-weight="700" fill="#3730A3">OpenID</text>
  <text x="358" y="214" text-anchor="middle" font-size="14.5" font-weight="700" fill="#3730A3">Provider</text>
  <text x="346" y="240" text-anchor="middle" font-size="11" fill="#4338CA">(Identity Provider)</text>

  <!-- frecce IdP -> apps -->
  <line x1="436" y1="195" x2="524" y2="110" stroke="#475569" stroke-width="1.6" marker-end="url(#ar1)"/>
  <line x1="436" y1="212" x2="524" y2="212" stroke="#475569" stroke-width="1.6" marker-end="url(#ar1)"/>
  <line x1="436" y1="229" x2="524" y2="314" stroke="#475569" stroke-width="1.6" marker-end="url(#ar1)"/>
  <text x="498" y="168" text-anchor="middle" font-size="11.5" font-weight="600" fill="#334155">② accesso ai servizi</text>

  <!-- app cards -->
  <g filter="url(#sh1)">
    <rect x="528" y="78" width="172" height="64" rx="10" fill="#CCFBF1" stroke="#0D9488" stroke-width="1.5"/>
    <rect x="528" y="180" width="172" height="64" rx="10" fill="#CCFBF1" stroke="#0D9488" stroke-width="1.5"/>
    <rect x="528" y="282" width="172" height="64" rx="10" fill="#CCFBF1" stroke="#0D9488" stroke-width="1.5"/>
  </g>
  <rect x="542" y="96" width="26" height="26" rx="6" fill="#0D9488"/>
  <rect x="542" y="198" width="26" height="26" rx="6" fill="#0D9488"/>
  <rect x="542" y="300" width="26" height="26" rx="6" fill="#0D9488"/>
  <text x="582" y="106" font-size="12.5" font-weight="600" fill="#115E59">Registro</text>
  <text x="582" y="124" font-size="12.5" font-weight="600" fill="#115E59">elettronico</text>
  <text x="582" y="208" font-size="12.5" font-weight="600" fill="#115E59">Piattaforma</text>
  <text x="582" y="226" font-size="12.5" font-weight="600" fill="#115E59">e-learning</text>
  <text x="582" y="310" font-size="12.5" font-weight="600" fill="#115E59">Biblioteca</text>
  <text x="582" y="328" font-size="12.5" font-weight="600" fill="#115E59">digitale</text>

  <!-- didascalia inferiore -->
  <rect x="40" y="378" width="640" height="38" rx="9" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="360" y="402" text-anchor="middle" font-size="12.5" fill="#334155">Lo studente si autentica <tspan font-weight="700" fill="#3730A3">una sola volta</tspan> presso il Provider e usa tutte le applicazioni senza nuovi login.</text>
</svg>
