<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 600" font-family="Segoe UI, Arial, sans-serif">
<style>
  .lbl{font-size:12px;fill:#1f2937}.sub{font-size:10px;fill:#6b7280}.ttl{font-size:13px;font-weight:600;fill:#111827}
  .room{fill:#f7f8fa;stroke:#d1d5db;stroke-width:0.5}
  .to{fill:none;stroke:#BA7517;stroke-width:1.2}.tohdr{fill:#BA7517;opacity:0.25}
  .fd{fill:#15A179;opacity:0.18;stroke:#15A179;stroke-width:1.4}
  .cd{fill:#534AB7;opacity:0.12;stroke:#534AB7;stroke-width:1.6}
  .fib{stroke:#378ADD;stroke-width:2.4}.utp{stroke:#15A179;stroke-width:1;stroke-dasharray:4 2}
</style>
<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5"/></marker></defs>
<text class="ttl" x="350" y="22" text-anchor="middle">Planimetria fisica — Stazione Cat. A (≈ 60 × 45 m)</text>

<rect x="50" y="50" width="580" height="490" rx="4" fill="none" stroke="#111827" stroke-width="2"/>
<!-- atrio -->
<rect class="room" x="50" y="50" width="580" height="110"/>
<text class="sub" x="60" y="68">Atrio ingresso — tornelli (serviti dal CD)</text>
<g><rect class="to" x="110" y="92" width="30" height="48" rx="3"/><rect class="tohdr" x="110" y="92" width="30" height="12"/><text class="sub" x="125" y="120" text-anchor="middle">TO A.01</text></g>
<g><rect class="to" x="160" y="92" width="30" height="48" rx="3"/><rect class="tohdr" x="160" y="92" width="30" height="12"/><text class="sub" x="175" y="120" text-anchor="middle">A.02</text></g>
<g><rect class="to" x="210" y="92" width="30" height="48" rx="3"/><rect class="tohdr" x="210" y="92" width="30" height="12"/><text class="sub" x="225" y="120" text-anchor="middle">…</text></g>
<g><rect class="to" x="260" y="92" width="30" height="48" rx="3"/><rect class="tohdr" x="260" y="92" width="30" height="12"/><text class="sub" x="275" y="120" text-anchor="middle">A.06</text></g>
<g><rect class="to" x="330" y="92" width="44" height="48" rx="3"/><rect class="tohdr" x="330" y="92" width="44" height="12"/><text class="sub" x="352" y="120" text-anchor="middle">A.07 PMR</text></g>
<rect x="470" y="50" width="60" height="6" fill="#f7f8fa" stroke="#111827" stroke-width="0.8"/>
<text class="sub" x="500" y="100" text-anchor="middle">↓ uscita</text>

<!-- banchina 1 -->
<rect class="room" x="50" y="180" width="270" height="160"/>
<text class="sub" x="60" y="198">Banchina 1 — Treno / Metro linea A</text>
<rect x="60" y="300" width="250" height="14" fill="none" stroke="#9ca3af" stroke-width="0.6" stroke-dasharray="6 4"/>
<text class="sub" x="185" y="310" text-anchor="middle">binario</text>
<g><rect class="to" x="70" y="216" width="28" height="40" rx="3"/><rect class="tohdr" x="70" y="216" width="28" height="10"/><text class="sub" x="84" y="246" text-anchor="middle">1.01</text></g>
<g><rect class="to" x="124" y="216" width="28" height="40" rx="3"/><rect class="tohdr" x="124" y="216" width="28" height="10"/><text class="sub" x="138" y="246" text-anchor="middle">1.02</text></g>
<g><rect class="to" x="178" y="216" width="28" height="40" rx="3"/><rect class="tohdr" x="178" y="216" width="28" height="10"/><text class="sub" x="192" y="248" text-anchor="middle">…</text></g>
<g><rect class="to" x="232" y="216" width="28" height="40" rx="3"/><rect class="tohdr" x="232" y="216" width="28" height="10"/><text class="sub" x="246" y="246" text-anchor="middle">1.06</text></g>
<g><rect class="fd" x="278" y="216" width="34" height="40" rx="2"/><text class="lbl" x="295" y="233" text-anchor="middle" font-weight="600">FD</text><text class="sub" x="295" y="248" text-anchor="middle">1</text></g>

<!-- banchina 2 -->
<rect class="room" x="360" y="180" width="270" height="160"/>
<text class="sub" x="370" y="198">Banchina 2 — Tram / Bus integrato</text>
<rect x="370" y="300" width="250" height="14" fill="none" stroke="#9ca3af" stroke-width="0.6" stroke-dasharray="6 4"/>
<text class="sub" x="495" y="310" text-anchor="middle">corsia mezzi</text>
<g><rect class="fd" x="378" y="216" width="34" height="40" rx="2"/><text class="lbl" x="395" y="233" text-anchor="middle" font-weight="600">FD</text><text class="sub" x="395" y="248" text-anchor="middle">2</text></g>
<g><rect class="to" x="430" y="216" width="28" height="40" rx="3"/><rect class="tohdr" x="430" y="216" width="28" height="10"/><text class="sub" x="444" y="246" text-anchor="middle">2.01</text></g>
<g><rect class="to" x="484" y="216" width="28" height="40" rx="3"/><rect class="tohdr" x="484" y="216" width="28" height="10"/><text class="sub" x="498" y="248" text-anchor="middle">…</text></g>
<g><rect class="to" x="538" y="216" width="28" height="40" rx="3"/><rect class="tohdr" x="538" y="216" width="28" height="10"/><text class="sub" x="552" y="246" text-anchor="middle">2.05</text></g>

<!-- locale tecnico -->
<rect class="room" x="50" y="360" width="580" height="180"/>
<text class="sub" x="60" y="378">Locale tecnico (accesso ristretto) — armadio CD = BD = FD-0</text>
<g><rect class="cd" x="250" y="400" width="180" height="110" rx="3"/>
<text class="lbl" x="340" y="420" text-anchor="middle" font-weight="600">Armadio CD</text>
<text class="sub" x="340" y="436" text-anchor="middle">(centro stella)</text>
<text class="sub" x="340" y="456" text-anchor="middle">Core SW · Server edge</text>
<text class="sub" x="340" y="471" text-anchor="middle">Broker MQTT · R-FW</text>
<text class="sub" x="340" y="486" text-anchor="middle">UPS · cassetti ottici</text></g>

<!-- dorsali fibra -->
<line class="fib" x1="295" y1="256" x2="295" y2="400"/>
<line class="fib" x1="395" y1="256" x2="340" y2="400"/>
<text class="sub" x="262" y="350">dorsale fibra</text>
<!-- orizzontale -->
<line class="utp" x1="84" y1="256" x2="278" y2="230"/>
<line class="utp" x1="246" y1="256" x2="278" y2="240"/>
<line class="utp" x1="444" y1="256" x2="412" y2="230"/>
<line class="utp" x1="552" y1="256" x2="412" y2="242"/>
<line class="utp" x1="125" y1="140" x2="255" y2="402"/>
<line class="utp" x1="352" y1="140" x2="300" y2="400"/>

<!-- WAN -->
<line x1="430" y1="455" x2="610" y2="455" stroke="#9aa0a6" stroke-width="2"/>
<text class="sub" x="555" y="448" text-anchor="middle">dorsale fibra → ISP/WAN</text>
<rect x="600" y="445" width="20" height="20" rx="2" fill="#fff" stroke="#9aa0a6"/>
<text class="sub" x="610" y="478" text-anchor="middle">ONT</text>

<!-- legenda -->
<rect x="50" y="552" width="580" height="42" rx="6" fill="none" stroke="#d1d5db" stroke-width="0.5" stroke-dasharray="4 3"/>
<rect x="62" y="562" width="14" height="12" rx="2" fill="none" stroke="#BA7517" stroke-width="1.2"/><text class="sub" x="82" y="572">Presa TO (reader)</text>
<rect x="200" y="562" width="14" height="12" rx="2" fill="#15A179" opacity="0.18" stroke="#15A179"/><text class="sub" x="220" y="572">Armadio FD</text>
<rect x="310" y="562" width="14" height="12" rx="2" fill="#534AB7" opacity="0.12" stroke="#534AB7"/><text class="sub" x="330" y="572">Armadio CD</text>
<line x1="420" y1="568" x2="440" y2="568" class="fib"/><text class="sub" x="446" y="572">dorsale fibra</text>
<line x1="530" y1="568" x2="550" y2="568" class="utp"/><text class="sub" x="556" y="572">orizz. UTP Cat6A</text>
</svg>
