<svg viewBox="0 0 880 470" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="softg" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1a2233" flood-opacity="0.16"/>
    </filter>
    <marker id="aG" markerWidth="11" markerHeight="11" refX="6" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#1a2233"/></marker>
  </defs>
  <rect width="880" height="470" fill="#ffffff"/>
  <text x="32" y="40" font-size="22" font-weight="700" fill="#1a2233">GPO: l'ordine LSDOU — l'ultima applicata vince</text>
  <text x="32" y="64" font-size="14" fill="#5b6677">Le impostazioni si sovrappongono dal generale al particolare. La OU ha sempre la precedenza.</text>

  <!-- layered bars, widening priority arrow -->
  <g filter="url(#softg)">
    <rect x="120" y="110" width="520" height="52" rx="9" fill="#eef2f6" stroke="#5b6677" stroke-width="1.4"/>
    <rect x="120" y="178" width="520" height="52" rx="9" fill="#f3eefb" stroke="#6a3da8" stroke-width="1.4"/>
    <rect x="120" y="246" width="520" height="52" rx="9" fill="#fdf3df" stroke="#b8791a" stroke-width="1.4"/>
    <rect x="120" y="314" width="520" height="52" rx="9" fill="#e9f4ee" stroke="#2f7d52" stroke-width="1.8"/>
  </g>

  <!-- order badges -->
  <g font-weight="700" font-size="14" text-anchor="middle">
    <circle cx="148" cy="136" r="16" fill="#5b6677"/><text x="148" y="141" fill="#fff">1</text>
    <circle cx="148" cy="204" r="16" fill="#6a3da8"/><text x="148" y="209" fill="#fff">2</text>
    <circle cx="148" cy="272" r="16" fill="#b8791a"/><text x="148" y="277" fill="#fff">3</text>
    <circle cx="148" cy="340" r="16" fill="#2f7d52"/><text x="148" y="345" fill="#fff">4</text>
  </g>

  <g font-size="15" font-weight="700">
    <text x="184" y="134" fill="#3a4757">L — Local</text>
    <text x="184" y="202" fill="#6a3da8">S — Site</text>
    <text x="184" y="270" fill="#9a6512">D — Domain</text>
    <text x="184" y="338" fill="#2f7d52">OU — Organizational Unit</text>
  </g>
  <g font-size="11.5" fill="#5b6677">
    <text x="184" y="150">policy locali del singolo PC</text>
    <text x="184" y="218">legate al sito AD (sede geografica)</text>
    <text x="184" y="286">valgono per tutto il dominio (es. password)</text>
    <text x="334" y="354" fill="#3d6b51">la più specifica → la più forte</text>
  </g>

  <!-- precedence arrow -->
  <line x1="690" y1="120" x2="690" y2="356" stroke="#1a2233" stroke-width="3" marker-end="url(#aG)"/>
  <text x="730" y="200" font-size="13" font-weight="700" fill="#1a2233" transform="rotate(90 730 200)" text-anchor="middle">ordine di applicazione</text>
  <text x="772" y="240" font-size="13" font-weight="700" fill="#b23b3b" transform="rotate(90 772 240)" text-anchor="middle">priorità crescente</text>

  <!-- golden rule -->
  <rect x="120" y="392" width="520" height="58" rx="11" fill="#fbeaea" stroke="#b23b3b" stroke-width="1.3"/>
  <text x="140" y="416" font-size="13" font-weight="700" fill="#b23b3b">Regola d'oro</text>
  <text x="140" y="437" font-size="12.5" fill="#7a2a2a">Si applicano 1 → 4: ciò che la OU imposta sovrascrive il dominio, il sito e il locale.</text>
</svg>
