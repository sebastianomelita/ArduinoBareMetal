<svg xmlns="http://www.w3.org/2000/svg" width="680" height="545" viewBox="0 0 680 545" role="img" aria-labelledby="t4 d4">
<title id="t4">Diagramma di sequenza di una sessione V2G con Plug and Charge</title>
<desc id="d4">Quattro linee di vita — veicolo, colonnina, backend dell'operatore e aggregatore — con undici messaggi numerati che alternano il canale ISO 15118 sul cavo, il canale OCPP verso il backend e il canale di mercato.</desc>
<style>
text{font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",sans-serif}
.ts{font-size:12px;fill:#73726c}
.f-coral{fill:#FAECE7;stroke:#993C1D;stroke-width:.5}
.f-purple{fill:#EEEDFE;stroke:#534AB7;stroke-width:.5}
.f-teal{fill:#E1F5EE;stroke:#0F6E56;stroke-width:.5}
.tt-coral{font-size:14px;font-weight:500;fill:#712B13}
.st-coral{font-size:12px;fill:#993C1D}
.tt-purple{font-size:14px;font-weight:500;fill:#3C3489}
.st-purple{font-size:12px;fill:#534AB7}
.tt-teal{font-size:14px;font-weight:500;fill:#085041}
.st-teal{font-size:12px;fill:#0F6E56}
.life{stroke:#b4b2a9;stroke-width:.5;stroke-dasharray:4 4}
.m-iso{stroke:#D85A30;stroke-width:1.5;fill:none}
.m-ocpp{stroke:#7F77DD;stroke-width:1.5;stroke-dasharray:6 4;fill:none}
.m-mkt{stroke:#1D9E75;stroke-width:1.5;stroke-dasharray:2 3;fill:none}
@media (prefers-color-scheme:dark){
.ts{fill:#9c9a92}
.f-coral{fill:#712B13;stroke:#F0997B}
.f-purple{fill:#3C3489;stroke:#AFA9EC}
.f-teal{fill:#085041;stroke:#5DCAA5}
.tt-coral{fill:#F5C4B3}.st-coral{fill:#F0997B}
.tt-purple{fill:#CECBF6}.st-purple{fill:#AFA9EC}
.tt-teal{fill:#9FE1CB}.st-teal{fill:#5DCAA5}
.life{stroke:#5f5e5a}
.m-iso{stroke:#F0997B}.m-ocpp{stroke:#AFA9EC}.m-mkt{stroke:#5DCAA5}
}
</style>
<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<rect class="f-coral" x="50" y="20" width="130" height="56" rx="8"/>
<text class="tt-coral" x="115" y="45" text-anchor="middle">Veicolo</text>
<text class="st-coral" x="115" y="63" text-anchor="middle">EVCC</text>
<rect class="f-coral" x="200" y="20" width="130" height="56" rx="8"/>
<text class="tt-coral" x="265" y="45" text-anchor="middle">Colonnina</text>
<text class="st-coral" x="265" y="63" text-anchor="middle">SECC</text>
<rect class="f-purple" x="350" y="20" width="130" height="56" rx="8"/>
<text class="tt-purple" x="415" y="45" text-anchor="middle">Backend CPO</text>
<text class="st-purple" x="415" y="63" text-anchor="middle">CSMS</text>
<rect class="f-teal" x="500" y="20" width="130" height="56" rx="8"/>
<text class="tt-teal" x="565" y="45" text-anchor="middle">Aggregatore</text>
<text class="st-teal" x="565" y="63" text-anchor="middle">e mercato</text>

<line class="life" x1="115" y1="76" x2="115" y2="505"/>
<line class="life" x1="265" y1="76" x2="265" y2="505"/>
<line class="life" x1="415" y1="76" x2="415" y2="505"/>
<line class="life" x1="565" y1="76" x2="565" y2="505"/>

<text class="ts" x="190" y="104" text-anchor="middle">1. SLAC, link PLC</text>
<line class="m-iso" x1="115" y1="110" x2="265" y2="110" marker-end="url(#a)"/>
<text class="ts" x="190" y="142" text-anchor="middle">2. autenticazione</text>
<line class="m-iso" x1="115" y1="148" x2="265" y2="148" marker-end="url(#a)"/>
<text class="ts" x="340" y="180" text-anchor="middle">3. Authorize</text>
<line class="m-ocpp" x1="265" y1="186" x2="415" y2="186" marker-end="url(#a)"/>
<text class="ts" x="340" y="218" text-anchor="middle">4. autorizzato</text>
<line class="m-ocpp" x1="415" y1="224" x2="265" y2="224" marker-end="url(#a)"/>
<text class="ts" x="190" y="256" text-anchor="middle">5. SoC e partenza</text>
<line class="m-iso" x1="115" y1="262" x2="265" y2="262" marker-end="url(#a)"/>
<text class="ts" x="340" y="294" text-anchor="middle">6. inoltro bisogni</text>
<line class="m-ocpp" x1="265" y1="300" x2="415" y2="300" marker-end="url(#a)"/>
<text class="ts" x="490" y="332" text-anchor="middle">7. offerta e ordine</text>
<line class="m-mkt" x1="415" y1="338" x2="565" y2="338" marker-end="url(#a)" marker-start="url(#a)"/>
<text class="ts" x="340" y="370" text-anchor="middle">8. profilo scarica</text>
<line class="m-ocpp" x1="415" y1="376" x2="265" y2="376" marker-end="url(#a)"/>
<text class="ts" x="190" y="408" text-anchor="middle">9. schedule V2G</text>
<line class="m-iso" x1="265" y1="414" x2="115" y2="414" marker-end="url(#a)"/>
<text class="ts" x="190" y="446" text-anchor="middle">10. avvio scarica</text>
<line class="m-iso" x1="115" y1="452" x2="265" y2="452" marker-end="url(#a)"/>
<text class="ts" x="340" y="484" text-anchor="middle">11. MeterValues</text>
<line class="m-ocpp" x1="265" y1="490" x2="415" y2="490" marker-end="url(#a)"/>

<line class="m-iso" x1="50" y1="522" x2="80" y2="522"/>
<text class="ts" x="88" y="526">ISO 15118 (cavo)</text>
<line class="m-ocpp" x1="240" y1="522" x2="270" y2="522"/>
<text class="ts" x="278" y="526">OCPP (backend)</text>
<line class="m-mkt" x1="430" y1="522" x2="460" y2="522"/>
<text class="ts" x="468" y="526">mercato elettrico</text>
</svg>
