<svg viewBox="0 0 720 430" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ar2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
    <filter id="sh2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <text x="360" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#1E293B">I tre attori di OpenID Connect</text>

  <!-- frecce (sotto le box) -->
  <!-- Utente -> Client -->
  <line x1="240" y1="352" x2="480" y2="352" stroke="#475569" stroke-width="1.7" marker-end="url(#ar2)"/>
  <text x="360" y="343" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">① usa l'applicazione</text>
  <!-- Client -> Provider -->
  <line x1="548" y1="288" x2="452" y2="176" stroke="#475569" stroke-width="1.7" marker-end="url(#ar2)"/>
  <text x="556" y="230" font-size="12" font-weight="600" fill="#334155">② delega</text>
  <text x="556" y="247" font-size="12" font-weight="600" fill="#334155">l'autenticazione</text>
  <!-- Provider -> Utente -->
  <line x1="272" y1="176" x2="176" y2="288" stroke="#475569" stroke-width="1.7" marker-end="url(#ar2)"/>
  <text x="164" y="230" text-anchor="end" font-size="12" font-weight="600" fill="#334155">③ verifica</text>
  <text x="164" y="247" text-anchor="end" font-size="12" font-weight="600" fill="#334155">l'identità</text>

  <!-- Provider (alto) -->
  <g filter="url(#sh2)">
    <rect x="270" y="74" width="180" height="100" rx="12" fill="#E0E7FF" stroke="#4338CA" stroke-width="1.6"/>
  </g>
  <text x="360" y="104" text-anchor="middle" font-size="14.5" font-weight="700" fill="#3730A3">OpenID Provider</text>
  <text x="360" y="123" text-anchor="middle" font-size="11" font-style="italic" fill="#6366F1">OpenID Provider / IdP</text>
  <text x="360" y="146" text-anchor="middle" font-size="11.5" fill="#3730A3">Autentica gli utenti</text>
  <text x="360" y="161" text-anchor="middle" font-size="11.5" fill="#3730A3">e rilascia i token</text>

  <!-- Utente (basso sx) -->
  <g filter="url(#sh2)">
    <rect x="55" y="290" width="180" height="100" rx="12" fill="#FEF3C7" stroke="#B45309" stroke-width="1.6"/>
  </g>
  <text x="145" y="320" text-anchor="middle" font-size="14.5" font-weight="700" fill="#92400E">Utente finale</text>
  <text x="145" y="339" text-anchor="middle" font-size="11" font-style="italic" fill="#D97706">End User</text>
  <text x="145" y="362" text-anchor="middle" font-size="11.5" fill="#92400E">Possiede identità</text>
  <text x="145" y="377" text-anchor="middle" font-size="11.5" fill="#92400E">e credenziali</text>

  <!-- Client (basso dx) -->
  <g filter="url(#sh2)">
    <rect x="485" y="290" width="180" height="100" rx="12" fill="#CCFBF1" stroke="#0D9488" stroke-width="1.6"/>
  </g>
  <text x="575" y="320" text-anchor="middle" font-size="14.5" font-weight="700" fill="#115E59">Applicazione client</text>
  <text x="575" y="339" text-anchor="middle" font-size="11" font-style="italic" fill="#0D9488">Relying Party</text>
  <text x="575" y="362" text-anchor="middle" font-size="11.5" fill="#115E59">Si affida al Provider</text>
  <text x="575" y="377" text-anchor="middle" font-size="11.5" fill="#115E59">per autenticare</text>
</svg>
