<svg viewBox="0 0 920 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1d4e8f"/>
    </marker>
    <marker id="arrowGold" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b8791a"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f7d52"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1a2233" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="920" height="560" fill="#ffffff"/>
  <text x="32" y="42" font-size="22" font-weight="700" fill="#1a2233">Il flusso Kerberos: un login, tre scambi</text>
  <text x="32" y="66" font-size="14" fill="#5b6677">La password si verifica una volta sola. Da lì in poi viaggiano solo ticket firmati.</text>

  <!-- Actor headers -->
  <g filter="url(#soft)">
    <rect x="60" y="96" width="200" height="58" rx="12" fill="#e8f0fa" stroke="#1d4e8f" stroke-width="1.5"/>
    <rect x="360" y="96" width="200" height="58" rx="12" fill="#fdf3df" stroke="#b8791a" stroke-width="1.5"/>
    <rect x="660" y="96" width="200" height="58" rx="12" fill="#e6f3ec" stroke="#2f7d52" stroke-width="1.5"/>
  </g>
  <text x="160" y="123" font-size="15" font-weight="700" fill="#1d4e8f" text-anchor="middle">CLIENT</text>
  <text x="160" y="143" font-size="12" fill="#46586e" text-anchor="middle">PC dell'utente (Alice)</text>
  <text x="460" y="123" font-size="15" font-weight="700" fill="#9a6512" text-anchor="middle">KDC</text>
  <text x="460" y="143" font-size="12" fill="#7d5a23" text-anchor="middle">Domain Controller · AS + TGS</text>
  <text x="760" y="123" font-size="15" font-weight="700" fill="#2f7d52" text-anchor="middle">RISORSA</text>
  <text x="760" y="143" font-size="12" fill="#3d6b51" text-anchor="middle">File server / stampante</text>

  <!-- Lifelines -->
  <line x1="160" y1="154" x2="160" y2="520" stroke="#c9d2dd" stroke-width="2" stroke-dasharray="4 5"/>
  <line x1="460" y1="154" x2="460" y2="520" stroke="#c9d2dd" stroke-width="2" stroke-dasharray="4 5"/>
  <line x1="760" y1="154" x2="760" y2="520" stroke="#c9d2dd" stroke-width="2" stroke-dasharray="4 5"/>

  <!-- 1. AS-REQ -->
  <line x1="160" y1="195" x2="452" y2="195" stroke="#1d4e8f" stroke-width="2.2" marker-end="url(#arrowBlue)"/>
  <circle cx="160" cy="195" r="11" fill="#1d4e8f"/><text x="160" y="199" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">1</text>
  <text x="310" y="187" font-size="12.5" font-weight="600" fill="#1d4e8f" text-anchor="middle">AS-REQ</text>
  <text x="310" y="210" font-size="11.5" fill="#46586e" text-anchor="middle">«Sono Alice» (pre-auth cifrata)</text>

  <!-- 2. AS-REP -->
  <line x1="460" y1="245" x2="168" y2="245" stroke="#b8791a" stroke-width="2.2" marker-end="url(#arrowGold)"/>
  <circle cx="460" cy="245" r="11" fill="#b8791a"/><text x="460" y="249" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">2</text>
  <text x="310" y="237" font-size="12.5" font-weight="600" fill="#9a6512" text-anchor="middle">AS-REP</text>
  <text x="310" y="260" font-size="11.5" fill="#7d5a23" text-anchor="middle">Ecco il TGT — il «pass giornaliero»</text>

  <!-- 3. TGS-REQ -->
  <line x1="160" y1="305" x2="452" y2="305" stroke="#1d4e8f" stroke-width="2.2" marker-end="url(#arrowBlue)"/>
  <circle cx="160" cy="305" r="11" fill="#1d4e8f"/><text x="160" y="309" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">3</text>
  <text x="310" y="297" font-size="12.5" font-weight="600" fill="#1d4e8f" text-anchor="middle">TGS-REQ</text>
  <text x="310" y="320" font-size="11.5" fill="#46586e" text-anchor="middle">«Voglio il file server» + TGT</text>

  <!-- 4. TGS-REP -->
  <line x1="460" y1="355" x2="168" y2="355" stroke="#b8791a" stroke-width="2.2" marker-end="url(#arrowGold)"/>
  <circle cx="460" cy="355" r="11" fill="#b8791a"/><text x="460" y="359" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">4</text>
  <text x="310" y="347" font-size="12.5" font-weight="600" fill="#9a6512" text-anchor="middle">TGS-REP</text>
  <text x="310" y="370" font-size="11.5" fill="#7d5a23" text-anchor="middle">Service Ticket (contiene il PAC)</text>

  <!-- 5. AP-REQ -->
  <line x1="160" y1="430" x2="752" y2="430" stroke="#2f7d52" stroke-width="2.2" marker-end="url(#arrowGreen)"/>
  <circle cx="160" cy="430" r="11" fill="#2f7d52"/><text x="160" y="434" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">5</text>
  <text x="610" y="422" font-size="12.5" font-weight="600" fill="#2f7d52" text-anchor="middle">AP-REQ</text>
  <text x="610" y="445" font-size="11.5" fill="#3d6b51" text-anchor="middle">Presento il Service Ticket</text>

  <!-- 6. AP-REP -->
  <line x1="760" y1="480" x2="168" y2="480" stroke="#2f7d52" stroke-width="2.2" marker-end="url(#arrowGreen)"/>
  <circle cx="760" cy="480" r="11" fill="#2f7d52"/><text x="760" y="484" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">6</text>
  <text x="460" y="472" font-size="12.5" font-weight="600" fill="#2f7d52" text-anchor="middle">AP-REP — mutua autenticazione OK</text>
  <text x="460" y="495" font-size="11.5" fill="#3d6b51" text-anchor="middle">La risorsa legge i gruppi dal PAC e applica le ACL · accesso concesso</text>

  <!-- phase brackets -->
  <text x="30" y="225" font-size="11" font-weight="700" fill="#1d4e8f" transform="rotate(-90 30 225)" text-anchor="middle">LOGON</text>
  <text x="30" y="335" font-size="11" font-weight="700" fill="#b8791a" transform="rotate(-90 30 335)" text-anchor="middle">ACCESSO RISORSA</text>
  <text x="30" y="455" font-size="11" font-weight="700" fill="#2f7d52" transform="rotate(-90 30 455)" text-anchor="middle">USO</text>
</svg>
