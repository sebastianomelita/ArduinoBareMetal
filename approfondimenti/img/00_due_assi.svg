<svg viewBox="0 0 760 580" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- Card -->
  <rect x="8" y="8" width="744" height="564" rx="14" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>

  <!-- Title -->
  <text x="390" y="44" text-anchor="middle" font-size="21" font-weight="700" fill="#1e2327">I due assi di criticità</text>
  <text x="390" y="67" text-anchor="middle" font-size="13" fill="#57606a">lo stesso apparato può essere critico su un asse e irrilevante sull'altro</text>

  <!-- Quadrant fills -->
  <rect x="130" y="100" width="260" height="190" fill="#fdf3e3"/>  <!-- TL: low topo / high funz -->
  <rect x="390" y="100" width="260" height="190" fill="#fdeceb"/>  <!-- TR: high topo / high funz -->
  <rect x="130" y="290" width="260" height="190" fill="#eef3ee"/>  <!-- BL: low / low -->
  <rect x="390" y="290" width="260" height="190" fill="#eaf1fb"/>  <!-- BR: high topo / low funz -->

  <!-- Plot border + midlines -->
  <rect x="130" y="100" width="520" height="380" fill="none" stroke="#c4ccd4" stroke-width="1"/>
  <line x1="390" y1="100" x2="390" y2="480" stroke="#c4ccd4" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="130" y1="290" x2="650" y2="290" stroke="#c4ccd4" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Axes (drawn over edges, with arrowheads) -->
  <line x1="130" y1="480" x2="130" y2="92" stroke="#1e2327" stroke-width="1.6"/>
  <line x1="130" y1="480" x2="660" y2="480" stroke="#1e2327" stroke-width="1.6"/>
  <polygon points="130,90 124,102 136,102" fill="#1e2327"/>
  <polygon points="662,480 650,474 650,486" fill="#1e2327"/>

  <!-- Axis labels -->
  <text x="390" y="522" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1e2327">Criticità topologica  →  fan-out · blast radius</text>
  <text x="135" y="498" text-anchor="start" font-size="11" fill="#8b949e">basso</text>
  <text x="648" y="498" text-anchor="end" font-size="11" fill="#8b949e">alto</text>

  <g transform="rotate(-90 86 290)">
    <text x="86" y="290" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1e2327">Criticità funzionale  →  gravità della conseguenza</text>
  </g>
  <text x="122" y="476" text-anchor="end" font-size="11" fill="#8b949e">basso</text>
  <text x="122" y="110" text-anchor="end" font-size="11" fill="#8b949e">alto</text>

  <!-- TL: Fail-safe locale -->
  <text x="148" y="132" font-size="14" font-weight="700" fill="#9a6a00">Fail-safe locale · integrità</text>
  <text x="148" y="160" font-size="12" fill="#6b5526">•  rilevatore gas</text>
  <text x="148" y="180" font-size="12" fill="#6b5526">•  interlock di sicurezza</text>
  <text x="148" y="200" font-size="12" fill="#6b5526">•  sensore antintrusione</text>

  <!-- TR: Ridondanza + integrità -->
  <text x="408" y="132" font-size="14" font-weight="700" fill="#b62324">Ridondanza + integrità</text>
  <text x="408" y="152" font-size="11.5" font-style="italic" fill="#99514c">massima protezione</text>
  <text x="408" y="180" font-size="12" fill="#7a3b35">•  controllore SCADA centrale</text>
  <text x="408" y="200" font-size="12" fill="#7a3b35">•  core di rete safety</text>

  <!-- BL: Resilienza di flotta -->
  <text x="148" y="322" font-size="14" font-weight="700" fill="#2f7d4f">Resilienza di flotta · spare</text>
  <text x="148" y="350" font-size="12" fill="#3a5a44">•  gateway-foglia (telemetria)</text>
  <text x="148" y="370" font-size="12" fill="#3a5a44">•  singolo sensore ambientale</text>

  <!-- BR: Ridondanza / HA -->
  <text x="408" y="322" font-size="14" font-weight="700" fill="#1f5fc4">Ridondanza · HA</text>
  <text x="408" y="350" font-size="12" fill="#2a4d80">•  proxy / load balancer</text>
  <text x="408" y="370" font-size="12" fill="#2a4d80">•  switch di aggregazione</text>
  <text x="408" y="390" font-size="12" fill="#2a4d80">•  DNS · gateway uplink</text>

  <!-- Footer note -->
  <text x="390" y="556" text-anchor="middle" font-size="11.5" fill="#8b949e">La diagonale verso l'alto-destra è la criticità crescente: il caso che richiede sia disponibilità sia integrità.</text>
</svg>
