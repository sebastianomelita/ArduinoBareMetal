<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 230" role="img">
  <title>Topic di comando MQTT</title>
  <desc>Pulsante che pubblica sul topic di comando, lampada iscritta, broker MQTT al centro.</desc>
  <style>
    .th { font: 500 14px sans-serif; fill: #2C2C2A; }
    .ts { font: 400 12px sans-serif; fill: #444441; }
    .badge-text { font: 400 12px sans-serif; fill: #FFFFFF; }
    .pub-box { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
    .pub-text { fill: #04342C; }
    .sub-box { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
    .sub-text { fill: #4A1B0C; }
    .tube { fill: #CECBF6; stroke: #534AB7; stroke-width: 1; }
    .tube-arrow { stroke: #534AB7; stroke-width: 1.5; fill: none; stroke-dasharray: 6 4; }
    .topic-label-box { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
    .topic-label-text { fill: #26215C; }
    .pub-badge { fill: #0F6E56; }
    .sub-badge { fill: #993C1D; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="th" x="340" y="30" text-anchor="middle">Topic di comando</text>
  <text class="ts" x="340" y="92" text-anchor="middle">{"toggle":"true"}</text>

  <rect class="tube" x="170" y="105" width="340" height="36" rx="18"/>
  <line class="tube-arrow" x1="200" y1="123" x2="480" y2="123" marker-end="url(#arrow)"/>

  <rect class="topic-label-box" x="260" y="148" width="160" height="22" rx="4"/>
  <text class="ts topic-label-text" x="340" y="163" text-anchor="middle">luci/soggiorno/comandi</text>
  <text class="ts" x="340" y="187" text-anchor="middle">Broker MQTT</text>

  <rect class="pub-box" x="40" y="95" width="120" height="56" rx="8"/>
  <text class="th pub-text" x="100" y="115" text-anchor="middle">Pulsante</text>
  <text class="ts pub-text" x="100" y="135" text-anchor="middle">sensore</text>
  <rect class="pub-badge" x="55" y="158" width="90" height="22" rx="11"/>
  <text class="badge-text" x="100" y="173" text-anchor="middle">publish()</text>

  <rect class="sub-box" x="520" y="95" width="120" height="56" rx="8"/>
  <text class="th sub-text" x="580" y="115" text-anchor="middle">Lampada</text>
  <text class="ts sub-text" x="580" y="135" text-anchor="middle">attuatore</text>
  <rect class="sub-badge" x="528" y="158" width="104" height="22" rx="11"/>
  <text class="badge-text" x="580" y="173" text-anchor="middle">subscribe()</text>
</svg>
