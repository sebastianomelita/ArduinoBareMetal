<svg width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: system-ui, -apple-system, sans-serif; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; }
  .tl { font-size: 11px; font-weight: 400; }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<!-- Scenario 1: Ceph RBD -->
<text class="th" x="110" y="24" text-anchor="middle" fill="#085041">Ceph RBD (distribuito)</text>

<rect x="30" y="40" width="80" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="70" y="58" text-anchor="middle" dominant-baseline="central" fill="#085041">Nodo A</text>
<text class="tl" x="70" y="74" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">VM attiva</text>

<rect x="140" y="40" width="80" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="180" y="58" text-anchor="middle" dominant-baseline="central" fill="#085041">Nodo B</text>
<text class="tl" x="180" y="74" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">VM riprende</text>

<text class="tl" x="125" y="55" text-anchor="middle" fill="#0F6E56">RAM</text>
<line x1="110" y1="62" x2="140" y2="62" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>

<line x1="70" y1="90" x2="110" y2="120" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="180" y1="90" x2="140" y2="120" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="55" y="120" width="140" height="36" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="ts" x="125" y="141" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Ceph RBD</text>

<rect x="40" y="170" width="170" height="26" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text class="tl" x="125" y="186" text-anchor="middle" dominant-baseline="central" fill="#27500A">Live migration: SÌ</text>
<text class="tl" x="125" y="212" text-anchor="middle" fill="#27500A">Nessun SPOF storage</text>

<!-- Separator 1 -->
<rect x="230" y="20" width="1" height="210" fill="#D3D1C7" opacity="0.5"/>

<!-- Scenario 2: NAS NFS -->
<text class="th" x="340" y="24" text-anchor="middle" fill="#633806">NAS centralizzato (NFS)</text>

<rect x="270" y="40" width="70" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="305" y="58" text-anchor="middle" dominant-baseline="central" fill="#085041">Nodo A</text>
<text class="tl" x="305" y="74" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">VM attiva</text>

<rect x="370" y="40" width="70" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="405" y="58" text-anchor="middle" dominant-baseline="central" fill="#085041">Nodo B</text>
<text class="tl" x="405" y="74" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">VM riprende</text>

<text class="tl" x="352" y="55" text-anchor="middle" fill="#0F6E56">RAM</text>
<line x1="340" y1="62" x2="370" y2="62" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>

<line x1="305" y1="90" x2="335" y2="120" stroke="#854F0B" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="405" y1="90" x2="375" y2="120" stroke="#854F0B" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="280" y="120" width="150" height="36" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="355" y="141" text-anchor="middle" dominant-baseline="central" fill="#633806">NAS (NFS / iSCSI)</text>

<rect x="270" y="170" width="170" height="26" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text class="tl" x="355" y="186" text-anchor="middle" dominant-baseline="central" fill="#27500A">Live migration: SÌ</text>
<text class="tl" x="355" y="212" text-anchor="middle" fill="#A32D2D">Ma il NAS è SPOF</text>

<!-- Separator 2 -->
<rect x="455" y="20" width="1" height="210" fill="#D3D1C7" opacity="0.5"/>

<!-- Scenario 3: ZFS locale -->
<text class="th" x="570" y="24" text-anchor="middle" fill="#791F1F">ZFS locale</text>

<rect x="490" y="40" width="70" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="525" y="58" text-anchor="middle" dominant-baseline="central" fill="#085041">Nodo A</text>
<text class="tl" x="525" y="74" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">VM attiva</text>

<rect x="590" y="40" width="70" height="50" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text class="ts" x="625" y="58" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Nodo B</text>
<text class="tl" x="625" y="74" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">???</text>

<line x1="525" y1="90" x2="525" y2="120" stroke="#854F0B" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="490" y="120" width="70" height="36" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="525" y="141" text-anchor="middle" dominant-baseline="central" fill="#633806">ZFS</text>

<rect x="590" y="120" width="70" height="36" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text class="ts" x="625" y="141" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">ZFS</text>
<text class="tl" x="625" y="161" text-anchor="middle" fill="#5F5E5A">vuoto</text>

<rect x="480" y="170" width="180" height="26" rx="6" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="tl" x="570" y="186" text-anchor="middle" dominant-baseline="central" fill="#791F1F">Live migration: NO</text>
<text class="tl" x="570" y="212" text-anchor="middle" fill="#791F1F">Disco intrappolato su nodo A</text>

<!-- Summary table below -->
<rect x="40" y="250" width="600" height="210" rx="10" fill="none" stroke="#D3D1C7" stroke-width="0.5"/>

<text class="th" x="340" y="278" text-anchor="middle" fill="#2C2C2A">Riepilogo: quale storage per quale migrazione</text>

<!-- Header row -->
<rect x="40" y="290" width="200" height="28" fill="#F1EFE8" stroke="none"/>
<rect x="240" y="290" width="200" height="28" fill="#F1EFE8" stroke="none"/>
<rect x="440" y="290" width="200" height="28" fill="#F1EFE8" stroke="none"/>
<text class="ts" x="140" y="308" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Storage</text>
<text class="ts" x="340" y="308" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Live migration</text>
<text class="ts" x="540" y="308" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">SPOF storage</text>
<line x1="40" y1="318" x2="640" y2="318" stroke="#D3D1C7" stroke-width="0.5"/>

<!-- Row 1 -->
<text class="ts" x="140" y="338" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Ceph RBD</text>
<text class="ts" x="340" y="338" text-anchor="middle" dominant-baseline="central" fill="#27500A">SÌ</text>
<text class="ts" x="540" y="338" text-anchor="middle" dominant-baseline="central" fill="#27500A">NO</text>
<line x1="40" y1="350" x2="640" y2="350" stroke="#D3D1C7" stroke-width="0.5"/>

<!-- Row 2 -->
<text class="ts" x="140" y="370" text-anchor="middle" dominant-baseline="central" fill="#633806">NAS (NFS / iSCSI)</text>
<text class="ts" x="340" y="370" text-anchor="middle" dominant-baseline="central" fill="#27500A">SÌ</text>
<text class="ts" x="540" y="370" text-anchor="middle" dominant-baseline="central" fill="#A32D2D">SÌ (il NAS)</text>
<line x1="40" y1="382" x2="640" y2="382" stroke="#D3D1C7" stroke-width="0.5"/>

<!-- Row 3 -->
<text class="ts" x="140" y="402" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">ZFS / LVM locale</text>
<text class="ts" x="340" y="402" text-anchor="middle" dominant-baseline="central" fill="#A32D2D">NO</text>
<text class="ts" x="540" y="402" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">N/A</text>
<line x1="40" y1="414" x2="640" y2="414" stroke="#D3D1C7" stroke-width="0.5"/>

<!-- Row 4 -->
<text class="ts" x="140" y="436" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">ZFS + replica (syncoid)</text>
<text class="ts" x="340" y="436" text-anchor="middle" dominant-baseline="central" fill="#854F0B">Solo offline</text>
<text class="ts" x="540" y="436" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">NO</text>

<text class="tl" x="340" y="480" text-anchor="middle" fill="#888780">La live migration richiede che il disco sia accessibile da entrambi i nodi PRIMA dello spostamento</text>
<text class="tl" x="340" y="496" text-anchor="middle" fill="#888780">Questo è possibile sia con storage distribuito (Ceph) sia con NAS centralizzato (NFS/iSCSI)</text>
</svg>