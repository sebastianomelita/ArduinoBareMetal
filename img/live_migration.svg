<svg width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: system-ui, -apple-system, sans-serif; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; }
  .tl { font-size: 11px; font-weight: 400; }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<!-- Scenario 1: Ceph RBD -->
<text class="th" x="110" y="24" text-anchor="middle" fill="#085041">Ceph RBD (distribuito)</text>

<rect x="30" y="40" width="80" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="70" y="65" text-anchor="middle" dominant-baseline="central" fill="#085041">Nodo A</text>

<rect x="140" y="40" width="80" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="180" y="65" text-anchor="middle" dominant-baseline="central" fill="#085041">Nodo B</text>

<line x1="70" y1="84" x2="105" y2="110" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="180" y1="84" x2="145" y2="110" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="55" y="110" width="140" height="36" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="ts" x="125" y="131" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Ceph RBD</text>

<text class="tl" x="125" y="166" text-anchor="middle" fill="#085041">Entrambi accedono al disco</text>

<rect x="40" y="180" width="170" height="26" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text class="tl" x="125" y="196" text-anchor="middle" dominant-baseline="central" fill="#27500A">Live migration: SÌ — no SPOF</text>

<!-- Separator 1 -->
<rect x="230" y="20" width="1" height="200" fill="#D3D1C7" opacity="0.5"/>

<!-- Scenario 2: NAS NFS -->
<text class="th" x="345" y="24" text-anchor="middle" fill="#633806">NAS centralizzato (NFS)</text>

<rect x="275" y="40" width="70" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="310" y="65" text-anchor="middle" dominant-baseline="central" fill="#085041">Nodo A</text>

<rect x="375" y="40" width="70" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="410" y="65" text-anchor="middle" dominant-baseline="central" fill="#085041">Nodo B</text>

<line x1="310" y1="84" x2="335" y2="110" stroke="#854F0B" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="410" y1="84" x2="385" y2="110" stroke="#854F0B" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="285" y="110" width="150" height="36" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="360" y="131" text-anchor="middle" dominant-baseline="central" fill="#633806">NAS (NFS / iSCSI)</text>

<text class="tl" x="360" y="166" text-anchor="middle" fill="#633806">Entrambi accedono al disco</text>

<rect x="270" y="180" width="180" height="26" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="tl" x="360" y="196" text-anchor="middle" dominant-baseline="central" fill="#633806">Live migration: SÌ — ma NAS è SPOF</text>

<!-- Separator 2 -->
<rect x="460" y="20" width="1" height="200" fill="#D3D1C7" opacity="0.5"/>

<!-- Scenario 3: ZFS locale -->
<text class="th" x="570" y="24" text-anchor="middle" fill="#791F1F">ZFS locale</text>

<rect x="495" y="40" width="70" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="530" y="65" text-anchor="middle" dominant-baseline="central" fill="#085041">Nodo A</text>

<rect x="595" y="40" width="70" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text class="ts" x="630" y="65" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Nodo B</text>

<line x1="530" y1="84" x2="530" y2="110" stroke="#854F0B" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="495" y="110" width="70" height="36" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="530" y="131" text-anchor="middle" dominant-baseline="central" fill="#633806">ZFS</text>

<rect x="595" y="110" width="70" height="36" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text class="ts" x="630" y="131" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">ZFS</text>
<text class="tl" x="630" y="152" text-anchor="middle" fill="#5F5E5A">vuoto</text>

<text class="tl" x="570" y="166" text-anchor="middle" fill="#791F1F">Solo nodo A accede al disco</text>

<rect x="480" y="180" width="180" height="26" rx="6" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="tl" x="570" y="196" text-anchor="middle" dominant-baseline="central" fill="#791F1F">Live migration: NO</text>

<!-- Summary table below -->
<rect x="40" y="240" width="600" height="220" rx="10" fill="none" stroke="#D3D1C7" stroke-width="0.5"/>

<text class="th" x="340" y="268" text-anchor="middle" fill="#2C2C2A">Riepilogo: quale storage per quale migrazione</text>

<!-- Header row -->
<rect x="40" y="280" width="200" height="28" fill="#F1EFE8" stroke="none"/>
<rect x="240" y="280" width="200" height="28" fill="#F1EFE8" stroke="none"/>
<rect x="440" y="280" width="200" height="28" fill="#F1EFE8" stroke="none"/>
<text class="ts" x="140" y="298" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Storage</text>
<text class="ts" x="340" y="298" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Live migration</text>
<text class="ts" x="540" y="298" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">SPOF storage</text>
<line x1="40" y1="308" x2="640" y2="308" stroke="#D3D1C7" stroke-width="0.5"/>

<!-- Row 1 -->
<text class="ts" x="140" y="330" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Ceph RBD</text>
<text class="ts" x="340" y="330" text-anchor="middle" dominant-baseline="central" fill="#27500A">SÌ</text>
<text class="ts" x="540" y="330" text-anchor="middle" dominant-baseline="central" fill="#27500A">NO</text>
<line x1="40" y1="342" x2="640" y2="342" stroke="#D3D1C7" stroke-width="0.5"/>

<!-- Row 2 -->
<text class="ts" x="140" y="362" text-anchor="middle" dominant-baseline="central" fill="#633806">NAS (NFS / iSCSI)</text>
<text class="ts" x="340" y="362" text-anchor="middle" dominant-baseline="central" fill="#27500A">SÌ</text>
<text class="ts" x="540" y="362" text-anchor="middle" dominant-baseline="central" fill="#A32D2D">SÌ (il NAS)</text>
<line x1="40" y1="374" x2="640" y2="374" stroke="#D3D1C7" stroke-width="0.5"/>

<!-- Row 3 -->
<text class="ts" x="140" y="394" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">ZFS / LVM locale</text>
<text class="ts" x="340" y="394" text-anchor="middle" dominant-baseline="central" fill="#A32D2D">NO</text>
<text class="ts" x="540" y="394" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">N/A</text>
<line x1="40" y1="406" x2="640" y2="406" stroke="#D3D1C7" stroke-width="0.5"/>

<!-- Row 4 -->
<text class="ts" x="140" y="428" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">ZFS + replica (syncoid)</text>
<text class="ts" x="340" y="428" text-anchor="middle" dominant-baseline="central" fill="#854F0B">Solo offline</text>
<text class="ts" x="540" y="428" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">NO</text>

<text class="tl" x="340" y="475" text-anchor="middle" fill="#888780">La live migration richiede che il disco sia accessibile da entrambi i nodi PRIMA dello spostamento.</text>
<text class="tl" x="340" y="491" text-anchor="middle" fill="#888780">Questo è possibile sia con storage distribuito (Ceph) sia con NAS centralizzato (NFS/iSCSI).</text>
</svg>