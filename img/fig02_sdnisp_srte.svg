<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 500" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <marker id="arrCtrl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrData" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#15803d"/>
    </marker>
  </defs>

  <text x="460" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">SR-TE con controller SDN: architettura di un backbone ISP moderno</text>

  <!-- controller SDN -->
  <rect x="310" y="50" width="300" height="90" rx="14" fill="#ede9fe" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="460" y="78" text-anchor="middle" font-size="14" font-weight="700" fill="#5b21b6">Controller SDN</text>
  <text x="460" y="98" text-anchor="middle" font-size="11" fill="#6d28d9">visione globale topologia + metriche</text>
  <text x="460" y="116" text-anchor="middle" font-size="11" fill="#6d28d9">calcola percorsi SR-TE ottimali, inietta stack SID</text>

  <!-- linee verso i PE -->
  <line x1="370" y1="140" x2="160" y2="230" stroke="#7c3aed" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#arrCtrl)"/>
  <line x1="460" y1="140" x2="460" y2="230" stroke="#7c3aed" stroke-width="1.8" stroke-dasharray="5 3"/>
  <line x1="550" y1="140" x2="760" y2="230" stroke="#7c3aed" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#arrCtrl)"/>

  <text x="260" y="175" font-size="9" fill="#7c3aed" font-style="italic">PCEP / Netconf</text>
  <text x="640" y="175" font-size="9" fill="#7c3aed" font-style="italic">PCEP / Netconf</text>

  <!-- backbone -->
  <rect x="40" y="220" width="840" height="180" rx="14" fill="#f1f5f9" stroke="#475569" stroke-width="2"/>
  <text x="60" y="244" font-size="11" font-weight="700" fill="#334155">Backbone ISP — underlay SR-MPLS (IGP distribuisce i SID, niente LDP)</text>

  <!-- PE1 -->
  <circle cx="140" cy="310" r="32" fill="#fff" stroke="#1d4ed8" stroke-width="2.5"/>
  <text x="140" y="306" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">PE1</text>
  <text x="140" y="322" text-anchor="middle" font-size="9" fill="#1e40af">SID 16001</text>
  <text x="140" y="336" text-anchor="middle" font-size="8" fill="#1e40af">ingress</text>

  <!-- P1 -->
  <circle cx="300" cy="280" r="26" fill="#fff" stroke="#475569" stroke-width="2"/>
  <text x="300" y="278" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">P1</text>
  <text x="300" y="294" text-anchor="middle" font-size="9" fill="#475569">SID 16010</text>

  <!-- P2 -->
  <circle cx="460" cy="340" r="26" fill="#fff" stroke="#475569" stroke-width="2"/>
  <text x="460" y="338" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">P2</text>
  <text x="460" y="354" text-anchor="middle" font-size="9" fill="#475569">SID 16020</text>

  <!-- P3 -->
  <circle cx="460" cy="270" r="26" fill="#fff" stroke="#475569" stroke-width="2"/>
  <text x="460" y="268" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">P3</text>
  <text x="460" y="284" text-anchor="middle" font-size="9" fill="#475569">SID 16030</text>

  <!-- P4 -->
  <circle cx="620" cy="300" r="26" fill="#fff" stroke="#475569" stroke-width="2"/>
  <text x="620" y="298" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">P4</text>
  <text x="620" y="314" text-anchor="middle" font-size="9" fill="#475569">SID 16040</text>

  <!-- PE2 -->
  <circle cx="780" cy="310" r="32" fill="#fff" stroke="#1d4ed8" stroke-width="2.5"/>
  <text x="780" y="306" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">PE2</text>
  <text x="780" y="322" text-anchor="middle" font-size="9" fill="#1e40af">SID 16002</text>
  <text x="780" y="336" text-anchor="middle" font-size="8" fill="#1e40af">egress</text>

  <!-- link tra nodi -->
  <line x1="168" y1="296" x2="276" y2="284" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="168" y1="324" x2="436" y2="340" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="324" y1="276" x2="436" y2="272" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="320" y1="294" x2="438" y2="330" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="484" y1="272" x2="598" y2="294" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="484" y1="338" x2="598" y2="308" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="644" y1="298" x2="752" y2="306" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- path calcolato in verde -->
  <path d="M 172 310 Q 220 275 274 280" stroke="#15803d" stroke-width="3" fill="none" marker-end="url(#arrData)"/>
  <path d="M 326 276 Q 390 260 434 270" stroke="#15803d" stroke-width="3" fill="none" marker-end="url(#arrData)"/>
  <path d="M 486 272 Q 550 275 594 294" stroke="#15803d" stroke-width="3" fill="none" marker-end="url(#arrData)"/>
  <path d="M 646 300 Q 710 302 748 306" stroke="#15803d" stroke-width="3" fill="none" marker-end="url(#arrData)"/>

  <!-- stack SID -->
  <rect x="80" y="420" width="760" height="60" rx="10" fill="#dcfce7" stroke="#15803d" stroke-width="1.5"/>
  <text x="100" y="442" font-size="11" font-weight="700" fill="#14532d">Stack SID iniettato dal controller su PE1:</text>
  <g transform="translate(100,448)">
    <rect width="80" height="24" rx="4" fill="#fff" stroke="#15803d" stroke-width="1.5"/>
    <text x="40" y="17" text-anchor="middle" font-size="10" font-weight="700" fill="#14532d">16010 (P1)</text>
    <rect x="84" width="80" height="24" rx="4" fill="#fff" stroke="#15803d" stroke-width="1.5"/>
    <text x="124" y="17" text-anchor="middle" font-size="10" font-weight="700" fill="#14532d">16030 (P3)</text>
    <rect x="168" width="80" height="24" rx="4" fill="#fff" stroke="#15803d" stroke-width="1.5"/>
    <text x="208" y="17" text-anchor="middle" font-size="10" font-weight="700" fill="#14532d">16040 (P4)</text>
    <rect x="252" width="80" height="24" rx="4" fill="#fff" stroke="#15803d" stroke-width="1.5"/>
    <text x="292" y="17" text-anchor="middle" font-size="10" font-weight="700" fill="#14532d">16002 (PE2)</text>
    <text x="390" y="17" font-size="10" fill="#14532d" font-style="italic">→ percorso esplicito: PE1 → P1 → P3 → P4 → PE2 (evita P2)</text>
  </g>
</svg>
