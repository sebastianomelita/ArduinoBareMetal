<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 360" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="Schema generico VRRP: un VIP condiviso tra un nodo master e un nodo backup">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Client / host -->
  <rect x="40" y="140" width="120" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="100" y="164" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">Client / host</text>
  <text x="100" y="182" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">usa solo il VIP</text>

  <text x="210" y="152" text-anchor="middle" font-size="12" fill="#5F5E5A">connessione al VIP</text>
  <line x1="160" y1="168" x2="258" y2="168" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Container VIP -->
  <rect x="262" y="56" width="200" height="232" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="362" y="78" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">VIP 192.168.1.100</text>
  <text x="362" y="95" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">indirizzo virtuale condiviso</text>

  <!-- Nodo MASTER -->
  <rect x="282" y="114" width="160" height="60" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="362" y="134" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">Nodo A — MASTER</text>
  <text x="362" y="152" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">priority 100 · tiene il VIP</text>

  <!-- Heartbeat / advertisement -->
  <line x1="362" y1="176" x2="362" y2="208" stroke="#73726c" stroke-width="1.5" stroke-dasharray="4 3" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

  <!-- Nodo BACKUP -->
  <rect x="282" y="210" width="160" height="60" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="362" y="230" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">Nodo B — BACKUP</text>
  <text x="362" y="248" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">priority 90 · in attesa</text>

  <!-- Nota advertisement -->
  <line x1="442" y1="192" x2="486" y2="160" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="2 2"/>
  <text x="492" y="150" font-size="12" fill="#5F5E5A">advertisement</text>
  <text x="492" y="166" font-size="12" fill="#5F5E5A">ogni 1s</text>

  <!-- Nota failover -->
  <text x="492" y="208" font-size="12" fill="#5F5E5A">se cessano →</text>
  <text x="492" y="224" font-size="12" fill="#5F5E5A">il BACKUP prende</text>
  <text x="492" y="240" font-size="12" fill="#5F5E5A">il VIP (failover)</text>

  <!-- Caption -->
  <text x="340" y="322" text-anchor="middle" font-size="12" fill="#5F5E5A">Dietro il VIP può esserci qualsiasi servizio: reverse proxy, web, DB, DNS, gateway…</text>
</svg>
