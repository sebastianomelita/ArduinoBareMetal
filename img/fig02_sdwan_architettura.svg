<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="cloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ede9fe"/>
      <stop offset="1" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="branch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#fde68a"/>
    </linearGradient>
  </defs>

  <text x="460" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Architettura SD-WAN: tre piani separati</text>

  <!-- cloud: controller + orchestrator -->
  <ellipse cx="460" cy="100" rx="280" ry="55" fill="url(#cloud)" stroke="#7c3aed" stroke-width="2"/>
  <text x="460" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">Cloud / NOC del vendor</text>

  <rect x="240" y="92" width="180" height="50" rx="8" fill="#fff" stroke="#7c3aed" stroke-width="2"/>
  <text x="330" y="111" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">Orchestrator</text>
  <text x="330" y="127" text-anchor="middle" font-size="9" fill="#6d28d9">policy, onboarding</text>
  <text x="330" y="138" text-anchor="middle" font-size="9" fill="#6d28d9">("piano di gestione")</text>

  <rect x="500" y="92" width="180" height="50" rx="8" fill="#fff" stroke="#7c3aed" stroke-width="2"/>
  <text x="590" y="111" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">Controller</text>
  <text x="590" y="127" text-anchor="middle" font-size="9" fill="#6d28d9">distribuzione rotte e chiavi</text>
  <text x="590" y="138" text-anchor="middle" font-size="9" fill="#6d28d9">("control plane")</text>

  <!-- linee tratteggiate verso edge -->
  <line x1="200" y1="155" x2="140" y2="280" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="460" y1="155" x2="460" y2="280" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="720" y1="155" x2="780" y2="280" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4 3"/>

  <text x="290" y="220" font-size="9" fill="#6d28d9" font-style="italic">policy + rotte</text>
  <text x="640" y="220" font-size="9" fill="#6d28d9" font-style="italic">policy + rotte</text>

  <!-- edge devices nelle sedi -->
  <rect x="60" y="280" width="180" height="80" rx="10" fill="url(#branch)" stroke="#d97706" stroke-width="2"/>
  <text x="150" y="304" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Sede A — Roma</text>
  <rect x="100" y="318" width="100" height="32" rx="6" fill="#fff" stroke="#d97706" stroke-width="1.5"/>
  <text x="150" y="338" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Edge A</text>

  <rect x="370" y="280" width="180" height="80" rx="10" fill="url(#branch)" stroke="#d97706" stroke-width="2"/>
  <text x="460" y="304" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Sede B — Milano (HQ)</text>
  <rect x="410" y="318" width="100" height="32" rx="6" fill="#fff" stroke="#d97706" stroke-width="1.5"/>
  <text x="460" y="338" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Edge B</text>

  <rect x="680" y="280" width="180" height="80" rx="10" fill="url(#branch)" stroke="#d97706" stroke-width="2"/>
  <text x="770" y="304" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Sede C — Napoli</text>
  <rect x="720" y="318" width="100" height="32" rx="6" fill="#fff" stroke="#d97706" stroke-width="1.5"/>
  <text x="770" y="338" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Edge C</text>

  <!-- tunnel IPsec verdi tra edge (data plane) -->
  <path d="M 200 360 Q 305 420 410 360" stroke="#15803d" stroke-width="2" fill="none"/>
  <path d="M 510 360 Q 615 420 720 360" stroke="#15803d" stroke-width="2" fill="none"/>
  <path d="M 200 360 Q 460 460 720 360" stroke="#15803d" stroke-width="2" fill="none" stroke-dasharray="0"/>

  <text x="305" y="442" text-anchor="middle" font-size="10" fill="#14532d" font-weight="600">tunnel IPsec</text>
  <text x="615" y="442" text-anchor="middle" font-size="10" fill="#14532d" font-weight="600">tunnel IPsec</text>

  <!-- legenda data plane -->
  <text x="460" y="395" text-anchor="middle" font-size="11" fill="#15803d" font-style="italic" font-weight="600">data plane: tunnel diretti edge↔edge sopra Internet (full mesh)</text>
</svg>
