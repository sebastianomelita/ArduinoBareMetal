<svg viewBox="0 0 980 400" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .tit{font-size:14px;font-weight:700;fill:#202124}
    .h{font-size:12px;font-weight:700;fill:#202124}
    .sub{font-size:11px;fill:#5f6368}
    .panel{fill:#f8f9fa;stroke:#dadce0}
    .brk{fill:#ede7f6;stroke:#6a1b9a}
    .dev{fill:#e8f0fe;stroke:#1a73e8}
    .alarm{fill:#fce8e6;stroke:#d93025}
    .srv{fill:#e6f4ea;stroke:#137333}
    .q{fill:#fff;stroke:#6a1b9a}
    .out{stroke:#137333;stroke-width:3.5;fill:none;marker-end:url(#ag)}
    .in{stroke:#1565c0;stroke-width:3.5;fill:none;marker-end:url(#ab)}
    .wire{stroke:#9aa0a6;stroke-width:2;fill:none}
  </style>
  <defs>
    <marker id="ag" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#137333"/></marker>
    <marker id="ab" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#1565c0"/></marker>
  </defs>

  <text x="490" y="30" text-anchor="middle" class="tit" font-size="15">MQTT — due broker in bridge</text>

  <!-- CANTIERE -->
  <rect x="24" y="56" width="300" height="320" rx="12" class="panel" stroke-width="2"/>
  <text x="174" y="80" text-anchor="middle" class="h">CANTIERE</text>

  <rect x="48" y="96" width="252" height="44" rx="7" class="dev" stroke-width="1.5"/>
  <text x="174" y="113" text-anchor="middle" class="sub" font-weight="700">Sensori furto / incendio</text>
  <text x="174" y="130" text-anchor="middle" class="sub">Zigbee · Wi-Fi · Ethernet</text>
  <line x1="174" y1="140" x2="174" y2="176" class="wire"/>

  <rect x="74" y="176" width="200" height="96" rx="10" class="brk" stroke-width="2"/>
  <text x="174" y="202" text-anchor="middle" class="tit" font-size="13">Broker edge</text>
  <text x="174" y="220" text-anchor="middle" class="sub">store-and-forward</text>
  <rect x="104" y="234" width="18" height="20" rx="3" class="q"/>
  <rect x="128" y="234" width="18" height="20" rx="3" class="q"/>
  <rect x="152" y="234" width="18" height="20" rx="3" class="q"/>
  <text x="206" y="249" class="sub" fill="#6a1b9a">coda</text>

  <rect x="56" y="306" width="236" height="52" rx="8" class="alarm" stroke-width="1.5"/>
  <text x="174" y="328" text-anchor="middle" class="sub" font-weight="700">Sirena / notifica locale</text>
  <text x="174" y="345" text-anchor="middle" class="sub">allarme real-time</text>
  <line x1="174" y1="272" x2="174" y2="306" stroke="#d93025" stroke-width="2"/>

  <!-- SEDE -->
  <rect x="656" y="56" width="300" height="320" rx="12" class="panel" stroke-width="2"/>
  <text x="806" y="80" text-anchor="middle" class="h">SEDE</text>

  <rect x="706" y="176" width="200" height="96" rx="10" class="brk" stroke-width="2"/>
  <text x="806" y="208" text-anchor="middle" class="tit" font-size="13">Broker centrale</text>
  <text x="806" y="228" text-anchor="middle" class="sub">aggrega i cantieri</text>

  <rect x="680" y="300" width="252" height="64" rx="8" class="srv" stroke-width="1.5"/>
  <text x="806" y="322" text-anchor="middle" class="sub" font-weight="700">Sistema allarmi + log storico</text>
  <text x="806" y="340" text-anchor="middle" class="sub">sub: cantiere/+/+/+/+/alarm</text>
  <line x1="806" y1="272" x2="806" y2="300" stroke="#137333" stroke-width="2"/>

  <!-- BRIDGE -->
  <text x="490" y="150" text-anchor="middle" class="h">BRIDGE · canale mTLS</text>
  <path d="M278 196 L702 196" class="out"/>
  <text x="490" y="186" text-anchor="middle" class="sub" fill="#137333" font-weight="700">out ▸ dati / allarmi · QoS 1</text>
  <path d="M702 240 L278 240" class="in"/>
  <text x="490" y="262" text-anchor="middle" class="sub" fill="#1565c0" font-weight="700">in ◂ comandi …/cmd</text>

  <rect x="468" y="202" width="44" height="30" rx="6" fill="#fff" stroke="#6a1b9a"/>
  <text x="490" y="222" text-anchor="middle" class="sub" fill="#6a1b9a" font-weight="700">mTLS</text>

  <rect x="336" y="300" width="308" height="62" rx="9" fill="#fff8e1" stroke="#f9a825"/>
  <text x="490" y="322" text-anchor="middle" class="sub" font-weight="700" fill="#202124">link 4G/5G ⚡ se cade</text>
  <text x="490" y="339" text-anchor="middle" class="sub">edge continua (allarmi locali);</text>
  <text x="490" y="355" text-anchor="middle" class="sub">il bridge accoda e rispedisce alla riconnessione</text>
</svg>
