<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
  <style>
    .title{font-size:17px;font-weight:700;fill:#0f172a}
    .role{font-size:11px;font-weight:700;fill:#fff}
    .sub{font-size:11px;fill:#475569}
    .lbl{font-size:12px;font-weight:600;fill:#0f172a}
    .port{font-size:10px;font-weight:700;fill:#0f172a}
    .svc{font-size:11px;fill:#0f172a}
  </style>

  <text x="450" y="28" class="title" text-anchor="middle">CPE managed fornito alla struttura privata: hardware e servizi</text>
  <text x="450" y="48" class="sub" text-anchor="middle">configurato e gestito da remoto dalla società regionale (zero-touch provisioning)</text>

  <!-- Router body -->
  <rect x="270" y="110" width="360" height="180" rx="14" fill="#1e3a8a" stroke="#0f172a" stroke-width="2"/>
  <text x="450" y="138" class="role" text-anchor="middle" font-size="14">CPE MANAGED ROUTER</text>
  <text x="450" y="156" class="role" text-anchor="middle" font-size="10" font-weight="400">fascia SOHO/small enterprise</text>

  <!-- Porte sul pannello -->
  <!-- WAN fibra -->
  <rect x="295" y="185" width="80" height="55" rx="5" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
  <circle cx="335" cy="210" r="9" fill="#fff" stroke="#b45309" stroke-width="2"/>
  <text x="335" y="214" class="port" text-anchor="middle">SFP</text>
  <text x="335" y="235" class="port" text-anchor="middle" fill="#78350f">WAN</text>

  <!-- LAN ports -->
  <g>
    <rect x="400" y="185" width="35" height="55" rx="4" fill="#dbeafe" stroke="#1e40af" stroke-width="1.3"/>
    <rect x="410" y="192" width="15" height="18" fill="#1e40af"/>
    <text x="417" y="252" class="port" text-anchor="middle">LAN1</text>
  </g>
  <g>
    <rect x="440" y="185" width="35" height="55" rx="4" fill="#dbeafe" stroke="#1e40af" stroke-width="1.3"/>
    <rect x="450" y="192" width="15" height="18" fill="#1e40af"/>
    <text x="457" y="252" class="port" text-anchor="middle">LAN2</text>
  </g>
  <g>
    <rect x="480" y="185" width="35" height="55" rx="4" fill="#dbeafe" stroke="#1e40af" stroke-width="1.3"/>
    <rect x="490" y="192" width="15" height="18" fill="#1e40af"/>
    <text x="497" y="252" class="port" text-anchor="middle">LAN3</text>
  </g>
  <g>
    <rect x="520" y="185" width="35" height="55" rx="4" fill="#dbeafe" stroke="#1e40af" stroke-width="1.3"/>
    <rect x="530" y="192" width="15" height="18" fill="#1e40af"/>
    <text x="537" y="252" class="port" text-anchor="middle">LAN4</text>
  </g>

  <!-- Console / management -->
  <rect x="575" y="185" width="40" height="55" rx="4" fill="#ede9fe" stroke="#6d28d9" stroke-width="1.3"/>
  <rect x="585" y="195" width="20" height="8" fill="#6d28d9"/>
  <text x="595" y="252" class="port" text-anchor="middle" fill="#5b21b6">MGMT</text>

  <!-- Status LEDs -->
  <circle cx="298" cy="270" r="3" fill="#10b981"/>
  <circle cx="308" cy="270" r="3" fill="#10b981"/>
  <circle cx="318" cy="270" r="3" fill="#f59e0b"/>

  <!-- Etichetta hardware -->
  <text x="450" y="278" class="role" text-anchor="middle" font-size="9">CPU multicore • 1 GB RAM • crypto HW accel • TPM • ≥500 Mbps IPsec</text>

  <!-- WAN callout -->
  <rect x="40" y="110" width="220" height="140" rx="10" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
  <text x="55" y="130" class="lbl" fill="#78350f">Porta WAN (fibra)</text>
  <text x="55" y="150" class="sub">• SFP 1000BASE-LX (P2P) o</text>
  <text x="55" y="166" class="sub">  SFP GPON (rete condivisa)</text>
  <text x="55" y="186" class="sub">• IP statico su /29 (es. 10.100.5.8/29)</text>
  <text x="55" y="202" class="sub">• gateway = PE regionale</text>
  <text x="55" y="218" class="sub">• appartiene alla VRF sanità-priv</text>
  <text x="55" y="238" class="sub" font-weight="700">verso il PoP regionale</text>
  <line x1="260" y1="215" x2="295" y2="215" stroke="#b45309" stroke-width="2"/>

  <!-- LAN callout -->
  <rect x="640" y="110" width="230" height="140" rx="10" fill="#dbeafe" stroke="#1e40af" stroke-width="1.5"/>
  <text x="655" y="130" class="lbl" fill="#1e40af">Porte LAN (RJ45 gigabit)</text>
  <text x="655" y="150" class="sub">• IP nella LAN interna della</text>
  <text x="655" y="166" class="sub">  struttura (es. 192.168.1.254)</text>
  <text x="655" y="186" class="sub">• NAT verso la WAN</text>
  <text x="655" y="202" class="sub">• firewall stateful default-deny</text>
  <text x="655" y="222" class="sub" font-weight="700">verso i server/PC della struttura</text>
  <line x1="615" y1="215" x2="640" y2="215" stroke="#1e40af" stroke-width="2"/>

  <!-- Servizi configurati -->
  <rect x="40" y="305" width="820" height="140" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="55" y="325" class="lbl">⚙️  Servizi configurati sul CPE (tutti gestiti da remoto dalla società regionale):</text>

  <g transform="translate(55,340)">
    <rect x="0" y="0" width="195" height="22" rx="4" fill="#fee2e2"/>
    <text x="97" y="15" class="svc" text-anchor="middle" fill="#991b1b">🛡️ Firewall stateful default-deny</text>
  </g>
  <g transform="translate(260,340)">
    <rect x="0" y="0" width="195" height="22" rx="4" fill="#ede9fe"/>
    <text x="97" y="15" class="svc" text-anchor="middle" fill="#5b21b6">🔐 IPsec site-to-site verso DC</text>
  </g>
  <g transform="translate(465,340)">
    <rect x="0" y="0" width="195" height="22" rx="4" fill="#dbeafe"/>
    <text x="97" y="15" class="svc" text-anchor="middle" fill="#1e40af">📊 SNMP/syslog verso NMS</text>
  </g>
  <g transform="translate(670,340)">
    <rect x="0" y="0" width="195" height="22" rx="4" fill="#fef3c7"/>
    <text x="97" y="15" class="svc" text-anchor="middle" fill="#78350f">⏱️ NTP sincronizzato</text>
  </g>

  <g transform="translate(55,370)">
    <rect x="0" y="0" width="195" height="22" rx="4" fill="#ecfdf5"/>
    <text x="97" y="15" class="svc" text-anchor="middle" fill="#065f46">🎯 QoS / DSCP marking</text>
  </g>
  <g transform="translate(260,370)">
    <rect x="0" y="0" width="195" height="22" rx="4" fill="#fce7f3"/>
    <text x="97" y="15" class="svc" text-anchor="middle" fill="#9f1239">🔧 NETCONF/SSH mgmt</text>
  </g>
  <g transform="translate(465,370)">
    <rect x="0" y="0" width="195" height="22" rx="4" fill="#e0e7ff"/>
    <text x="97" y="15" class="svc" text-anchor="middle" fill="#3730a3">🌐 NAT (PAT) LAN→WAN</text>
  </g>
  <g transform="translate(670,370)">
    <rect x="0" y="0" width="195" height="22" rx="4" fill="#cffafe"/>
    <text x="97" y="15" class="svc" text-anchor="middle" fill="#155e75">📍 Routing statico DC</text>
  </g>

  <text x="55" y="420" class="sub">🔑 <tspan font-weight="700">Defense-in-depth</tspan>: al trasporto MPLS trusted si aggiunge una VPN IPsec untrusted sopra — dati sanitari cifrati anche in caso di</text>
  <text x="55" y="436" class="sub">misconfiguration dei PE. Il TPM custodisce le chiavi: fondamentale perché l'apparato è fisicamente in una sede non controllata.</text>
</svg>
