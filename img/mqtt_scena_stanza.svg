<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 550" role="img">
  <title>Scena fisica del soggiorno con dispositivi IoT</title>
  <desc>Pianta del soggiorno con pulsante a parete, display LED, lampada con attacco a vite E27, sensore ambientale di temperatura, scatolotto del server applicativo contenente pulsante virtuale e web app. Esterni alla stanza: smartphone con dashboard luci e temperatura, broker MQTT.</desc>
  <style>
    .th { font: 500 14px sans-serif; fill: #2C2C2A; }
    .ts { font: 400 12px sans-serif; fill: #444441; }
    .room { fill: #F5F5F0; stroke: #5C5852; stroke-width: 2; }
    .wall-plate { fill: #FAF8F2; stroke: #5C5852; stroke-width: 0.8; }
    .display-screen { fill: #2C2C2A; stroke: #1a1a18; stroke-width: 0.8; }
    .display-text { font: 600 16px ui-monospace, monospace; fill: #5DCAA5; }
    .temp-big { font: 600 20px ui-monospace, monospace; fill: #993C1D; }
    .server-box { fill: #FBF5E5; stroke: #9C7A1A; stroke-width: 1.2; }
    .module-box { fill: #FFFFFF; stroke: #9C7A1A; stroke-width: 0.8; stroke-dasharray: 4 3; }
    .broker-box { fill: #CECBF6; stroke: #534AB7; stroke-width: 0.8; }
    .phone-body { fill: #2C2C2A; stroke: #1a1a18; stroke-width: 1; }
    .phone-screen { fill: #FFFFFF; }
    .phone-header { fill: #3DA980; }
    .phone-text-h { font: 600 8px ui-monospace, monospace; fill: #FFFFFF; }
    .card-bg { fill: #F5F5F0; stroke: #888780; stroke-width: 0.4; }
    .card-title { font: 600 7px ui-monospace, monospace; fill: #444441; }
    .toggle-bg { fill: #5DCAA5; }
    .toggle-knob { fill: #FFFFFF; }
    .phone-text-on { font: 600 7px ui-monospace, monospace; fill: #5DCAA5; }
    .phone-text-mini { font: 400 5px ui-monospace, monospace; fill: #888780; }
    .phone-temp { font: 600 14px ui-monospace, monospace; fill: #993C1D; }
    .net-line { stroke: #888780; stroke-width: 0.6; stroke-dasharray: 4 3; fill: none; }
    .web-tile-screen { fill: #2C2C2A; }
    .web-tile-inner { fill: #3DA980; }
    .web-tile-header { font: 600 5px ui-monospace, monospace; fill: #FFFFFF; }
    .web-tile-toggle { fill: #FFFFFF; }
    .web-tile-knob { fill: #3DA980; }
  </style>
  <defs>
    <radialGradient id="bulb-glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FFE89C"/>
      <stop offset="60%" stop-color="#F4C24A"/>
      <stop offset="100%" stop-color="#C99422"/>
    </radialGradient>
    <radialGradient id="btn-cap" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#E8E2D6"/>
      <stop offset="100%" stop-color="#9C9489"/>
    </radialGradient>
    <linearGradient id="screw-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C9C2B5"/>
      <stop offset="50%" stop-color="#9C9489"/>
      <stop offset="100%" stop-color="#6E685E"/>
    </linearGradient>
    <linearGradient id="temp-merc" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#993C1D"/>
      <stop offset="100%" stop-color="#E66B43"/>
    </linearGradient>
  </defs>

  <rect class="room" x="40" y="60" width="440" height="450" rx="6"/>
  <text class="th" x="60" y="85">Soggiorno</text>

  <rect class="wall-plate" x="80" y="120" width="160" height="120" rx="6"/>
  <rect class="display-screen" x="100" y="142" width="50" height="50" rx="4"/>
  <text class="display-text" x="125" y="174" text-anchor="middle">ON</text>
  <text class="ts" x="125" y="210" text-anchor="middle">display</text>
  <circle cx="195" cy="167" r="22" fill="url(#btn-cap)" stroke="#5C5852" stroke-width="0.8"/>
  <circle cx="195" cy="167" r="14" fill="none" stroke="#5C5852" stroke-width="0.5" opacity="0.6"/>
  <text class="ts" x="195" y="210" text-anchor="middle">pulsante</text>
  <text class="ts" x="160" y="232" text-anchor="middle">dispositivo a parete</text>

  <circle cx="380" cy="150" r="28" fill="url(#bulb-glow)" stroke="#9C7A1A" stroke-width="0.8"/>
  <path d="M 365 173 Q 380 187 395 173" fill="none" stroke="#9C7A1A" stroke-width="0.8"/>
  <rect x="368" y="178" width="24" height="6" rx="1" fill="#7A7268" stroke="#5C5852" stroke-width="0.5"/>
  <rect x="368" y="184" width="24" height="32" fill="url(#screw-grad)" stroke="#5C5852" stroke-width="0.4"/>
  <path d="M 368 188 Q 380 192 392 188 M 368 194 Q 380 198 392 194 M 368 200 Q 380 204 392 200 M 368 206 Q 380 210 392 206 M 368 212 Q 380 216 392 212" fill="none" stroke="#3D3934" stroke-width="0.6"/>
  <polygon points="370,216 390,216 384,224 376,224" fill="#5C5852" stroke="#3D3934" stroke-width="0.4"/>
  <circle cx="380" cy="226" r="2" fill="#2C2C2A"/>
  <text class="th" x="380" y="245" text-anchor="middle">Lampada</text>
  <text class="ts" x="380" y="259" text-anchor="middle">attuatore</text>

  <g transform="translate(80, 280)">
    <rect class="wall-plate" x="0" y="0" width="160" height="78" rx="6"/>
    <circle cx="32" cy="20" r="9" fill="#FFFFFF" stroke="#5C5852" stroke-width="0.7"/>
    <rect x="29" y="20" width="6" height="38" fill="#FFFFFF" stroke="#5C5852" stroke-width="0.7"/>
    <rect x="30.5" y="22" width="3" height="34" fill="url(#temp-merc)"/>
    <circle cx="32" cy="58" r="6.5" fill="url(#temp-merc)" stroke="#5C5852" stroke-width="0.6"/>
    <text class="temp-big" x="100" y="32" text-anchor="middle">23 °C</text>
    <text class="ts" x="100" y="52" text-anchor="middle">Sensore</text>
    <text class="ts" x="100" y="66" text-anchor="middle">ambientale</text>
  </g>
  <text class="ts" x="160" y="375" text-anchor="middle">misure: temp, umidità, pressione</text>

  <rect class="server-box" x="80" y="395" width="360" height="100" rx="8"/>
  <text class="th" x="98" y="412">Server applicativo</text>
  <text class="ts" x="245" y="412">scatolotto / Raspberry / mini-PC</text>

  <rect class="module-box" x="100" y="422" width="155" height="62" rx="6"/>
  <circle cx="125" cy="453" r="14" fill="url(#btn-cap)" stroke="#9C7A1A" stroke-width="0.7" stroke-dasharray="2 2"/>
  <circle cx="125" cy="453" r="9" fill="none" stroke="#9C7A1A" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.6"/>
  <text class="th" x="170" y="450" text-anchor="middle">Pulsante</text>
  <text class="ts" x="170" y="465" text-anchor="middle">virtuale</text>

  <rect class="module-box" x="265" y="422" width="155" height="62" rx="6"/>
  <rect class="web-tile-screen" x="285" y="436" width="32" height="38" rx="3"/>
  <rect class="web-tile-inner" x="287" y="438" width="28" height="26" rx="1"/>
  <text class="web-tile-header" x="301" y="450" text-anchor="middle">LUCI</text>
  <rect class="web-tile-toggle" x="291" y="455" width="20" height="4" rx="2"/>
  <circle class="web-tile-knob" cx="307" cy="457" r="1.4"/>
  <text class="th" x="365" y="450" text-anchor="middle">Web app</text>
  <text class="ts" x="365" y="465" text-anchor="middle">browser</text>

  <rect class="broker-box" x="540" y="80" width="140" height="80" rx="8"/>
  <text class="th" x="610" y="108" text-anchor="middle">Broker MQTT</text>
  <text class="ts" x="610" y="128" text-anchor="middle">smista i messaggi</text>
  <text class="ts" x="610" y="146" text-anchor="middle">tra i dispositivi</text>

  <rect class="phone-body" x="555" y="240" width="110" height="280" rx="14"/>
  <rect class="phone-screen" x="563" y="258" width="94" height="244" rx="2"/>
  <rect class="phone-header" x="563" y="258" width="94" height="20" rx="2"/>
  <text class="phone-text-h" x="610" y="272" text-anchor="middle">Smart Home</text>

  <rect class="card-bg" x="571" y="288" width="78" height="92" rx="3"/>
  <text class="card-title" x="610" y="302" text-anchor="middle">Luci soggiorno</text>
  <rect class="toggle-bg" x="582" y="312" width="56" height="20" rx="10"/>
  <circle class="toggle-knob" cx="628" cy="322" r="7"/>
  <text class="phone-text-on" x="610" y="350" text-anchor="middle">ON</text>
  <rect x="582" y="358" width="56" height="14" rx="3" fill="none" stroke="#888780" stroke-width="0.4"/>
  <text class="phone-text-mini" x="610" y="368" text-anchor="middle">stato live</text>

  <rect class="card-bg" x="571" y="392" width="78" height="92" rx="3"/>
  <text class="card-title" x="610" y="406" text-anchor="middle">Temperatura</text>
  <g transform="translate(580, 416)">
    <circle cx="6" cy="6" r="5.5" fill="#FFFFFF" stroke="#993C1D" stroke-width="0.6"/>
    <rect x="4" y="6" width="4" height="22" fill="#FFFFFF" stroke="#993C1D" stroke-width="0.6"/>
    <rect x="5" y="7" width="2" height="20" fill="#993C1D"/>
    <circle cx="6" cy="28" r="4" fill="#993C1D" stroke="#993C1D" stroke-width="0.4"/>
  </g>
  <text class="phone-temp" x="625" y="436" text-anchor="middle">23 °C</text>
  <text class="phone-text-mini" x="625" y="450" text-anchor="middle">soggiorno</text>
  <rect x="582" y="460" width="56" height="14" rx="3" fill="none" stroke="#888780" stroke-width="0.4"/>
  <text class="phone-text-mini" x="610" y="470" text-anchor="middle">aggiornamento live</text>

  <rect x="600" y="508" width="20" height="8" rx="2" fill="none" stroke="#1a1a18" stroke-width="0.5"/>
  <text class="ts" x="610" y="535" text-anchor="middle">smartphone (utente remoto)</text>

  <line class="net-line" x1="480" y1="120" x2="538" y2="120"/>
  <text class="ts" x="509" y="113" text-anchor="middle">rete</text>

  <line class="net-line" x1="553" y1="380" x2="442" y2="380"/>
  <text class="ts" x="500" y="373" text-anchor="middle">Wi-Fi / web</text>
</svg>
