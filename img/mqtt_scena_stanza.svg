<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 500" role="img">
  <title>Scena fisica del soggiorno con dispositivi IoT</title>
  <desc>Pianta del soggiorno con pulsante a parete, display LED, lampada con attacco a vite E27, scatolotto del server applicativo contenente pulsante virtuale e web app. Esterni alla stanza: smartphone con mockup interfaccia e broker MQTT.</desc>
  <style>
    .th { font: 500 14px sans-serif; fill: #2C2C2A; }
    .ts { font: 400 12px sans-serif; fill: #444441; }
    .room { fill: #F5F5F0; stroke: #5C5852; stroke-width: 2; }
    .wall-plate { fill: #FAF8F2; stroke: #5C5852; stroke-width: 0.8; }
    .display-screen { fill: #2C2C2A; stroke: #1a1a18; stroke-width: 0.8; }
    .display-text { font: 600 16px ui-monospace, monospace; fill: #5DCAA5; }
    .server-box { fill: #FBF5E5; stroke: #9C7A1A; stroke-width: 1.2; }
    .module-box { fill: #FFFFFF; stroke: #9C7A1A; stroke-width: 0.8; stroke-dasharray: 4 3; }
    .broker-box { fill: #CECBF6; stroke: #534AB7; stroke-width: 0.8; }
    .phone-body { fill: #2C2C2A; stroke: #1a1a18; stroke-width: 1; }
    .phone-screen { fill: #FFFFFF; }
    .phone-header { fill: #3DA980; }
    .phone-text-h { font: 600 8px ui-monospace, monospace; fill: #FFFFFF; }
    .phone-text-b { font: 400 7px ui-monospace, monospace; fill: #444441; }
    .phone-text-on { font: 600 6px ui-monospace, monospace; fill: #5DCAA5; }
    .phone-text-mini { font: 400 5px ui-monospace, monospace; fill: #888780; }
    .toggle-bg { fill: #5DCAA5; }
    .toggle-knob { fill: #FFFFFF; }
    .net-line { stroke: #888780; stroke-width: 0.6; stroke-dasharray: 4 3; fill: none; }
    .web-tile-screen { fill: #2C2C2A; }
    .web-tile-inner { fill: #3DA980; }
    .web-tile-header { font: 600 6px ui-monospace, monospace; fill: #FFFFFF; }
    .web-tile-toggle { fill: #FFFFFF; }
    .web-tile-knob { fill: #3DA980; }
    .web-tile-status { font: 400 5px ui-monospace, monospace; fill: #FFFFFF; }
  </style>
  <defs>
    <radialGradient id="bulb-glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FFE89C"/>
      <stop offset="60%" stop-color="#F4C24A"/>
      <stop offset="100%" stop-color="#C99422"/>
    </radialGradient>
    <radialGradient id="btn-cap" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#E8E2D6"/>
      <stop offset="100%" stop-color="#9C9489"/>
    </radialGradient>
    <linearGradient id="screw-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C9C2B5"/>
      <stop offset="50%" stop-color="#9C9489"/>
      <stop offset="100%" stop-color="#6E685E"/>
    </linearGradient>
  </defs>

  <rect class="room" x="40" y="60" width="440" height="400" rx="6"/>
  <text class="th" x="60" y="85">Soggiorno</text>

  <rect class="wall-plate" x="80" y="120" width="160" height="120" rx="6"/>
  <rect class="display-screen" x="100" y="142" width="50" height="50" rx="4"/>
  <text class="display-text" x="125" y="174" text-anchor="middle">ON</text>
  <text class="ts" x="125" y="210" text-anchor="middle">display</text>
  <circle cx="195" cy="167" r="22" fill="url(#btn-cap)" stroke="#5C5852" stroke-width="0.8"/>
  <circle cx="195" cy="167" r="14" fill="none" stroke="#5C5852" stroke-width="0.5" opacity="0.6"/>
  <text class="ts" x="195" y="210" text-anchor="middle">pulsante</text>
  <text class="ts" x="160" y="232" text-anchor="middle">dispositivo a parete</text>

  <circle cx="380" cy="150" r="28" fill="url(#bulb-glow)" stroke="#9C7A1A" stroke-width="0.8"/>
  <path d="M 365 173 Q 380 187 395 173" fill="none" stroke="#9C7A1A" stroke-width="0.8"/>
  <rect x="368" y="178" width="24" height="6" rx="1" fill="#7A7268" stroke="#5C5852" stroke-width="0.5"/>
  <rect x="368" y="184" width="24" height="32" fill="url(#screw-grad)" stroke="#5C5852" stroke-width="0.4"/>
  <path d="M 368 188 Q 380 192 392 188 M 368 194 Q 380 198 392 194 M 368 200 Q 380 204 392 200 M 368 206 Q 380 210 392 206 M 368 212 Q 380 216 392 212" fill="none" stroke="#3D3934" stroke-width="0.6"/>
  <polygon points="370,216 390,216 384,224 376,224" fill="#5C5852" stroke="#3D3934" stroke-width="0.4"/>
  <circle cx="380" cy="226" r="2" fill="#2C2C2A"/>
  <text class="th" x="380" y="245" text-anchor="middle">Lampada</text>
  <text class="ts" x="380" y="259" text-anchor="middle">attuatore</text>

  <rect class="server-box" x="80" y="285" width="360" height="160" rx="8"/>
  <text class="th" x="98" y="305">Server applicativo</text>
  <text class="ts" x="245" y="305">scatolotto / Raspberry / mini-PC</text>

  <rect class="module-box" x="100" y="320" width="155" height="110" rx="6"/>
  <circle cx="177" cy="358" r="20" fill="url(#btn-cap)" stroke="#9C7A1A" stroke-width="0.7" stroke-dasharray="2 2"/>
  <circle cx="177" cy="358" r="13" fill="none" stroke="#9C7A1A" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.6"/>
  <text class="th" x="177" y="402" text-anchor="middle">Pulsante virtuale</text>
  <text class="ts" x="177" y="418" text-anchor="middle">imita un pulsante reale</text>

  <rect class="module-box" x="265" y="320" width="155" height="110" rx="6"/>
  <rect class="web-tile-screen" x="318" y="335" width="48" height="56" rx="5"/>
  <rect class="web-tile-inner" x="321" y="339" width="42" height="40" rx="2"/>
  <text class="web-tile-header" x="342" y="354" text-anchor="middle">LUCI</text>
  <rect class="web-tile-toggle" x="327" y="360" width="30" height="6" rx="3"/>
  <circle class="web-tile-knob" cx="352" cy="363" r="2"/>
  <text class="web-tile-status" x="342" y="375" text-anchor="middle">on</text>
  <text class="th" x="342" y="402" text-anchor="middle">Web app</text>
  <text class="ts" x="342" y="418" text-anchor="middle">interfaccia per smartphone</text>

  <rect class="broker-box" x="540" y="80" width="140" height="80" rx="8"/>
  <text class="th" x="610" y="108" text-anchor="middle">Broker MQTT</text>
  <text class="ts" x="610" y="128" text-anchor="middle">smista i messaggi</text>
  <text class="ts" x="610" y="146" text-anchor="middle">tra i dispositivi</text>

  <rect class="phone-body" x="565" y="290" width="90" height="160" rx="14"/>
  <rect class="phone-screen" x="572" y="308" width="76" height="124" rx="2"/>
  <rect class="phone-header" x="572" y="308" width="76" height="20" rx="2"/>
  <text class="phone-text-h" x="610" y="322" text-anchor="middle">Smart Home</text>
  <text class="phone-text-b" x="610" y="345" text-anchor="middle">Luci soggiorno</text>
  <rect class="toggle-bg" x="582" y="355" width="56" height="20" rx="10"/>
  <circle class="toggle-knob" cx="628" cy="365" r="7"/>
  <text class="phone-text-on" x="610" y="392" text-anchor="middle">ON</text>
  <rect x="582" y="405" width="56" height="14" rx="3" fill="none" stroke="#888780" stroke-width="0.4"/>
  <text class="phone-text-mini" x="610" y="415" text-anchor="middle">stato live</text>
  <rect x="600" y="438" width="20" height="8" rx="2" fill="none" stroke="#1a1a18" stroke-width="0.5"/>
  <text class="ts" x="610" y="475" text-anchor="middle">smartphone (utente remoto)</text>

  <line class="net-line" x1="480" y1="120" x2="538" y2="120"/>
  <text class="ts" x="509" y="113" text-anchor="middle">rete</text>

  <line class="net-line" x1="563" y1="370" x2="442" y2="370"/>
  <text class="ts" x="500" y="363" text-anchor="middle">Wi-Fi / web</text>
</svg>
