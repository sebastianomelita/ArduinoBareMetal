<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1565c0"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e65100"/>
    </marker>
  </defs>

  <!-- Titolo -->
  <text x="450" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">
    Flusso MQTT di un attuatore: comandi, stato (feedback) e configurazione
  </text>

  <!-- Pulsante / Sensore di comando -->
  <rect x="30" y="70" width="180" height="100" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="120" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#0d47a1">Pulsante</text>
  <text x="120" y="120" text-anchor="middle" font-size="12" fill="#0d47a1">(sensore di comando)</text>
  <text x="120" y="142" text-anchor="middle" font-size="11" fill="#333">publisher su comandi</text>
  <text x="120" y="158" text-anchor="middle" font-size="11" fill="#333">subscriber su stato</text>

  <!-- Display associato -->
  <rect x="30" y="200" width="180" height="80" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="120" y="228" text-anchor="middle" font-size="14" font-weight="bold" fill="#0d47a1">Display</text>
  <text x="120" y="248" text-anchor="middle" font-size="11" fill="#333">subscriber su stato</text>
  <text x="120" y="264" text-anchor="middle" font-size="11" fill="#333">(verifica del comando)</text>

  <!-- Server applicativo -->
  <rect x="30" y="320" width="180" height="100" rx="10" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
  <text x="120" y="350" text-anchor="middle" font-size="14" font-weight="bold" fill="#bf360c">Server applicativo</text>
  <text x="120" y="372" text-anchor="middle" font-size="11" fill="#333">publisher su config</text>
  <text x="120" y="388" text-anchor="middle" font-size="11" fill="#333">subscriber su stato</text>
  <text x="120" y="404" text-anchor="middle" font-size="11" fill="#333">(pannello di controllo)</text>

  <!-- Broker MQTT -->
  <rect x="350" y="160" width="200" height="220" rx="12" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2.5"/>
  <text x="450" y="190" text-anchor="middle" font-size="15" font-weight="bold" fill="#4a148c">Broker MQTT</text>

  <!-- Topic comando -->
  <rect x="370" y="208" width="160" height="38" rx="6" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="450" y="225" text-anchor="middle" font-size="11" font-weight="bold" fill="#0d47a1">topic comandi</text>
  <text x="450" y="240" text-anchor="middle" font-size="10" fill="#333">luci/soggiorno/comandi</text>

  <!-- Topic stato -->
  <rect x="370" y="254" width="160" height="38" rx="6" fill="#fff" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="450" y="271" text-anchor="middle" font-size="11" font-weight="bold" fill="#1b5e20">topic stato (feedback)</text>
  <text x="450" y="286" text-anchor="middle" font-size="10" fill="#333">luci/soggiorno/stato</text>

  <!-- Topic config -->
  <rect x="370" y="300" width="160" height="38" rx="6" fill="#fff" stroke="#e65100" stroke-width="1.5"/>
  <text x="450" y="317" text-anchor="middle" font-size="11" font-weight="bold" fill="#bf360c">topic configurazione</text>
  <text x="450" y="332" text-anchor="middle" font-size="10" fill="#333">luci/soggiorno/config</text>

  <!-- Attuatore -->
  <rect x="690" y="180" width="180" height="180" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2.5"/>
  <text x="780" y="210" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b5e20">Attuatore</text>
  <text x="780" y="228" text-anchor="middle" font-size="11" fill="#333">(relè, motore, lampada)</text>
  <line x1="710" y1="240" x2="850" y2="240" stroke="#2e7d32" stroke-dasharray="3,3"/>
  <text x="780" y="258" text-anchor="middle" font-size="11" fill="#333">subscriber su comandi</text>
  <text x="780" y="276" text-anchor="middle" font-size="11" fill="#333">subscriber su config</text>
  <text x="780" y="294" text-anchor="middle" font-size="11" fill="#333">publisher su stato</text>
  <line x1="710" y1="306" x2="850" y2="306" stroke="#2e7d32" stroke-dasharray="3,3"/>
  <text x="780" y="326" text-anchor="middle" font-size="10" fill="#333">device_id: "01"</text>
  <text x="780" y="344" text-anchor="middle" font-size="10" fill="#333">pin: GPIO 5</text>

  <!-- FRECCE -->

  <!-- 1. Pulsante -> broker (comando) -->
  <path d="M 210 110 Q 290 110, 370 215" stroke="#1565c0" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="240" y="100" font-size="10" fill="#0d47a1" font-weight="bold">1. comando</text>
  <text x="240" y="113" font-size="9" fill="#0d47a1">{"toggle":"true"}</text>

  <!-- 2. broker -> attuatore (comando) -->
  <path d="M 530 225 Q 610 215, 690 215" stroke="#1565c0" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="570" y="208" font-size="10" fill="#0d47a1" font-weight="bold">2. consegna</text>

  <!-- 3. attuatore -> broker (stato, feedback) -->
  <path d="M 690 275 Q 610 275, 530 273" stroke="#2e7d32" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="568" y="296" font-size="10" fill="#1b5e20" font-weight="bold">3. feedback</text>

  <!-- 4. broker -> display (stato) -->
  <path d="M 370 273 Q 290 273, 210 245" stroke="#2e7d32" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="232" y="260" font-size="10" fill="#1b5e20" font-weight="bold">4. stato</text>
  <text x="232" y="273" font-size="9" fill="#1b5e20">{"state":"on"}</text>

  <!-- 4b. broker -> server (stato) -->
  <path d="M 370 285 Q 290 320, 210 360" stroke="#2e7d32" stroke-width="2" fill="none" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>
  <text x="232" y="335" font-size="10" fill="#1b5e20">4b. stato (anche al server)</text>

  <!-- 5. server -> broker (config) -->
  <path d="M 210 370 Q 290 370, 370 320" stroke="#e65100" stroke-width="2" fill="none" marker-end="url(#arrowOrange)"/>
  <text x="232" y="388" font-size="10" fill="#bf360c" font-weight="bold">5. config</text>
  <text x="232" y="401" font-size="9" fill="#bf360c">{"stateperiod":"3000"}</text>

  <!-- 6. broker -> attuatore (config) -->
  <path d="M 530 320 Q 610 330, 690 330" stroke="#e65100" stroke-width="2" fill="none" marker-end="url(#arrowOrange)"/>
  <text x="568" y="348" font-size="10" fill="#bf360c" font-weight="bold">6. consegna config</text>

  <!-- Pubblicazione PUSH periodica (sotto) -->
  <rect x="270" y="450" width="380" height="60" rx="8" fill="#fffde7" stroke="#f9a825" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="460" y="472" text-anchor="middle" font-size="12" font-weight="bold" fill="#5d4037">
    Pubblicazione PUSH periodica dello stato
  </text>
  <text x="460" y="490" text-anchor="middle" font-size="10" fill="#5d4037">
    L'attuatore ripubblica autonomamente lo stato ogni state_period ms,
  </text>
  <text x="460" y="503" text-anchor="middle" font-size="10" fill="#5d4037">
    per risincronizzare pannelli che si fossero persi un feedback.
  </text>

  <!-- Linea che collega attuatore al riquadro PUSH -->
  <path d="M 780 360 Q 780 410, 650 480" stroke="#f9a825" stroke-width="1.5" fill="none" stroke-dasharray="3,3"/>

  <!-- Legenda colori -->
  <g transform="translate(30,530)">
    <line x1="0" y1="0" x2="25" y2="0" stroke="#1565c0" stroke-width="2.5"/>
    <text x="30" y="4" font-size="10" fill="#333">comando</text>
    <line x1="105" y1="0" x2="130" y2="0" stroke="#2e7d32" stroke-width="2.5"/>
    <text x="135" y="4" font-size="10" fill="#333">stato/feedback</text>
    <line x1="225" y1="0" x2="250" y2="0" stroke="#e65100" stroke-width="2.5"/>
    <text x="255" y="4" font-size="10" fill="#333">configurazione</text>
  </g>
</svg>
