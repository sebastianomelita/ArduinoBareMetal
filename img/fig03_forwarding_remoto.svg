<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 360" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <marker id="arrflow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#15803d"/>
    </marker>
  </defs>

  <!-- linea backbone -->
  <line x1="120" y1="200" x2="820" y2="200" stroke="#cbd5e1" stroke-width="3"/>

  <!-- nodi -->
  <g>
    <circle cx="80" cy="200" r="28" fill="#fef3c7" stroke="#d97706" stroke-width="2.5"/>
    <text x="80" y="205" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">CE-A</text>
  </g>
  <g>
    <circle cx="220" cy="200" r="32" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2.5"/>
    <text x="220" y="198" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">PE1</text>
    <text x="220" y="214" text-anchor="middle" font-size="9" fill="#1e40af">ingress</text>
  </g>
  <g>
    <circle cx="380" cy="200" r="28" fill="#fff" stroke="#475569" stroke-width="2"/>
    <text x="380" y="205" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">P1</text>
  </g>
  <g>
    <circle cx="540" cy="200" r="28" fill="#fff" stroke="#475569" stroke-width="2"/>
    <text x="540" y="200" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">P2</text>
    <text x="540" y="214" text-anchor="middle" font-size="9" fill="#475569">PHP</text>
  </g>
  <g>
    <circle cx="700" cy="200" r="32" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2.5"/>
    <text x="700" y="198" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">PE2</text>
    <text x="700" y="214" text-anchor="middle" font-size="9" fill="#1e40af">egress</text>
  </g>
  <g>
    <circle cx="850" cy="200" r="28" fill="#fef3c7" stroke="#d97706" stroke-width="2.5"/>
    <text x="850" y="205" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">CE-B</text>
  </g>

  <!-- pacchetti sopra le tratte -->
  <!-- tratta 1: CE-A -> PE1, IP puro -->
  <g transform="translate(120,130)">
    <rect width="70" height="32" rx="5" fill="#fff" stroke="#15803d" stroke-width="1.5"/>
    <text x="35" y="21" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">IP</text>
  </g>

  <!-- tratta 2: PE1 -> P1, [T=100][V=5012][IP] -->
  <g transform="translate(265,118)">
    <rect width="44" height="22" rx="4" fill="#fde68a" stroke="#d97706" stroke-width="1.3"/>
    <text x="22" y="16" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">T:100</text>
    <rect x="44" width="44" height="22" rx="4" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="1.3"/>
    <text x="66" y="16" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">V:5012</text>
    <rect x="88" width="36" height="22" rx="4" fill="#fff" stroke="#15803d" stroke-width="1.3"/>
    <text x="106" y="16" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">IP</text>
  </g>

  <!-- tratta 3: P1 -> P2, [T=200][V=5012][IP] -->
  <g transform="translate(425,118)">
    <rect width="44" height="22" rx="4" fill="#fde68a" stroke="#d97706" stroke-width="1.3"/>
    <text x="22" y="16" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">T:200</text>
    <rect x="44" width="44" height="22" rx="4" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="1.3"/>
    <text x="66" y="16" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">V:5012</text>
    <rect x="88" width="36" height="22" rx="4" fill="#fff" stroke="#15803d" stroke-width="1.3"/>
    <text x="106" y="16" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">IP</text>
  </g>

  <!-- tratta 4: P2 -> PE2, [V=5012][IP] (PHP) -->
  <g transform="translate(595,118)">
    <rect width="44" height="22" rx="4" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="1.3"/>
    <text x="22" y="16" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">V:5012</text>
    <rect x="44" width="36" height="22" rx="4" fill="#fff" stroke="#15803d" stroke-width="1.3"/>
    <text x="62" y="16" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">IP</text>
  </g>

  <!-- tratta 5: PE2 -> CE-B, IP puro -->
  <g transform="translate(745,130)">
    <rect width="70" height="32" rx="5" fill="#fff" stroke="#15803d" stroke-width="1.5"/>
    <text x="35" y="21" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">IP</text>
  </g>

  <!-- frecce di flusso sotto -->
  <line x1="115" y1="240" x2="815" y2="240" stroke="#15803d" stroke-width="2" marker-end="url(#arrflow)"/>
  <text x="465" y="232" text-anchor="middle" font-size="11" fill="#15803d" font-style="italic">flusso del pacchetto</text>

  <!-- annotazioni operazioni -->
  <text x="220" y="266" text-anchor="middle" font-size="10" fill="#1e3a8a">PUSH T+V</text>
  <text x="380" y="266" text-anchor="middle" font-size="10" fill="#334155">SWAP T</text>
  <text x="540" y="266" text-anchor="middle" font-size="10" fill="#334155">POP T</text>
  <text x="700" y="266" text-anchor="middle" font-size="10" fill="#1e3a8a">POP V → VRF</text>

  <!-- legenda colori -->
  <g transform="translate(120,300)">
    <rect width="18" height="14" rx="3" fill="#fde68a" stroke="#d97706" stroke-width="1"/>
    <text x="24" y="12" font-size="11" fill="#374151">T = label transport (cambia hop-by-hop)</text>
  </g>
  <g transform="translate(420,300)">
    <rect width="18" height="14" rx="3" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="1"/>
    <text x="24" y="12" font-size="11" fill="#374151">V = label VPN (invariata fino a PE2)</text>
  </g>
  <g transform="translate(720,300)">
    <rect width="18" height="14" rx="3" fill="#fff" stroke="#15803d" stroke-width="1"/>
    <text x="24" y="12" font-size="11" fill="#374151">IP = pacchetto cliente</text>
  </g>
</svg>
