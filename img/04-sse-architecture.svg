<svg viewBox="0 0 800 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <marker id="arrS" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#be185d"/>
    </marker>
    <marker id="arrSG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#15803d"/>
    </marker>
  </defs>

  <rect width="800" height="540" fill="#f8fafc"/>
  <text x="400" y="30" font-size="18" font-weight="700" text-anchor="middle" fill="#0f172a">Architettura SSE — Security Service Edge</text>
  <text x="400" y="50" font-size="12" text-anchor="middle" fill="#64748b">tutto il traffico passa dal "security stack as a service" su PoP cloud</text>

  <!-- LEFT: Users / branches -->
  <g transform="translate(30,90)">
    <text x="65" y="0" font-size="12" font-weight="700" text-anchor="middle" fill="#1e3a8a">SORGENTI</text>

    <rect x="0" y="15" width="130" height="55" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" rx="6"/>
    <text x="20" y="45" font-size="22">👤</text>
    <text x="85" y="38" font-size="10" font-weight="600" fill="#1e3a8a">Utenti remoti</text>
    <text x="85" y="52" font-size="8" fill="#1e40af">(agent locale)</text>

    <rect x="0" y="85" width="130" height="55" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" rx="6"/>
    <text x="20" y="115" font-size="22">🏢</text>
    <text x="85" y="108" font-size="10" font-weight="600" fill="#1e3a8a">Sedi / branch</text>
    <text x="85" y="122" font-size="8" fill="#1e40af">(IPsec o connector)</text>

    <rect x="0" y="155" width="130" height="55" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" rx="6"/>
    <text x="20" y="185" font-size="22">📱</text>
    <text x="85" y="178" font-size="10" font-weight="600" fill="#1e3a8a">Mobile</text>
    <text x="85" y="192" font-size="8" fill="#1e40af">(app SSE)</text>

    <rect x="0" y="225" width="130" height="55" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" rx="6"/>
    <text x="20" y="255" font-size="22">🌐</text>
    <text x="85" y="248" font-size="10" font-weight="600" fill="#1e3a8a">Browser</text>
    <text x="85" y="262" font-size="8" fill="#1e40af">(clientless)</text>
  </g>

  <!-- Arrows in -->
  <path d="M 160 117 L 240 230" stroke="#be185d" stroke-width="2" marker-end="url(#arrS)"/>
  <path d="M 160 187 L 240 260" stroke="#be185d" stroke-width="2" marker-end="url(#arrS)"/>
  <path d="M 160 257 L 240 290" stroke="#be185d" stroke-width="2" marker-end="url(#arrS)"/>
  <path d="M 160 327 L 240 320" stroke="#be185d" stroke-width="2" marker-end="url(#arrS)"/>

  <!-- CENTRAL: SSE Cloud (PoP) -->
  <g>
    <rect x="250" y="120" width="300" height="280" fill="#fce7f3" stroke="#be185d" stroke-width="3" rx="14"/>
    <text x="400" y="148" font-size="14" font-weight="700" text-anchor="middle" fill="#831843">SSE CLOUD PLATFORM</text>
    <text x="400" y="165" font-size="10" text-anchor="middle" fill="#9d174d" font-style="italic">PoP globali (single-pass inspection)</text>

    <!-- Security modules pipeline -->
    <rect x="270" y="185" width="80" height="35" fill="#fff" stroke="#ec4899" stroke-width="1.5" rx="4"/>
    <text x="310" y="200" font-size="10" font-weight="700" text-anchor="middle" fill="#831843">ZTNA</text>
    <text x="310" y="213" font-size="8" text-anchor="middle" fill="#9d174d">app private</text>

    <rect x="360" y="185" width="80" height="35" fill="#fff" stroke="#ec4899" stroke-width="1.5" rx="4"/>
    <text x="400" y="200" font-size="10" font-weight="700" text-anchor="middle" fill="#831843">SWG</text>
    <text x="400" y="213" font-size="8" text-anchor="middle" fill="#9d174d">filtro web</text>

    <rect x="450" y="185" width="80" height="35" fill="#fff" stroke="#ec4899" stroke-width="1.5" rx="4"/>
    <text x="490" y="200" font-size="10" font-weight="700" text-anchor="middle" fill="#831843">CASB</text>
    <text x="490" y="213" font-size="8" text-anchor="middle" fill="#9d174d">controllo SaaS</text>

    <rect x="270" y="235" width="80" height="35" fill="#fff" stroke="#ec4899" stroke-width="1.5" rx="4"/>
    <text x="310" y="250" font-size="10" font-weight="700" text-anchor="middle" fill="#831843">FWaaS</text>
    <text x="310" y="263" font-size="8" text-anchor="middle" fill="#9d174d">firewall L3-L7</text>

    <rect x="360" y="235" width="80" height="35" fill="#fff" stroke="#ec4899" stroke-width="1.5" rx="4"/>
    <text x="400" y="250" font-size="10" font-weight="700" text-anchor="middle" fill="#831843">DLP</text>
    <text x="400" y="263" font-size="8" text-anchor="middle" fill="#9d174d">data loss prev.</text>

    <rect x="450" y="235" width="80" height="35" fill="#fff" stroke="#ec4899" stroke-width="1.5" rx="4"/>
    <text x="490" y="250" font-size="10" font-weight="700" text-anchor="middle" fill="#831843">RBI</text>
    <text x="490" y="263" font-size="8" text-anchor="middle" fill="#9d174d">browser isolation</text>

    <rect x="315" y="285" width="80" height="35" fill="#fff" stroke="#ec4899" stroke-width="1.5" rx="4"/>
    <text x="355" y="300" font-size="10" font-weight="700" text-anchor="middle" fill="#831843">DNS sec</text>
    <text x="355" y="313" font-size="8" text-anchor="middle" fill="#9d174d">filtering DNS</text>

    <rect x="405" y="285" width="80" height="35" fill="#fff" stroke="#ec4899" stroke-width="1.5" rx="4"/>
    <text x="445" y="300" font-size="10" font-weight="700" text-anchor="middle" fill="#831843">Threat prev.</text>
    <text x="445" y="313" font-size="8" text-anchor="middle" fill="#9d174d">sandboxing</text>

    <!-- Identity/policy core -->
    <rect x="295" y="340" width="210" height="40" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" rx="5"/>
    <text x="400" y="358" font-size="11" font-weight="700" text-anchor="middle" fill="#78350f">Identity + Policy Engine</text>
    <text x="400" y="372" font-size="8" text-anchor="middle" fill="#92400e">SSO · posture · context-aware</text>
  </g>

  <!-- RIGHT: Destinations -->
  <g transform="translate(640,90)">
    <text x="65" y="0" font-size="12" font-weight="700" text-anchor="middle" fill="#14532d">DESTINAZIONI</text>

    <rect x="0" y="15" width="130" height="55" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" rx="6"/>
    <text x="20" y="45" font-size="22">🌍</text>
    <text x="85" y="38" font-size="10" font-weight="600" fill="#14532d">Internet</text>
    <text x="85" y="52" font-size="8" fill="#15803d">siti web</text>

    <rect x="0" y="85" width="130" height="55" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" rx="6"/>
    <text x="20" y="115" font-size="22">☁️</text>
    <text x="85" y="108" font-size="10" font-weight="600" fill="#14532d">App SaaS</text>
    <text x="85" y="122" font-size="8" fill="#15803d">M365, Salesforce</text>

    <rect x="0" y="155" width="130" height="55" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" rx="6"/>
    <text x="20" y="185" font-size="22">🔒</text>
    <text x="85" y="178" font-size="10" font-weight="600" fill="#14532d">App private</text>
    <text x="85" y="192" font-size="8" fill="#15803d">VPC, on-prem</text>

    <rect x="0" y="225" width="130" height="55" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" rx="6"/>
    <text x="20" y="255" font-size="22">🏭</text>
    <text x="85" y="248" font-size="10" font-weight="600" fill="#14532d">Datacenter</text>
    <text x="85" y="262" font-size="8" fill="#15803d">legacy</text>
  </g>

  <!-- Arrows out -->
  <path d="M 555 230 L 635 117" stroke="#15803d" stroke-width="2" marker-end="url(#arrSG)"/>
  <path d="M 555 260 L 635 187" stroke="#15803d" stroke-width="2" marker-end="url(#arrSG)"/>
  <path d="M 555 290 L 635 257" stroke="#15803d" stroke-width="2" marker-end="url(#arrSG)"/>
  <path d="M 555 320 L 635 327" stroke="#15803d" stroke-width="2" marker-end="url(#arrSG)"/>

  <!-- Bottom: key concept -->
  <rect x="80" y="430" width="640" height="90" fill="#fff" stroke="#cbd5e1" stroke-width="1.5" rx="6"/>
  <text x="400" y="453" font-size="12" font-weight="700" text-anchor="middle" fill="#0f172a">Concetto chiave: tutto il traffico fa "hairpin" sul cloud SSE</text>
  <text x="400" y="475" font-size="10" text-anchor="middle" fill="#475569">Ogni richiesta — verso Internet, SaaS o app private — viene intercettata e ispezionata dallo stack security</text>
  <text x="400" y="491" font-size="10" text-anchor="middle" fill="#475569">"single-pass": una sola ispezione applica in pipeline tutti i moduli (ZTNA + SWG + CASB + DLP...)</text>
  <text x="400" y="510" font-size="9" text-anchor="middle" fill="#64748b" font-style="italic">Vendor: Zscaler, Netskope, Palo Alto Prisma Access, Cloudflare One, Cisco Umbrella+</text>
</svg>
