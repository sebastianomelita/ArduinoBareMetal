<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: system-ui, -apple-system, sans-serif; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; }
  .tl { font-size: 11px; font-weight: 400; }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text class="th" x="340" y="24" text-anchor="middle" fill="#2C2C2A">Ripristino manuale di una VM da NAS centralizzato</text>

<!-- FASE 1 -->
<rect x="40" y="44" width="120" height="26" rx="6" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="ts" x="100" y="60" text-anchor="middle" dominant-baseline="central" fill="#791F1F">Fase 1: guasto</text>

<rect x="60" y="84" width="130" height="70" rx="10" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="ts" x="125" y="106" text-anchor="middle" dominant-baseline="central" fill="#791F1F">Nodo A</text>
<text class="tl" x="125" y="124" text-anchor="middle" dominant-baseline="central" fill="#A32D2D">GUASTO o VM corrotta</text>

<rect x="260" y="84" width="130" height="70" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="325" y="106" text-anchor="middle" dominant-baseline="central" fill="#085041">Nodo B</text>
<text class="tl" x="325" y="124" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Operativo</text>

<line x1="125" y1="154" x2="125" y2="180" stroke="#A32D2D" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="325" y1="154" x2="325" y2="180" stroke="#0F6E56" stroke-width="1" stroke-dasharray="4 3"/>

<rect x="140" y="175" width="160" height="36" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="220" y="196" text-anchor="middle" dominant-baseline="central" fill="#633806">NAS (NFS / iSCSI)</text>
<text class="tl" x="220" y="224" text-anchor="middle" fill="#633806">Il disco della VM è QUI, intatto</text>

<text class="tl" x="500" y="100" text-anchor="start" fill="#5F5E5A">Il nodo A è guasto o la VM</text>
<text class="tl" x="500" y="116" text-anchor="start" fill="#5F5E5A">al suo interno è corrotta.</text>
<text class="tl" x="500" y="132" text-anchor="start" fill="#5F5E5A">Il disco della VM sul NAS</text>
<text class="tl" x="500" y="148" text-anchor="start" fill="#5F5E5A">è integro e accessibile.</text>

<!-- FASE 2 -->
<rect x="40" y="250" width="210" height="26" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="145" y="266" text-anchor="middle" dominant-baseline="central" fill="#633806">Fase 2: il sistemista interviene</text>

<rect x="60" y="290" width="130" height="50" rx="10" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="ts" x="125" y="310" text-anchor="middle" dominant-baseline="central" fill="#791F1F">Nodo A</text>
<text class="tl" x="125" y="326" text-anchor="middle" dominant-baseline="central" fill="#A32D2D">GUASTO</text>

<rect x="260" y="290" width="130" height="50" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="325" y="310" text-anchor="middle" dominant-baseline="central" fill="#085041">Nodo B</text>
<text class="tl" x="325" y="326" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Operativo</text>

<rect x="140" y="360" width="160" height="36" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="220" y="381" text-anchor="middle" dominant-baseline="central" fill="#633806">NAS (NFS / iSCSI)</text>

<line x1="325" y1="340" x2="285" y2="360" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>

<text class="tl" x="500" y="290" text-anchor="start" fill="#5F5E5A">1. Accede alla GUI Proxmox</text>
<text class="tl" x="500" y="308" text-anchor="start" fill="#5F5E5A">2. Crea una nuova VM su Nodo B</text>
<text class="tl" x="500" y="326" text-anchor="start" fill="#5F5E5A">3. Punta il disco della nuova VM</text>
<text class="tl" x="500" y="344" text-anchor="start" fill="#5F5E5A">   al volume sul NAS (già lì)</text>
<text class="tl" x="500" y="362" text-anchor="start" fill="#5F5E5A">4. Avvia la VM su Nodo B</text>

<!-- FASE 3 -->
<rect x="40" y="410" width="175" height="26" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text class="ts" x="127" y="426" text-anchor="middle" dominant-baseline="central" fill="#27500A">Fase 3: servizio ripristinato</text>

<rect x="60" y="450" width="130" height="50" rx="10" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="ts" x="125" y="470" text-anchor="middle" dominant-baseline="central" fill="#791F1F">Nodo A</text>
<text class="tl" x="125" y="486" text-anchor="middle" dominant-baseline="central" fill="#A32D2D">GUASTO</text>

<rect x="260" y="450" width="130" height="50" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="325" y="465" text-anchor="middle" dominant-baseline="central" fill="#085041">Nodo B</text>
<text class="tl" x="325" y="481" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">VM attiva qui</text>

<line x1="325" y1="500" x2="285" y2="520" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="140" y="520" width="160" height="36" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="220" y="541" text-anchor="middle" dominant-baseline="central" fill="#633806">NAS (NFS / iSCSI)</text>

<text class="tl" x="500" y="455" text-anchor="start" fill="#5F5E5A">La VM gira su Nodo B e accede</text>
<text class="tl" x="500" y="473" text-anchor="start" fill="#5F5E5A">allo stesso disco sul NAS.</text>
<text class="tl" x="500" y="491" text-anchor="start" fill="#5F5E5A">Nessun dato perso (RPO = 0).</text>
<text class="tl" x="500" y="509" text-anchor="start" fill="#5F5E5A">Downtime = tempo di intervento</text>
<text class="tl" x="500" y="527" text-anchor="start" fill="#5F5E5A">del sistemista (minuti-ore).</text>

<rect x="40" y="575" width="600" height="30" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="tl" x="340" y="593" text-anchor="middle" dominant-baseline="central" fill="#633806">Procedura MANUALE — il sistemista deve intervenire, non c'è automazione</text>
</svg>