<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Fattore di diffusione per bit in LoRa</title>
  <desc>Diagramma che mostra la catena logica: chirp → simbolo → chip → bit, con la formula 2^SF/SF e tabella SF7-SF12</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- sfondo -->
  <rect width="680" height="620" fill="#ffffff"/>

  <!-- ── RIGA 1: spettrogramma ── -->
  <text x="340" y="28" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">La pendenza è fissa: il chirp percorre sempre tutta la banda B</text>
  <rect x="60" y="40" width="560" height="80" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="68" y="58" font-family="sans-serif" font-size="12" fill="#5F5E5A">Spettrogramma</text>
  <line x1="100" y1="112" x2="580" y2="48" stroke="#EF9F27" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="88" y1="48" x2="88" y2="112" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <text x="76" y="84" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">B</text>
  <line x1="100" y1="124" x2="580" y2="124" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <text x="340" y="138" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">durata di 1 simbolo = SF bit</text>

  <!-- freccia -->
  <line x1="340" y1="152" x2="340" y2="178" stroke="#B4B2A9" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── RIGA 2: simbolo ── -->
  <text x="340" y="196" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">Un simbolo contiene…</text>

  <!-- SF bit -->
  <rect x="80" y="208" width="220" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="190" y="233" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">SF bit</text>
  <text x="190" y="252" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#534AB7">es. 7 bit con SF7</text>

  <!-- = -->
  <text x="340" y="242" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="500" fill="#888780">=</text>

  <!-- 2^SF chip -->
  <rect x="380" y="208" width="220" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="490" y="233" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">2^SF chip</text>
  <text x="490" y="252" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F6E56">es. 128 chip con SF7</text>

  <!-- frecce giù -->
  <line x1="190" y1="264" x2="190" y2="308" stroke="#B4B2A9" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="264" x2="490" y2="308" stroke="#B4B2A9" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── RIGA 3: formula ── -->
  <text x="340" y="298" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">Quindi ogni bit è rappresentato da…</text>
  <rect x="200" y="312" width="280" height="60" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="340" y="337" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13">2^SF / SF  chip per bit</text>
  <text x="340" y="357" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#993C1D">fattore di diffusione per bit</text>

  <!-- freccia -->
  <line x1="340" y1="372" x2="340" y2="398" stroke="#B4B2A9" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── RIGA 4: tabella ── -->
  <text x="340" y="416" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">Cresce quasi esponenzialmente con SF:</text>

  <!-- intestazione tabella -->
  <rect x="80" y="424" width="520" height="32" rx="4" fill="#D3D1C7" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="160" y="444" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">SF</text>
  <text x="300" y="444" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">chip/simbolo (2^SF)</text>
  <text x="490" y="444" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">chip/bit (2^SF / SF)</text>

  <!-- SF7 -->
  <rect x="80" y="456" width="520" height="28" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="160" y="474" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#2C2C2A">7</text>
  <text x="300" y="474" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#2C2C2A">128</text>
  <text x="490" y="474" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#2C2C2A">≈ 18</text>

  <!-- SF8 -->
  <rect x="80" y="484" width="520" height="28" fill="#ffffff" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="160" y="502" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#2C2C2A">8</text>
  <text x="300" y="502" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#2C2C2A">256</text>
  <text x="490" y="502" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#2C2C2A">32</text>

  <!-- SF9 -->
  <rect x="80" y="512" width="520" height="28" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="160" y="530" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#2C2C2A">9</text>
  <text x="300" y="530" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#2C2C2A">512</text>
  <text x="490" y="530" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#2C2C2A">≈ 57</text>

  <!-- SF10 -->
  <rect x="80" y="540" width="520" height="28" fill="#ffffff" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="160" y="558" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#2C2C2A">10</text>
  <text x="300" y="558" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#2C2C2A">1024</text>
  <text x="490" y="558" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#2C2C2A">≈ 102</text>

  <!-- SF11 -->
  <rect x="80" y="568" width="520" height="28" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="160" y="586" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#2C2C2A">11</text>
  <text x="300" y="586" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#2C2C2A">2048</text>
  <text x="490" y="586" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#2C2C2A">≈ 186</text>

  <!-- SF12 evidenziato -->
  <rect x="80" y="596" width="520" height="28" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="160" y="614" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13">12</text>
  <text x="300" y="614" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13">4096</text>
  <text x="490" y="614" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13">≈ 341</text>
</svg>
