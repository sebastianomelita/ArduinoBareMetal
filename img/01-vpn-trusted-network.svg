<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <marker id="arr1" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#475569"/>
    </marker>
    <marker id="arrRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="800" height="500" fill="#f8fafc"/>
  <text x="400" y="32" font-size="18" font-weight="700" text-anchor="middle" fill="#0f172a">Architettura VPN classica / Trusted Network</text>
  <text x="400" y="52" font-size="12" text-anchor="middle" fill="#64748b">modello perimetrale "castello e fossato"</text>

  <!-- INTERNET ZONE -->
  <rect x="30" y="80" width="200" height="380" fill="#fef2f2" stroke="#fca5a5" stroke-width="2" stroke-dasharray="6,3" rx="8"/>
  <text x="130" y="105" font-size="12" font-weight="700" text-anchor="middle" fill="#991b1b">INTERNET (untrusted)</text>

  <!-- Remote users -->
  <g transform="translate(60,130)">
    <rect width="60" height="50" fill="#fff" stroke="#dc2626" stroke-width="1.5" rx="6"/>
    <text x="30" y="30" font-size="22" text-anchor="middle">👤</text>
    <text x="30" y="45" font-size="9" text-anchor="middle">Remoto</text>
  </g>
  <g transform="translate(140,130)">
    <rect width="60" height="50" fill="#fff" stroke="#dc2626" stroke-width="1.5" rx="6"/>
    <text x="30" y="30" font-size="22" text-anchor="middle">💻</text>
    <text x="30" y="45" font-size="9" text-anchor="middle">Smart work</text>
  </g>
  <g transform="translate(60,205)">
    <rect width="60" height="50" fill="#fff" stroke="#dc2626" stroke-width="1.5" rx="6"/>
    <text x="30" y="30" font-size="22" text-anchor="middle">📱</text>
    <text x="30" y="45" font-size="9" text-anchor="middle">Mobile</text>
  </g>

  <!-- Threats -->
  <g transform="translate(140,210)">
    <circle cx="30" cy="25" r="22" fill="#fee2e2" stroke="#b91c1c" stroke-width="1.5"/>
    <text x="30" y="32" font-size="20" text-anchor="middle">🦠</text>
  </g>
  <g transform="translate(60,290)">
    <circle cx="30" cy="25" r="22" fill="#fee2e2" stroke="#b91c1c" stroke-width="1.5"/>
    <text x="30" y="32" font-size="20" text-anchor="middle">⚠️</text>
  </g>
  <g transform="translate(140,290)">
    <circle cx="30" cy="25" r="22" fill="#fee2e2" stroke="#b91c1c" stroke-width="1.5"/>
    <text x="30" y="32" font-size="20" text-anchor="middle">🎣</text>
  </g>
  <text x="130" y="365" font-size="10" text-anchor="middle" fill="#991b1b" font-style="italic">minacce esterne</text>

  <!-- VPN CONCENTRATOR / FW -->
  <g transform="translate(260,260)">
    <rect width="90" height="80" fill="#fde68a" stroke="#b45309" stroke-width="2" rx="6"/>
    <text x="45" y="28" font-size="11" font-weight="700" text-anchor="middle" fill="#78350f">VPN gateway</text>
    <text x="45" y="44" font-size="11" font-weight="700" text-anchor="middle" fill="#78350f">+ Firewall</text>
    <text x="45" y="64" font-size="22" text-anchor="middle">🛡️</text>
    <text x="45" y="75" font-size="8" text-anchor="middle" fill="#78350f">perimetro</text>
  </g>
  <text x="305" y="365" font-size="9" text-anchor="middle" fill="#78350f">single point</text>
  <text x="305" y="377" font-size="9" text-anchor="middle" fill="#78350f">of failure</text>

  <!-- VPN tunnels -->
  <path d="M 120 155 Q 200 200 260 290" stroke="#6366f1" stroke-width="3" fill="none"/>
  <path d="M 200 155 Q 240 220 260 295" stroke="#6366f1" stroke-width="3" fill="none"/>
  <path d="M 120 230 Q 200 250 260 300" stroke="#6366f1" stroke-width="3" fill="none"/>
  <text x="200" y="195" font-size="10" fill="#4338ca" font-weight="600">tunnel IPsec/SSL</text>

  <!-- TRUSTED NETWORK BOX -->
  <rect x="380" y="80" width="390" height="380" fill="#fef3c7" stroke="#d97706" stroke-width="2.5" rx="10"/>
  <text x="575" y="105" font-size="13" font-weight="700" text-anchor="middle" fill="#78350f">RETE AZIENDALE (trusted zone)</text>
  <text x="575" y="122" font-size="10" text-anchor="middle" fill="#92400e" font-style="italic">"se sei dentro, sei fidato"</text>

  <!-- Resources inside -->
  <g transform="translate(410,145)">
    <rect width="80" height="60" fill="#fff" stroke="#b45309" rx="5"/>
    <text x="40" y="32" font-size="22" text-anchor="middle">🖥️</text>
    <text x="40" y="52" font-size="10" text-anchor="middle" fill="#78350f">App Server</text>
  </g>
  <g transform="translate(510,145)">
    <rect width="80" height="60" fill="#fff" stroke="#b45309" rx="5"/>
    <text x="40" y="32" font-size="22" text-anchor="middle">💾</text>
    <text x="40" y="52" font-size="10" text-anchor="middle" fill="#78350f">Database</text>
  </g>
  <g transform="translate(610,145)">
    <rect width="80" height="60" fill="#fff" stroke="#b45309" rx="5"/>
    <text x="40" y="32" font-size="22" text-anchor="middle">📁</text>
    <text x="40" y="52" font-size="10" text-anchor="middle" fill="#78350f">File share</text>
  </g>
  <g transform="translate(710,145)">
    <rect width="55" height="60" fill="#fff" stroke="#b45309" rx="5"/>
    <text x="27" y="32" font-size="22" text-anchor="middle">📧</text>
    <text x="27" y="52" font-size="9" text-anchor="middle" fill="#78350f">Mail</text>
  </g>

  <g transform="translate(410,225)">
    <rect width="80" height="60" fill="#fff" stroke="#b45309" rx="5"/>
    <text x="40" y="32" font-size="22" text-anchor="middle">🖨️</text>
    <text x="40" y="52" font-size="10" text-anchor="middle" fill="#78350f">Printer</text>
  </g>
  <g transform="translate(510,225)">
    <rect width="80" height="60" fill="#fff" stroke="#b45309" rx="5"/>
    <text x="40" y="32" font-size="22" text-anchor="middle">🗄️</text>
    <text x="40" y="52" font-size="10" text-anchor="middle" fill="#78350f">Backup</text>
  </g>
  <g transform="translate(610,225)">
    <rect width="80" height="60" fill="#fff" stroke="#b45309" rx="5"/>
    <text x="40" y="32" font-size="22" text-anchor="middle">⚙️</text>
    <text x="40" y="52" font-size="10" text-anchor="middle" fill="#78350f">ERP</text>
  </g>
  <g transform="translate(710,225)">
    <rect width="55" height="60" fill="#fff" stroke="#b45309" rx="5"/>
    <text x="27" y="32" font-size="22" text-anchor="middle">🔧</text>
    <text x="27" y="52" font-size="9" text-anchor="middle" fill="#78350f">Admin</text>
  </g>

  <!-- Internal user -->
  <g transform="translate(420,320)">
    <rect width="70" height="55" fill="#fef3c7" stroke="#b45309" stroke-width="1.5" rx="5"/>
    <text x="35" y="30" font-size="22" text-anchor="middle">👨‍💼</text>
    <text x="35" y="48" font-size="9" text-anchor="middle" fill="#78350f">PC Mario</text>
  </g>

  <!-- Compromised endpoint -->
  <g transform="translate(550,320)">
    <rect width="70" height="55" fill="#fee2e2" stroke="#dc2626" stroke-width="2" rx="5"/>
    <text x="35" y="30" font-size="22" text-anchor="middle">💻</text>
    <text x="35" y="48" font-size="9" text-anchor="middle" fill="#991b1b">PC infetto</text>
  </g>

  <!-- Lateral movement -->
  <path d="M 620 335 Q 660 305 680 280" stroke="#dc2626" stroke-width="2.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrRed)"/>
  <path d="M 620 335 Q 580 280 530 215" stroke="#dc2626" stroke-width="2.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrRed)"/>
  <path d="M 620 335 Q 650 250 700 215" stroke="#dc2626" stroke-width="2.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrRed)"/>
  <text x="640" y="395" font-size="10" font-weight="700" text-anchor="middle" fill="#991b1b">⚠ movimento laterale libero</text>
  <text x="640" y="410" font-size="9" text-anchor="middle" fill="#991b1b" font-style="italic">una breccia → l'attaccante raggiunge ogni risorsa</text>

  <!-- VPN tunnel into network -->
  <path d="M 350 300 L 410 300" stroke="#6366f1" stroke-width="3" marker-end="url(#arr1)"/>

  <!-- Bottom legend -->
  <rect x="30" y="460" width="740" height="30" fill="#fff" stroke="#cbd5e1" rx="4"/>
  <text x="50" y="478" font-size="11" fill="#0f172a"><tspan font-weight="700">Punti deboli:</tspan> tunnel = accesso ampio · perimetro fisso · zero verifica continua · lateral movement possibile · perimetro evaporato col cloud/SaaS</text>
</svg>
