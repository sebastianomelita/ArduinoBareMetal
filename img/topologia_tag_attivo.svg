<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="floor2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef4f1"/>
      <stop offset="100%" stop-color="#d4e0d8"/>
    </linearGradient>
    <linearGradient id="wallG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bdc3c7"/>
      <stop offset="100%" stop-color="#95a5a6"/>
    </linearGradient>
    <!-- alone scanner: cono di copertura blu -->
    <radialGradient id="scancone" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#9b59b6" stop-opacity="0.32"/>
      <stop offset="60%" stop-color="#9b59b6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#9b59b6" stop-opacity="0"/>
    </radialGradient>
    <!-- alone tag: piccolo cerchio arancione -->
    <radialGradient id="tagpulse" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#e67e22" stop-opacity="0.65"/>
      <stop offset="60%" stop-color="#e67e22" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#e67e22" stop-opacity="0"/>
    </radialGradient>
    <filter id="drop2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="2" dy="3" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c0392b"/>
    </marker>
  </defs>

  <!-- ============ TITOLO ============ -->
  <rect width="1100" height="700" fill="#fafbfc"/>
  <text x="550" y="32" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a1a">
    Topologia a tag attivo (RTLS) – Reparto ospedaliero
  </text>
  <text x="550" y="54" text-anchor="middle" font-size="13" fill="#555" font-style="italic">
    I tag attivi trasmettono periodicamente; gli scanner fissi a soffitto li ascoltano e ne triangolano la posizione
  </text>

  <!-- ============ PAVIMENTO + PIANTA ============ -->
  <rect x="40" y="80" width="1020" height="560" fill="url(#floor2)" stroke="#7d8a85" stroke-width="1.5" rx="6"/>

  <!-- Pareti dei reparti (planimetria) -->
  <g stroke="#7f8c8d" stroke-width="3" fill="none">
    <!-- divisione verticale in 3 zone -->
    <line x1="380" y1="90" x2="380" y2="450"/>
    <line x1="720" y1="90" x2="720" y2="450"/>
    <!-- corridoio orizzontale -->
    <line x1="50" y1="450" x2="1050" y2="450"/>
    <!-- stanze sotto -->
    <line x1="280" y1="450" x2="280" y2="630"/>
    <line x1="540" y1="450" x2="540" y2="630"/>
    <line x1="820" y1="450" x2="820" y2="630"/>
  </g>
  <!-- aperture (porte) -->
  <g stroke="#fafbfc" stroke-width="5">
    <line x1="380" y1="280" x2="380" y2="320"/>
    <line x1="720" y1="280" x2="720" y2="320"/>
    <line x1="180" y1="450" x2="220" y2="450"/>
    <line x1="430" y1="450" x2="470" y2="450"/>
    <line x1="660" y1="450" x2="700" y2="450"/>
    <line x1="920" y1="450" x2="960" y2="450"/>
  </g>

  <!-- etichette reparti -->
  <text x="210" y="110" font-size="12" font-weight="bold" fill="#5a6677" letter-spacing="1">REPARTO A</text>
  <text x="540" y="110" font-size="12" font-weight="bold" fill="#5a6677" letter-spacing="1" text-anchor="middle">SALA OPERATORIA</text>
  <text x="870" y="110" font-size="12" font-weight="bold" fill="#5a6677" letter-spacing="1">REPARTO B</text>
  <text x="555" y="475" font-size="11" fill="#5a6677" font-style="italic" text-anchor="middle">corridoio</text>
  <text x="160" y="630" font-size="11" font-weight="bold" fill="#5a6677" text-anchor="middle">DEPOSITO FARMACI</text>
  <text x="410" y="630" font-size="11" font-weight="bold" fill="#5a6677" text-anchor="middle">DEPOSITO STRUMENTI</text>
  <text x="680" y="630" font-size="11" font-weight="bold" fill="#5a6677" text-anchor="middle">SALA D'ATTESA</text>
  <text x="940" y="630" font-size="11" font-weight="bold" fill="#5a6677" text-anchor="middle">UFFICIO</text>

  <!-- ============ SCANNER FISSI (a soffitto, distribuiti) ============ -->
  <!-- ognuno con cerchio di copertura morbido -->
  <g>
    <!-- Scanner 1: reparto A -->
    <ellipse cx="200" cy="240" rx="160" ry="140" fill="url(#scancone)"/>
    <g transform="translate(184, 224)" filter="url(#drop2)">
      <rect width="32" height="32" fill="#8e44ad" stroke="#5b2c75" stroke-width="1.5" rx="4"/>
      <circle cx="16" cy="16" r="9" fill="#bb8fce" stroke="#5b2c75" stroke-width="1"/>
      <circle cx="16" cy="16" r="4" fill="#5b2c75"/>
    </g>
    <text x="200" y="275" text-anchor="middle" font-size="9" font-weight="bold" fill="#5b2c75">SCAN-1</text>

    <!-- Scanner 2: sala operatoria -->
    <ellipse cx="540" cy="240" rx="160" ry="140" fill="url(#scancone)"/>
    <g transform="translate(524, 224)" filter="url(#drop2)">
      <rect width="32" height="32" fill="#8e44ad" stroke="#5b2c75" stroke-width="1.5" rx="4"/>
      <circle cx="16" cy="16" r="9" fill="#bb8fce" stroke="#5b2c75" stroke-width="1"/>
      <circle cx="16" cy="16" r="4" fill="#5b2c75"/>
    </g>
    <text x="540" y="275" text-anchor="middle" font-size="9" font-weight="bold" fill="#5b2c75">SCAN-2</text>

    <!-- Scanner 3: reparto B -->
    <ellipse cx="880" cy="240" rx="160" ry="140" fill="url(#scancone)"/>
    <g transform="translate(864, 224)" filter="url(#drop2)">
      <rect width="32" height="32" fill="#8e44ad" stroke="#5b2c75" stroke-width="1.5" rx="4"/>
      <circle cx="16" cy="16" r="9" fill="#bb8fce" stroke="#5b2c75" stroke-width="1"/>
      <circle cx="16" cy="16" r="4" fill="#5b2c75"/>
    </g>
    <text x="880" y="275" text-anchor="middle" font-size="9" font-weight="bold" fill="#5b2c75">SCAN-3</text>

    <!-- Scanner 4: corridoio sx -->
    <ellipse cx="200" cy="540" rx="150" ry="130" fill="url(#scancone)"/>
    <g transform="translate(184, 524)" filter="url(#drop2)">
      <rect width="32" height="32" fill="#8e44ad" stroke="#5b2c75" stroke-width="1.5" rx="4"/>
      <circle cx="16" cy="16" r="9" fill="#bb8fce" stroke="#5b2c75" stroke-width="1"/>
      <circle cx="16" cy="16" r="4" fill="#5b2c75"/>
    </g>
    <text x="200" y="575" text-anchor="middle" font-size="9" font-weight="bold" fill="#5b2c75">SCAN-4</text>

    <!-- Scanner 5: corridoio centro -->
    <ellipse cx="540" cy="540" rx="150" ry="130" fill="url(#scancone)"/>
    <g transform="translate(524, 524)" filter="url(#drop2)">
      <rect width="32" height="32" fill="#8e44ad" stroke="#5b2c75" stroke-width="1.5" rx="4"/>
      <circle cx="16" cy="16" r="9" fill="#bb8fce" stroke="#5b2c75" stroke-width="1"/>
      <circle cx="16" cy="16" r="4" fill="#5b2c75"/>
    </g>
    <text x="540" y="575" text-anchor="middle" font-size="9" font-weight="bold" fill="#5b2c75">SCAN-5</text>

    <!-- Scanner 6: corridoio dx -->
    <ellipse cx="880" cy="540" rx="150" ry="130" fill="url(#scancone)"/>
    <g transform="translate(864, 524)" filter="url(#drop2)">
      <rect width="32" height="32" fill="#8e44ad" stroke="#5b2c75" stroke-width="1.5" rx="4"/>
      <circle cx="16" cy="16" r="9" fill="#bb8fce" stroke="#5b2c75" stroke-width="1"/>
      <circle cx="16" cy="16" r="4" fill="#5b2c75"/>
    </g>
    <text x="880" y="575" text-anchor="middle" font-size="9" font-weight="bold" fill="#5b2c75">SCAN-6</text>
  </g>

  <!-- ============ TAG ATTIVI MOBILI ============ -->

  <!-- Tag 1: paziente con braccialetto in sala d'attesa (in movimento) -->
  <g transform="translate(660, 530)">
    <ellipse cx="0" cy="0" rx="45" ry="45" fill="url(#tagpulse)"/>
    <!-- omino paziente -->
    <circle cx="0" cy="-10" r="8" fill="#f5cba7" stroke="#a04000" stroke-width="1.2"/>
    <path d="M -10 0 Q 0 -2 10 0 L 10 18 Q 0 22 -10 18 Z" fill="#5dade2" stroke="#1f5f8b" stroke-width="1.2"/>
    <!-- braccialetto giallo con tag -->
    <rect x="6" y="6" width="9" height="6" fill="#f1c40f" stroke="#7d6608" stroke-width="0.8" rx="1"/>
    <text x="0" y="36" text-anchor="middle" font-size="8" fill="#5b2c75" font-weight="bold">paziente</text>
  </g>
  <!-- freccia movimento paziente verso reparto B -->
  <path d="M 690 525 Q 770 470 850 470" stroke="#c0392b" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow2)" opacity="0.85"/>

  <!-- Tag 2: defibrillatore in corridoio -->
  <g transform="translate(420, 540)">
    <ellipse cx="0" cy="0" rx="40" ry="40" fill="url(#tagpulse)"/>
    <rect x="-14" y="-12" width="28" height="22" fill="#e74c3c" stroke="#922b21" stroke-width="1.2" rx="2"/>
    <path d="M -8 -2 L -3 -2 L -1 -7 L 3 5 L 5 -2 L 9 -2" stroke="#fff" stroke-width="1.5" fill="none"/>
    <rect x="6" y="6" width="9" height="6" fill="#f1c40f" stroke="#7d6608" stroke-width="0.8" rx="1"/>
    <text x="0" y="32" text-anchor="middle" font-size="8" fill="#5b2c75" font-weight="bold">defibrillatore</text>
  </g>

  <!-- Tag 3: medico in reparto A -->
  <g transform="translate(280, 250)">
    <ellipse cx="0" cy="0" rx="40" ry="40" fill="url(#tagpulse)"/>
    <circle cx="0" cy="-10" r="8" fill="#f5cba7" stroke="#a04000" stroke-width="1.2"/>
    <path d="M -10 0 Q 0 -2 10 0 L 10 18 Q 0 22 -10 18 Z" fill="#fff" stroke="#34495e" stroke-width="1.2"/>
    <!-- stetoscopio (linea) -->
    <path d="M -3 4 Q -7 10 -3 14" stroke="#34495e" stroke-width="1.5" fill="none"/>
    <rect x="6" y="6" width="9" height="6" fill="#f1c40f" stroke="#7d6608" stroke-width="0.8" rx="1"/>
    <text x="0" y="34" text-anchor="middle" font-size="8" fill="#5b2c75" font-weight="bold">medico</text>
  </g>

  <!-- Tag 4: pompa infusione sala operatoria -->
  <g transform="translate(620, 220)">
    <ellipse cx="0" cy="0" rx="38" ry="38" fill="url(#tagpulse)"/>
    <rect x="-12" y="-14" width="24" height="26" fill="#16a085" stroke="#0e6655" stroke-width="1.2" rx="2"/>
    <rect x="-9" y="-10" width="18" height="6" fill="#1abc9c"/>
    <circle cx="0" cy="2" r="3" fill="#fff"/>
    <rect x="6" y="6" width="9" height="6" fill="#f1c40f" stroke="#7d6608" stroke-width="0.8" rx="1"/>
    <text x="0" y="30" text-anchor="middle" font-size="8" fill="#5b2c75" font-weight="bold">pompa infus.</text>
  </g>

  <!-- Tag 5: carrello strumenti deposito -->
  <g transform="translate(420, 555)">
    <!-- spostiamo a 145, 555 in deposito strumenti -->
  </g>
  <g transform="translate(120, 555)">
    <ellipse cx="0" cy="0" rx="38" ry="38" fill="url(#tagpulse)"/>
    <rect x="-15" y="-12" width="30" height="20" fill="#7f8c8d" stroke="#34495e" stroke-width="1.2" rx="1"/>
    <circle cx="-9" cy="11" r="3" fill="#34495e"/>
    <circle cx="9" cy="11" r="3" fill="#34495e"/>
    <rect x="6" y="-8" width="9" height="6" fill="#f1c40f" stroke="#7d6608" stroke-width="0.8" rx="1"/>
    <text x="0" y="30" text-anchor="middle" font-size="8" fill="#5b2c75" font-weight="bold">carrello</text>
  </g>

  <!-- ============ LINEE DI ASCOLTO (tag-> scanner multipli per trilaterazione) ============ -->
  <!-- dal paziente verso 3 scanner -->
  <g stroke="#e67e22" stroke-width="1.3" stroke-dasharray="3,3" fill="none" opacity="0.7">
    <line x1="660" y1="530" x2="540" y2="540"/>
    <line x1="660" y1="530" x2="880" y2="540"/>
    <line x1="660" y1="530" x2="540" y2="240"/>
  </g>

  <!-- evidenza trilaterazione (testo) -->
  <text x="690" y="510" font-size="9" fill="#a04000" font-style="italic">tag attivo trasmette beacon → ascoltato da 3 scanner</text>

  <!-- ============ INFRASTRUTTURA: GATEWAY + SERVER RTLS ============ -->
  <!-- linee Ethernet/PoE che convergono dagli scanner al gateway -->
  <g stroke="#27ae60" stroke-width="1.5" fill="none" stroke-dasharray="5,3" opacity="0.55">
    <path d="M 200 224 Q 200 100 530 90"/>
    <path d="M 540 224 Q 540 100 545 90"/>
    <path d="M 880 224 Q 880 100 560 90"/>
    <path d="M 200 524 Q 100 500 80 95"/>
    <path d="M 540 524 Q 540 500 540 95"/>
    <path d="M 880 524 Q 1000 500 1020 95"/>
  </g>

  <!-- Cloud / server RTLS in alto -->
  <g transform="translate(880, 80)">
    <!-- spostato fuori vista, lo metto dentro cornice in basso -->
  </g>

  <!-- Gateway / server posizionato in basso-destra fuori dal piano (rettangolo dedicato) -->

  <!-- aggiungiamo un'area infrastruttura sotto -->

  <!-- ============ Etichette aggiuntive ============ -->
  <!-- mostriamo che il tag è "active" con piccola indicazione -->
  <g transform="translate(60, 95)">
    <rect width="100" height="55" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="4" opacity="0.9"/>
    <text x="50" y="15" text-anchor="middle" font-size="9" font-weight="bold" fill="#2c3e50">TAG ATTIVO</text>
    <rect x="35" y="20" width="30" height="18" fill="#f39c12" stroke="#7d6608" stroke-width="1" rx="2"/>
    <circle cx="50" cy="29" r="2.5" fill="#27ae60"/>
    <text x="50" y="50" text-anchor="middle" font-size="7" fill="#7f8c8d" font-style="italic">batteria + radio</text>
  </g>

  <!-- Mini box "RTLS server" in alto a destra -->
  <g transform="translate(950, 95)" filter="url(#drop2)">
    <rect width="100" height="55" fill="#2c3e50" stroke="#1a252f" stroke-width="1.5" rx="4"/>
    <rect x="6" y="6" width="88" height="14" fill="#34495e"/>
    <circle cx="14" cy="13" r="2" fill="#2ecc71"/>
    <circle cx="22" cy="13" r="2" fill="#2ecc71"/>
    <text x="50" y="35" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">SERVER RTLS</text>
    <text x="50" y="46" text-anchor="middle" font-size="8" fill="#bdc3c7">trilaterazione</text>
  </g>

  <!-- ============ LEGENDA ============ -->
  <g transform="translate(50, 660)">
    <rect width="22" height="16" fill="#8e44ad" stroke="#5b2c75" rx="2"/>
    <text x="30" y="12" font-size="10" fill="#2c3e50">scanner fisso (listener)</text>

    <ellipse cx="183" cy="8" rx="14" ry="8" fill="url(#scancone)"/>
    <text x="205" y="12" font-size="10" fill="#2c3e50">copertura scanner</text>

    <rect x="320" y="3" width="14" height="10" fill="#f39c12" stroke="#7d6608" rx="1"/>
    <circle cx="327" cy="8" r="1.5" fill="#27ae60"/>
    <text x="342" y="12" font-size="10" fill="#2c3e50">tag attivo (mobile)</text>

    <line x1="450" y1="8" x2="490" y2="8" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="495" y="12" font-size="10" fill="#2c3e50">beacon RF del tag</text>

    <line x1="600" y1="8" x2="640" y2="8" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="645" y="12" font-size="10" fill="#2c3e50">Ethernet/PoE → server RTLS</text>

    <line x1="830" y1="8" x2="858" y2="8" stroke="#c0392b" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow2)"/>
    <text x="868" y="12" font-size="10" fill="#2c3e50">spostamento del tag</text>
  </g>
</svg>
