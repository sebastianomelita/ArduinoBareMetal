<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: system-ui, -apple-system, sans-serif; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; }
  .tl { font-size: 11px; font-weight: 400; }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<!-- Title -->
<text class="th" x="340" y="24" text-anchor="middle" fill="#2C2C2A">LB singolo (SPOF) vs LB ridondato</text>

<!-- LEFT: single LB = SPOF -->
<text class="ts" x="140" y="52" text-anchor="middle" fill="#791F1F">LB singolo</text>

<rect x="70" y="64" width="140" height="36" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text class="ts" x="140" y="85" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Utenti</text>

<line x1="140" y1="100" x2="140" y2="130" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="60" y="130" width="160" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="ts" x="140" y="148" text-anchor="middle" dominant-baseline="central" fill="#791F1F">HAProxy (unico)</text>
<text class="tl" x="140" y="164" text-anchor="middle" dominant-baseline="central" fill="#A32D2D">SPOF</text>

<line x1="100" y1="174" x2="80" y2="210" stroke="#A32D2D" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="140" y1="174" x2="140" y2="210" stroke="#A32D2D" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="180" y1="174" x2="200" y2="210" stroke="#A32D2D" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="40" y="210" width="60" height="36" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="70" y="231" text-anchor="middle" dominant-baseline="central" fill="#085041">VM 1</text>
<rect x="110" y="210" width="60" height="36" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="140" y="231" text-anchor="middle" dominant-baseline="central" fill="#085041">VM 2</text>
<rect x="180" y="210" width="60" height="36" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="210" y="231" text-anchor="middle" dominant-baseline="central" fill="#085041">VM 3</text>

<rect x="50" y="270" width="180" height="26" rx="6" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="tl" x="140" y="286" text-anchor="middle" dominant-baseline="central" fill="#791F1F">Se HAProxy cade, tutto fermo</text>

<!-- Separator -->
<rect x="278" y="50" width="1" height="260" fill="#D3D1C7" opacity="0.5"/>

<!-- RIGHT: redundant LB -->
<text class="ts" x="480" y="52" text-anchor="middle" fill="#27500A">LB ridondato</text>

<rect x="410" y="64" width="140" height="36" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text class="ts" x="480" y="85" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Utenti</text>

<line x1="480" y1="100" x2="480" y2="130" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="400" y="130" width="160" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="480" y="148" text-anchor="middle" dominant-baseline="central" fill="#3C3489">VIP (Keepalived)</text>
<text class="tl" x="480" y="164" text-anchor="middle" dominant-baseline="central" fill="#534AB7">IP flottante condiviso</text>

<line x1="440" y1="174" x2="400" y2="210" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="520" y1="174" x2="560" y2="210" stroke="#534AB7" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

<rect x="330" y="210" width="140" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="400" y="228" text-anchor="middle" dominant-baseline="central" fill="#085041">HAProxy 1</text>
<text class="tl" x="400" y="244" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">ATTIVO</text>

<rect x="490" y="210" width="140" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text class="ts" x="560" y="228" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">HAProxy 2</text>
<text class="tl" x="560" y="244" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">STANDBY</text>

<line x1="370" y1="254" x2="350" y2="290" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="400" y1="254" x2="430" y2="290" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="430" y1="254" x2="510" y2="290" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="310" y="290" width="60" height="36" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="340" y="311" text-anchor="middle" dominant-baseline="central" fill="#085041">VM 1</text>
<rect x="400" y="290" width="60" height="36" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="430" y="311" text-anchor="middle" dominant-baseline="central" fill="#085041">VM 2</text>
<rect x="480" y="290" width="60" height="36" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="510" y="311" text-anchor="middle" dominant-baseline="central" fill="#085041">VM 3</text>

<rect x="350" y="350" width="260" height="26" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text class="tl" x="480" y="366" text-anchor="middle" dominant-baseline="central" fill="#27500A">Se HAProxy 1 cade, VIP passa a HAProxy 2</text>

<!-- Bottom explanation -->
<rect x="40" y="410" width="600" height="56" rx="8" fill="none" stroke="#D3D1C7" stroke-width="0.5"/>
<text class="ts" x="340" y="432" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Come funziona il VIP con Keepalived</text>
<text class="tl" x="340" y="452" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">I due HAProxy si scambiano heartbeat. Il VIP è assegnato all'attivo. Se l'attivo non risponde, il VIP si sposta sullo standby in 2-5 secondi.</text>
</svg>