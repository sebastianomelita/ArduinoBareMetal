<svg viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <marker id="arr2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1e40af"/>
    </marker>
    <marker id="arrG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#15803d"/>
    </marker>
    <marker id="arrO" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#b45309"/>
    </marker>
  </defs>

  <rect width="800" height="520" fill="#f8fafc"/>
  <text x="400" y="32" font-size="18" font-weight="700" text-anchor="middle" fill="#0f172a">Zero Trust Architecture (modello NIST SP 800-207)</text>
  <text x="400" y="52" font-size="12" text-anchor="middle" fill="#64748b">separazione control plane / data plane · verifica continua per ogni accesso</text>

  <!-- USER side -->
  <g transform="translate(40,140)">
    <rect width="120" height="200" fill="#dbeafe" stroke="#2563eb" stroke-width="2" rx="8"/>
    <text x="60" y="22" font-size="12" font-weight="700" text-anchor="middle" fill="#1e3a8a">SUBJECT</text>
    <text x="60" y="60" font-size="30" text-anchor="middle">👤</text>
    <text x="60" y="80" font-size="10" text-anchor="middle" fill="#1e40af">Utente</text>
    <text x="60" y="115" font-size="26" text-anchor="middle">💻</text>
    <text x="60" y="135" font-size="10" text-anchor="middle" fill="#1e40af">Device</text>
    <line x1="15" y1="150" x2="105" y2="150" stroke="#93c5fd" stroke-dasharray="2,2"/>
    <text x="60" y="170" font-size="9" text-anchor="middle" fill="#1e40af">identità +</text>
    <text x="60" y="183" font-size="9" text-anchor="middle" fill="#1e40af">posture + contesto</text>
  </g>

  <!-- PEP (Policy Enforcement Point) - data plane -->
  <g transform="translate(330,200)">
    <rect width="140" height="100" fill="#fef3c7" stroke="#b45309" stroke-width="2.5" rx="8"/>
    <text x="70" y="22" font-size="11" font-weight="700" text-anchor="middle" fill="#78350f">PEP</text>
    <text x="70" y="36" font-size="9" text-anchor="middle" fill="#92400e">Policy Enforcement</text>
    <text x="70" y="48" font-size="9" text-anchor="middle" fill="#92400e">Point</text>
    <text x="70" y="74" font-size="26" text-anchor="middle">🚦</text>
    <text x="70" y="92" font-size="9" text-anchor="middle" fill="#78350f" font-style="italic">data plane</text>
  </g>

  <!-- Request arrow user → PEP -->
  <path d="M 160 240 L 325 245" stroke="#1e40af" stroke-width="2.5" marker-end="url(#arr2)"/>
  <text x="240" y="232" font-size="11" font-weight="600" fill="#1e40af">1. richiesta accesso</text>

  <!-- CONTROL PLANE box -->
  <g transform="translate(295,30)">
    <rect width="220" height="140" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6,3" rx="8"/>
    <text x="110" y="22" font-size="12" font-weight="700" text-anchor="middle" fill="#5b21b6">CONTROL PLANE</text>

    <!-- PDP -->
    <rect x="15" y="38" width="90" height="85" fill="#fff" stroke="#7c3aed" stroke-width="1.5" rx="5"/>
    <text x="60" y="55" font-size="10" font-weight="700" text-anchor="middle" fill="#5b21b6">PDP</text>
    <text x="60" y="68" font-size="8" text-anchor="middle" fill="#6d28d9">Policy Decision</text>
    <text x="60" y="78" font-size="8" text-anchor="middle" fill="#6d28d9">Point</text>
    <text x="60" y="100" font-size="20" text-anchor="middle">🧠</text>
    <text x="60" y="116" font-size="8" text-anchor="middle" fill="#5b21b6">decide</text>

    <!-- PA -->
    <rect x="115" y="38" width="90" height="85" fill="#fff" stroke="#7c3aed" stroke-width="1.5" rx="5"/>
    <text x="160" y="55" font-size="10" font-weight="700" text-anchor="middle" fill="#5b21b6">PA</text>
    <text x="160" y="68" font-size="8" text-anchor="middle" fill="#6d28d9">Policy</text>
    <text x="160" y="78" font-size="8" text-anchor="middle" fill="#6d28d9">Administrator</text>
    <text x="160" y="100" font-size="20" text-anchor="middle">📋</text>
    <text x="160" y="116" font-size="8" text-anchor="middle" fill="#5b21b6">orchestra</text>
  </g>

  <!-- Control plane → PEP (down) -->
  <path d="M 400 170 L 400 200" stroke="#7c3aed" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="445" y="187" font-size="10" font-weight="600" fill="#5b21b6">3. allow/deny</text>

  <!-- PEP → control plane (up, query) -->
  <path d="M 380 200 L 380 170" stroke="#7c3aed" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="290" y="187" font-size="10" font-weight="600" fill="#5b21b6">2. verifica</text>

  <!-- Data sources around control plane -->
  <g transform="translate(545,40)">
    <rect width="100" height="35" fill="#fff" stroke="#94a3b8" rx="4"/>
    <text x="50" y="16" font-size="9" font-weight="600" text-anchor="middle" fill="#475569">IdP / SSO</text>
    <text x="50" y="28" font-size="8" text-anchor="middle" fill="#64748b">Okta, Entra ID</text>
  </g>
  <line x1="515" y1="65" x2="545" y2="57" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,2"/>

  <g transform="translate(545,85)">
    <rect width="100" height="35" fill="#fff" stroke="#94a3b8" rx="4"/>
    <text x="50" y="16" font-size="9" font-weight="600" text-anchor="middle" fill="#475569">MDM / EDR</text>
    <text x="50" y="28" font-size="8" text-anchor="middle" fill="#64748b">device posture</text>
  </g>
  <line x1="515" y1="100" x2="545" y2="102" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,2"/>

  <g transform="translate(545,130)">
    <rect width="100" height="35" fill="#fff" stroke="#94a3b8" rx="4"/>
    <text x="50" y="16" font-size="9" font-weight="600" text-anchor="middle" fill="#475569">Threat intel</text>
    <text x="50" y="28" font-size="8" text-anchor="middle" fill="#64748b">SIEM / logs</text>
  </g>
  <line x1="515" y1="135" x2="545" y2="147" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,2"/>

  <g transform="translate(665,85)">
    <rect width="100" height="35" fill="#fff" stroke="#94a3b8" rx="4"/>
    <text x="50" y="16" font-size="9" font-weight="600" text-anchor="middle" fill="#475569">CMDB</text>
    <text x="50" y="28" font-size="8" text-anchor="middle" fill="#64748b">asset DB</text>
  </g>
  <line x1="665" y1="100" x2="645" y2="102" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,2"/>

  <text x="595" y="195" font-size="9" text-anchor="middle" fill="#64748b" font-style="italic">trust signals (input continuo)</text>

  <!-- RESOURCES (right side) -->
  <g transform="translate(620,260)">
    <rect width="150" height="180" fill="#dcfce7" stroke="#16a34a" stroke-width="2" rx="8"/>
    <text x="75" y="22" font-size="12" font-weight="700" text-anchor="middle" fill="#14532d">RESOURCES</text>
    <text x="75" y="38" font-size="9" text-anchor="middle" fill="#15803d" font-style="italic">app, dati, servizi</text>

    <rect x="15" y="50" width="55" height="40" fill="#fff" stroke="#16a34a" rx="3"/>
    <text x="42" y="73" font-size="20" text-anchor="middle">🖥️</text>

    <rect x="80" y="50" width="55" height="40" fill="#fff" stroke="#16a34a" rx="3"/>
    <text x="107" y="73" font-size="20" text-anchor="middle">💾</text>

    <rect x="15" y="100" width="55" height="40" fill="#fff" stroke="#16a34a" rx="3"/>
    <text x="42" y="123" font-size="20" text-anchor="middle">📁</text>

    <rect x="80" y="100" width="55" height="40" fill="#fff" stroke="#16a34a" rx="3"/>
    <text x="107" y="123" font-size="20" text-anchor="middle">⚙️</text>

    <text x="75" y="165" font-size="8" text-anchor="middle" fill="#14532d">microsegmentate</text>
  </g>

  <!-- PEP → Resource (only if allowed) -->
  <path d="M 470 250 L 620 320" stroke="#15803d" stroke-width="3" marker-end="url(#arrG)"/>
  <text x="540" y="270" font-size="11" font-weight="600" fill="#15803d">4. connessione</text>
  <text x="540" y="284" font-size="11" font-weight="600" fill="#15803d">cifrata (se OK)</text>

  <!-- Bottom: continuous verification loop -->
  <rect x="40" y="380" width="430" height="100" fill="#fff" stroke="#cbd5e1" stroke-width="1.5" rx="6"/>
  <text x="255" y="402" font-size="12" font-weight="700" text-anchor="middle" fill="#0f172a">🔄 Verifica continua (per ogni richiesta, non solo al login)</text>

  <g transform="translate(60,415)">
    <rect width="80" height="50" fill="#fef3c7" stroke="#d97706" rx="4"/>
    <text x="40" y="20" font-size="9" font-weight="700" text-anchor="middle" fill="#78350f">Identità</text>
    <text x="40" y="38" font-size="18" text-anchor="middle">🔑</text>
  </g>
  <g transform="translate(150,415)">
    <rect width="80" height="50" fill="#fef3c7" stroke="#d97706" rx="4"/>
    <text x="40" y="20" font-size="9" font-weight="700" text-anchor="middle" fill="#78350f">Device</text>
    <text x="40" y="38" font-size="18" text-anchor="middle">💻</text>
  </g>
  <g transform="translate(240,415)">
    <rect width="80" height="50" fill="#fef3c7" stroke="#d97706" rx="4"/>
    <text x="40" y="20" font-size="9" font-weight="700" text-anchor="middle" fill="#78350f">Contesto</text>
    <text x="40" y="38" font-size="18" text-anchor="middle">🌍</text>
  </g>
  <g transform="translate(330,415)">
    <rect width="120" height="50" fill="#fef3c7" stroke="#d97706" rx="4"/>
    <text x="60" y="20" font-size="9" font-weight="700" text-anchor="middle" fill="#78350f">Comportamento</text>
    <text x="60" y="38" font-size="18" text-anchor="middle">📊</text>
  </g>

  <!-- Principles box -->
  <rect x="490" y="460" width="280" height="50" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5" rx="4"/>
  <text x="630" y="478" font-size="10" font-weight="700" text-anchor="middle" fill="#713f12">PRINCIPI ZERO TRUST</text>
  <text x="630" y="495" font-size="9" text-anchor="middle" fill="#713f12">never trust · always verify · least privilege</text>
  <text x="630" y="506" font-size="9" text-anchor="middle" fill="#713f12">assume breach · microsegment</text>
</svg>
