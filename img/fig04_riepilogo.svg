<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <marker id="arrdown" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,0 L5,10 z" fill="#475569"/>
    </marker>
    <marker id="arrright" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#15803d"/>
    </marker>
  </defs>

  <!-- CONTROL PLANE -->
  <rect x="20" y="20" width="860" height="220" rx="14" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="40" y="48" font-size="14" font-weight="700" fill="#854d0e">CONTROL PLANE — signalling</text>

  <!-- box OSPF -->
  <rect x="60" y="70" width="200" height="80" rx="10" fill="#fff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="160" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">OSPF / IS-IS</text>
  <text x="160" y="118" text-anchor="middle" font-size="11" fill="#1e40af">IGP del provider</text>
  <text x="160" y="134" text-anchor="middle" font-size="10" fill="#475569" font-style="italic">"dove stanno i PE?"</text>

  <!-- box LDP -->
  <rect x="350" y="70" width="200" height="80" rx="10" fill="#fff" stroke="#7c3aed" stroke-width="2"/>
  <text x="450" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">LDP</text>
  <text x="450" y="118" text-anchor="middle" font-size="11" fill="#6d28d9">distribuzione label transport</text>
  <text x="450" y="134" text-anchor="middle" font-size="10" fill="#475569" font-style="italic">"con quale label?"</text>

  <!-- box MP-BGP -->
  <rect x="640" y="70" width="220" height="80" rx="10" fill="#fff" stroke="#be123c" stroke-width="2"/>
  <text x="750" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#9f1239">MP-BGP VPNv4</text>
  <text x="750" y="118" text-anchor="middle" font-size="11" fill="#be123c">rotte cliente + label VPN</text>
  <text x="750" y="134" text-anchor="middle" font-size="10" fill="#475569" font-style="italic">"cosa c'è dietro ogni PE?"</text>

  <!-- frecce verso le tabelle -->
  <line x1="160" y1="150" x2="160" y2="190" stroke="#475569" stroke-width="2" marker-end="url(#arrdown)"/>
  <line x1="450" y1="150" x2="450" y2="190" stroke="#475569" stroke-width="2" marker-end="url(#arrdown)"/>
  <line x1="750" y1="150" x2="750" y2="190" stroke="#475569" stroke-width="2" marker-end="url(#arrdown)"/>

  <text x="160" y="212" text-anchor="middle" font-size="11" fill="#1e3a8a" font-weight="600">routing globale</text>
  <text x="160" y="228" text-anchor="middle" font-size="10" fill="#475569">(su P e PE)</text>

  <text x="450" y="212" text-anchor="middle" font-size="11" fill="#5b21b6" font-weight="600">LFIB</text>
  <text x="450" y="228" text-anchor="middle" font-size="10" fill="#475569">(su P e PE)</text>

  <text x="750" y="212" text-anchor="middle" font-size="11" fill="#9f1239" font-weight="600">VRF</text>
  <text x="750" y="228" text-anchor="middle" font-size="10" fill="#475569">(sui PE)</text>

  <!-- DATA PLANE -->
  <rect x="20" y="270" width="860" height="170" rx="14" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  <text x="40" y="298" font-size="14" font-weight="700" fill="#14532d">DATA PLANE — forwarding</text>

  <!-- nodi sequenziali -->
  <g>
    <circle cx="90" cy="370" r="22" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="90" y="375" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">CE</text>
  </g>
  <g>
    <circle cx="240" cy="370" r="26" fill="#fff" stroke="#1d4ed8" stroke-width="2"/>
    <text x="240" y="374" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">PE1</text>
  </g>
  <g>
    <circle cx="430" cy="370" r="22" fill="#fff" stroke="#475569" stroke-width="2"/>
    <text x="430" y="375" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">P</text>
  </g>
  <g>
    <circle cx="620" cy="370" r="26" fill="#fff" stroke="#1d4ed8" stroke-width="2"/>
    <text x="620" y="374" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">PE2</text>
  </g>
  <g>
    <circle cx="780" cy="370" r="22" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="780" y="375" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">CE</text>
  </g>

  <!-- frecce flusso -->
  <line x1="113" y1="370" x2="210" y2="370" stroke="#15803d" stroke-width="2" marker-end="url(#arrright)"/>
  <line x1="266" y1="370" x2="404" y2="370" stroke="#15803d" stroke-width="2" marker-end="url(#arrright)"/>
  <line x1="453" y1="370" x2="590" y2="370" stroke="#15803d" stroke-width="2" marker-end="url(#arrright)"/>
  <line x1="646" y1="370" x2="755" y2="370" stroke="#15803d" stroke-width="2" marker-end="url(#arrright)"/>

  <!-- etichette pacchetti -->
  <text x="161" y="358" text-anchor="middle" font-size="10" fill="#14532d">IP</text>
  <text x="335" y="358" text-anchor="middle" font-size="10" fill="#14532d">[T][V][IP]</text>
  <text x="521" y="358" text-anchor="middle" font-size="10" fill="#14532d">[T'][V][IP]</text>
  <text x="700" y="358" text-anchor="middle" font-size="10" fill="#14532d">IP</text>

  <!-- annotazioni operazioni -->
  <text x="240" y="412" text-anchor="middle" font-size="10" fill="#1e3a8a">VRF lookup +</text>
  <text x="240" y="425" text-anchor="middle" font-size="10" fill="#1e3a8a">PUSH T,V</text>

  <text x="430" y="412" text-anchor="middle" font-size="10" fill="#334155">SWAP T</text>
  <text x="430" y="425" text-anchor="middle" font-size="10" fill="#334155">(label switching)</text>

  <text x="620" y="412" text-anchor="middle" font-size="10" fill="#1e3a8a">POP V → VRF</text>
  <text x="620" y="425" text-anchor="middle" font-size="10" fill="#1e3a8a">consegna a CE</text>
</svg>
