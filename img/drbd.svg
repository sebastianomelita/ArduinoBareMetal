<svg viewBox="0 0 840 470" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ad" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7c"/>
    </marker>
    <marker id="ag" markerWidth="11" markerHeight="11" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#1f9d55"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="840" height="470" fill="#ffffff"/>
  <text x="420" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2933">DRBD — Distributed Replicated Block Device (RAID‑1 di rete)</text>

  <!-- ===== NODO 1 (PRIMARY) ===== -->
  <rect x="30" y="64" width="300" height="370" rx="10" fill="#f4f7fb" stroke="#34506b" stroke-width="2"/>
  <path d="M40 64 H320 Q330 64 330 74 V104 H30 V74 Q30 64 40 64 Z" fill="#2d6cdf"/>
