<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
  <defs>
    <marker id="arr8" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f172a"/>
    </marker>
  </defs>
  <style>
    .title{font-size:16px;font-weight:700;fill:#0f172a}
    .role{font-size:12px;font-weight:700;fill:#fff}
    .sub{font-size:11px;fill:#475569}
    .caption{font-size:12px;font-weight:600;fill:#0f172a}
    .lblbox{font-size:11px;font-weight:700;fill:#0f172a}
  </style>

  <text x="410" y="26" class="title" text-anchor="middle">EVPN + VXLAN: overlay L2 su IP per datacenter e SDN</text>

  <!-- Fabric -->
  <rect x="150" y="150" width="520" height="140" rx="16" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
  <text x="410" y="172" class="caption" text-anchor="middle" fill="#78350f">IP Fabric (spine)</text>

  <!-- Spine -->
  <polygon points="350,195 390,195 410,225 390,255 350,255 330,225" fill="#d97706"/>
  <text x="370" y="230" class="role" text-anchor="middle">Spine</text>
  <polygon points="430,195 470,195 490,225 470,255 430,255 410,225" fill="#d97706"/>
  <text x="450" y="230" class="role" text-anchor="middle">Spine</text>

  <!-- VTEP left -->
  <rect x="180" y="195" width="90" height="65" rx="8" fill="#2563eb"/>
  <text x="225" y="220" class="role" text-anchor="middle">Leaf</text>
  <text x="225" y="240" class="role" text-anchor="middle" font-size="10">VTEP</text>

  <!-- VTEP right -->
  <rect x="550" y="195" width="90" height="65" rx="8" fill="#2563eb"/>
  <text x="595" y="220" class="role" text-anchor="middle">Leaf</text>
  <text x="595" y="240" class="role" text-anchor="middle" font-size="10">VTEP</text>

  <!-- VMs -->
  <rect x="50" y="210" width="90" height="40" rx="7" fill="#e0e7ff" stroke="#4f46e5"/>
  <text x="95" y="228" class="caption" text-anchor="middle">VM1</text>
  <text x="95" y="243" class="sub" text-anchor="middle">MAC aa:..</text>
  <text x="95" y="272" class="sub" text-anchor="middle">VNI 10000</text>

  <rect x="680" y="210" width="90" height="40" rx="7" fill="#e0e7ff" stroke="#4f46e5"/>
  <text x="725" y="228" class="caption" text-anchor="middle">VM2</text>
  <text x="725" y="243" class="sub" text-anchor="middle">MAC bb:..</text>
  <text x="725" y="272" class="sub" text-anchor="middle">VNI 10000</text>

  <!-- flow arrows -->
  <line x1="140" y1="225" x2="180" y2="225" stroke="#0f172a" stroke-width="2" marker-end="url(#arr8)"/>
  <line x1="270" y1="225" x2="330" y2="225" stroke="#0f172a" stroke-width="2" marker-end="url(#arr8)"/>
  <line x1="410" y1="225" x2="430" y2="225" stroke="#0f172a" stroke-width="2" marker-end="url(#arr8)"/>
  <line x1="490" y1="225" x2="550" y2="225" stroke="#0f172a" stroke-width="2" marker-end="url(#arr8)"/>
  <line x1="640" y1="225" x2="680" y2="225" stroke="#0f172a" stroke-width="2" marker-end="url(#arr8)"/>

  <text x="160" y="213" class="sub" text-anchor="middle">Eth</text>
  <text x="660" y="213" class="sub" text-anchor="middle">Eth</text>

  <!-- VXLAN packet format -->
  <g transform="translate(285,105)">
    <rect x="0" y="0" width="50" height="22" rx="3" fill="#fde68a" stroke="#b45309"/>
    <text x="25" y="15" class="lblbox" text-anchor="middle">IP</text>
    <rect x="52" y="0" width="50" height="22" rx="3" fill="#fcd34d" stroke="#b45309"/>
    <text x="77" y="15" class="lblbox" text-anchor="middle">UDP</text>
    <rect x="104" y="0" width="55" height="22" rx="3" fill="#fbbf24" stroke="#b45309"/>
    <text x="131" y="15" class="lblbox" text-anchor="middle">VXLAN</text>
    <rect x="161" y="0" width="70" height="22" rx="3" fill="#c7d2fe" stroke="#4f46e5"/>
    <text x="196" y="15" class="lblbox" text-anchor="middle">Eth frame</text>
  </g>
  <text x="400" y="95" class="sub" text-anchor="middle">incapsulamento nel fabric: [IP | UDP:4789 | VXLAN(VNI) | frame Ethernet]</text>

  <!-- MP-BGP EVPN -->
  <path d="M 225 260 Q 410 345 595 260" stroke="#8b5cf6" stroke-width="1.8" fill="none" stroke-dasharray="6,3"/>
  <text x="410" y="340" class="caption" text-anchor="middle" fill="#7c3aed">MP-BGP EVPN — signalling: "il MAC aa sta dietro VTEP1, il MAC bb dietro VTEP2"</text>
</svg>
