<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 230" role="img" aria-labelledby="t1 d1">
<title id="t1">PULL contro PUSH nel backup</title>
<desc id="d1">Confronto tra la strategia PULL, in cui il NAS prende l'iniziativa e preleva i dati dal server, e PUSH, in cui il server prende l'iniziativa e spinge i dati verso il NAS. In entrambi i casi i dati fluiscono dal server al NAS.</desc>
<style>
 .f{font-family:-apple-system,system-ui,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
 .nt{fill:#3d3d3a}.ns{fill:#73726c}.na{stroke:#73726c;fill:none}.dv{stroke:#c9c7bd}
 @media (prefers-color-scheme:dark){.nt{fill:#e8e6dc}.ns{fill:#a8a69c}.na{stroke:#9c9a92}.dv{stroke:#54534e}}
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text class="f nt" font-size="14" font-weight="500" x="182" y="44" text-anchor="middle">PULL</text>
<text class="f ns" font-size="12" x="182" y="62" text-anchor="middle">il NAS preleva dal server</text>
<text class="f nt" font-size="14" font-weight="500" x="502" y="44" text-anchor="middle">PUSH</text>
<text class="f ns" font-size="12" x="502" y="62" text-anchor="middle">il server spinge verso il NAS</text>

<line class="dv" x1="342" y1="36" x2="342" y2="205" stroke-width="0.5" stroke-dasharray="4 4"/>

<rect x="50" y="92" width="120" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="f" font-size="14" font-weight="500" fill="#2C2C2A" x="110" y="111" text-anchor="middle" dominant-baseline="central">Server</text>
<text class="f" font-size="12" fill="#5F5E5A" x="110" y="127" text-anchor="middle" dominant-baseline="central">sorgente</text>
<rect x="194" y="92" width="120" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="f" font-size="14" font-weight="500" fill="#04342C" x="254" y="111" text-anchor="middle" dominant-baseline="central">NAS</text>
<text class="f" font-size="12" fill="#0F6E56" x="254" y="127" text-anchor="middle" dominant-baseline="central">iniziativa</text>
<text class="f ns" font-size="12" x="182" y="80" text-anchor="middle">dati</text>
<line class="na" x1="170" y1="117" x2="194" y2="117" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="370" y="92" width="120" height="50" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="f" font-size="14" font-weight="500" fill="#4A1B0C" x="430" y="111" text-anchor="middle" dominant-baseline="central">Server</text>
<text class="f" font-size="12" fill="#993C1D" x="430" y="127" text-anchor="middle" dominant-baseline="central">iniziativa</text>
<rect x="514" y="92" width="120" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="f" font-size="14" font-weight="500" fill="#2C2C2A" x="574" y="111" text-anchor="middle" dominant-baseline="central">NAS</text>
<text class="f" font-size="12" fill="#5F5E5A" x="574" y="127" text-anchor="middle" dominant-baseline="central">destinazione</text>
<text class="f ns" font-size="12" x="502" y="80" text-anchor="middle">dati</text>
<line class="na" x1="490" y1="117" x2="514" y2="117" stroke-width="1.5" marker-end="url(#arrow)"/>

<text class="f ns" font-size="12" x="182" y="172" text-anchor="middle">chiave privata: NAS</text>
<text class="f ns" font-size="12" x="182" y="190" text-anchor="middle">chiave pubblica: server</text>
<text class="f ns" font-size="12" x="502" y="172" text-anchor="middle">chiave privata: server</text>
<text class="f ns" font-size="12" x="502" y="190" text-anchor="middle">chiave pubblica: NAS</text>
</svg>
