<svg width="100%" viewBox="0 0 680 500" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Architettura Matter con bridge verso reti non-IP</title>
<desc>Una rete IP locale ospita controller Matter e bridge. I bridge espongono dispositivi Zigbee e BLE proprietari come dispositivi Matter nativi.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<style>
.t  { font-family: sans-serif; font-size: 14px; fill: #2C2C2A; }
.ts { font-family: sans-serif; font-size: 12px; fill: #5F5E5A; }
.th { font-family: sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
.arr { stroke: #5F5E5A; stroke-width: 1; fill: none; }
.c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
.c-purple text { fill: #26215C; }
.c-teal   rect { fill: #E1F5EE; stroke: #0F6E56; }
.c-teal   text { fill: #04342C; }
.c-blue   rect { fill: #E6F1FB; stroke: #185FA5; }
.c-blue   text { fill: #042C53; }
.c-coral  rect { fill: #FAECE7; stroke: #993C1D; }
.c-coral  text { fill: #4A1B0C; }
</style>

<rect x="60" y="60" width="560" height="180" rx="20" fill="none" stroke="#185FA5" stroke-width="0.5" stroke-dasharray="6 4"/>
<text class="th" x="80" y="85" text-anchor="start">Rete IP locale (LAN, WiFi/Ethernet, IPv6)</text>
<text class="ts" x="80" y="103" text-anchor="start">discovery via mDNS, comunicazione peer-to-peer</text>

<g class="c-purple">
<rect x="90" y="130" width="160" height="80" rx="10" stroke-width="0.5"/>
<text class="th" x="170" y="160" text-anchor="middle" dominant-baseline="central">Controller Matter</text>
<text class="ts" x="170" y="180" text-anchor="middle" dominant-baseline="central">Apple Home, Google,</text>
<text class="ts" x="170" y="195" text-anchor="middle" dominant-baseline="central">Home Assistant</text>
</g>

<g class="c-teal">
<rect x="270" y="130" width="160" height="80" rx="10" stroke-width="0.5"/>
<text class="th" x="350" y="160" text-anchor="middle" dominant-baseline="central">Bridge Zigbee&#8594;Matter</text>
<text class="ts" x="350" y="180" text-anchor="middle" dominant-baseline="central">Hue Bridge, Aqara M3,</text>
<text class="ts" x="350" y="195" text-anchor="middle" dominant-baseline="central">SmartThings</text>
</g>

<g class="c-teal">
<rect x="450" y="130" width="160" height="80" rx="10" stroke-width="0.5"/>
<text class="th" x="530" y="160" text-anchor="middle" dominant-baseline="central">Bridge BLE&#8594;Matter</text>
<text class="ts" x="530" y="180" text-anchor="middle" dominant-baseline="central">Hub Switchbot,</text>
<text class="ts" x="530" y="195" text-anchor="middle" dominant-baseline="central">hub di marca</text>
</g>

<line x1="250" y1="170" x2="270" y2="170" class="arr"/>
<line x1="430" y1="170" x2="450" y2="170" class="arr"/>

<line x1="350" y1="210" x2="350" y2="290" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="360" y="252" text-anchor="start">802.15.4</text>

<line x1="530" y1="210" x2="530" y2="290" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="540" y="252" text-anchor="start">BLE</text>

<g class="c-coral">
<rect x="270" y="290" width="160" height="70" rx="10" stroke-width="0.5"/>
<text class="th" x="350" y="318" text-anchor="middle" dominant-baseline="central">Rete Zigbee mesh</text>
<text class="ts" x="350" y="340" text-anchor="middle" dominant-baseline="central">lampadine, sensori, prese</text>
</g>

<g class="c-coral">
<rect x="450" y="290" width="160" height="70" rx="10" stroke-width="0.5"/>
<text class="th" x="530" y="318" text-anchor="middle" dominant-baseline="central">Dispositivi BLE</text>
<text class="ts" x="530" y="340" text-anchor="middle" dominant-baseline="central">lock, sensori, beacon</text>
</g>

<line x1="170" y1="210" x2="170" y2="290" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="180" y="252" text-anchor="start">Matter nativo</text>

<g class="c-blue">
<rect x="90" y="290" width="160" height="70" rx="10" stroke-width="0.5"/>
<text class="th" x="170" y="318" text-anchor="middle" dominant-baseline="central">Dispositivi Matter</text>
<text class="ts" x="170" y="340" text-anchor="middle" dominant-baseline="central">WiFi o Thread nativi</text>
</g>

<rect x="60" y="400" width="560" height="80" rx="10" fill="none" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="80" y="425" text-anchor="start">Cosa fa un Matter Bridge</text>
<text class="ts" x="80" y="448" text-anchor="start">Mappa i comandi del dispositivo nativo (Zigbee ZCL, protocollo BLE proprietario)</text>
<text class="ts" x="80" y="466" text-anchor="start">sui cluster Matter standard, esponendoli al controller come device Matter nativi.</text>
</svg>
