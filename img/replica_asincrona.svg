<svg width="100%" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: system-ui, -apple-system, sans-serif; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<rect x="60" y="40" width="220" height="180" rx="16" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="170" y="72" text-anchor="middle" fill="#085041">Nodo A (attivo)</text>

<rect x="100" y="100" width="140" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text class="th" x="170" y="120" text-anchor="middle" dominant-baseline="central" fill="#27500A">Dato v5</text>
<text class="ts" x="170" y="140" text-anchor="middle" dominant-baseline="central" fill="#3B6D11">Aggiornato</text>

<rect x="400" y="40" width="220" height="180" rx="16" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text class="th" x="510" y="72" text-anchor="middle" fill="#2C2C2A">Nodo B (replica)</text>

<rect x="440" y="100" width="140" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="510" y="120" text-anchor="middle" dominant-baseline="central" fill="#633806">Dato v4</text>
<text class="ts" x="510" y="140" text-anchor="middle" dominant-baseline="central" fill="#854F0B">In ritardo</text>

<text class="ts" x="340" y="118" text-anchor="middle" fill="#854F0B">Copia in background</text>
<line x1="280" y1="128" x2="440" y2="128" stroke="#854F0B" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrow)"/>

<text class="ts" x="340" y="240" text-anchor="middle" fill="#5F5E5A">Il nodo B può essere INDIETRO di qualche scrittura</text>
</svg>