<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="lan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dcfce7"/>
      <stop offset="1" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="wan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dbeafe"/>
      <stop offset="1" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="dc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#fde68a"/>
    </linearGradient>
  </defs>

  <text x="460" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Tassonomia: dove vive ciascuna tecnologia overlay</text>

  <!-- riga 1: ambito geografico -->
  <text x="40" y="62" font-size="11" font-weight="700" fill="#475569">Ambito</text>

  <rect x="120" y="48" width="220" height="28" rx="6" fill="url(#lan)" stroke="#15803d" stroke-width="1.5"/>
  <text x="230" y="67" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">LAN / singolo edificio</text>

  <rect x="360" y="48" width="240" height="28" rx="6" fill="url(#dc)" stroke="#d97706" stroke-width="1.5"/>
  <text x="480" y="67" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Datacenter (fabric IP)</text>

  <rect x="620" y="48" width="280" height="28" rx="6" fill="url(#wan)" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="760" y="67" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">WAN (sedi geograficamente distribuite)</text>

  <!-- riga 2: tecnologia -->
  <text x="40" y="120" font-size="11" font-weight="700" fill="#475569">Tecnologia</text>

  <rect x="120" y="100" width="220" height="60" rx="8" fill="#fff" stroke="#15803d" stroke-width="2"/>
  <text x="230" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">VLAN 802.1Q</text>
  <text x="230" y="142" text-anchor="middle" font-size="10" fill="#166534">tag L2, max 4094 segmenti</text>
  <text x="230" y="155" text-anchor="middle" font-size="9" fill="#166534" font-style="italic">richiede continuità Ethernet</text>

  <rect x="360" y="100" width="240" height="60" rx="8" fill="#fff" stroke="#d97706" stroke-width="2"/>
  <text x="480" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">VXLAN + EVPN</text>
  <text x="480" y="142" text-anchor="middle" font-size="10" fill="#92400e">overlay L2 su underlay IP</text>
  <text x="480" y="155" text-anchor="middle" font-size="9" fill="#92400e" font-style="italic">VNI 24 bit, MP-BGP signalling</text>

  <rect x="620" y="100" width="135" height="60" rx="8" fill="#fff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="687" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">MPLS L3VPN</text>
  <text x="687" y="142" text-anchor="middle" font-size="10" fill="#1e40af">overlay L3</text>
  <text x="687" y="155" text-anchor="middle" font-size="9" fill="#1e40af" font-style="italic">gestita dall'ISP</text>

  <rect x="765" y="100" width="135" height="60" rx="8" fill="#fff" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="832" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">SD-WAN</text>
  <text x="832" y="142" text-anchor="middle" font-size="10" fill="#6d28d9">overlay L3 cifrato</text>
  <text x="832" y="155" text-anchor="middle" font-size="9" fill="#6d28d9" font-style="italic">gestita dal cliente</text>

  <!-- riga 3: chi gestisce -->
  <text x="40" y="200" font-size="11" font-weight="700" fill="#475569">Gestione</text>
  <text x="230" y="200" text-anchor="middle" font-size="11" fill="#374151">amministratore LAN</text>
  <text x="480" y="200" text-anchor="middle" font-size="11" fill="#374151">datacenter / cloud operator</text>
  <text x="687" y="200" text-anchor="middle" font-size="11" fill="#374151">ISP (es. TIM)</text>
  <text x="832" y="200" text-anchor="middle" font-size="11" fill="#374151">enterprise (in proprio)</text>

  <!-- riga 4: signalling -->
  <text x="40" y="232" font-size="11" font-weight="700" fill="#475569">Signalling</text>
  <text x="230" y="232" text-anchor="middle" font-size="11" fill="#374151">nessuno (statico)</text>
  <text x="480" y="232" text-anchor="middle" font-size="11" fill="#374151">MP-BGP EVPN</text>
  <text x="687" y="232" text-anchor="middle" font-size="11" fill="#374151">MP-BGP VPNv4</text>
  <text x="832" y="232" text-anchor="middle" font-size="11" fill="#374151">controller (SDN)</text>

  <!-- riga 5: trasporto -->
  <text x="40" y="264" font-size="11" font-weight="700" fill="#475569">Trasporto</text>
  <text x="230" y="264" text-anchor="middle" font-size="11" fill="#374151">tag 802.1Q</text>
  <text x="480" y="264" text-anchor="middle" font-size="11" fill="#374151">UDP/IP + VXLAN</text>
  <text x="687" y="264" text-anchor="middle" font-size="11" fill="#374151">label MPLS</text>
  <text x="832" y="264" text-anchor="middle" font-size="11" fill="#374151">IPsec/GRE</text>

  <!-- box riassuntivo del pattern -->
  <rect x="60" y="310" width="800" height="130" rx="14" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
  <text x="460" y="334" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Il pattern unificante: separazione signalling / trasporto</text>

  <text x="80" y="365" font-size="11" fill="#374151">• <tspan font-weight="700">Signalling</tspan> = chi sa cosa sta dove (control plane, "intelligenza")</text>
  <text x="80" y="385" font-size="11" fill="#374151">• <tspan font-weight="700">Trasporto</tspan> = come i dati attraversano la rete (data plane, "muscolo")</text>
  <text x="80" y="405" font-size="11" fill="#374151">• Cambia la <tspan font-weight="700">scala</tspan> (LAN → datacenter → WAN globale) e il <tspan font-weight="700">livello</tspan> (L2/L3), ma lo schema architetturale</text>
  <text x="80" y="421" font-size="11" fill="#374151">  resta identico: un overlay logico costruito sopra un underlay più semplice.</text>
</svg>
