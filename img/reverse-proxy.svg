<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 420" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="Schema reverse proxy con VRRP, ALG e clustering">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Client -->
  <rect x="40" y="160" width="120" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="100" y="184" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">Client</text>
  <text x="100" y="202" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">da internet</text>

  <text x="210" y="176" text-anchor="middle" font-size="12" fill="#5F5E5A">HTTPS</text>
  <line x1="160" y1="188" x2="258" y2="188" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Container VRRP -->
  <rect x="262" y="90" width="180" height="196" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="352" y="110" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">VIP 192.168.1.100</text>
  <text x="352" y="127" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">HA VRRP (keepalived)</text>

  <!-- HAProxy master -->
  <rect x="282" y="142" width="140" height="50" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="352" y="160" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">HAProxy master</text>
  <text x="352" y="177" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">ALG per hostname</text>

  <!-- HAProxy backup -->
  <rect x="282" y="210" width="140" height="50" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="352" y="228" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">HAProxy backup</text>
  <text x="352" y="245" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">subentra al failover</text>

  <!-- Routing arrows -->
  <text x="500" y="120" text-anchor="middle" font-size="12" fill="#5F5E5A">blog.*</text>
  <line x1="442" y1="150" x2="540" y2="132" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="500" y="222" text-anchor="middle" font-size="12" fill="#5F5E5A">web.*</text>
  <line x1="442" y1="180" x2="540" y2="232" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- blog backend -->
  <rect x="542" y="100" width="118" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="601" y="118" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">blog_backend</text>
  <text x="601" y="136" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">server singolo</text>

  <!-- web backend pool -->
  <rect x="528" y="176" width="148" height="118" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="602" y="192" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#712B13">web_backend · round-robin</text>
  <rect x="544" y="204" width="116" height="26" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="602" y="217" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">web_server1</text>
  <rect x="544" y="236" width="116" height="26" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="602" y="249" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">web_server2</text>
  <rect x="544" y="268" width="116" height="26" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="602" y="281" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">web_server3</text>

  <!-- Caption -->
  <text x="340" y="360" text-anchor="middle" font-size="12" fill="#5F5E5A">VRRP tiene su il VIP · ALG instrada per hostname · check esclude i backend giù</text>
</svg>
