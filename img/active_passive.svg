  .ts { font-size: 12px; font-weight: 400; }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<rect x="260" y="30" width="160" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text class="th" x="340" y="55" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Utenti</text>

<line x1="340" y1="74" x2="340" y2="110" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="230" y="110" width="220" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="340" y="135" text-anchor="middle" dominant-baseline="central" fill="#3C3489">VIP (IP flottante)</text>

<line x1="290" y1="154" x2="190" y2="210" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="390" y1="154" x2="490" y2="210" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrow)"/>

<rect x="100" y="210" width="180" height="56" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="190" y="230" text-anchor="middle" dominant-baseline="central" fill="#085041">VM App 1</text>
<text class="ts" x="190" y="250" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">ATTIVA</text>

<rect x="400" y="210" width="180" height="56" rx="12" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text class="th" x="490" y="230" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">VM App 2</text>
<text class="ts" x="490" y="250" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">STANDBY</text>

<text class="ts" x="340" y="310" text-anchor="middle" fill="#5F5E5A">Se VM1 cade, il VIP si sposta su VM2</text>
<text class="ts" x="340" y="330" text-anchor="middle" fill="#5F5E5A">Tecnologie: Keepalived, Pacemaker/Corosync</text>
