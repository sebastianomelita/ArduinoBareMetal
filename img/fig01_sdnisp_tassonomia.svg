<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" font-family="-apple-system, system-ui, sans-serif">
  <text x="460" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Tassonomia completa: chi gestisce × generazione tecnologica</text>

  <!-- intestazioni colonne -->
  <text x="410" y="68" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Gestita dall'utente (enterprise)</text>
  <text x="740" y="68" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Gestita dall'ISP (provider)</text>

  <!-- intestazioni righe -->
  <text x="130" y="152" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">Vecchia generazione</text>
  <text x="130" y="170" text-anchor="middle" font-size="11" fill="#64748b">(protocolli distribuiti)</text>

  <text x="130" y="302" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">Nuova generazione</text>
  <text x="130" y="320" text-anchor="middle" font-size="11" fill="#64748b">(controller SDN)</text>

  <!-- linee griglia -->
  <line x1="240" y1="80" x2="240" y2="390" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="570" y1="80" x2="570" y2="390" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="240" y1="230" x2="900" y2="230" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- cella 1,1: VPN IPsec -->
  <rect x="270" y="100" width="270" height="110" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="405" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">VPN IPsec / OpenVPN</text>
  <text x="405" y="150" text-anchor="middle" font-size="11" fill="#7f1d1d">signalling: TLS/IKE</text>
  <text x="405" y="168" text-anchor="middle" font-size="11" fill="#7f1d1d">trasporto: UDP cifrato</text>
  <text x="405" y="186" text-anchor="middle" font-size="10" fill="#7f1d1d" font-style="italic">punto-punto, config manuale</text>

  <!-- cella 1,2: MPLS L3VPN -->
  <rect x="600" y="100" width="270" height="110" rx="12" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="735" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">MPLS L3VPN</text>
  <text x="735" y="150" text-anchor="middle" font-size="11" fill="#1e40af">signalling: MP-BGP + LDP</text>
  <text x="735" y="168" text-anchor="middle" font-size="11" fill="#1e40af">trasporto: label MPLS</text>
  <text x="735" y="186" text-anchor="middle" font-size="10" fill="#1e40af" font-style="italic">protocolli distribuiti, no visione globale</text>

  <!-- cella 2,1: SD-WAN -->
  <rect x="270" y="250" width="270" height="110" rx="12" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  <text x="405" y="278" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">SD-WAN</text>
  <text x="405" y="300" text-anchor="middle" font-size="11" fill="#166534">signalling: controller cloud</text>
  <text x="405" y="318" text-anchor="middle" font-size="11" fill="#166534">trasporto: IPsec su Internet</text>
  <text x="405" y="336" text-anchor="middle" font-size="10" fill="#166534" font-style="italic">path selection per app, zero-touch</text>

  <!-- cella 2,2: SR-TE + SDN -->
  <rect x="600" y="250" width="270" height="110" rx="12" fill="#ede9fe" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="735" y="278" text-anchor="middle" font-size="14" font-weight="700" fill="#5b21b6">SR-TE + controller SDN</text>
  <text x="735" y="300" text-anchor="middle" font-size="11" fill="#6d28d9">signalling: controller centralizzato</text>
  <text x="735" y="318" text-anchor="middle" font-size="11" fill="#6d28d9">trasporto: SR-MPLS (stack SID)</text>
  <text x="735" y="336" text-anchor="middle" font-size="10" fill="#6d28d9" font-style="italic">TE ottimale, visione globale del backbone</text>

  <!-- frecce evoluzione -->
  <line x1="405" y1="215" x2="405" y2="245" stroke="#15803d" stroke-width="2.5"/>
  <polygon points="405,250 399,240 411,240" fill="#15803d"/>
  <line x1="735" y1="215" x2="735" y2="245" stroke="#7c3aed" stroke-width="2.5"/>
  <polygon points="735,250 729,240 741,240" fill="#7c3aed"/>

  <!-- nota bottom -->
  <text x="460" y="395" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">Stessa evoluzione: da protocolli distribuiti a controller centralizzato. Cambia la scala e chi è il "proprietario" della rete.</text>
</svg>
