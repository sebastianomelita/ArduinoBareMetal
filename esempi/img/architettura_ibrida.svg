<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg viewBox="0 0 880 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Architettura ibrida a tre livelli">
  <style>
    .title { font: bold 16px sans-serif; fill: #1F2937; }
    .label { font: 12px sans-serif; fill: #1F2937; }
    .sub   { font: 11px sans-serif; fill: #4B5563; }
    .lvl   { font: bold 12px sans-serif; fill: #6B7280; letter-spacing: 1px; }
    .box   { fill: #FFFFFF; stroke: #2563EB; stroke-width: 1.5; rx: 6; ry: 6; }
    .ble   { fill: #EDE9FE; stroke: #7C3AED; stroke-width: 1.5; rx: 6; ry: 6; }
    .uhf   { fill: #DBEAFE; stroke: #2563EB; stroke-width: 1.5; rx: 6; ry: 6; }
    .gw    { fill: #FEF3C7; stroke: #D97706; stroke-width: 1.5; rx: 6; ry: 6; }
    .srv   { fill: #DCFCE7; stroke: #16A34A; stroke-width: 1.5; rx: 6; ry: 6; }
    .band  { fill: #F9FAFB; stroke: #E5E7EB; stroke-width: 1; }
    .arr   { fill: none; stroke: #6B7280; stroke-width: 1.5; marker-end: url(#ah); }
    .arr2  { fill: none; stroke: #7C3AED; stroke-width: 1.5; stroke-dasharray: 4 3; marker-end: url(#ah2); }
    .arr3  { fill: none; stroke: #2563EB; stroke-width: 1.5; stroke-dasharray: 2 3; marker-end: url(#ah3); }
  </style>
  <defs>
    <marker id="ah"  viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#6B7280"/></marker>
    <marker id="ah2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#7C3AED"/></marker>
    <marker id="ah3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#2563EB"/></marker>
  </defs>

  <!-- Bande di livello -->
  <rect class="band" x="10" y="40" width="860" height="130"/>
  <rect class="band" x="10" y="190" width="860" height="170"/>
  <rect class="band" x="10" y="380" width="860" height="170"/>
  <text class="lvl" x="20" y="58">LIVELLO ENDPOINT (PC)</text>
  <text class="lvl" x="20" y="208">LIVELLO RILEVAZIONE</text>
  <text class="lvl" x="20" y="398">LIVELLO APPLICATIVO (BACKEND)</text>

  <!-- Endpoint: PC con due tag -->
  <rect class="box" x="350" y="75" width="180" height="80"/>
  <text class="title" x="440" y="100" text-anchor="middle">PC portatile</text>
  <rect class="ble" x="365" y="115" width="65" height="30"/>
  <text class="label" x="397" y="134" text-anchor="middle">beacon</text>
  <text class="sub" x="397" y="146" text-anchor="middle" font-style="italic">2.4 GHz attivo</text>
  <rect class="uhf" x="450" y="115" width="65" height="30"/>
  <text class="label" x="482" y="134" text-anchor="middle">tag UHF</text>
  <text class="sub" x="482" y="146" text-anchor="middle" font-style="italic">passivo</text>

  <!-- Rilevazione: AP, cassone, UHF reader -->
  <rect class="ble" x="60" y="240" width="170" height="90"/>
  <text class="title" x="145" y="265" text-anchor="middle">AP Wi-Fi</text>
  <text class="label" x="145" y="285" text-anchor="middle">+ radio BLE</text>
  <text class="sub" x="145" y="303" text-anchor="middle">observer</text>
  <text class="sub" x="145" y="317" text-anchor="middle">scanner fissi distribuiti</text>

  <rect class="ble" x="355" y="240" width="170" height="90"/>
  <text class="title" x="440" y="265" text-anchor="middle">Cassone-carica</text>
  <text class="label" x="440" y="285" text-anchor="middle">intelligente</text>
  <text class="sub" x="440" y="303" text-anchor="middle">scanner BLE locale</text>
  <text class="sub" x="440" y="317" text-anchor="middle">+ lettore UHF al ritorno</text>

  <rect class="uhf" x="650" y="240" width="170" height="90"/>
  <text class="title" x="735" y="265" text-anchor="middle">Lettore UHF</text>
  <text class="label" x="735" y="285" text-anchor="middle">portale d'uscita</text>
  <text class="sub" x="735" y="303" text-anchor="middle">865&#8211;868 MHz</text>
  <text class="sub" x="735" y="317" text-anchor="middle">EPC Gen2 (rete di sicurezza)</text>

  <!-- Frecce endpoint -> rilevazione -->
  <path class="arr2" d="M 380 155 Q 250 200 195 240"/>
  <path class="arr2" d="M 440 155 L 440 240"/>
  <text class="sub" x="345" y="195" fill="#7C3AED">advertisement BLE</text>
  <path class="arr3" d="M 495 155 Q 620 200 705 240"/>
  <text class="sub" x="620" y="195" fill="#2563EB">lettura UHF</text>

  <!-- Backend -->
  <rect class="gw" x="60" y="410" width="160" height="60"/>
  <text class="title" x="140" y="435" text-anchor="middle">Gateway</text>
  <text class="sub" x="140" y="453" text-anchor="middle">MQTT client + buffer</text>

  <rect class="srv" x="260" y="410" width="160" height="60"/>
  <text class="title" x="340" y="435" text-anchor="middle">Broker MQTT</text>
  <text class="sub" x="340" y="453" text-anchor="middle">TLS, QoS 1/2</text>

  <rect class="srv" x="460" y="410" width="180" height="60"/>
  <text class="title" x="550" y="435" text-anchor="middle">Application server</text>
  <text class="sub" x="550" y="453" text-anchor="middle">fusione eventi + DB pseudonimizzato</text>

  <rect class="srv" x="680" y="410" width="140" height="60"/>
  <text class="title" x="750" y="435" text-anchor="middle">Videocamera</text>
  <text class="sub" x="750" y="453" text-anchor="middle">trigger su evento</text>

  <rect class="srv" x="260" y="490" width="380" height="40"/>
  <text class="title" x="450" y="515" text-anchor="middle">Console operatore &amp; mappa live</text>

  <!-- Rilevazione -> Backend -->
  <path class="arr" d="M 145 330 L 140 410"/>
  <path class="arr" d="M 440 330 L 340 410"/>
  <path class="arr" d="M 735 330 Q 600 360 200 410"/>

  <!-- Broker -> server -->
  <path class="arr" d="M 420 440 L 460 440"/>
  <path class="arr" d="M 220 440 L 260 440"/>
  <path class="arr" d="M 640 440 L 680 440"/>
  <path class="arr" d="M 450 470 L 450 490"/>
</svg>