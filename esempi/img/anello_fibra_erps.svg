<svg width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
<title>Anello ottico Ethernet con switch industriali ERPS</title>
<desc>Topologia ad anello in fibra ottica con switch managed industriali a ogni smart-gate, protocollo ERPS per failover sotto i 50 ms.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.t { font-size: 14px; fill: #2C2C2A; }
.ts { font-size: 12px; fill: #5F5E5A; }
.th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
</style>
</defs>

<rect x="240" y="30" width="200" height="64" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="340" y="54" text-anchor="middle" dominant-baseline="central" fill="#0C447C">CdC regionale</text>
<text class="ts" x="340" y="76" text-anchor="middle" dominant-baseline="central" fill="#185FA5">switch aggregatore</text>

<line x1="280" y1="94" x2="120" y2="200" stroke="#185FA5" stroke-width="2"/>
<line x1="400" y1="94" x2="560" y2="200" stroke="#185FA5" stroke-width="2"/>

<rect x="60" y="200" width="120" height="80" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="120" y="222" text-anchor="middle" dominant-baseline="central" fill="#3C3489">km 1</text>
<text class="ts" x="120" y="244" text-anchor="middle" dominant-baseline="central" fill="#534AB7">switch L2</text>
<text class="ts" x="120" y="260" text-anchor="middle" dominant-baseline="central" fill="#534AB7">smart-gate</text>

<rect x="220" y="200" width="120" height="80" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="280" y="222" text-anchor="middle" dominant-baseline="central" fill="#3C3489">km 2</text>
<text class="ts" x="280" y="244" text-anchor="middle" dominant-baseline="central" fill="#534AB7">switch L2</text>
<text class="ts" x="280" y="260" text-anchor="middle" dominant-baseline="central" fill="#534AB7">smart-gate</text>

<rect x="380" y="200" width="120" height="80" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="440" y="222" text-anchor="middle" dominant-baseline="central" fill="#3C3489">km 3</text>
<text class="ts" x="440" y="244" text-anchor="middle" dominant-baseline="central" fill="#534AB7">switch L2</text>
<text class="ts" x="440" y="260" text-anchor="middle" dominant-baseline="central" fill="#534AB7">smart-gate</text>

<rect x="500" y="200" width="120" height="80" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="560" y="222" text-anchor="middle" dominant-baseline="central" fill="#3C3489">km N</text>
<text class="ts" x="560" y="244" text-anchor="middle" dominant-baseline="central" fill="#534AB7">switch L2</text>
<text class="ts" x="560" y="260" text-anchor="middle" dominant-baseline="central" fill="#534AB7">smart-gate</text>

<line x1="180" y1="240" x2="220" y2="240" stroke="#185FA5" stroke-width="2"/>
<line x1="340" y1="240" x2="380" y2="240" stroke="#185FA5" stroke-width="2"/>
<line x1="500" y1="240" x2="500" y2="240" stroke="#185FA5" stroke-width="2"/>

<path d="M120 280 L 120 350 L 560 350 L 560 280" stroke="#A32D2D" stroke-width="2" fill="none" stroke-dasharray="8 4"/>
<rect x="320" y="338" width="40" height="24" rx="4" fill="#FFFFFF" stroke="#A32D2D" stroke-width="0.5"/>
<text class="ts" x="340" y="354" text-anchor="middle" dominant-baseline="central" fill="#A32D2D">RPL</text>

<text class="ts" x="100" y="390">Ring Protection Link — tratta bloccata in condizioni normali, sbloccata in caso di guasto</text>
<text class="ts" x="100" y="407">ERPS (IEEE G.8032) garantisce failover entro 50 ms</text>

<text class="ts" x="100" y="445">Ogni switch: 2 porte SFP+ (anello) + 4-8 porte Gigabit (apparati interni)</text>
<text class="ts" x="100" y="462">Alimentazione condivisa con il maxi-schermo, supporto VLAN 802.1Q</text>
<text class="ts" x="100" y="479">In rosso il link di protezione, in blu i link attivi che portano il traffico</text>
</svg>
