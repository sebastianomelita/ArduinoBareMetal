<svg viewBox="0 0 980 660" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .box{rx:8;ry:8;stroke-width:2}
    .net{fill:#fef7e0;stroke:#ea8600}
    .dev{fill:#e8f0fe;stroke:#1a73e8}
    .sec{fill:#fce8e6;stroke:#d93025}
    .srv{fill:#e6f4ea;stroke:#137333}
    .lbl{font-size:13px;fill:#202124}
    .lblw{font-size:12px;fill:#fff;font-weight:600}
    .tit{font-size:13px;font-weight:700;fill:#202124}
    .sub{font-size:11px;fill:#5f6368}
    .wire{stroke:#5f6368;stroke-width:2;fill:none}
    .rf{stroke:#1a73e8;stroke-width:2;stroke-dasharray:5 4;fill:none}
    .vpn{stroke:#137333;stroke-width:3;stroke-dasharray:2 5;fill:none;stroke-linecap:round}
  </style>

  <text x="490" y="28" text-anchor="middle" class="tit" font-size="16">Schema rete di un cantiere (rete temporanea)</text>

  <!-- Internet cloud / verso sede -->
  <ellipse cx="490" cy="80" rx="120" ry="36" class="net box"/>
  <text x="490" y="76" text-anchor="middle" class="lbl" font-weight="600">Internet (rete mobile)</text>
  <text x="490" y="94" text-anchor="middle" class="sub">tunnel VPN IPsec → SEDE</text>

  <!-- Gateway 4G/5G + firewall -->
  <rect x="385" y="160" width="210" height="64" class="sec box"/>
  <text x="490" y="186" text-anchor="middle" class="tit">Gateway industriale 4G/5G</text>
  <text x="490" y="205" text-anchor="middle" class="sub">router + firewall + VPN client (dual-SIM)</text>
  <line x1="490" y1="116" x2="490" y2="160" class="vpn"/>
  <text x="505" y="142" class="sub" fill="#137333">VPN</text>

  <!-- Switch PoE -->
  <rect x="395" y="280" width="190" height="50" class="dev box"/>
  <text x="490" y="300" text-anchor="middle" class="tit">Switch PoE gestito</text>
  <text x="490" y="318" text-anchor="middle" class="sub">VLAN: tablet / cam / sensori / mgmt</text>
  <line x1="490" y1="224" x2="490" y2="280" class="wire"/>

  <!-- Edge NAS -->
  <rect x="660" y="278" width="150" height="54" class="srv box"/>
  <text x="735" y="300" text-anchor="middle" class="tit">Edge NAS</text>
  <text x="735" y="318" text-anchor="middle" class="sub">buffer / store-and-forward</text>
  <line x1="585" y1="305" x2="660" y2="305" class="wire"/>

  <!-- three branches -->
  <!-- AP Wi-Fi -->
  <rect x="70" y="400" width="180" height="52" class="dev box"/>
  <text x="160" y="421" text-anchor="middle" class="tit">Access Point Wi-Fi</text>
  <text x="160" y="439" text-anchor="middle" class="sub">802.11ax outdoor (mesh)</text>
  <line x1="430" y1="330" x2="160" y2="400" class="wire"/>

  <rect x="60" y="540" width="200" height="58" class="dev box"/>
  <text x="160" y="562" text-anchor="middle" class="tit">Tablet rugged ×4</text>
  <text x="160" y="580" text-anchor="middle" class="sub">scanner 3D / Lidar — nuvole di punti</text>
  <path d="M160 452 L160 540" class="rf"/>

  <!-- PoE cameras -->
  <rect x="400" y="400" width="180" height="52" class="dev box"/>
  <text x="490" y="421" text-anchor="middle" class="tit">Telecamere IP timelapse</text>
  <text x="490" y="439" text-anchor="middle" class="sub">×3 — PoE, 4K/8K</text>
  <line x1="490" y1="330" x2="490" y2="400" class="wire"/>

  <!-- IoT gateway + sensors -->
  <rect x="720" y="400" width="190" height="52" class="dev box"/>
  <text x="815" y="421" text-anchor="middle" class="tit">Gateway IoT</text>
  <text x="815" y="439" text-anchor="middle" class="sub">broker MQTT — LoRa/Zigbee/RS-485</text>
  <line x1="560" y1="330" x2="815" y2="400" class="wire"/>

  <rect x="710" y="540" width="210" height="58" class="dev box"/>
  <text x="815" y="562" text-anchor="middle" class="tit">Sensori sicurezza ×25</text>
  <text x="815" y="580" text-anchor="middle" class="sub">gas, fumi, vibrazioni, T, umidità…</text>
  <path d="M815 452 L815 540" class="rf"/>

  <!-- legend -->
  <rect x="40" y="120" width="250" height="96" rx="8" fill="#ffffff" stroke="#dadce0"/>
  <text x="52" y="140" class="sub" font-weight="700" fill="#202124">Legenda</text>
  <line x1="54" y1="156" x2="84" y2="156" class="wire"/><text x="92" y="160" class="sub">cablato (Ethernet/PoE)</text>
  <line x1="54" y1="178" x2="84" y2="178" class="rf"/><text x="92" y="182" class="sub">wireless (Wi-Fi / RF)</text>
  <line x1="54" y1="200" x2="84" y2="200" class="vpn"/><text x="92" y="204" class="sub">tunnel VPN cifrato</text>
</svg>
