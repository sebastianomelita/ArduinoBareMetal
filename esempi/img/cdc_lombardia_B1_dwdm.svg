<!-- ====================== NOTA B1 ====================== -->
<rect x="320" y="328" width="300" height="74" rx="6" fill="#FFFFFF" stroke="#C8772E" stroke-width="0.6" opacity="0.95"/>
<text class="th" x="332" y="346" fill="#9A5A1E">Opzione B1 — bridging L2</text>
<text class="tt" x="332" y="362">• Trasporto: una λ DWDM dedicata per tratta, dorsale comune</text>
<text class="tt" x="332" y="377">• VLAN 30 sensori = 10.30.0.0/24, subnet UNICA estesa ai tratti</text>
<text class="tt" x="332" y="392">• Termina sul Core Switch multilayer (gw/SVI .254), no NAT per tratta</text>

