<svg width="100%" viewBox="0 0 1100 800" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
<title>CdC Lombardia — Opzione B1 (L2 + DWDM): rete di reti LoRaWAN</title>
<desc>Tre tratti autostradali, ciascuno con anello ERPS di switch L2 e gateway LoRaWAN, collegati al CdC Lombardia tramite una lunghezza d'onda DWDM dedicata su dorsale comune; terminazione su Core Switch multilayer; overlay applicativo MQTT verso il broker centrale.</desc>
<defs>
<style>
