</style>
</defs>

<!-- ====================== TITOLO ====================== -->
<text class="area-title" x="20" y="28">CdC Lombardia — Opzione B1 (L2 + DWDM): rete di reti LoRaWAN</text>
<text class="ts" x="20" y="46">L2 LoRa (onde) nel tratto · trasporto su λ DWDM dedicata per tratta (ambra) · commutazione/SVI sul Core Switch · L7 MQTT (puntinato azzurro)</text>

