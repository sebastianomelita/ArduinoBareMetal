<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 600" font-family="Segoe UI, Arial, sans-serif">
<style>
  .lbl{font-size:12px;fill:#1f2937}
  .sub{font-size:10px;fill:#6b7280}
  .ttl{font-size:13px;font-weight:600;fill:#111827}
  .net{fill:none;stroke-width:1;stroke-dasharray:5 3}
  .rt{stroke:#2F7DD1}.sw{stroke:#15A179}.fw{stroke:#E24B4A}.srv{stroke:#7F77DD}.db{stroke:#6b7280}.cl{stroke:#9aa0a6}
  .body{fill:#ffffff}
  .arr{stroke:#9aa0a6;stroke-width:1.2;fill:none}
</style>
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round"/>
  </marker>
</defs>
<text class="ttl" x="350" y="22" text-anchor="middle">Architettura generale — rete di trasporto IP, gateway di confine, VPN</text>

<!-- reti laterali -->
<rect class="net sw" x="20" y="50" width="180" height="78" rx="10"/>
<text class="lbl" x="34" y="72" font-weight="600">Sito Cat. A</text>
<text class="sub" x="34" y="88">LAN locale + server edge</text>
<text class="sub" x="34" y="104">stazioni / metro princ.</text>

<rect class="net fw" x="20" y="250" width="180" height="78" rx="10" stroke="#BA7517"/>
<text class="lbl" x="34" y="272" font-weight="600">Sito Cat. B</text>
<text class="sub" x="34" y="288">2 reader diretti su WAN</text>
<text class="sub" x="34" y="304">fermate / pontili interm.</text>

<rect class="net" x="20" y="450" width="180" height="78" rx="10" stroke="#534AB7"/>
<text class="lbl" x="34" y="472" font-weight="600">Sede controllori</text>
<text class="sub" x="34" y="488">app verifica card</text>
<text class="sub" x="34" y="504">REST / HTTPS</text>

<!-- router CE (cilindro Cisco) -->
<g id="ceA" transform="translate(170,100)">
  <ellipse class="body rt" cx="0" cy="6" rx="20" ry="5.5"/>
  <path class="body rt" d="M-20 6 V-4 A20 5.5 0 0 1 20 -4 V6"/>
  <ellipse class="body rt" cx="0" cy="-4" rx="20" ry="5.5"/>
  <line class="rt" x1="-8" y1="-6" x2="10" y2="-6" marker-end="url(#a)" stroke-width="1.2"/>
  <line class="rt" x1="8" y1="-2" x2="-10" y2="-2" marker-end="url(#a)" stroke-width="1.2"/>
  <text class="sub" x="0" y="22" text-anchor="middle">CE-A</text>
</g>
<g transform="translate(170,300)">
  <ellipse class="body rt" cx="0" cy="6" rx="20" ry="5.5"/>
  <path class="body rt" d="M-20 6 V-4 A20 5.5 0 0 1 20 -4 V6"/>
  <ellipse class="body rt" cx="0" cy="-4" rx="20" ry="5.5"/>
  <line class="rt" x1="-8" y1="-6" x2="10" y2="-6" marker-end="url(#a)" stroke-width="1.2"/>
  <line class="rt" x1="8" y1="-2" x2="-10" y2="-2" marker-end="url(#a)" stroke-width="1.2"/>
  <line class="rt" x1="0" y1="-9" x2="0" y2="-22" stroke-width="1"/>
  <path class="rt" d="M-6 -24 q6 -6 12 0" fill="none" stroke-width="0.9"/>
  <text class="sub" x="0" y="22" text-anchor="middle">CE-B (4G/5G)</text>
</g>
<g transform="translate(170,500)">
  <ellipse class="body rt" cx="0" cy="6" rx="20" ry="5.5"/>
  <path class="body rt" d="M-20 6 V-4 A20 5.5 0 0 1 20 -4 V6"/>
  <ellipse class="body rt" cx="0" cy="-4" rx="20" ry="5.5"/>
  <line class="rt" x1="-8" y1="-6" x2="10" y2="-6" marker-end="url(#a)" stroke-width="1.2"/>
  <line class="rt" x1="8" y1="-2" x2="-10" y2="-2" marker-end="url(#a)" stroke-width="1.2"/>
  <text class="sub" x="0" y="22" text-anchor="middle">CE-C</text>
</g>

<!-- cloud -->
<path class="body cl" d="M270 270 q-18 0 -22 -22 q-30 -6 -22 -34 q-20 -22 8 -36 q4 -30 40 -24 q18 -28 52 -12 q30 -18 50 8 q34 -4 30 30 q26 12 8 40 q10 30 -26 30 q-12 22 -44 12 q-26 18 -52 0 q-28 8 -30 -10 Z" transform="translate(70,130)"/>
<text class="ttl" x="410" y="285" text-anchor="middle">Rete di trasporto IP</text>
<text class="sub" x="410" y="301" text-anchor="middle">metropolitana — core MPLS/IP</text>

<!-- access links -->
<line class="arr" x1="192" y1="95" x2="300" y2="240" marker-end="url(#a)"/>
<line class="arr" x1="200" y1="295" x2="300" y2="290" marker-end="url(#a)"/>
<line class="arr" x1="192" y1="495" x2="300" y2="335" marker-end="url(#a)"/>

<!-- SUM -->
<rect x="500" y="46" width="180" height="500" rx="12" fill="none" stroke="#534AB7" stroke-width="0.8"/>
<text class="ttl" x="590" y="68" text-anchor="middle">SUM — datacenter</text>

<g transform="translate(590,112)">
  <ellipse class="body rt" cx="0" cy="6" rx="22" ry="6"/>
  <path class="body rt" d="M-22 6 V-4 A22 6 0 0 1 22 -4 V6"/>
  <ellipse class="body rt" cx="0" cy="-4" rx="22" ry="6"/>
  <line class="rt" x1="-9" y1="-6" x2="10" y2="-6" marker-end="url(#a)" stroke-width="1.3"/>
  <line class="rt" x1="8" y1="-1" x2="-11" y2="-1" marker-end="url(#a)" stroke-width="1.3"/>
</g>
<text class="sub" x="590" y="138" text-anchor="middle">Gateway di confine (PE)</text>

<g transform="translate(590,168)">
  <rect class="body fw" x="-25" y="-7" width="50" height="32" rx="2"/>
  <line class="fw" x1="-25" y1="4" x2="25" y2="4" stroke-width="0.7"/>
  <line class="fw" x1="-25" y1="14" x2="25" y2="14" stroke-width="0.7"/>
  <line class="fw" x1="-8" y1="-7" x2="-8" y2="4" stroke-width="0.7"/>
  <line class="fw" x1="9" y1="-7" x2="9" y2="4" stroke-width="0.7"/>
  <line class="fw" x1="0" y1="4" x2="0" y2="14" stroke-width="0.7"/>
  <line class="fw" x1="-8" y1="14" x2="-8" y2="25" stroke-width="0.7"/>
  <line class="fw" x1="9" y1="14" x2="9" y2="25" stroke-width="0.7"/>
</g>
<text class="sub" x="590" y="206" text-anchor="middle">Firewall + WAF</text>

<g transform="translate(590,236)">
  <rect class="body sw" x="-28" y="-2" width="56" height="26" rx="3"/>
  <line class="sw" x1="-18" y1="5" x2="14" y2="5" marker-end="url(#a)" stroke-width="1.1"/>
  <line class="sw" x1="18" y1="10" x2="-14" y2="10" marker-end="url(#a)" stroke-width="1.1"/>
  <line class="sw" x1="-18" y1="16" x2="14" y2="16" marker-end="url(#a)" stroke-width="1.1"/>
</g>
<text class="sub" x="590" y="278" text-anchor="middle">Core switch</text>

<g transform="translate(534,300)">
  <rect class="body srv" x="-13" y="0" width="26" height="44" rx="3"/>
  <line class="srv" x1="-13" y1="14" x2="13" y2="14" stroke-width="0.7"/>
  <line class="srv" x1="-13" y1="28" x2="13" y2="28" stroke-width="0.7"/>
  <circle cx="-8" cy="7" r="1.4" fill="#7F77DD"/>
</g>
<text class="sub" x="534" y="358" text-anchor="middle">Broker MQTT</text>
<g transform="translate(580,300)">
  <rect class="body srv" x="-13" y="0" width="26" height="44" rx="3"/>
  <line class="srv" x1="-13" y1="14" x2="13" y2="14" stroke-width="0.7"/>
  <line class="srv" x1="-13" y1="28" x2="13" y2="28" stroke-width="0.7"/>
  <circle cx="-8" cy="7" r="1.4" fill="#7F77DD"/>
</g>
<text class="sub" x="580" y="358" text-anchor="middle">App server</text>
<g transform="translate(632,300)">
  <rect class="body db" x="-13" y="0" width="26" height="44" rx="3"/>
  <ellipse class="body db" cx="0" cy="6" rx="12" ry="3.4"/>
  <ellipse cx="0" cy="20" rx="12" ry="3.4" fill="none" stroke="#6b7280" stroke-width="0.7"/>
  <ellipse cx="0" cy="34" rx="12" ry="3.4" fill="none" stroke="#6b7280" stroke-width="0.7"/>
</g>
<text class="sub" x="632" y="358" text-anchor="middle">DB</text>

<line class="arr" x1="590" y1="118" x2="590" y2="160" marker-end="url(#a)"/>
<line class="arr" x1="590" y1="194" x2="590" y2="234" marker-end="url(#a)"/>
<line class="arr" x1="590" y1="262" x2="590" y2="298" marker-end="url(#a)"/>
<line class="arr" x1="520" y1="240" x2="566" y2="120" marker-end="url(#a)"/>

<!-- VPN tunnels -->
<path d="M178 84 Q400 30 575 92" fill="none" stroke="#15A179" stroke-width="1.4" stroke-dasharray="6 4"/>
<path d="M188 286 Q420 200 570 98" fill="none" stroke="#BA7517" stroke-width="1.4" stroke-dasharray="6 4"/>
<path d="M180 486 Q430 420 572 102" fill="none" stroke="#534AB7" stroke-width="1.4" stroke-dasharray="6 4"/>

<!-- legenda -->
<rect x="20" y="552" width="660" height="40" rx="6" fill="none" stroke="#d1d5db" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="34" y1="566" x2="60" y2="566" class="arr"/>
<text class="sub" x="66" y="570">Access link fisico</text>
<line x1="190" y1="566" x2="216" y2="566" stroke="#15A179" stroke-width="1.4" stroke-dasharray="6 4"/>
<text class="sub" x="222" y="570">Tunnel VPN IPsec</text>
<text class="sub" x="360" y="570">Router=cilindro · Switch=box+frecce · Firewall=muretto · Server=tower</text>
</svg>
