<svg viewBox="0 0 980 500" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .tit{font-size:13px;font-weight:700;fill:#202124}
    .sub{font-size:11px;fill:#5f6368}
    .net{fill:#fef7e0;stroke:#ea8600}
    .sec{fill:#fce8e6;stroke:#d93025}
    .core{fill:#e8eaf6;stroke:#3949ab}
    .sw{fill:#e8f0fe;stroke:#1a73e8}
    .srv{fill:#e6f4ea;stroke:#137333}
    .lk{stroke:#5f6368;stroke-width:2;fill:none}
  </style>
  <text x="490" y="26" text-anchor="middle" class="tit" font-size="16">5 · Albero degli apparati attivi (con VLAN e indirizzi)</text>

  <ellipse cx="490" cy="66" rx="80" ry="26" class="net" stroke-width="2"/>
  <text x="490" y="70" text-anchor="middle" class="sub" font-weight="600">Internet (FTTH)</text>

  <rect x="395" y="110" width="190" height="40" rx="6" class="sw" stroke-width="1.5"/>
  <text x="490" y="135" text-anchor="middle" class="sub" font-weight="700">Router perimetrale</text>
  <line x1="490" y1="92" x2="490" y2="110" class="lk"/>

  <rect x="380" y="166" width="220" height="44" rx="6" class="sec" stroke-width="2"/>
  <text x="490" y="192" text-anchor="middle" class="sub" font-weight="700">NGFW/UTM + concentratore VPN</text>
  <line x1="490" y1="150" x2="490" y2="166" class="lk"/>

  <rect x="380" y="226" width="220" height="48" rx="6" class="core" stroke-width="2"/>
  <text x="490" y="248" text-anchor="middle" class="tit">Core switch L3 (BD)</text>
  <text x="490" y="265" text-anchor="middle" class="sub">routing inter-VLAN · mgmt VLAN 99</text>
  <line x1="490" y1="210" x2="490" y2="226" class="lk"/>

  <!-- branches -->
  <rect x="40" y="330" width="200" height="56" rx="6" class="sw" stroke-width="1.5"/>
  <text x="140" y="352" text-anchor="middle" class="sub" font-weight="700">Switch accesso FD-PT</text>
  <text x="140" y="370" text-anchor="middle" class="sub">PoE · TO+AP · VLAN 10/20</text>
  <line x1="430" y1="274" x2="140" y2="330" class="lk"/>

  <rect x="270" y="330" width="200" height="56" rx="6" class="sw" stroke-width="1.5"/>
  <text x="370" y="352" text-anchor="middle" class="sub" font-weight="700">Switch accesso FD-P1</text>
  <text x="370" y="370" text-anchor="middle" class="sub">PoE · TO+AP · VLAN 10/20</text>
  <line x1="460" y1="274" x2="370" y2="330" class="lk"/>

  <rect x="500" y="330" width="220" height="56" rx="6" class="srv" stroke-width="2"/>
  <text x="610" y="352" text-anchor="middle" class="sub" font-weight="700">Server farm — VLAN 30</text>
  <text x="610" y="370" text-anchor="middle" class="sub">NAS/SAN, app BIM, AD/RADIUS, DB, MQTT</text>
  <line x1="520" y1="274" x2="610" y2="330" class="lk"/>

  <rect x="750" y="330" width="190" height="56" rx="6" class="sec" stroke-width="1.5"/>
  <text x="845" y="352" text-anchor="middle" class="sub" font-weight="700">DMZ — VLAN 40</text>
  <text x="845" y="370" text-anchor="middle" class="sub">repository ricezione, reverse proxy</text>
  <line x1="555" y1="274" x2="845" y2="330" class="lk"/>

  <!-- leaves -->
  <rect x="60" y="430" width="160" height="34" rx="5" fill="#fff" stroke="#1565c0"/>
  <text x="140" y="452" text-anchor="middle" class="sub">TO / AP (10.0.10–20.x)</text>
  <line x1="140" y1="386" x2="140" y2="430" class="lk"/>
  <rect x="290" y="430" width="160" height="34" rx="5" fill="#fff" stroke="#1565c0"/>
  <text x="370" y="452" text-anchor="middle" class="sub">TO / AP (10.0.10–20.x)</text>
  <line x1="370" y1="386" x2="370" y2="430" class="lk"/>
  <rect x="525" y="430" width="170" height="34" rx="5" fill="#fff" stroke="#137333"/>
  <text x="610" y="452" text-anchor="middle" class="sub">server fissi 10.0.30.x</text>
  <line x1="610" y1="386" x2="610" y2="430" class="lk"/>
</svg>
