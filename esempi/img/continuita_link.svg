<svg viewBox="0 0 980 420" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .tit{font-size:13px;font-weight:700;fill:#202124}
    .sub{font-size:11px;fill:#5f6368}
    .dev{fill:#e8f0fe;stroke:#1a73e8}
    .sec{fill:#fce8e6;stroke:#d93025}
    .net{fill:#fef7e0;stroke:#ea8600}
    .ok{stroke:#137333;stroke-width:3;fill:none}
    .bk{stroke:#9aa0a6;stroke-width:2;stroke-dasharray:5 4;fill:none}
  </style>
  <text x="490" y="26" text-anchor="middle" class="tit" font-size="16">Continuità del link verso la VPN — dual-WAN + VRRP</text>

  <!-- cantiere -->
  <rect x="40" y="70" width="250" height="180" rx="8" fill="#f8f9fa" stroke="#dadce0"/>
  <text x="165" y="92" text-anchor="middle" class="tit">Cantiere</text>
  <rect x="58" y="104" width="214" height="40" rx="6" class="dev" stroke-width="1.5"/>
  <text x="165" y="122" text-anchor="middle" class="sub">Gateway dual-SIM</text>
  <text x="165" y="137" text-anchor="middle" class="sub">VPN client + DPD/keepalive</text>
  <rect x="58" y="156" width="100" height="34" rx="6" class="net" stroke-width="1.5"/>
  <text x="108" y="177" text-anchor="middle" class="sub">SIM A (5G)</text>
  <rect x="172" y="156" width="100" height="34" rx="6" class="net" stroke-width="1.5"/>
  <text x="222" y="177" text-anchor="middle" class="sub">SIM B / SAT</text>
  <text x="165" y="212" text-anchor="middle" class="sub">attivo → failover automatico</text>
  <line x1="108" y1="190" x2="108" y2="124" class="ok"/>
  <line x1="222" y1="190" x2="222" y2="124" class="bk"/>

  <!-- internet -->
  <ellipse cx="490" cy="160" rx="90" ry="44" class="net" stroke-width="2"/>
  <text x="490" y="156" text-anchor="middle" class="sub" font-weight="600">Internet</text>
  <text x="490" y="174" text-anchor="middle" class="sub">2 tunnel ridondati</text>
  <line x1="290" y1="150" x2="402" y2="150" class="ok"/>
  <line x1="290" y1="200" x2="405" y2="180" class="bk"/>

  <!-- sede HA -->
  <rect x="640" y="60" width="300" height="300" rx="8" fill="#f8f9fa" stroke="#dadce0"/>
  <text x="790" y="82" text-anchor="middle" class="tit">Sede — concentratore VPN in HA</text>
  <rect x="660" y="100" width="120" height="60" rx="6" class="sec" stroke-width="1.5"/>
  <text x="720" y="125" text-anchor="middle" class="sub" font-weight="700">FW/VPN #1</text>
  <text x="720" y="142" text-anchor="middle" class="sub">MASTER · prio 100</text>
  <rect x="800" y="100" width="120" height="60" rx="6" class="sec" stroke-width="1.5"/>
  <text x="860" y="125" text-anchor="middle" class="sub" font-weight="700">FW/VPN #2</text>
  <text x="860" y="142" text-anchor="middle" class="sub">BACKUP · prio 90</text>
  <rect x="700" y="190" width="180" height="44" rx="6" fill="#e6f4ea" stroke="#137333" stroke-width="1.5"/>
  <text x="790" y="210" text-anchor="middle" class="sub" font-weight="700">VIP VRRP condiviso</text>
  <text x="790" y="226" text-anchor="middle" class="sub">i tunnel terminano qui</text>
  <line x1="720" y1="160" x2="775" y2="190" class="ok"/>
  <line x1="860" y1="160" x2="805" y2="190" class="bk"/>
  <text x="790" y="270" text-anchor="middle" class="sub">keepalived: se il MASTER cade, il BACKUP</text>
  <text x="790" y="286" text-anchor="middle" class="sub">prende il VIP → failover trasparente</text>
  <text x="790" y="320" text-anchor="middle" class="sub">+ doppio ISP / 4G in failover lato sede</text>
  <line x1="580" y1="158" x2="700" y2="205" class="ok"/>

  <text x="60" y="300" class="sub" font-weight="700" fill="#137333">——— percorso attivo</text>
  <text x="260" y="300" class="sub" fill="#9aa0a6">- - - percorso di backup</text>
</svg>
