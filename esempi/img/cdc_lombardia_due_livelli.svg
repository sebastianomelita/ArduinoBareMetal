<svg width="100%" viewBox="0 0 1100 800" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
<title>CdC Lombardia — rete di reti LoRaWAN a due livelli (L3 IP / L7 MQTT)</title>
<desc>Tre tratti autostradali con switch L2 di tratto e nodi edge (gateway + network server + application server) collegati al CdC Lombardia tramite dorsali IP; i link radio sensore-gateway sono LoRaWAN 868 MHz; sovrapposto il piano applicativo MQTT con il broker come router applicativo.</desc>
<defs>
<style>
.t  { font-size: 14px; fill: #2C2C2A; }
.ts { font-size: 12px; fill: #5F5E5A; }
.th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
.tt { font-size: 11px; fill: #5F5E5A; }
.area-title { font-size: 15px; font-weight: 500; fill: #2C2C2A; }
</style>
</defs>

<!-- ====================== TITOLO ====================== -->
<text class="area-title" x="20" y="28">CdC Lombardia — rete di reti LoRaWAN a due livelli</text>
<text class="ts" x="20" y="46">L2 LoRa (onde verdi) sensore↔gateway · L3 IP (tratteggio nero) tra firewall · L7 MQTT (puntinato azzurro) come piano applicativo sopra IP</text>

