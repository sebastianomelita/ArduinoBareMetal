<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
<title>Topologia LoRaWAN del km autostradale</title>
<desc>Sensori end-device LoRaWAN distribuiti lungo il km, gateway baricentrico nel cabinet del pannello PMV, uplink IP verso il CdC.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.t { font-size: 14px; fill: #2C2C2A; }
.ts { font-size: 12px; fill: #5F5E5A; }
.th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
</style>
</defs>

<!-- ===== Centro di Controllo (in alto) ===== -->
<rect x="220" y="20" width="280" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="360" y="42" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Centro di Controllo regionale</text>

<!-- uplink CdC <- smart-gate -->
<line x1="360" y1="120" x2="360" y2="66" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="372" y="96">fibra ottica + 5G backup (MQTT su TLS)</text>

<!-- ===== Smart-gate cabinet ===== -->
<rect x="220" y="120" width="280" height="104" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="360" y="146" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Smart-gate (cabinet a portale)</text>
<text class="ts" x="360" y="168" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Pannello PMV · Gateway LoRaWAN</text>
<text class="ts" x="360" y="186" text-anchor="middle" dominant-baseline="central" fill="#534AB7">SoC edge · Switch + uplink fibra</text>
<text class="ts" x="360" y="206" text-anchor="middle" dominant-baseline="central" fill="#534AB7">5-7 m di altezza · posizione baricentrica</text>

<!-- antenna sopra il cabinet -->
<line x1="540" y1="120" x2="540" y2="104" stroke="#534AB7" stroke-width="1.5"/>
<circle cx="540" cy="101" r="3" fill="#534AB7"/>

<!-- palo del portale -->
<rect x="350" y="224" width="20" height="56" rx="2" fill="#5F5E5A" opacity="0.5"/>

<!-- ===== etichetta radio (in zona libera a destra) ===== -->
<text class="ts" x="512" y="250" fill="#1D9E75">radio LoRaWAN</text>
<text class="ts" x="512" y="266" fill="#1D9E75">ISM 868 MHz</text>

<!-- ===== onde radio dai sensori verso l'antenna (540,101) ===== -->
<path d="M92 320 C 200 240, 420 150, 537 104" stroke="#1D9E75" stroke-width="0.8" fill="none" stroke-dasharray="4 4" opacity="0.5"/>
<path d="M202 320 C 290 250, 430 160, 537 104" stroke="#1D9E75" stroke-width="0.8" fill="none" stroke-dasharray="4 4" opacity="0.5"/>
<path d="M312 320 C 380 260, 460 180, 537 104" stroke="#1D9E75" stroke-width="0.8" fill="none" stroke-dasharray="4 4" opacity="0.5"/>
<path d="M462 320 C 500 270, 522 200, 538 104" stroke="#1D9E75" stroke-width="0.8" fill="none" stroke-dasharray="4 4" opacity="0.5"/>
<path d="M600 320 C 590 250, 560 170, 542 104" stroke="#1D9E75" stroke-width="0.8" fill="none" stroke-dasharray="4 4" opacity="0.5"/>

<!-- ===== fascia strada ===== -->
<rect x="40" y="360" width="600" height="40" rx="2" fill="#888780" opacity="0.12"/>
<line x1="40" y1="360" x2="640" y2="360" stroke="#5F5E5A" stroke-width="0.5" opacity="0.4"/>
<line x1="40" y1="400" x2="640" y2="400" stroke="#5F5E5A" stroke-width="0.5" opacity="0.4"/>
<line x1="40" y1="380" x2="640" y2="380" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="8 8" opacity="0.4"/>
<text class="ts" x="46" y="395">km 0</text>
<text class="ts" x="606" y="395">km 1</text>

<!-- ===== sensori (sopra la fascia strada) ===== -->
<rect x="60" y="320" width="64" height="32" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="92" y="337" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">meteo</text>

<rect x="170" y="320" width="64" height="32" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="202" y="337" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">aria</text>

<rect x="280" y="320" width="64" height="32" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="312" y="337" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">fondo</text>

<rect x="430" y="320" width="64" height="32" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="462" y="337" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">fonom.</text>

<rect x="568" y="320" width="64" height="32" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="600" y="337" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">aria</text>

<!-- ===== note in basso ===== -->
<text class="ts" x="40" y="425">Sensori a batteria o supercondensatore + microfotovoltaico (autonomia indefinita)</text>
<text class="ts" x="40" y="442">Gateway alimentato dalla linea del pannello PMV (rete o FV grande)</text>
<text class="ts" x="40" y="459">Decine di sensori per km, tutti agganciati a un unico gateway baricentrico</text>
</svg>
