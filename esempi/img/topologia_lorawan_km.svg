<svg width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
<title>Topologia LoRaWAN del km autostradale</title>
<desc>Sensori end-device LoRaWAN distribuiti lungo il km, gateway baricentrico nel cabinet del maxi-schermo, uplink IP verso il CdC.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.t { font-size: 14px; fill: #2C2C2A; }
.ts { font-size: 12px; fill: #5F5E5A; }
.th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
</style>
</defs>

<rect x="40" y="270" width="600" height="40" rx="2" fill="#888780" opacity="0.12"/>
<line x1="40" y1="270" x2="640" y2="270" stroke="#5F5E5A" stroke-width="0.5" opacity="0.4"/>
<line x1="40" y1="310" x2="640" y2="310" stroke="#5F5E5A" stroke-width="0.5" opacity="0.4"/>
<line x1="40" y1="290" x2="640" y2="290" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="8 8" opacity="0.4"/>

<text class="ts" x="48" y="262">km 0</text>
<text class="ts" x="620" y="262">km 1</text>

<rect x="60" y="320" width="64" height="34" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="92" y="341" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">meteo</text>

<rect x="170" y="320" width="64" height="34" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="202" y="341" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">aria</text>

<rect x="280" y="320" width="64" height="34" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="312" y="341" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">fondo</text>

<rect x="430" y="320" width="64" height="34" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="462" y="341" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">fonom.</text>

<rect x="540" y="320" width="64" height="34" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="572" y="341" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">aria</text>

<path d="M92 320 Q 92 280 360 215" stroke="#1D9E75" stroke-width="0.8" fill="none" stroke-dasharray="3 3" opacity="0.55"/>
<path d="M202 320 Q 220 280 360 215" stroke="#1D9E75" stroke-width="0.8" fill="none" stroke-dasharray="3 3" opacity="0.55"/>
<path d="M312 320 Q 330 280 360 215" stroke="#1D9E75" stroke-width="0.8" fill="none" stroke-dasharray="3 3" opacity="0.55"/>
<path d="M462 320 Q 440 280 360 215" stroke="#1D9E75" stroke-width="0.8" fill="none" stroke-dasharray="3 3" opacity="0.55"/>
<path d="M572 320 Q 540 280 360 215" stroke="#1D9E75" stroke-width="0.8" fill="none" stroke-dasharray="3 3" opacity="0.55"/>

<text class="ts" x="475" y="265">radio LoRaWAN — banda ISM 868 MHz</text>

<rect x="345" y="195" width="30" height="80" rx="2" fill="#5F5E5A" opacity="0.6"/>

<rect x="220" y="115" width="280" height="100" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="360" y="140" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Smart-gate (cabinet a portale)</text>
<text class="ts" x="360" y="162" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Maxi-schermo · Gateway LoRaWAN</text>
<text class="ts" x="360" y="180" text-anchor="middle" dominant-baseline="central" fill="#534AB7">SoC edge · Switch + uplink fibra</text>
<text class="ts" x="360" y="200" text-anchor="middle" dominant-baseline="central" fill="#534AB7">5-7 m di altezza · posizione baricentrica</text>

<line x1="360" y1="115" x2="360" y2="60" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="370" y="90">fibra ottica + 5G backup (MQTT su TLS)</text>

<rect x="220" y="20" width="280" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="360" y="42" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Centro di Controllo regionale</text>

<text class="ts" x="40" y="395">Sensori a batteria + microfotovoltaico (autonomia indefinita)</text>
<text class="ts" x="40" y="412">Gateway alimentato dalla linea del maxi-schermo (rete o FV grande)</text>
<text class="ts" x="40" y="429">Decine di sensori per km, tutti agganciati a un unico gateway baricentrico</text>
</svg>
