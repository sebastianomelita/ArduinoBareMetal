<svg width="100%" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
<title>Architettura gerarchica smart-road a tre livelli</title>
<desc>Smart-gate al livello edge, Centri di Controllo regionali al livello intermedio, Centro Nazionale active-active al vertice.</desc>
