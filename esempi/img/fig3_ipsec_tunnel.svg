<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" width="720" height="400" font-family="Segoe UI, system-ui, sans-serif">
  <text x="360" y="22" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2937">Punto D — VPN IPsec site-to-site (settori commerciali)</text>
  <!-- tunnel label -->
  <rect x="285" y="40" width="150" height="26" rx="13" fill="#fee2e2" stroke="#dc2626" stroke-width="1.4"/>
  <text x="360" y="58" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">Tunnel IPsec ESP</text>
  <!-- internet cloud -->
  <ellipse cx="360" cy="170" rx="120" ry="62" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="360" y="160" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">INTERNET</text>
  <text x="360" y="178" text-anchor="middle" font-size="10" fill="#64748b">traffico cifrato end-to-end</text>
  <!-- tunnel dashed arc -->
  <path d="M150 175 C 250 90, 470 90, 570 175" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="7 5"/>
  <path d="M150 200 C 250 270, 470 270, 570 200" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="7 5"/>
  <!-- Edificio 1 -->
  <rect x="20" y="120" width="140" height="120" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.4"/>
  <text x="90" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Edificio 1</text>
  <ellipse cx="60" cy="185" rx="34" ry="24" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.3"/>
  <text x="60" y="182" text-anchor="middle" font-size="9" fill="#14532d">LAN comm.</text>
  <text x="60" y="194" text-anchor="middle" font-size="8" fill="#14532d">172.16.0.0/22</text>
  <rect x="104" y="166" width="44" height="38" rx="6" fill="#fde68a" stroke="#d97706" stroke-width="1.3"/>
  <text x="126" y="183" text-anchor="middle" font-size="9" font-weight="600" fill="#78350f">router1</text>
  <text x="126" y="195" text-anchor="middle" font-size="8" fill="#78350f">+FW/VPN</text>
  <text x="90" y="228" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">IP pubbl. 200.1.2.3</text>
  <!-- Edificio 2 -->
  <rect x="560" y="120" width="140" height="120" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.4"/>
  <text x="630" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Edificio 2</text>
  <rect x="572" y="166" width="44" height="38" rx="6" fill="#fde68a" stroke="#d97706" stroke-width="1.3"/>
  <text x="594" y="183" text-anchor="middle" font-size="9" font-weight="600" fill="#78350f">router1</text>
  <text x="594" y="195" text-anchor="middle" font-size="8" fill="#78350f">+FW/VPN</text>
  <ellipse cx="660" cy="185" rx="34" ry="24" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.3"/>
  <text x="660" y="182" text-anchor="middle" font-size="9" fill="#14532d">VLAN 20</text>
  <text x="660" y="194" text-anchor="middle" font-size="8" fill="#14532d">192.168.1.32/27</text>
  <text x="630" y="228" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">IP pubbl. 200.1.2.4</text>
  <!-- params strip -->
  <rect x="60" y="300" width="600" height="70" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.2"/>
  <text x="360" y="322" text-anchor="middle" font-size="12" font-weight="700" fill="#78350f">Parametri del tunnel</text>
  <text x="360" y="344" text-anchor="middle" font-size="10" fill="#374151">IKEv2 · DH gruppo 14 · ESP tunnel mode · AES-256-GCM · HMAC-SHA256</text>
  <text x="360" y="360" text-anchor="middle" font-size="10" fill="#374151">PFS attivo · autenticazione tramite certificati X.509 · subnet di transito 10.10.10.0/30</text>
</svg>
