<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 700" font-family="Segoe UI, Arial, sans-serif">
<style>
  .lbl{font-size:12px;fill:#1f2937}.sub{font-size:10px;fill:#6b7280}.ttl{font-size:15px;font-weight:600;fill:#111827}
  .zone{font-size:11px;font-weight:600;fill:#374151}
  .body{fill:#fff}.rt{stroke:#2F7DD1}.sw{stroke:#15A179}.fw{stroke:#E24B4A}.srv{stroke:#7F77DD}.db{stroke:#6b7280}
  .wire{stroke:#374151;stroke-width:1.1;fill:none}
  .zbox{fill:none;stroke:#cbd5e1;stroke-width:1;stroke-dasharray:5 4}
</style>
<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5"/></marker></defs>

<text class="ttl" x="490" y="30" text-anchor="middle">Schema logico apparati attivi — Sede centrale (SUM)</text>

<!-- ingressi -->
<text class="sub" x="150" y="74" text-anchor="middle">Tunnel IPsec dai CE</text>
<text class="sub" x="150" y="88" text-anchor="middle">(Cat. A · Cat. B · controllori)</text>
<text class="sub" x="150" y="102" text-anchor="middle">10.255.1/2/3.0/30</text>
<path class="wire" d="M230 100 Q360 120 458 158" marker-end="url(#a)"/>
<text class="sub" x="830" y="74" text-anchor="middle">WAN pubblica 198.64.5.1</text>
<text class="sub" x="830" y="88" text-anchor="middle">port-forward :8883 → broker</text>
<text class="sub" x="830" y="102" text-anchor="middle">:443 → WAF</text>
<path class="wire" d="M750 100 Q620 120 522 158" marker-end="url(#a)"/>

<!-- FW-SUM -->
<g transform="translate(490,170)">
  <rect class="body fw" x="-27" y="-16" width="54" height="32" rx="2"/>
  <line class="fw" x1="-27" y1="-5.5" x2="27" y2="-5.5" stroke-width="0.7"/><line class="fw" x1="-27" y1="5.5" x2="27" y2="5.5" stroke-width="0.7"/>
  <line class="fw" x1="-9" y1="-16" x2="-9" y2="-5.5" stroke-width="0.7"/><line class="fw" x1="10" y1="-16" x2="10" y2="-5.5" stroke-width="0.7"/>
  <line class="fw" x1="0" y1="-5.5" x2="0" y2="5.5" stroke-width="0.7"/><line class="fw" x1="-9" y1="5.5" x2="-9" y2="16" stroke-width="0.7"/><line class="fw" x1="10" y1="5.5" x2="10" y2="16" stroke-width="0.7"/>
</g>
<text class="lbl" x="490" y="205" text-anchor="middle" font-weight="600">FW-SUM — gateway di confine (PE)</text>
<text class="sub" x="490" y="220" text-anchor="middle">+ WAF + IDS/IPS · L3 multi-zona · default-deny</text>

<!-- legami verso le 3 zone -->
<path class="wire" d="M468 184 Q300 230 195 270" marker-end="url(#a)"/>
<path class="wire" d="M490 186 L490 268" marker-end="url(#a)"/>
<path class="wire" d="M512 184 Q700 230 810 270" marker-end="url(#a)"/>

<!-- ===== ZONA DMZ ===== -->
<rect class="zbox" x="70" y="262" width="250" height="200" rx="6"/>
<text class="zone" x="82" y="280">DMZ — 10.0.1.0/28 (gw .1)</text>
<text class="sub" x="195" y="300" text-anchor="middle">Broker MQTT cluster active-active · VIP 10.0.1.2</text>
<g transform="translate(160,335)"><rect class="body srv" x="-13" y="-18" width="26" height="36" rx="3"/><line class="srv" x1="-13" y1="-5" x2="13" y2="-5" stroke-width="0.7"/><line class="srv" x1="-13" y1="7" x2="13" y2="7" stroke-width="0.7"/><circle cx="-8" cy="-12" r="1.4" fill="#7F77DD"/></g>
<g transform="translate(230,335)"><rect class="body srv" x="-13" y="-18" width="26" height="36" rx="3"/><line class="srv" x1="-13" y1="-5" x2="13" y2="-5" stroke-width="0.7"/><line class="srv" x1="-13" y1="7" x2="13" y2="7" stroke-width="0.7"/><circle cx="-8" cy="-12" r="1.4" fill="#7F77DD"/></g>
<text class="sub" x="160" y="372" text-anchor="middle">node .3</text>
<text class="sub" x="230" y="372" text-anchor="middle">node .4</text>
<g transform="translate(195,415)"><rect class="body srv" x="-13" y="-16" width="26" height="32" rx="3"/><line class="srv" x1="-13" y1="-4" x2="13" y2="-4" stroke-width="0.7"/><line class="srv" x1="-13" y1="6" x2="13" y2="6" stroke-width="0.7"/></g>
<text class="sub" x="195" y="448" text-anchor="middle">WAF / reverse-proxy · 10.0.1.5</text>

<!-- ===== ZONA SERVER FARM ===== -->
<rect class="zbox" x="350" y="262" width="280" height="320" rx="6"/>
<text class="zone" x="362" y="280">Server farm — 10.0.2.0/24 (gw .1)</text>
<!-- core switch -->
<g transform="translate(490,300)">
  <rect class="body sw" x="-28" y="-13" width="56" height="26" rx="3"/>
  <line class="sw" x1="-18" y1="-6" x2="14" y2="-6" marker-end="url(#a)"/><line class="sw" x1="18" y1="-1" x2="-14" y2="-1" marker-end="url(#a)"/><line class="sw" x1="-18" y1="4" x2="14" y2="4" marker-end="url(#a)"/>
</g>
<text class="sub" x="490" y="330" text-anchor="middle">CS-SUM · core L2 · 10.0.2.1</text>
<path class="wire" d="M472 312 L405 360" /><path class="wire" d="M490 314 L490 360"/><path class="wire" d="M508 312 L575 360"/>
<!-- app -->
<g transform="translate(405,385)"><rect class="body srv" x="-13" y="-18" width="26" height="36" rx="3"/><line class="srv" x1="-13" y1="-5" x2="13" y2="-5" stroke-width="0.7"/><line class="srv" x1="-13" y1="7" x2="13" y2="7" stroke-width="0.7"/><circle cx="-8" cy="-12" r="1.4" fill="#7F77DD"/></g>
<text class="sub" x="405" y="422" text-anchor="middle">App/core .2.10</text>
<!-- db -->
<g transform="translate(490,388)"><rect class="body db" x="-13" y="-16" width="26" height="32" rx="3"/><ellipse class="body db" cx="0" cy="-10" rx="12" ry="3.2"/><ellipse cx="0" cy="2" rx="12" ry="3.2" fill="none" stroke="#6b7280" stroke-width="0.7"/></g>
<text class="sub" x="490" y="422" text-anchor="middle">DB m/s .2.20/.21</text>
<!-- web -->
<g transform="translate(575,385)"><rect class="body srv" x="-13" y="-18" width="26" height="36" rx="3"/><line class="srv" x1="-13" y1="-5" x2="13" y2="-5" stroke-width="0.7"/><line class="srv" x1="-13" y1="7" x2="13" y2="7" stroke-width="0.7"/></g>
<text class="sub" x="575" y="422" text-anchor="middle">Web/API .2.30</text>
<!-- siem / dns -->
<g transform="translate(430,490)"><rect class="body db" x="-13" y="-16" width="26" height="32" rx="3"/><line class="db" x1="-13" y1="-4" x2="13" y2="-4" stroke-width="0.7"/><line class="db" x1="-13" y1="6" x2="13" y2="6" stroke-width="0.7"/></g>
<text class="sub" x="430" y="523" text-anchor="middle">SIEM .2.40</text>
<g transform="translate(550,490)"><rect class="body srv" x="-13" y="-16" width="26" height="32" rx="3"/><line class="srv" x1="-13" y1="-4" x2="13" y2="-4" stroke-width="0.7"/><line class="srv" x1="-13" y1="6" x2="13" y2="6" stroke-width="0.7"/></g>
<text class="sub" x="550" y="523" text-anchor="middle">DNS/NTP .2.5</text>
<path class="wire" d="M490 314 Q450 400 432 472"/><path class="wire" d="M490 314 Q540 400 550 472"/>

<!-- ===== ZONA ADMIN ===== -->
<rect class="zbox" x="700" y="262" width="210" height="200" rx="6"/>
<text class="zone" x="712" y="280">Admin — 10.0.3.0/28 (gw .1)</text>
<g transform="translate(770,340)"><rect class="body srv" x="-13" y="-18" width="26" height="36" rx="3"/><line class="srv" x1="-13" y1="-5" x2="13" y2="-5" stroke-width="0.7"/><line class="srv" x1="-13" y1="7" x2="13" y2="7" stroke-width="0.7"/><circle cx="-8" cy="-12" r="1.4" fill="#7F77DD"/></g>
<text class="sub" x="770" y="377" text-anchor="middle">NMS / monitor · 10.0.3.10</text>
<g transform="translate(840,340)"><rect class="body srv" x="-13" y="-18" width="26" height="36" rx="3"/><line class="srv" x1="-13" y1="-5" x2="13" y2="-5" stroke-width="0.7"/><line class="srv" x1="-13" y1="7" x2="13" y2="7" stroke-width="0.7"/></g>
<text class="sub" x="845" y="395" text-anchor="middle">jump host · 10.0.3.11</text>

<!-- legenda -->
<rect x="70" y="600" width="840" height="78" rx="6" fill="none" stroke="#d1d5db" stroke-width="0.5"/>
<text class="lbl" x="86" y="622" font-weight="600">Legenda</text>
<text class="sub" x="86" y="642">muretto = firewall (L3, zone) · box = switch L2 · tower = server · cilindro = database</text>
<text class="sub" x="86" y="660">DMZ = unica zona esposta ai siti (broker :8883, WAF :443). Server farm e admin NON raggiungibili dai siti remoti.</text>
<text class="sub" x="86" y="675">Filtraggio centralizzato sul FW-SUM (default-deny): le fermate Cat. B sono reader IP nativi senza policy locale.</text>
</svg>
