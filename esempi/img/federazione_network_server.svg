<svg width="100%" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
<title>Federazione dei network server LoRaWAN</title>
<desc>Un network server per CdC regionale, gateway distribuiti sui tratti, application server convergente al CN.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.t { font-size: 14px; fill: #2C2C2A; }
.ts { font-size: 12px; fill: #5F5E5A; }
.th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
</style>
</defs>

<rect x="200" y="30" width="280" height="76" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="340" y="55" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Centro Nazionale</text>
<text class="ts" x="340" y="78" text-anchor="middle" dominant-baseline="central" fill="#185FA5">Application server · DB · analytics</text>
<text class="ts" x="340" y="95" text-anchor="middle" dominant-baseline="central" fill="#185FA5">Roaming hub (opzionale)</text>

<line x1="270" y1="106" x2="140" y2="180" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="106" x2="340" y2="180" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="410" y1="106" x2="540" y2="180" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="440" y="145">MQTT bridge + REST</text>

<rect x="50" y="180" width="180" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="140" y="204" text-anchor="middle" dominant-baseline="central" fill="#085041">CdC Lombardia</text>
<text class="ts" x="140" y="225" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">network server regionale</text>
<text class="ts" x="140" y="243" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">~1.500 sensori, ~50 gw</text>

<rect x="250" y="180" width="180" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="340" y="204" text-anchor="middle" dominant-baseline="central" fill="#085041">CdC Toscana</text>
<text class="ts" x="340" y="225" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">network server regionale</text>
<text class="ts" x="340" y="243" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">~1.500 sensori, ~50 gw</text>

<rect x="450" y="180" width="180" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="540" y="204" text-anchor="middle" dominant-baseline="central" fill="#085041">CdC Sicilia</text>
<text class="ts" x="540" y="225" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">network server regionale</text>
<text class="ts" x="540" y="243" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">~1.500 sensori, ~50 gw</text>

<line x1="100" y1="260" x2="80" y2="320" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="140" y1="260" x2="170" y2="320" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="180" y1="260" x2="270" y2="320" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="200" y="295">packet forwarding (MQTT/UDP)</text>

<rect x="40" y="320" width="80" height="60" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="80" y="343" text-anchor="middle" dominant-baseline="central" fill="#3C3489">gw</text>
<text class="ts" x="80" y="362" text-anchor="middle" dominant-baseline="central" fill="#534AB7">km 1</text>

<rect x="130" y="320" width="80" height="60" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="170" y="343" text-anchor="middle" dominant-baseline="central" fill="#3C3489">gw</text>
<text class="ts" x="170" y="362" text-anchor="middle" dominant-baseline="central" fill="#534AB7">km 2</text>

<rect x="230" y="320" width="80" height="60" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="270" y="343" text-anchor="middle" dominant-baseline="central" fill="#3C3489">gw</text>
<text class="ts" x="270" y="362" text-anchor="middle" dominant-baseline="central" fill="#534AB7">km 50</text>

<line x1="80" y1="380" x2="80" y2="430" stroke="#1D9E75" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.6"/>
<line x1="170" y1="380" x2="170" y2="430" stroke="#1D9E75" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.6"/>
<line x1="270" y1="380" x2="270" y2="430" stroke="#1D9E75" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.6"/>

<text class="ts" x="40" y="450">end-device LoRaWAN distribuiti lungo il tratto (per ciascun gateway: ~10-30 sensori)</text>

<text class="ts" x="40" y="490">Ciascun CdC regionale gestisce autonomamente la propria rete LoRaWAN.</text>
<text class="ts" x="40" y="508">L'application server al CN aggrega i dati di tutti i CdC e li espone alle dashboard nazionali.</text>
<text class="ts" x="40" y="526">Scalabilità garantita: il carico per network server è il 2% della capacità nominale.</text>
</svg>
