<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 540" width="720" height="540" font-family="Segoe UI, system-ui, sans-serif">
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#6b7280"/></marker></defs>
  <text x="360" y="24" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2937">Edificio 2 — VLAN 802.1Q, inter-VLAN routing (router-on-a-stick) e ACL</text>
  <!-- ISP -->
  <ellipse cx="610" cy="78" rx="44" ry="28" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="610" y="74" text-anchor="middle" font-size="12" font-weight="600" fill="#3730a3">ISP</text>
  <text x="610" y="89" text-anchor="middle" font-size="10" fill="#3730a3">200.1.2.4/30</text>
  <line x1="610" y1="106" x2="610" y2="134" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>
  <!-- router-firewall -->
  <rect x="528" y="136" width="164" height="56" rx="8" fill="#fed7aa" stroke="#ea580c" stroke-width="1.6"/>
  <text x="610" y="158" text-anchor="middle" font-size="13" font-weight="700" fill="#7c2d12">router1 + Firewall</text>
  <text x="610" y="174" text-anchor="middle" font-size="10" fill="#7c2d12">NAT/PAT · sottoint. 802.1Q</text>
  <text x="610" y="187" text-anchor="middle" font-size="10" fill="#7c2d12">g0/1 (trunk)</text>
  <!-- trunk -->
  <line x1="528" y1="180" x2="430" y2="248" stroke="#1f2937" stroke-width="2.4" marker-end="url(#a)"/>
  <text x="500" y="218" font-size="10" font-weight="600" fill="#1f2937">trunk 802.1Q</text>
  <text x="500" y="231" font-size="9" fill="#374151">VLAN 10/20/30/99</text>
  <!-- switch L2 -->
  <rect x="300" y="248" width="170" height="50" rx="6" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.6"/>
  <text x="385" y="270" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Switch L2 managed</text>
  <text x="385" y="286" text-anchor="middle" font-size="10" fill="#1e3a8a">porte access untagged</text>
  <!-- linee verso VLAN -->
  <line x1="340" y1="298" x2="150" y2="360" stroke="#9ca3af" stroke-width="1.4"/>
  <line x1="385" y1="298" x2="385" y2="360" stroke="#9ca3af" stroke-width="1.4"/>
  <line x1="430" y1="298" x2="600" y2="360" stroke="#9ca3af" stroke-width="1.4"/>
  <!-- VLAN 10 contabile -->
  <ellipse cx="135" cy="402" rx="120" ry="42" fill="#fecaca" stroke="#dc2626" stroke-width="1.5"/>
  <text x="135" y="392" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">VLAN 10 — Contabile</text>
  <text x="135" y="409" text-anchor="middle" font-size="11" fill="#7f1d1d">192.168.1.0/28</text>
  <text x="135" y="425" text-anchor="middle" font-size="9" fill="#7f1d1d">7 host · gateway .1</text>
  <!-- VLAN 20 commerciale -->
  <ellipse cx="385" cy="402" rx="120" ry="42" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="385" y="392" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">VLAN 20 — Commerciale</text>
  <text x="385" y="409" text-anchor="middle" font-size="11" fill="#14532d">192.168.1.32/27</text>
  <text x="385" y="425" text-anchor="middle" font-size="9" fill="#14532d">15 host · gateway .33</text>
  <!-- VLAN 30 DMZ -->
  <ellipse cx="620" cy="402" rx="92" ry="42" fill="#fef08a" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="620" y="392" text-anchor="middle" font-size="12" font-weight="700" fill="#713f12">VLAN 30 — DMZ</text>
  <text x="620" y="409" text-anchor="middle" font-size="11" fill="#713f12">192.168.1.64/28</text>
  <text x="620" y="425" text-anchor="middle" font-size="9" fill="#713f12">gateway .65</text>
  <!-- ACL note -->
  <rect x="60" y="470" width="600" height="52" rx="6" fill="#fffbeb" stroke="#d97706" stroke-width="1.2"/>
  <text x="360" y="490" text-anchor="middle" font-size="11" font-weight="700" fill="#78350f">ACL su g0/1.20 (in): deny Commerciale → Contabile, poi permit verso Internet/tunnel</text>
  <text x="360" y="510" text-anchor="middle" font-size="10" fill="#374151" font-family="monospace">deny ip 192.168.1.32 0.0.0.31 192.168.1.0 0.0.0.15   |   permit ip 192.168.1.32 0.0.0.31 any</text>
</svg>
