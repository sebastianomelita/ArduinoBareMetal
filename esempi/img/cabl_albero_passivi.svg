<svg viewBox="0 0 980 470" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .tit{font-size:13px;font-weight:700;fill:#202124}
    .sub{font-size:11px;fill:#5f6368}
    .bd{fill:#fce8e6;stroke:#d93025}
    .fd{fill:#e6f4ea;stroke:#137333}
    .pp{fill:#e8f0fe;stroke:#1a73e8}
    .to{fill:#fff;stroke:#1565c0}
    .fib{stroke:#ea8600;stroke-width:3;fill:none}
    .cu{stroke:#5f6368;stroke-width:2;fill:none}
  </style>
  <text x="490" y="26" text-anchor="middle" class="tit" font-size="16">3 · Albero degli apparati passivi (armadi, permutatori, dorsali, prese)</text>

  <!-- BD -->
  <rect x="380" y="50" width="220" height="64" rx="8" class="bd" stroke-width="2"/>
  <text x="490" y="74" text-anchor="middle" class="tit">Armadio BD (CED, PT)</text>
  <text x="490" y="94" text-anchor="middle" class="sub">CD≡BD · permutatori fibra + rame</text>

  <!-- FD-PT -->
  <rect x="120" y="190" width="220" height="60" rx="8" class="fd" stroke-width="2"/>
  <text x="230" y="214" text-anchor="middle" class="tit">Armadio FD-PT</text>
  <text x="230" y="233" text-anchor="middle" class="sub">permutatore rame di piano</text>
  <path d="M420 114 L260 190" class="fib"/>
  <text x="320" y="150" class="sub" fill="#ea8600">dorsale OM4</text>

  <!-- FD-P1 -->
  <rect x="640" y="190" width="220" height="60" rx="8" class="fd" stroke-width="2"/>
  <text x="750" y="214" text-anchor="middle" class="tit">Armadio FD-P1</text>
  <text x="750" y="233" text-anchor="middle" class="sub">permutatore rame di piano</text>
  <path d="M560 114 L720 190" class="fib"/>
  <text x="640" y="150" class="sub" fill="#ea8600">dorsale OM4</text>

  <!-- server farm patch -->
  <rect x="395" y="190" width="190" height="60" rx="8" class="pp" stroke-width="1.5"/>
  <text x="490" y="214" text-anchor="middle" class="sub" font-weight="700">Permutatore server farm</text>
  <text x="490" y="233" text-anchor="middle" class="sub">+ DMZ (in BD)</text>
  <line x1="490" y1="114" x2="490" y2="190" class="cu"/>

  <!-- TO PT -->
  <g>
    <rect x="70" y="330" width="60" height="34" rx="5" class="to" stroke-width="1.5"/><text x="100" y="352" text-anchor="middle" class="sub">TO PT-01</text>
    <rect x="150" y="330" width="60" height="34" rx="5" class="to" stroke-width="1.5"/><text x="180" y="352" text-anchor="middle" class="sub">PT-02</text>
    <rect x="230" y="330" width="70" height="34" rx="5" class="to" stroke-width="1.5"/><text x="265" y="352" text-anchor="middle" class="sub">… PT-12</text>
  </g>
  <line x1="200" y1="250" x2="100" y2="330" class="cu"/>
  <line x1="220" y1="250" x2="180" y2="330" class="cu"/>
  <line x1="250" y1="250" x2="265" y2="330" class="cu"/>
  <text x="185" y="392" text-anchor="middle" class="sub">cablaggio orizzontale Cat6A → prese TO</text>

  <!-- TO P1 -->
  <g>
    <rect x="650" y="330" width="60" height="34" rx="5" class="to" stroke-width="1.5"/><text x="680" y="352" text-anchor="middle" class="sub">TO P1-01</text>
    <rect x="730" y="330" width="60" height="34" rx="5" class="to" stroke-width="1.5"/><text x="760" y="352" text-anchor="middle" class="sub">P1-02</text>
    <rect x="810" y="330" width="70" height="34" rx="5" class="to" stroke-width="1.5"/><text x="845" y="352" text-anchor="middle" class="sub">… P1-20</text>
  </g>
  <line x1="720" y1="250" x2="680" y2="330" class="cu"/>
  <line x1="745" y1="250" x2="760" y2="330" class="cu"/>
  <line x1="775" y1="250" x2="845" y2="330" class="cu"/>
  <text x="765" y="392" text-anchor="middle" class="sub">cablaggio orizzontale Cat6A → prese TO</text>

  <text x="490" y="440" text-anchor="middle" class="sub">— fibra (dorsali di edificio) · — rame (server farm e cablaggio orizzontale). Permanent link ≤ 90 m, channel ≤ 100 m.</text>
</svg>
