<svg width="100%" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
<title>Architettura di ridondanza del join server LoRaWAN</title>
<desc>Due join server in configurazione active-active geograficamente separati, con replica sincrona del database chiavi e HSM in ogni sito, raggiunti dai network server via GSLB.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.t { font-size: 14px; fill: #2C2C2A; }
.ts { font-size: 12px; fill: #5F5E5A; }
.th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
</style>
</defs>

<rect x="260" y="20" width="160" height="60" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text class="th" x="340" y="44" text-anchor="middle" dominant-baseline="central" fill="#854F0B">GSLB · anycast</text>
<text class="ts" x="340" y="64" text-anchor="middle" dominant-baseline="central" fill="#BA7517">join.smart-road.example</text>

<line x1="320" y1="80" x2="180" y2="125" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="360" y1="80" x2="500" y2="125" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="60" y="125" width="240" height="170" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="180" y="150" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Join Server #1 — Milano</text>

<rect x="80" y="170" width="200" height="36" rx="6" fill="none" stroke="#3C3489" stroke-width="0.5"/>
<text class="ts" x="180" y="188" text-anchor="middle" dominant-baseline="central" fill="#534AB7">HSM (chiavi master)</text>

<rect x="80" y="216" width="200" height="36" rx="6" fill="none" stroke="#3C3489" stroke-width="0.5"/>
<text class="ts" x="180" y="234" text-anchor="middle" dominant-baseline="central" fill="#534AB7">DB AppKey · DevEUI · AppEUI</text>

<rect x="80" y="262" width="200" height="22" rx="4" fill="none" stroke="#3C3489" stroke-width="0.5"/>
<text class="ts" x="180" y="273" text-anchor="middle" dominant-baseline="central" fill="#534AB7">processo join · validazione OTAA</text>

<rect x="380" y="125" width="240" height="170" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="500" y="150" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Join Server #2 — Roma</text>

<rect x="400" y="170" width="200" height="36" rx="6" fill="none" stroke="#3C3489" stroke-width="0.5"/>
<text class="ts" x="500" y="188" text-anchor="middle" dominant-baseline="central" fill="#534AB7">HSM (chiavi master)</text>

<rect x="400" y="216" width="200" height="36" rx="6" fill="none" stroke="#3C3489" stroke-width="0.5"/>
<text class="ts" x="500" y="234" text-anchor="middle" dominant-baseline="central" fill="#534AB7">DB AppKey · DevEUI · AppEUI</text>

<rect x="400" y="262" width="200" height="22" rx="4" fill="none" stroke="#3C3489" stroke-width="0.5"/>
<text class="ts" x="500" y="273" text-anchor="middle" dominant-baseline="central" fill="#534AB7">processo join · validazione OTAA</text>

<line x1="300" y1="234" x2="380" y2="234" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="6 4"/>
<text class="ts" x="340" y="226" text-anchor="middle">replica</text>
<text class="ts" x="340" y="252" text-anchor="middle">sincrona</text>

<line x1="180" y1="295" x2="180" y2="370" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="500" y1="295" x2="500" y2="370" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="190" y="340">richieste OTAA</text>

<rect x="60" y="370" width="240" height="60" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="180" y="394" text-anchor="middle" dominant-baseline="central" fill="#085041">Network Server regionali</text>
<text class="ts" x="180" y="414" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">(uno per CdC)</text>

<rect x="380" y="370" width="240" height="60" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="500" y="394" text-anchor="middle" dominant-baseline="central" fill="#085041">Network Server edge</text>
<text class="ts" x="500" y="414" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">(uno per smart-gate)</text>

<rect x="200" y="465" width="280" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="340" y="487" text-anchor="middle" dominant-baseline="central" fill="#444441">Backup offline — terzo sito</text>
<text class="ts" x="340" y="506" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">disaster recovery, RTO ore</text>

<line x1="180" y1="295" x2="340" y2="465" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.5"/>
<line x1="500" y1="295" x2="340" y2="465" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.5"/>
</svg>
